# Unified build-scan-publish workflow for Atlan first-party app repos.
#
# Two modes controlled by the caller:
#   PR mode:    Build single-arch → Trivy + Snyk scan → Security gate (blocks on CRITICAL/HIGH)
#   Merge mode: Build multi-arch → Push to GHCR → Trivy + Snyk scan → Security gate → Publish
#
# The security gate checks scan results against .security/allowlist.json in the caller repo.
# New CRITICAL/HIGH vulnerabilities not in the allowlist will fail the workflow.
#
# Usage in each app repo:
#
#   # .github/workflows/build-and-scan.yaml (on PR)
#   on:
#     pull_request:
#       branches: [main]
#   jobs:
#     build-scan:
#       uses: atlanhq/application-sdk/.github/workflows/build-scan-publish.yaml@main
#       with:
#         mode: scan
#       secrets: inherit
#
#   # .github/workflows/build-and-publish.yaml (on merge)
#   on:
#     push:
#       branches: [main]
#   jobs:
#     build-scan-publish:
#       uses: atlanhq/application-sdk/.github/workflows/build-scan-publish.yaml@main
#       with:
#         mode: publish
#         publish: true
#       secrets: inherit
#
name: Build, Scan & Publish

on:
  workflow_call:
    inputs:
      mode:
        description: "'scan' for PR (single-arch, no push) or 'publish' for merge (multi-arch, push + publish)"
        required: false
        type: string
        default: "scan"
      ref:
        description: "Branch or SHA to checkout and build (default: caller's ref)"
        required: false
        type: string
      publish:
        description: "Whether to publish to marketplace after build (default: false)"
        required: false
        type: boolean
        default: false
      channel:
        description: "Target channel (e.g. 'all' for draft release requiring approval)"
        required: false
        type: string
        default: "all"
      tenants:
        description: "Comma-separated tenant IDs for targeted publish"
        required: false
        type: string
        default: ""
      base_url:
        description: "Marketplace API base URL"
        required: false
        type: string
        default: "https://home.atlan.com"
      snyk_monitor:
        description: "Push scan results to Snyk UI dashboard"
        required: false
        type: boolean
        default: false
      snyk_org:
        description: "Snyk organization slug"
        required: false
        type: string
        default: "partner-images"
    secrets:
      ORG_PAT_GITHUB:
        required: true
      DOCKER_HUB_PAT_RW:
        required: false
      APP_PUBLISH_TOKEN:
        required: false

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  # ── Job 1: Read atlan.yaml, validate, compute tags ─────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_name:         ${{ steps.manifest.outputs.app_name }}
      app_id:           ${{ steps.manifest.outputs.app_id }}
      dockerfile:       ${{ steps.manifest.outputs.dockerfile }}
      enable_sdr:       ${{ steps.manifest.outputs.enable_sdr }}
      deploy_config:    ${{ steps.manifest.outputs.deploy_config }}
      sdk_version:      ${{ steps.manifest.outputs.sdk_version }}
      branch:           ${{ steps.tags.outputs.branch }}
      image_tag:        ${{ steps.tags.outputs.image_tag }}
      ghcr_base:        ${{ steps.tags.outputs.ghcr_base }}
      ghcr_image:       ${{ steps.tags.outputs.ghcr_image }}
      ghcr_branch_tag:  ${{ steps.tags.outputs.ghcr_branch_tag }}
      dockerhub_image:  ${{ steps.tags.outputs.dockerhub_image }}
      scan_image:       ${{ steps.tags.outputs.scan_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Read atlan.yaml
        id: manifest
        run: |
          if [ ! -f atlan.yaml ]; then
            echo "::error::atlan.yaml not found in repo root"
            exit 1
          fi

          python3 - <<'PYEOF'
          import yaml, sys, os, json, re

          try:
              with open('atlan.yaml') as f:
                  d = yaml.safe_load(f) or {}
          except yaml.YAMLError as e:
              print(f'::error::atlan.yaml is invalid YAML: {e}', file=sys.stderr)
              sys.exit(1)

          app_name   = d.get('name', '')
          app_id     = d.get('app_id', '')
          build_tag  = d.get('build_tag', 'v1')
          dockerfile = d.get('dockerfile', './Dockerfile')
          enable_sdr = 'true' if d.get('self_deployed_runtime', False) else 'false'

          if not app_name:
              print('::error::atlan.yaml is missing required "name" field', file=sys.stderr)
              sys.exit(1)

          if build_tag != 'v1':
              print(f"::error::Unsupported build_tag '{build_tag}'. Only 'v1' is supported.", file=sys.stderr)
              sys.exit(1)

          deploy_config = ''
          deploy_val = d.get('deploy')
          if deploy_val is not None:
              deploy_config = yaml.dump(deploy_val, default_flow_style=False)

          sdk_version = ''
          try:
              re_ver = re.compile(r'^version\s*=\s*"([^"]+)"')
              in_sdk_block = False
              with open('uv.lock') as f:
                  for line in f:
                      line = line.rstrip()
                      if line == 'name = "atlan-application-sdk"':
                          in_sdk_block = True
                          continue
                      if in_sdk_block:
                          m = re_ver.match(line)
                          if m:
                              sdk_version = m.group(1)
                              break
                          if line.startswith('name = ') or line.startswith('[['):
                              break
          except FileNotFoundError:
              pass

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'app_name={app_name}\n')
              out.write(f'app_id={app_id}\n')
              out.write(f'build_tag={build_tag}\n')
              out.write(f'dockerfile={dockerfile}\n')
              out.write(f'enable_sdr={enable_sdr}\n')
              out.write(f'sdk_version={sdk_version}\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'deploy_config<<DEPLOY_EOF\n')
              out.write(f'{deploy_config}\n')
              out.write(f'DEPLOY_EOF\n')

          print(f'App: {app_name}')
          print(f'App ID: {app_id}')
          print(f'Dockerfile: {dockerfile}')
          print(f'SDR: {enable_sdr}')
          print(f'SDK version: {sdk_version}')
          PYEOF

      - name: Validate SDR secrets
        if: steps.manifest.outputs.enable_sdr == 'true'
        env:
          HAS_PAT: ${{ secrets.DOCKER_HUB_PAT_RW != '' && 'true' || 'false' }}
        run: |
          if [ "$HAS_PAT" != "true" ]; then
            echo "::error::atlan.yaml sets self_deployed_runtime=true but DOCKER_HUB_PAT_RW secret is not set."
            exit 1
          fi

      - name: Validate publish secrets
        if: inputs.publish
        env:
          HAS_TOKEN: ${{ secrets.APP_PUBLISH_TOKEN != '' && 'true' || 'false' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::error::publish=true but APP_PUBLISH_TOKEN secret is not set."
            exit 1
          fi

      - name: Compute image tags
        id: tags
        env:
          REPO: ${{ github.event.repository.name }}
          REF: ${{ inputs.ref || github.ref }}
          MODE: ${{ inputs.mode }}
        run: |
          SHA=$(git rev-parse HEAD)
          if ! [[ "$REF" =~ ^(refs/heads/|refs/tags/)?[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid ref format: ${REF}"
            exit 1
          fi

          BRANCH=$(echo "$REF" | sed 's|refs/heads/||' | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr '_' '-')
          IMAGE_TAG="${SHA:0:7}"

          GHCR_BASE="ghcr.io/atlanhq/${REPO}"
          GHCR_IMAGE="${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}"
          GHCR_BRANCH_TAG="${GHCR_BASE}:${BRANCH}"

          DOCKERHUB_BASE="atlanhq/${REPO}"
          DOCKERHUB_IMAGE="${DOCKERHUB_BASE}:${BRANCH}-${IMAGE_TAG}"

          # In scan mode, image stays local; in publish mode, it's the GHCR image
          if [ "$MODE" = "scan" ]; then
            SCAN_IMAGE="scan-target:${SHA:0:7}"
          else
            SCAN_IMAGE="${GHCR_IMAGE}"
          fi

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_branch_tag=${GHCR_BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${DOCKERHUB_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "scan_image=${SCAN_IMAGE}" >> "$GITHUB_OUTPUT"

          echo "Mode: ${MODE}"
          echo "Branch: ${BRANCH}"
          echo "Scan image: ${SCAN_IMAGE}"

  # ── Job 2a: Build for scan mode (single-arch, local, no push) ──────────────
  build-scan:
    name: Build (scan)
    if: inputs.mode == 'scan'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build and export image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ needs.prepare.outputs.dockerfile }}
          push: false
          tags: ${{ needs.prepare.outputs.scan_image }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha,scope=scan
          cache-to: type=gha,mode=max,scope=scan
          provenance: false
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── Job 2b: Build for publish mode (multi-arch, push to GHCR) ──────────────
  build-publish:
    name: Build (${{ matrix.arch }})
    if: inputs.mode == 'publish'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build and push arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ needs.prepare.outputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.prepare.outputs.ghcr_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.image_tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}

  # ── Job 3: Merge multi-arch manifest (publish mode only) ───────────────────
  merge:
    name: Merge & Push Manifest
    if: inputs.mode == 'publish'
    needs: [prepare, build-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.enable_sdr == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: atlanhq
          password: ${{ secrets.DOCKER_HUB_PAT_RW }}

      - name: Create and push multi-arch manifest
        env:
          GHCR_BASE:       ${{ needs.prepare.outputs.ghcr_base }}
          GHCR_IMAGE:      ${{ needs.prepare.outputs.ghcr_image }}
          GHCR_BRANCH_TAG: ${{ needs.prepare.outputs.ghcr_branch_tag }}
          BRANCH:          ${{ needs.prepare.outputs.branch }}
          IMAGE_TAG:       ${{ needs.prepare.outputs.image_tag }}
        run: |
          docker buildx imagetools create \
            --tag "${GHCR_IMAGE}" \
            --tag "${GHCR_BRANCH_TAG}" \
            "${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}-amd64" \
            "${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}-arm64"
          echo "Multi-arch manifest pushed: ${GHCR_IMAGE}"

      - name: Push to Docker Hub
        if: needs.prepare.outputs.enable_sdr == 'true'
        env:
          GHCR_IMAGE:      ${{ needs.prepare.outputs.ghcr_image }}
          DOCKERHUB_IMAGE: ${{ needs.prepare.outputs.dockerhub_image }}
        run: |
          docker buildx imagetools create --tag "${DOCKERHUB_IMAGE}" "${GHCR_IMAGE}"
          echo "Pushed to DockerHub: ${DOCKERHUB_IMAGE}"

  # ── Job 4: Trivy scan (parallel with Snyk) ─────────────────────────────────
  trivy-scan:
    name: Trivy Scan
    needs: [prepare, build-scan, merge]
    if: |
      always() &&
      (needs.build-scan.result == 'success' || needs.merge.result == 'success') &&
      !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download image artifact (scan mode)
        if: inputs.mode == 'scan'
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load local image (scan mode)
        if: inputs.mode == 'scan'
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR (publish mode)
        if: inputs.mode == 'publish'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Install Trivy
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          TRIVY_VERSION=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/aquasecurity/trivy/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | sed 's/^v//')
          curl -sL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy

      - name: Run Trivy scan
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        run: |
          trivy image \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --format json \
            --quiet \
            --output /tmp/trivy_results.json \
            ${{ needs.prepare.outputs.scan_image }}

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: /tmp/trivy_results.json
          retention-days: 1

  # ── Job 5: Snyk scan (parallel with Trivy) ─────────────────────────────────
  snyk-scan:
    name: Snyk Scan
    needs: [prepare, build-scan, merge]
    if: |
      always() &&
      (needs.build-scan.result == 'success' || needs.merge.result == 'success') &&
      !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download image artifact (scan mode)
        if: inputs.mode == 'scan'
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load local image (scan mode)
        if: inputs.mode == 'scan'
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR (publish mode)
        if: inputs.mode == 'publish'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk container scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.us.snyk.io
        run: |
          snyk container test ${{ needs.prepare.outputs.scan_image }} \
            --severity-threshold=high \
            --org=${{ inputs.snyk_org }} \
            --json-file-output=/tmp/snyk_results.json || true

      - name: Monitor with Snyk
        if: inputs.snyk_monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.us.snyk.io
        run: |
          snyk container monitor ${{ needs.prepare.outputs.scan_image }} \
            --severity-threshold=high \
            --org=${{ inputs.snyk_org }}

      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: /tmp/snyk_results.json
          retention-days: 1

  # ── Job 6: Security Gate — merge results, check allowlist ───────────────────
  security-gate:
    name: Security Gate
    needs: [prepare, trivy-scan, snyk-scan]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for allowlist)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Download Trivy results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: trivy-results
          path: /tmp

      - name: Download Snyk results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: snyk-results
          path: /tmp

      - name: Check against allowlist
        run: |
          python3 - <<'PYEOF'
          import json, sys, os
          from datetime import datetime

          allowlist_path = ".security/allowlist.json"
          if os.path.exists(allowlist_path):
              with open(allowlist_path) as f:
                  allowlist = json.load(f)
          else:
              allowlist = {}

          today = datetime.now().strftime("%Y-%m-%d")
          all_vulns = {}

          # Parse Trivy
          trivy_count = 0
          try:
              with open("/tmp/trivy_results.json") as f:
                  trivy = json.load(f)
              for result in trivy.get("Results", []):
                  for vuln in result.get("Vulnerabilities", []):
                      vid = vuln.get("VulnerabilityID")
                      if vid and vid not in all_vulns:
                          all_vulns[vid] = {
                              "id": vid,
                              "severity": vuln.get("Severity", "").upper(),
                              "package": vuln.get("PkgName", ""),
                              "installed": vuln.get("InstalledVersion", ""),
                              "fixed": vuln.get("FixedVersion", ""),
                              "source": "trivy",
                          }
                          trivy_count += 1
          except Exception as e:
              print(f"Warning: Trivy results unavailable: {e}")

          # Parse Snyk
          snyk_count = 0
          try:
              with open("/tmp/snyk_results.json") as f:
                  snyk = json.load(f)
              if not snyk.get("error"):
                  for vuln in snyk.get("vulnerabilities", []):
                      vid = vuln.get("id")
                      cves = vuln.get("identifiers", {}).get("CVE", [])
                      if vid and vid not in all_vulns:
                          if not any(c in all_vulns for c in cves):
                              all_vulns[vid] = {
                                  "id": vid,
                                  "severity": vuln.get("severity", "").upper(),
                                  "package": vuln.get("packageName") or vuln.get("name", ""),
                                  "installed": vuln.get("version", ""),
                                  "fixed": ", ".join(vuln.get("fixedIn", [])) if vuln.get("fixedIn") else "",
                                  "source": "snyk",
                              }
                              snyk_count += 1
                  for app in snyk.get("applications", []):
                      for vuln in app.get("vulnerabilities", []):
                          vid = vuln.get("id")
                          if vid and vid not in all_vulns:
                              all_vulns[vid] = {
                                  "id": vid,
                                  "severity": vuln.get("severity", "").upper(),
                                  "package": vuln.get("packageName") or vuln.get("name", ""),
                                  "installed": vuln.get("version", ""),
                                  "fixed": ", ".join(vuln.get("fixedIn", [])) if vuln.get("fixedIn") else "",
                                  "source": "snyk",
                              }
                              snyk_count += 1
          except Exception as e:
              print(f"Warning: Snyk results unavailable: {e}")

          unique = list(all_vulns.values())
          allowed, expired, new_vulns = [], [], []

          for v in unique:
              entry = allowlist.get(v["id"])
              if entry and not entry.get("_comment"):
                  if today > entry.get("expires", "9999-12-31"):
                      expired.append(v)
                  else:
                      allowed.append(v)
              else:
                  new_vulns.append(v)

          sev_order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3}
          new_vulns.sort(key=lambda x: sev_order.get(x["severity"], 9))
          expired.sort(key=lambda x: sev_order.get(x["severity"], 9))

          print(f"\n{'='*60}")
          print(f"VULNERABILITY SCAN RESULTS (Full Docker Image)")
          print(f"{'='*60}")
          print(f"Scanners: Trivy ({trivy_count} findings) + Snyk ({snyk_count} findings)")
          print(f"Total unique CRITICAL/HIGH: {len(unique)}")
          print(f"  Allowlisted: {len(allowed)}")
          print(f"  Expired:     {len(expired)}")
          print(f"  NEW:         {len(new_vulns)}")
          print(f"{'='*60}\n")

          if allowed:
              print(f"--- Allowlisted ({len(allowed)}) ---")
              for v in allowed:
                  print(f"  {v['severity']:8s} [{v['source']:5s}] {v['id']}")
              print()

          if expired:
              print(f"--- Expired ({len(expired)}) - must fix or re-approve ---")
              for v in expired:
                  print(f"  {v['severity']:8s} [{v['source']:5s}] {v['id']} {v['package']}@{v['installed']}")
              print()

          if new_vulns:
              print(f"--- NEW ({len(new_vulns)}) - must fix or add to allowlist ---")
              for v in new_vulns:
                  fix = f" -> fix: {v['fixed']}" if v["fixed"] else ""
                  print(f"  {v['severity']:8s} [{v['source']:5s}] {v['id']} {v['package']}@{v['installed']}{fix}")
              print()

          blockers = new_vulns + expired
          if blockers:
              summary = f"### Security Gate Failed\n\n"
              summary += f"Found **{len(blockers)}** CRITICAL/HIGH vulnerability(ies) not in the allowlist:\n\n"
              summary += "| Severity | Scanner | ID | Package | Fix |\n"
              summary += "|----------|---------|-----|---------|-----|\n"
              for v in blockers:
                  fix = v["fixed"] if v["fixed"] else "No fix"
                  summary += f"| {v['severity']} | {v['source']} | {v['id']} | {v['package']}@{v['installed']} | {fix} |\n"
              summary += f"\n**To resolve:** fix the vulnerability or add it to `.security/allowlist.json` with owner approval.\n"
              with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
                  f.write(summary)
              print(f"GATE FAILED: {len(blockers)} non-allowlisted vulnerabilities")
              sys.exit(1)
          else:
              print(f"GATE PASSED: All {len(unique)} vulnerabilities are allowlisted")
          PYEOF

  # ── Job 7: Dispatch deployment (publish mode, main only) ───────────────────
  app-deployment-dispatcher:
    name: Dispatch App Deployment
    needs: [prepare, security-gate, merge]
    if: inputs.mode == 'publish' && github.ref == 'refs/heads/main' && needs.prepare.outputs.enable_sdr == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ['atlanhq/atlan-apps-deployment']
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3.0.0
        with:
          token: ${{ secrets.ORG_PAT_GITHUB }}
          repository: ${{ matrix.repo }}
          event-type: dispatch_app_builder_workflow
          client-payload: |-
            {
                "app_name": "${{ needs.prepare.outputs.app_name }}",
                "image_name": "${{ needs.prepare.outputs.dockerhub_image }}"
            }

  # ── Job 8: Publish to Marketplace ──────────────────────────────────────────
  publish:
    name: Publish to Marketplace
    needs: [prepare, security-gate, merge]
    if: inputs.publish && inputs.mode == 'publish'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Publish version
        env:
          BASE_URL: ${{ inputs.base_url }}
          APP_PUBLISH_TOKEN: ${{ secrets.APP_PUBLISH_TOKEN }}
          GHCR_IMAGE: ${{ needs.prepare.outputs.ghcr_image }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
          APP_ID: ${{ needs.prepare.outputs.app_id }}
          APP_NAME: ${{ needs.prepare.outputs.app_name }}
          DEPLOY_CONFIG: ${{ needs.prepare.outputs.deploy_config }}
          SDK_VERSION: ${{ needs.prepare.outputs.sdk_version }}
          CHANNEL: ${{ inputs.channel }}
          TENANTS: ${{ inputs.tenants }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail

          BODY=$(python3 - <<'PYEOF'
          import json, os

          body = {
              "app_id": os.environ["APP_ID"],
              "image": os.environ["GHCR_IMAGE"],
              "version": os.environ["IMAGE_TAG"],
              "branch": os.environ["BRANCH"],
              "repo": os.environ["REPO_URL"],
              "source": "ci_publish",
          }

          config = os.environ.get("DEPLOY_CONFIG", "").strip()
          if config:
              body["config"] = config

          sdk = os.environ.get("SDK_VERSION", "").strip()
          if sdk:
              body["sdk_version"] = sdk

          tenants = os.environ.get("TENANTS", "").strip()
          if tenants:
              body["allowed_tenants"] = [t.strip() for t in tenants.split(",") if t.strip()]
          else:
              body["target_channel"] = os.environ.get("CHANNEL", "all") or "all"

          print(json.dumps(body))
          PYEOF
          )

          echo "Publishing ${APP_NAME} (${IMAGE_TAG}) to marketplace..."

          RESPONSE=$(curl -sf -X POST \
            "${BASE_URL}/api/service/marketplace/publish" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${APP_PUBLISH_TOKEN}" \
            -d "$BODY")

          echo "$RESPONSE" | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          d = r.get('data', {})
          print(f'Version: {d.get(\"version_id\", \"N/A\")}')
          print(f'Release: {d.get(\"release_id\", \"N/A\")}')
          print(f'App ID:  {d.get(\"app_id\", \"N/A\")}')
          "

          echo "### Publish complete" >> $GITHUB_STEP_SUMMARY
          echo "Published \`${APP_NAME}\` version \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
