name: Retag Docker Hub and dispatch deployment (SDR on GM approval)

# Triggered by Global Marketplace when a channel=all release is approved for an
# SDR-enabled app. Retags the immutable GHCR image to <branch>-latest on Docker Hub,
# then dispatches to atlan-apps-deployment to trigger the Helm rollout.
on:
  repository_dispatch:
    types: [sdr_release_approved]

jobs:
  retag-and-deploy:
    name: Retag Docker Hub → dispatch deployment
    runs-on: ubuntu-latest
    steps:
      - name: Derive image refs from GHCR image
        id: refs
        env:
          GHCR_IMAGE: ${{ github.event.client_payload.ghcr_image }}
        run: |
          # Input: ghcr.io/atlanhq/<repo>:<branch>-<sha7>
          path="${GHCR_IMAGE#ghcr.io/}"             # atlanhq/<repo>:<branch>-<sha7>
          repo="${path%:*}"                           # atlanhq/<repo>
          tag="${path#*:}"                            # <branch>-<sha7>
          branch="${tag%-*}"                          # <branch>  (strips last -<sha7>)
          app_name="${repo#atlanhq/}"                 # <repo>    (e.g. atlan-bigquery-app)
          dockerhub_image="${repo}:${tag}"            # atlanhq/<repo>:<branch>-<sha7>
          dockerhub_latest="${repo}:${branch}-latest" # atlanhq/<repo>:<branch>-latest

          echo "ghcr_image=${GHCR_IMAGE}"          >> "$GITHUB_OUTPUT"
          echo "repo=${repo}"                        >> "$GITHUB_OUTPUT"
          echo "app_name=${app_name}"                >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${dockerhub_image}"  >> "$GITHUB_OUTPUT"
          echo "dockerhub_latest=${dockerhub_latest}" >> "$GITHUB_OUTPUT"

          echo "GHCR image:       ${GHCR_IMAGE}"
          echo "DockerHub image:  ${dockerhub_image}"
          echo "DockerHub latest: ${dockerhub_latest}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: docker.io
          username: atlanhq
          password: ${{ secrets.DOCKER_HUB_PAT_RW }}

      - name: Retag to branch-latest on Docker Hub
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.refs.outputs.dockerhub_latest }}" \
            "${{ steps.refs.outputs.ghcr_image }}"
          echo "Retagged: ${{ steps.refs.outputs.ghcr_image }} → ${{ steps.refs.outputs.dockerhub_latest }}"

      - name: Dispatch to atlan-apps-deployment
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.ORG_PAT_GITHUB }}
          repository: atlanhq/atlan-apps-deployment
          event-type: dispatch_app_builder_workflow
          client-payload: |-
            {
              "app_name": "${{ steps.refs.outputs.app_name }}",
              "image_name": "${{ steps.refs.outputs.dockerhub_image }}"
            }
