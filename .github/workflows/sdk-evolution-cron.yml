# SDK Evolution — nightly codebase scan
#
# Dispatches the sdk-evolution snapshot on mothership to scan this repo
# for bugs, architecture violations, security issues, performance problems,
# and SDK improvement opportunities.
#
# Runs nightly at 2am UTC. Sunday runs are full scans (entire codebase).
# Weekday runs are incremental (changed files + dependency cone only).

name: SDK Evolution (Nightly)

on:
  schedule:
    - cron: '0 2 * * *'     # 2am UTC daily
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Scan mode: auto (Sunday=full), full, or incremental'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - incremental

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Connect to VPN (attempt 1/3)
        id: vpn1
        uses: atlanhq/github-actions/globalprotect-connect-action@main
        continue-on-error: true
        with:
          portal-url: ${{ vars.GLOBALPROTECT_PORTAL_URL }}
          username: ${{ secrets.GLOBALPROTECT_USERNAME }}
          password: ${{ secrets.GLOBALPROTECT_PASSWORD }}

      - name: Connect to VPN (attempt 2/3)
        if: steps.vpn1.outcome == 'failure'
        id: vpn2
        uses: atlanhq/github-actions/globalprotect-connect-action@main
        continue-on-error: true
        with:
          portal-url: ${{ vars.GLOBALPROTECT_PORTAL_URL }}
          username: ${{ secrets.GLOBALPROTECT_USERNAME }}
          password: ${{ secrets.GLOBALPROTECT_PASSWORD }}

      - name: Connect to VPN (attempt 3/3)
        if: steps.vpn2.outcome == 'failure'
        uses: atlanhq/github-actions/globalprotect-connect-action@main
        with:
          portal-url: ${{ vars.GLOBALPROTECT_PORTAL_URL }}
          username: ${{ secrets.GLOBALPROTECT_USERNAME }}
          password: ${{ secrets.GLOBALPROTECT_PASSWORD }}

      - name: Dispatch SDK Evolution
        env:
          MOTHERSHIP_URL: ${{ vars.MOTHERSHIP_URL }}
          HARNESS_TOKEN: ${{ secrets.HARNESS_TOKEN }}
          SCAN_MODE: ${{ inputs.scan_mode || 'auto' }}
        run: |
          # Verify mothership is reachable
          for attempt in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${MOTHERSHIP_URL}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then break; fi
            echo "Mothership unreachable (status=$STATUS), retrying... ($attempt/5)"
            sleep 5
          done

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cannot reach mothership after 5 attempts"
            exit 1
          fi

          PAYLOAD=$(jq -n \
            --arg repo_url "https://github.com/${{ github.repository }}" \
            --arg run_date "$(date +%Y-%m-%d)" \
            --arg scan_mode "${SCAN_MODE}" \
            '{
              repo_url: $repo_url,
              run_date: $run_date,
              scan_mode: $scan_mode
            }')

          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 30 \
            -X POST "${MOTHERSHIP_URL}/api/sdk-evolution/dispatch" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${HARNESS_TOKEN}" \
            -d "$PAYLOAD")

          echo "Dispatch status: $STATUS"
          cat /tmp/response.json

          if [ "$STATUS" -ge 400 ]; then
            echo "::error::SDK Evolution dispatch failed with status $STATUS"
            exit 1
          fi

          echo "SDK Evolution dispatched successfully"
