# Capability Manifest Drift Check
#
# Runs on every PR push. Regenerates docs/agents/sdk-capabilities.md via
# `uv run poe regen-capabilities` and fails if the committed file differs.
#
# This is an informational check — it is NOT a required status check. Reviewers
# should ensure the manifest is up to date before approval so any SDK-surface
# changes are visible in the PR's Files Changed tab.
#
# On drift: a sticky comment tells the contributor how to resolve:
#   - Comment `/regen-manifest` on the PR — the bot pushes the fix.
#   - Run `uv run poe regen-capabilities` locally and push.
#   - Run the `/capability-manifest` Claude Code skill locally and push.
#
# source-sha / source-date header lines are excluded from the diff.
# These fields reflect the last commit that touched application_sdk/ and are
# squash-merge-incompatible during a PR (the final squash SHA doesn't exist yet).
# They are updated whenever the manifest is regenerated post-merge.
#
# Noop for: bump-version-* branches (they only touch version/lockfile artefacts).
# No comment posted for: fork PRs (no ORG_PAT_GITHUB access anyway).
#
# NOTE: the job has NO job-level `if` condition even though release PRs skip all
# the real work.  A job-level skip is reported as "skipped" by GitHub Actions,
# and GitHub branch protection does NOT treat "skipped" as "success" for required
# status checks — leaving the check permanently pending and blocking the merge.
# Running the job unconditionally ensures the conclusion is always "success" or
# "failure", never the ambiguous "skipped".

name: Capability Manifest Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  merge_group:

# Cancel in-flight runs when the PR receives a new push, so we don't
# post duplicate sticky comments or waste runner time on stale SHAs.
concurrency:
  group: capability-manifest-check-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  drift-check:
    name: Capability Manifest Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Detect release PRs up-front so subsequent steps can gate on this flag.
      # Release PRs only touch version/lockfile artefacts — no manifest check needed.
      - name: Detect release PR
        id: ctx
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$HEAD_REF" == bump-version* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Release PR — capability manifest check is a noop."
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        if: steps.ctx.outputs.release == 'false'
        with:
          # Check out the PR branch HEAD, not the synthetic merge commit.
          # The default pull_request checkout is the GitHub-created test merge of
          # the PR into the base, so `git log -1 -- application_sdk/` can return a
          # commit from main that is newer than this branch — making an up-to-date
          # manifest look stale. Pinning to the PR head SHA gives a deterministic
          # view of exactly what the contributor pushed.
          ref: ${{ github.event.pull_request.head.sha }}
          # Full history required: extractor.py resolves source-sha via
          # `git log -1 --format=%H -- application_sdk/`, which fails on shallow clones
          # when the most recent SDK commit is below the shallow boundary.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        if: steps.ctx.outputs.release == 'false'

      - name: Regenerate capability manifest
        if: steps.ctx.outputs.release == 'false'
        run: uv run poe regen-capabilities

      - name: Check for drift
        id: drift
        if: steps.ctx.outputs.release == 'false'
        run: |
          # source-sha / source-date are excluded: with squash merges the final
          # SHA doesn't exist during the PR, so these fields are always stale
          # until the manifest is regenerated post-merge.
          # || true: grep exits 1 on no matches; with pipefail that would kill the
          # script before the [ -z ] check, producing a false drift failure.
          SEMANTIC=$(git diff -- docs/agents/sdk-capabilities.md \
            | grep '^[+-]' \
            | grep -v '^+++\|^---' \
            | grep -v '^[+-]source-sha:\|^[+-]source-date:' \
            || true)
          if [ -z "$SEMANTIC" ]; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "status=drift" >> "$GITHUB_OUTPUT"
            echo "Manifest is stale. Lines changed:"
            git diff --stat -- docs/agents/sdk-capabilities.md
            exit 1
          fi

      - name: Post sticky comment on drift
        if: failure() && steps.drift.outputs.status == 'drift' && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: capability-manifest-drift
          message: |
            ### 📚 Capability manifest drift detected

            `docs/agents/sdk-capabilities.md` is stale relative to the SDK source on this branch.

            **To resolve, pick one:**
            - Comment `/regen-manifest` on this PR — a bot will regenerate and push the update.
            - Run `uv run poe regen-capabilities` locally and push the result.
            - Run the `/capability-manifest` Claude Code skill locally and push.

            This check is informational, not blocking. Reviewers should ensure the manifest is
            current before approval so the SDK-surface diff is visible in **Files changed**.

      - name: Clear sticky comment when manifest is current
        if: success() && steps.ctx.outputs.release == 'false' && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: capability-manifest-drift
          delete: true
