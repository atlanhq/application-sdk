# Throwaway — repurposed to check App installation coverage across the fleet
# (called with secrets: inherit from atlan-hello-world-app). Delete after
# confirmed.
name: _throwaway Declared Secret Test (Reusable)

on:
  workflow_call:
    secrets:
      FLEET_APP_ID:
        required: true
        description: test
      FLEET_APP_PRIVATE_KEY:
        required: true
        description: test

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Mint fleet App token via declared workflow_call secret
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq

      - name: List all accessible repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api installation/repositories --paginate --jq '.repositories[].full_name' > /tmp/repos.txt
          echo "Total accessible: $(wc -l < /tmp/repos.txt)"
          echo "--- checking key repos ---"
          for r in atlanhq/atlan-mysql-app atlanhq/atlan-openapi-app atlanhq/atlan-metabase-app atlanhq/atlan-hello-world-app atlanhq/atlan-csa-csv-composite-app atlanhq/atlan-apps-deployment atlanhq/atlan-local-marketplace-app atlanhq/application-sdk; do
            if grep -qx "$r" /tmp/repos.txt; then echo "OK   $r"; else echo "MISS $r"; fi
          done
