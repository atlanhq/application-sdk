# Throwaway — testing whether DECLARING a secret in on.workflow_call.secrets
# (required: true) makes GitHub auto-resolve it from the caller's own
# org-visible secrets, even with NO `secrets: inherit` / explicit passthrough
# at the call site. Delete after the answer is confirmed.
name: _throwaway Declared Secret Test (Reusable)

on:
  workflow_call:
    secrets:
      FLEET_APP_ID:
        required: true
        description: test
      FLEET_APP_PRIVATE_KEY:
        required: true
        description: test

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Mint fleet App token via declared workflow_call secret
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq

      - name: Confirm it minted a real token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh api rate_limit --jq '.rate'
