# .github/workflows/conformance-ci.yaml
#
# Reusable workflow: CI/workflow supply-chain checks (C-series) via
# `suite.runner --series C`.  Currently enforces:
#   C001  UnpinnedActionReference — every external action must use a digest pin
#
# New C-series checks added to suite/checks/ are picked up automatically.
#
# Usage from a connector app:
#   uses: atlanhq/application-sdk/.github/workflows/conformance-ci.yaml@main
#   # No inputs needed — published PyPI package is used by default.
#   # To test an unreleased version: with: { conformance-ref: '<branch-or-sha>' }

name: "Conformance — CI series (C)"

on:
  workflow_call:
    inputs:
      conformance-ref:
        description: "Git ref for unreleased suite testing (empty = use published PyPI package)"
        required: false
        default: ""
        type: string
      scan-path:
        description: "Path to watch for workflow/action change detection (default: .github)"
        required: false
        default: .github
        type: string
      upload-sarif:
        description: "Upload SARIF report to GitHub Security tab (requires security-events: write)"
        required: false
        default: true
        type: boolean
      event_name:
        description: "Caller's github.event_name (push / pull_request / merge_group); reusable workflows always see 'workflow_call' internally"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    name: "CI"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout caller repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: "Detect changed files"
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        with:
          filters: |
            relevant:
              - '${{ inputs.scan-path }}/**'


      - name: "Set up uv"
        if: steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.32"

      - name: "Run C-series checks (published package)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref == ''
        run: |
          uvx atlan-application-sdk-conformance detect \
            --repo . \
            --series C \
            --output ci.sarif

      - name: "Run C-series checks (from git ref)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref != ''
        run: |
          uv run \
            --with "atlan-application-sdk-conformance @ git+https://github.com/atlanhq/application-sdk@${{ inputs.conformance-ref }}#subdirectory=packages/conformance" \
            -- atlan-application-sdk-conformance detect \
            --repo . \
            --series C \
            --output ci.sarif

      - name: "Upload SARIF artifact"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conformance-ci-sarif
          path: ci.sarif

      - name: "Strip suppressed results for Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        run: |
          jq '.runs[] |= (.results |= map(select(.suppressions == null or (.suppressions | length == 0))))' \
            ci.sarif > ci-upload.sarif

      - name: "Upload SARIF to Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: ci-upload.sarif
