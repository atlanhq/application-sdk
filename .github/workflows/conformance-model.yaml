# .github/workflows/conformance-model.yaml
#
# Reusable workflow: model-driven conformance checks (M-series) via
# `suite.runner --series M`.  These verdicts come from a pinned language model,
# not deterministic analysis (BLDX-1575), so this workflow is deliberately kept
# OFF the fast per-commit deterministic gate:
#
#   * It is ADVISORY — detect runs with --exit-zero, so a model finding never
#     fails the job.  The SARIF invocation.exitCode still records the real
#     result for the Security tab.
#   * Cadence is release-label opt-in (Option B): the CALLER invokes this only
#     when a release-gating label is present (mirrors how e2e/release gates run),
#     not on every PR commit.  A `workflow_dispatch` is provided for manual runs.
#   * It requires an ANTHROPIC_API_KEY.  When the key is absent the M-series
#     skips cleanly and emits nothing (no error, no red build).
#
# Findings flow through the identical SARIF -> Security tab / connector-pulse
# pipeline as every deterministic series; `atlan/mechanism="model"` plus the
# per-finding provenance (`atlan/modelId`, `atlan/promptVersion`, `atlan/evidence`)
# are the only markers that they are non-deterministic.
#
# Usage from a connector app (release-label gated):
#   jobs:
#     model-conformance:
#       if: contains(github.event.pull_request.labels.*.name, 'run-model-conformance')
#       uses: atlanhq/application-sdk/.github/workflows/conformance-model.yaml@main
#       secrets:
#         anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

name: "Conformance — Model series (M)"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      conformance-ref:
        description: "Git ref for unreleased suite testing (empty = use published PyPI package)"
        required: false
        default: ""
        type: string
      upload-sarif:
        description: "Upload SARIF report to GitHub Security tab (requires security-events: write)"
        required: false
        default: true
        type: boolean
    secrets:
      anthropic-api-key:
        description: "Anthropic API key used for model-driven M-series checks. When absent the series skips cleanly."
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  model:
    name: "Model (M)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout caller repo"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: "Set up uv"
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: "Run M-series checks (published package)"
        if: inputs.conformance-ref == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
        run: |
          uvx --from 'atlan-application-sdk-conformance[model]' \
            atlan-application-sdk-conformance detect \
            --repo . \
            --series M \
            --exit-zero \
            --output metadata.sarif

      - name: "Run M-series checks (from git ref)"
        if: inputs.conformance-ref != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
        run: |
          uv run \
            --with "atlan-application-sdk-conformance[model] @ git+https://github.com/atlanhq/application-sdk@${{ inputs.conformance-ref }}#subdirectory=packages/conformance" \
            -- atlan-application-sdk-conformance detect \
            --repo . \
            --series M \
            --exit-zero \
            --output metadata.sarif

      - name: "Upload SARIF artifact"
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conformance-metadata-sarif
          path: metadata.sarif

      - name: "Strip suppressed results for Security tab"
        if: ${{ inputs.upload-sarif && !cancelled() }}
        run: |
          jq '.runs[] |= (.results |= map(select(.suppressions == null or (.suppressions | length == 0))))' \
            metadata.sarif > metadata-upload.sarif

      - name: "Upload SARIF to Security tab"
        if: ${{ inputs.upload-sarif && !cancelled() }}
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: metadata-upload.sarif
