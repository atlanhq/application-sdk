name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, labeled, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

env:
  TEMPORAL_CLI_VERSION: "1.5.1"  # bundles Server 1.29.1 — matches tenant Server 1.29.4

jobs:
  # Detect which files changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      container: ${{ steps.filter.outputs.container }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            container:
              - 'Dockerfile'
              - 'entrypoint.sh'
            code:
              - 'application_sdk/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'examples/**'
              - '.github/**'
              - '.security/**'

  # Conventional Commits (skipped on fork PRs — no org PAT available)
  commits:
    name: Conventional Commits
    if: github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: webiny/action-conventional-commits@faccb24fc2550dd15c0390d944379d2d8ed9690e # v1.3.1
        with:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}

  docstr:
    name: Docstring Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/docstring-coverage"
        with:
          module-name: application_sdk
          fail-under: "30"

  # Security Checks
  trivy:
    name: Trivy Code Scan
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/trivy"
        with:
          add-report-comment-to-pr: "true"

  trivy-container:
    name: Trivy Container Scan
    needs: changes
    if: needs.changes.outputs.container == 'true' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/trivy-container"
        with:
          chainguard-username: ${{ secrets.CHAINGUARD_USERNAME }}
          chainguard-password: ${{ secrets.CHAINGUARD_PASSWORD }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          fail-on-vulns: 'true'

  # Testing
  unit:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-22.04, macOS-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/unit-tests"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          fail-under: "85"
          python-version: ${{ matrix.python-version }}

  integration:
    name: Integration Tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/setup-deps"

      - name: Install Temporal CLI
        run: |
          mkdir -p "$HOME/.temporalio/bin"
          curl -sSLf "https://github.com/temporalio/cli/releases/download/v${TEMPORAL_CLI_VERSION}/temporal_cli_${TEMPORAL_CLI_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/temporal.tar.gz
          tar -xzf /tmp/temporal.tar.gz -C /tmp
          mv /tmp/temporal "$HOME/.temporalio/bin/temporal"
          chmod +x "$HOME/.temporalio/bin/temporal"
          echo "$HOME/.temporalio/bin" >> "$GITHUB_PATH"

      - name: Start Temporal dev server
        run: temporal server start-dev --db-filename /tmp/temporal-integ.db &

      - name: Wait for Temporal to be ready
        run: |
          for i in $(seq 1 20); do
            if temporal workflow list --namespace default 2>/dev/null; then
              echo "Temporal is ready"
              break
            fi
            sleep 2
          done

      - name: Install and start Dapr runtime (daprd)
        run: |
          DAPR_CLI_VERSION="1.16.2"
          curl -sSLf "https://github.com/dapr/cli/releases/download/v${DAPR_CLI_VERSION}/dapr_linux_amd64.tar.gz" \
            -o /tmp/dapr-cli.tar.gz
          tar -xzf /tmp/dapr-cli.tar.gz -C /tmp dapr
          chmod +x /tmp/dapr
          sudo mv /tmp/dapr /usr/local/bin/dapr
          dapr init --runtime-version 1.16.0 --slim
          mkdir -p tests/integration/dapr-data/objectstore
          # Run daprd directly (no sidecar pattern) for deterministic behavior
          $HOME/.dapr/bin/daprd \
            --app-id integ-test \
            --dapr-http-port 3500 \
            --resources-path ./tests/integration/dapr-components \
            --placement-host-address '' \
            --scheduler-host-address '' \
            --log-level warn &
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3500/v1.0/metadata > /dev/null 2>&1; then
              echo "daprd is ready"
              break
            fi
            sleep 2
          done

      - name: Run integration tests
        env:
          TEMPORAL_HOST: "localhost:7233"
          DAPR_HTTP_PORT: "3500"
        run: uv run pytest tests/integration/ -m integration -v --timeout=120

  matrix-builder:
    name: Build Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get PR Labels
        id: get-labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const labelNames = labels.map(label => label.name).join(',');
            console.log(`PR Labels: ${labelNames}`);
            core.setOutput('labels', labelNames);

      - name: Build matrix from PR labels
        id: set-matrix
        run: |
          # Get the target branch of PR
          TARGET_BRANCH="${{ github.base_ref }}"
          # Default matrix if no label provided
          DEFAULT_MATRIX="{\"include\":[{\"repo_name\":\"atlan-openapi-app\",\"target_branch\":\"${TARGET_BRANCH}\"}]}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Parse labels from GitHub Script output
            LABELS="${{ steps.get-labels.outputs.labels }}"

            FOUND_LABEL=false
            INCLUDES=""

            echo "Found labels: ${LABELS}"

            IFS=',' read -ra LABEL_ARRAY <<< "$LABELS"
            for LABEL in "${LABEL_ARRAY[@]}"; do
              if [[ $LABEL =~ ^([^:]+):([^:]+)$ ]]; then
                REPO="${BASH_REMATCH[1]}"
                BRANCH="${BASH_REMATCH[2]}"

                # Add comma if not the first entry
                if [[ "$FOUND_LABEL" == "true" ]]; then
                  INCLUDES="${INCLUDES},"
                fi

                # Add this pair as a direct include entry
                INCLUDES="${INCLUDES}{\"repo_name\":\"${REPO}\",\"target_branch\":\"${BRANCH}\"}"
                FOUND_LABEL=true
                echo "Added pair: $REPO:$BRANCH"
              fi
            done

            # Generate matrix JSON with includes
            if [[ "$FOUND_LABEL" == "true" ]]; then
              MATRIX="{\"include\":[${INCLUDES}]}"
              echo "Generated matrix from labels: $MATRIX"
            else
              MATRIX="$DEFAULT_MATRIX"
              echo "No repo:branch labels found, using default matrix"
            fi
          else
            MATRIX="$DEFAULT_MATRIX"
            echo "Not a PR event, using default matrix"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix output: $MATRIX"

  # Run Examples
  run-examples:
    name: Run Examples
    needs: matrix-builder
    if: ((github.event.action == 'labeled' && github.event.label.name == 'run-examples') || contains(github.event.pull_request.labels.*.name, 'run-examples')) && github.event.pull_request.head.repo.fork != true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macOS-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/e2e-examples"
        with:
          operating-system: ${{ matrix.os }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          postgres-host: ${{ secrets.POSTGRES_HOST }}
          postgres-password: ${{ secrets.POSTGRES_PASSWORD }}
          snowflake-account-id: ${{ secrets.SNOWFLAKE_ACCOUNT_ID }}
          snowflake-user: ${{ secrets.SNOWFLAKE_USER }}
          snowflake-password: ${{ secrets.SNOWFLAKE_PASSWORD }}

  # E2E Tests: This step is run for each app in the matrix
  e2e-apps:
    name: E2E (Apps)
    needs: [changes, matrix-builder]
    if: ((github.event.action == 'labeled' && github.event.label.name == 'e2e-test') || contains(github.event.pull_request.labels.*.name, 'e2e-test')) && github.event.pull_request.head.repo.fork != true && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-builder.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/e2e-apps"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          repo-name: ${{ matrix.repo_name }}
          target-branch: "refs/heads/${{ matrix.target_branch }}"

  # SDR matrix — same <repo>:<branch> label parsing as matrix-builder
  # above, but a different default (the SDR-enabled connector fleet,
  # not openapi-app). Keeping them separate so the SDR path can grow
  # connectors independently of the legacy e2e path.
  #
  # No label gate — the SDR connector suite (~3 min per app) auto-runs
  # on every PR push so SDK changes are validated end-to-end against
  # the connector fleet by default. Custom <repo>:<branch> labels
  # still override the default matrix when a contributor wants to pin
  # an alternate target branch for a specific connector.
  sdr-matrix-builder:
    name: Build SDR Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get PR Labels
        id: get-labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const labelNames = labels.map(label => label.name).join(',');
            console.log(`PR Labels: ${labelNames}`);
            core.setOutput('labels', labelNames);

      - name: Build matrix from PR labels
        id: set-matrix
        run: |
          TARGET_BRANCH="${{ github.base_ref }}"
          # SDR-enabled connector fleet — extend this list as new
          # connectors wire up sdr-integration-tests.yaml.
          DEFAULT_MATRIX="{\"include\":[{\"repo_name\":\"atlan-mysql-app\",\"target_branch\":\"${TARGET_BRANCH}\"}]}"

          LABELS="${{ steps.get-labels.outputs.labels }}"
          FOUND_LABEL=false
          INCLUDES=""

          IFS=',' read -ra LABEL_ARRAY <<< "$LABELS"
          for LABEL in "${LABEL_ARRAY[@]}"; do
            if [[ $LABEL =~ ^([^:]+):([^:]+)$ ]]; then
              REPO="${BASH_REMATCH[1]}"
              BRANCH="${BASH_REMATCH[2]}"
              if [[ "$FOUND_LABEL" == "true" ]]; then
                INCLUDES="${INCLUDES},"
              fi
              INCLUDES="${INCLUDES}{\"repo_name\":\"${REPO}\",\"target_branch\":\"${BRANCH}\"}"
              FOUND_LABEL=true
              echo "Added SDR matrix entry: $REPO:$BRANCH"
            fi
          done

          if [[ "$FOUND_LABEL" == "true" ]]; then
            MATRIX="{\"include\":[${INCLUDES}]}"
          else
            MATRIX="$DEFAULT_MATRIX"
            echo "No repo:branch labels found, using default SDR matrix"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix output: $MATRIX"

  # SDR E2E Tests: dispatched on the connector repo at the PR's head SHA
  # so SDK changes are validated end-to-end against the connector fleet.
  # The connector's sdr-integration-tests.yaml accepts the
  # application_sdk_ref input and re-pins atlan-application-sdk to that
  # SHA before building the image + running tests.
  sdr-e2e-apps:
    name: SDR E2E (Apps)
    needs: [changes, sdr-matrix-builder]
    # No label gate — runs on every push to a non-fork, non-dependabot
    # PR. ~3 min per connector and validates the SDR contract end-to-
    # end, which is worth the spend on every SDK PR.
    if: github.event.pull_request.head.repo.fork != true && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.sdr-matrix-builder.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/e2e-apps"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          repo-name: ${{ matrix.repo_name }}
          target-branch: "refs/heads/${{ matrix.target_branch }}"
          workflow: sdr-integration-tests.yaml
          workflow-inputs: |
            { "application_sdk_ref": "${{ github.event.pull_request.head.sha }}" }

  # Tier-4 full-DAG e2e against the mysql connector. Opt-in via the
  # `test-e2e-full-mysql-app` label because each run is ~20 min and
  # creates real Connection assets on the test tenant. Add a similar
  # job + label per app as more connectors adopt the e2e-full harness
  # (the e2e-apps composite action is generic; just changes the
  # `workflow` filename + the dispatch label name).
  e2e-full-mysql-app:
    name: e2e-full (mysql)
    needs: [changes]
    if: |
      (
        (github.event.action == 'labeled' && github.event.label.name == 'test-e2e-full-mysql-app') ||
        contains(github.event.pull_request.labels.*.name, 'test-e2e-full-mysql-app')
      ) && github.event.pull_request.head.repo.fork != true && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: "./.github/actions/e2e-apps"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          repo-name: atlan-mysql-app
          target-branch: "refs/heads/${{ github.base_ref }}"
          workflow: e2e-full.yaml
          workflow-inputs: |
            { "application_sdk_ref": "${{ github.event.pull_request.head.sha }}" }

