name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, labeled, reopened]
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  # Detect which files changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      container: ${{ steps.filter.outputs.container }}
      # 'sdk'  — changes that can alter SDK behaviour, so the unit + integration
      #          tests must run. Deliberately EXCLUDES contract-toolkit/ (ships
      #          its own package + CI), docs/, and .github/ workflow-meta — a
      #          workflow-only or toolkit-only PR no longer drags in the full
      #          test matrix. The .github/actions/* entries are the test
      #          harness itself (the unit/integration deps + docstring-coverage
      #          wrappers), so changing *how* those checks run still re-runs them.
      sdk: ${{ steps.sdk-refine.outputs.sdk }}
      # 'ci'   — pull_request.yaml itself changed. Self-referential entry
      #          (mirrors sdk-gate.yaml's own self-test pattern) so that editing
      #          the connector / sdr-k8s-e2e dispatch glue re-runs those jobs
      #          in the merge queue — otherwise workflow-only PRs merge blind.
      ci: ${{ steps.filter.outputs.ci }}
      # 'scan' — wider net for the Trivy filesystem scan: every first-party
      #          source tree + the dependency lockfiles. Still short-circuits on
      #          pure docs/, .github-meta, and .security-only PRs.
      scan: ${{ steps.filter.outputs.scan }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # No explicit `base`: for pull_request, paths-filter diffs against the PR
      # base automatically; for merge_group it diffs the queued merge ref against
      # the default branch (the same proven setup the conformance jobs use).
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          # list-files: json is required so the sdk-refine step below can inspect
          # which files actually matched and suppress markdown-only false positives.
          list-files: json
          filters: |
            container:
              - 'Dockerfile'
              - 'entrypoint.sh'
            sdk:
              - 'application_sdk/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/unit-tests/**'
              - '.github/actions/setup-deps/**'
              - '.github/actions/docstring-coverage/**'
              # NOTE: do NOT add '!**/*.md' here. dorny/paths-filter passes '!'
              # patterns straight to picomatch, which interprets '!**/*.md' as
              # "match any file that is not a .md file" — a near-catch-all that
              # makes sdk=true for every non-markdown change in the repo. Markdown
              # exclusion is handled in the sdk-refine step below instead.
            ci:
              - '.github/workflows/pull_request.yaml'
            scan:
              - 'application_sdk/**'
              - 'contract-toolkit/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/trivy/**'

      # paths-filter sdk=true is necessary but not sufficient: the broad
      # application_sdk/** pattern also matches .md files, so a PR that only
      # touches e.g. application_sdk/README.md would incorrectly trigger the
      # docstring-coverage check and the SDK test matrix. Check whether ANY
      # matched file is non-.md; if all matched files are .md, suppress sdk=false.
      - name: Refine sdk — suppress markdown-only matches
        id: sdk-refine
        env:
          SDK_RESULT: ${{ steps.filter.outputs.sdk }}
          SDK_FILES: ${{ steps.filter.outputs.sdk_files }}
        run: |
          set -euo pipefail
          if [[ "$SDK_RESULT" != "true" ]]; then
            echo "sdk=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 .github/scripts/sdk_changes_non_md.py

  # Required status check — the JOB has no `if:` so it always runs and always
  # concludes. The real validation step is gated to PR (non-fork) events: the
  # webiny action needs ORG_PAT_GITHUB, which fork PRs don't get, and merge_group
  # entries have no PR commits to inspect. On those paths a no-op success step
  # keeps the required context green instead of leaving it "skipped" (which would
  # block fork PRs / the merge queue). The PR title — which becomes the squash
  # commit subject — is independently enforced by "Validate PR title".
  commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true
        with:
          fetch-depth: 0
      - uses: webiny/action-conventional-commits@7f91b1595ca1951cdb671ddc9f07a49081ec5b69 # v1.4.2
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true
        with:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
      - name: Skip on fork PR / merge_group
        if: github.event_name == 'merge_group' || github.event.pull_request.head.repo.fork == true
        run: echo "Commit-convention check not applicable here (fork PR or merge_group); PR title is enforced by Validate PR title."

  docstr:
    name: Docstring Coverage
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: "./.github/actions/docstring-coverage"
        with:
          module-name: application_sdk
          fail-under: "30"

  # Security Checks
  # Required status check — must ALWAYS run and ALWAYS conclude (never skip via a
  # job-level `if:`, which GitHub reports as "skipped" and leaves a required check
  # pending forever, blocking the merge queue). Instead the job always runs and
  # short-circuits its real steps when no first-party source/deps changed.
  trivy:
    name: Trivy Code Scan
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Short-circuit when nothing to scan
        if: needs.changes.outputs.scan != 'true'
        run: echo "No first-party source or dependency changes — Trivy code scan not needed."
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.scan == 'true'
      - uses: "./.github/actions/trivy"
        if: needs.changes.outputs.scan == 'true'
        with:
          add-report-comment-to-pr: "true"

  trivy-container:
    name: Trivy Container Scan
    needs: changes
    if: needs.changes.outputs.container == 'true' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: "./.github/actions/trivy-container"
        with:
          chainguard-username: ${{ secrets.CHAINGUARD_USERNAME }}
          chainguard-password: ${{ secrets.CHAINGUARD_PASSWORD }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          fail-on-vulns: 'true'

  # NOTE: SDK unit / integration / storage-emulator tests moved to
  # sdk-tests-reusable.yaml and now run under the composing sdk-gate.yaml.
  # The orthogonal checks below (commits, docstring coverage, Trivy scans) and
  # the connector e2e dispatch stay here.

  matrix-builder:
    name: Build Test Matrix
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build matrix
        id: set-matrix
        run: |
          # For pull_request, github.base_ref is the branch name (e.g. 'main').
          # For merge_group, github.base_ref is empty; use the event's base_ref
          # and strip the refs/heads/ prefix.
          TARGET_BRANCH="${{ github.base_ref }}"
          if [[ -z "$TARGET_BRANCH" ]]; then
            TARGET_BRANCH="${{ github.event.merge_group.base_ref }}"
            TARGET_BRANCH="${TARGET_BRANCH#refs/heads/}"
          fi
          MATRIX="{\"include\":[{\"repo_name\":\"atlan-openapi-app\",\"target_branch\":\"${TARGET_BRANCH}\"},{\"repo_name\":\"atlan-mysql-app\",\"target_branch\":\"${TARGET_BRANCH}\"},{\"repo_name\":\"atlan-metabase-app\",\"target_branch\":\"${TARGET_BRANCH}\"}]}"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # Build a PR-scoped SDK runtime base image so the connector e2e tests can
  # build the connector FROM the *rebuilt* base — exercising Dockerfile /
  # base-image / daprd-apk changes that the pip-install (application_sdk_ref)
  # path can't reach.
  #
  # Gated on the 'e2e' label ONLY (the same deliberate opt-in as
  # connector-tests below) — NOT on the `container` paths-filter or the
  # trivy-container scan. On merge_group this job is skipped and the
  # connector dispatch passes no base_image_ref, so the connector builds
  # FROM the released base exactly as before.
  #
  # Pushes to the public Harbor project (anonymous-pull), so the connector
  # build pulls it through the same path it already uses for
  # `FROM registry.atlan.com/public/app-runtime-base:<tag>` — no extra
  # registry auth on the connector side. Fork PRs are excluded (no secrets).
  build-sdk-base-image:
    name: Build SDK base image (e2e)
    needs: changes
    # sdk OR container: a Dockerfile-only PR (the prime base-image use case,
    # e.g. a daprd / base bump) is container==true / sdk==false — it must
    # still rebuild the base so the connector e2e exercises the new image.
    if: |
      (needs.changes.outputs.sdk == 'true' || needs.changes.outputs.container == 'true') &&
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'e2e') &&
      github.event.pull_request.head.repo.fork != true &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Compute PR base image ref
        id: ref
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "image=registry.atlan.com/public/app-runtime-base:pr-${PR_NUMBER}-sha-${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Log in to Atlan Harbor Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: registry.atlan.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Log in to Chainguard Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CHAINGUARD_USERNAME }}
          password: ${{ secrets.CHAINGUARD_PASSWORD }}
      - name: Build, scan, and push PR base image
        uses: ./.github/actions/secure-build-push-apps
        with:
          branch: ${{ github.ref_name }}
          context: .
          file: ./Dockerfile
          push: true
          # amd64 only — GitHub-hosted e2e runners are amd64; the connector
          # build (sdr-e2e) is single-platform too. Keeps the rebuild fast.
          platforms: linux/amd64
          tags: ${{ steps.ref.outputs.image }}
          build-args: |
            ACCESS_TOKEN_USR=$GITHUB_ACTOR
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
        env:
          DOCKER_CLIENT_TIMEOUT: 600
          COMPOSE_HTTP_TIMEOUT: 600

  # Connector tests: dispatches tests.yaml to each connector repo.
  # Triggers:
  #   merge_group — always runs on code-changing merge queue entries (the
  #     primary gate). Each entry has a unique SHA so runs are parallel.
  #     build-sdk-base-image is skipped here, so base_image_ref is omitted
  #     and connectors build FROM the released base.
  #   pull_request + 'e2e' label — opt-in during PR development; also used
  #     to release-gate the release PR before merging. The connector-side
  #     e2e job serialises itself via its own concurrency group, so
  #     simultaneous e2e-labelled PRs queue safely on the connector side.
  #     On this path base_image_ref is the freshly-built PR base image, so
  #     the connector is rebuilt on top of the SDK PR's runtime image.
  connector-tests:
    name: Connector Tests (${{ matrix.repo_name }})
    needs: [changes, matrix-builder, build-sdk-base-image]
    # always() so a *skipped* build-sdk-base-image (merge_group path) does
    # not auto-skip this job. The explicit result clause still BLOCKS this
    # job when the base build genuinely fails on the e2e path — a base that
    # won't build is the signal, not something to mask by silently falling
    # back to the released base.
    if: |
      always() &&
      needs.matrix-builder.result == 'success' &&
      (needs.build-sdk-base-image.result == 'success' || needs.build-sdk-base-image.result == 'skipped') && (
        (
          (needs.changes.outputs.sdk == 'true' || needs.changes.outputs.container == 'true' || needs.changes.outputs.ci == 'true') &&
          github.event_name == 'merge_group'
        ) ||
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'e2e') &&
          github.event.pull_request.head.repo.fork != true &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        )
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-builder.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: "./.github/actions/e2e-apps"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          repo-name: ${{ matrix.repo_name }}
          target-branch: "refs/heads/${{ matrix.target_branch }}"
          workflow: tests.yaml
          workflow-inputs: ${{ github.event_name == 'merge_group' && format('{{"application_sdk_ref":"{0}"}}', github.sha) || format('{{"application_sdk_ref":"{0}","run_e2e":"true","base_image_ref":"{1}"}}', github.event.pull_request.head.sha, needs.build-sdk-base-image.outputs.image) }}

  # SDR-on-Kubernetes e2e — dispatched cross-repo to atlan-local-marketplace-app,
  # which owns the orchestrator + charts and runs the hermetic kind e2e. LM
  # git-installs the SDK at application_sdk_ref (no base image needed), so this
  # job doesn't depend on build-sdk-base-image. Heavy work happens in the
  # dispatched LM run; this job dispatches + mirrors it.
  #
  # Gate design (mirrors the sdk-gate.yaml self-test pattern):
  #   merge_group — fires on sdk/container/ci changes. The 'ci' entry covers
  #     pull_request.yaml itself, so editing this dispatch glue re-runs the job
  #     in the merge queue — workflow-only PRs no longer merge blind.
  #   pull_request + 'e2e' label — opt-in regardless of what changed. The label
  #     is the operator's explicit decision; it is NOT subordinated to the
  #     sdk/container/ci filter (decoupled so workflow-only PRs can be validated
  #     by adding the label without touching SDK code).
  sdr-k8s-e2e:
    name: SDR K8s E2E (LM)
    needs: [changes]
    if: |
      (
        (needs.changes.outputs.sdk == 'true' || needs.changes.outputs.container == 'true' || needs.changes.outputs.ci == 'true') &&
        github.event_name == 'merge_group'
      ) ||
      (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'e2e') &&
        github.event.pull_request.head.repo.fork != true &&
        github.event.pull_request.user.login != 'dependabot[bot]'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: "./.github/actions/e2e-apps"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          repo-name: atlan-local-marketplace-app
          target-branch: "refs/heads/main"
          workflow: sdr-k8s-e2e.yaml
          workflow-inputs: ${{ github.event_name == 'merge_group' && format('{{"application_sdk_ref":"{0}"}}', github.sha) || format('{{"application_sdk_ref":"{0}"}}', github.event.pull_request.head.sha) }}

  # ── The single required check for the connector e2e area ────────────────────
  # Always runs and always concludes, so branch protection / the merge queue can
  # require exactly this one stable context instead of the matrix legs
  # (whose names are label-driven: "Connector Tests (<repo>)"). Without this,
  # the matrix legs are not required, so the merge queue (ALLGREEN) merges as
  # soon as the OTHER required contexts (SDK Gate, Trivy, …) conclude — even
  # while the connector legs are still running. This gate closes that window.
  #
  # Fail-closed, mirroring SDK Gate: connector-tests is skipped both legitimately
  # (docs-only PR: sdk==false && container==false) AND on upstream failure
  # (matrix-builder failed, or the e2e-path base build failed). A naive
  # "skipped → pass" would go green when ZERO connector tests ran because an
  # upstream job died. So we require changes + matrix-builder to have SUCCEEDED
  # and build-sdk-base-image to be success|skipped (never failure) before
  # treating a skipped connector-tests as the genuine docs-only skip.
  connector-gate:
    name: Connector Tests Gate
    needs: [changes, matrix-builder, build-sdk-base-image, connector-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate connector e2e area
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          MATRIX_RESULT: ${{ needs.matrix-builder.result }}
          BASE_IMAGE_RESULT: ${{ needs.build-sdk-base-image.result }}
          CONNECTOR_RESULT: ${{ needs.connector-tests.result }}
        run: |
          set -euo pipefail
          # Detection / matrix build have no path-skip — anything other than
          # success means we cannot trust whether the connector legs ran. A
          # connector-tests skip downstream of these would then be an
          # upstream-failure skip, not the docs-only skip. Fail closed.
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "::error::Detect Changes did not succeed ($CHANGES_RESULT) — failing the gate closed."
            exit 1
          fi
          if [[ "$MATRIX_RESULT" != "success" ]]; then
            echo "::error::Build Test Matrix did not succeed ($MATRIX_RESULT) — failing the gate closed."
            exit 1
          fi
          # build-sdk-base-image is legitimately skipped on merge_group and on
          # non-e2e PRs; only a genuine build FAILURE must block (a base that
          # won't build is the signal, per the connector-tests if: comment).
          if [[ "$BASE_IMAGE_RESULT" != "success" && "$BASE_IMAGE_RESULT" != "skipped" ]]; then
            echo "::error::Build SDK base image did not succeed ($BASE_IMAGE_RESULT) — failing the gate closed."
            exit 1
          fi
          # With upstream proven healthy, a skipped connector-tests is the
          # genuine docs-only skip (sdk==false && container==false) → pass.
          if [[ "$CONNECTOR_RESULT" == "success" || "$CONNECTOR_RESULT" == "skipped" ]]; then
            echo "✓ Connector Tests: $CONNECTOR_RESULT"
            echo "Connector gate passed."
          else
            echo "::error::Connector Tests did not pass ($CONNECTOR_RESULT) — failing the gate."
            exit 1
          fi

  # Real-cloud storage integration tests (S3 / Azure / GCS) — exercise
  # create_store_from_binding + CloudStore against real buckets/vaults using the
  # *_integration markers (excluded from default addopts; conftest skips when a
  # cloud's creds are absent). Label-gated ('storage-integration') so it only
  # runs on demand; the heavy/credentialed path stays off the per-PR hot path.
  # Fork PRs are excluded (no secrets). Nightly counterpart lives in schedule.yaml.
  storage-integration:
    name: Storage Integration Tests (S3 / Azure / GCS)
    if: |
      (
        (github.event.action == 'labeled' && github.event.label.name == 'storage-integration') ||
        contains(github.event.pull_request.labels.*.name, 'storage-integration')
      ) && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Keyless: all three clouds authenticate via GitHub OIDC (no static secrets).
    # Resource identifiers are non-secret repo variables (vars.*_INTEG_*).
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: "./.github/actions/setup-deps"
      - name: AWS — assume the integration role (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ vars.AWS_INTEG_ROLE_ARN }}
          aws-region: ${{ vars.AWS_INTEG_REGION }}
      - name: Azure — login (OIDC federated, no secret)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ vars.AZURE_INTEG_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_INTEG_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_INTEG_SUBSCRIPTION_ID }}
      - name: GCS — Workload Identity Federation (sets ADC)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_INTEG_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_INTEG_SA }}
      - name: Azure — write the federated token file for obstore WI auth
        run: |
          set -euo pipefail
          # Mint into a throwaway file and only publish it on success, so a failed
          # mint/parse can't leave a zero-byte token that yields an opaque AAD
          # error downstream instead of a clear "OIDC mint failed". --fail-with-body
          # makes curl exit non-zero on a non-2xx (still printing the body to debug).
          tmp="$(mktemp)"
          curl --fail-with-body -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | python3 -c 'import sys,json;sys.stdout.write(json.load(sys.stdin)["value"])' \
            > "$tmp"
          mv "$tmp" "${RUNNER_TEMP}/azure-federated-token"
      - name: Run storage integration tests (keyless)
        env:
          # AWS: ambient creds (AWS_ACCESS_KEY_ID/SECRET/SESSION_TOKEN) set by the OIDC step.
          S3_BUCKET: ${{ vars.S3_INTEG_BUCKET }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_INTEG_REGION }}
          # Azure: federated workload identity (shared-key is disabled on the account).
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_INTEG_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_INTEG_CONTAINER }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_INTEG_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_INTEG_TENANT_ID }}
          AZURE_FEDERATED_TOKEN_FILE: ${{ runner.temp }}/azure-federated-token
          # GCS: ADC (GOOGLE_APPLICATION_CREDENTIALS) set by the WIF step.
          GCS_BUCKET: ${{ vars.GCS_INTEG_BUCKET }}
          GCS_PROJECT_ID: ${{ vars.GCS_INTEG_PROJECT_ID }}
        run: |
          uv run pytest tests/integration/storage/ \
            -m "s3_integration or azure_integration or gcs_integration" \
            -v --timeout=60

  # (sdr-matrix-builder, sdr-e2e-apps, and e2e-full-mysql removed —
  # superseded by connector-tests + the 'e2e' label on tests.yaml)

