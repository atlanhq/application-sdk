name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, labeled, reopened]
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  # Detect which files changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      container: ${{ steps.filter.outputs.container }}
      # 'sdk'  — changes that can alter SDK behaviour, so the unit + integration
      #          tests must run. Deliberately EXCLUDES contract-toolkit/ (ships
      #          its own package + CI), docs/, and .github/ workflow-meta — a
      #          workflow-only or toolkit-only PR no longer drags in the full
      #          test matrix. The .github/actions/* entries are the test
      #          harness itself (the unit/integration deps + docstring-coverage
      #          wrappers), so changing *how* those checks run still re-runs them.
      sdk: ${{ steps.filter.outputs.sdk }}
      # 'scan' — wider net for the Trivy filesystem scan: every first-party
      #          source tree + the dependency lockfiles. Still short-circuits on
      #          pure docs/, .github-meta, and .security-only PRs.
      scan: ${{ steps.filter.outputs.scan }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # No explicit `base`: for pull_request, paths-filter diffs against the PR
      # base automatically; for merge_group it diffs the queued merge ref against
      # the default branch (the same proven setup the conformance jobs use).
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            container:
              - 'Dockerfile'
              - 'entrypoint.sh'
            sdk:
              - 'application_sdk/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/unit-tests/**'
              - '.github/actions/setup-deps/**'
              - '.github/actions/docstring-coverage/**'
              # Markdown-only changes never affect SDK behaviour. Listed LAST so
              # paths-filter's gitignore-style last-match-wins excludes e.g.
              # application_sdk/README.md while application_sdk/foo.py still runs.
              - '!**/*.md'
            scan:
              - 'application_sdk/**'
              - 'contract-toolkit/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/trivy/**'

  # Required status check — the JOB has no `if:` so it always runs and always
  # concludes. The real validation step is gated to PR (non-fork) events: the
  # webiny action needs ORG_PAT_GITHUB, which fork PRs don't get, and merge_group
  # entries have no PR commits to inspect. On those paths a no-op success step
  # keeps the required context green instead of leaving it "skipped" (which would
  # block fork PRs / the merge queue). The PR title — which becomes the squash
  # commit subject — is independently enforced by "Validate PR title".
  commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true
        with:
          fetch-depth: 0
      - uses: webiny/action-conventional-commits@7f91b1595ca1951cdb671ddc9f07a49081ec5b69 # v1.4.2
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork != true
        with:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
      - name: Skip on fork PR / merge_group
        if: github.event_name == 'merge_group' || github.event.pull_request.head.repo.fork == true
        run: echo "Commit-convention check not applicable here (fork PR or merge_group); PR title is enforced by Validate PR title."

  docstr:
    name: Docstring Coverage
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: "./.github/actions/docstring-coverage"
        with:
          module-name: application_sdk
          fail-under: "30"

  # Security Checks
  # Required status check — must ALWAYS run and ALWAYS conclude (never skip via a
  # job-level `if:`, which GitHub reports as "skipped" and leaves a required check
  # pending forever, blocking the merge queue). Instead the job always runs and
  # short-circuits its real steps when no first-party source/deps changed.
  trivy:
    name: Trivy Code Scan
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Short-circuit when nothing to scan
        if: needs.changes.outputs.scan != 'true'
        run: echo "No first-party source or dependency changes — Trivy code scan not needed."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.scan == 'true'
      - uses: "./.github/actions/trivy"
        if: needs.changes.outputs.scan == 'true'
        with:
          add-report-comment-to-pr: "true"

  trivy-container:
    name: Trivy Container Scan
    needs: changes
    if: needs.changes.outputs.container == 'true' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: "./.github/actions/trivy-container"
        with:
          chainguard-username: ${{ secrets.CHAINGUARD_USERNAME }}
          chainguard-password: ${{ secrets.CHAINGUARD_PASSWORD }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          fail-on-vulns: 'true'

  # Testing
  # The matrix may skip when no SDK change — that is fine because the REQUIRED
  # check is the always-run `unit-gate` aggregator below, not these cells.
  unit:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-22.04, macOS-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: "./.github/actions/unit-tests"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          fail-under: "85"
          python-version: ${{ matrix.python-version }}

  unit-gate:
    name: Unit Tests Gate
    needs: [unit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check unit test results
        run: |
          result="${{ needs.unit.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "Unit tests passed or were intentionally skipped (result: $result)."
          else
            echo "Unit tests failed or were cancelled (result: $result)."
            exit 1
          fi

  # Required status check — always runs and always concludes; short-circuits its
  # real steps when no SDK change is present so non-code PRs and merge-queue
  # entries pass in seconds rather than leaving a required check pending.
  integration:
    name: Integration Tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Short-circuit when no SDK change
        if: needs.changes.outputs.sdk != 'true'
        run: echo "No SDK change on this PR/merge-group entry — integration tests not needed."

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.sdk == 'true'
      - uses: "./.github/actions/setup-deps"
        if: needs.changes.outputs.sdk == 'true'

      # Temporal and Dapr are provisioned in-process by the SDK's own embedded
      # dev helpers (application_sdk.dev.embedded_runtime / embedded_dapr) — the
      # same code path local development uses — so this job no longer installs
      # or starts a standalone Temporal CLI or daprd. The Temporal dev-server
      # version now follows the `temporalio` dep in uv.lock and the daprd
      # version follows `__dapr_version` (application_sdk/version.py), so there
      # is no separate CLI version pin to keep in sync.
      #
      # Both helpers fetch their binary to ~/.cache on first use; cache those
      # paths across runs so we don't re-download every time.
      - name: Cache embedded runtime binaries
        if: needs.changes.outputs.sdk == 'true'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cache/atlan-sdk/temporal
            ~/.cache/atlan-sdk/dapr
          key: embedded-runtimes-${{ runner.os }}-${{ hashFiles('uv.lock', 'application_sdk/version.py') }}
          restore-keys: |
            embedded-runtimes-${{ runner.os }}-

      - name: Run integration tests
        if: needs.changes.outputs.sdk == 'true'
        run: uv run pytest tests/integration/ -m integration -v --timeout=120

  # Always runs and always concludes; short-circuits its steps when no SDK
  # change is present (a job-level `if:` reports "skipped", which leaves a
  # required check pending forever in the merge queue). Mirrors the integration
  # job above.
  storage-emulator:
    name: Storage Emulator Tests
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Short-circuit when no SDK change
        if: needs.changes.outputs.sdk != 'true'
        run: echo "No SDK change on this PR/merge-group entry — storage emulator tests not needed."

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.sdk == 'true'
      - uses: "./.github/actions/setup-deps"
        if: needs.changes.outputs.sdk == 'true'

      - name: Start object-store emulators
        if: needs.changes.outputs.sdk == 'true'
        run: |
          set -euo pipefail
          # S3 → MinIO
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          # Azure → Azurite
          docker run -d --name azurite -p 10000:10000 \
            mcr.microsoft.com/azure-storage/azurite:3.31.0 \
            azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck
          # GCS → storage-testbench behind an nginx proxy that re-injects the
          # ETag / Last-Modified headers testbench omits (obstore requires them).
          docker network create gcs-net || true
          docker run -d --name gcs-testbench --network gcs-net -e PORT=9000 \
            gcr.io/cloud-devrel-public-resources/storage-testbench:v0.62.0
          docker run -d --name gcs-proxy --network gcs-net -p 9095:9000 \
            -v "$PWD/tests/integration/storage/gcs_emulator_proxy.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine

      - name: Wait for emulators + provision buckets/container
        if: needs.changes.outputs.sdk == 'true'
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1 && break; sleep 2; done
          for i in $(seq 1 30); do curl -s --max-time 2 http://localhost:10000/devstoreaccount1 >/dev/null 2>&1 && break; sleep 2; done
          for i in $(seq 1 40); do curl -sf "http://localhost:9095/storage/v1/b?project=test" >/dev/null 2>&1 && break; sleep 2; done
          export AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin AWS_DEFAULT_REGION=us-east-1
          # Provisioning is idempotent (|| true) so a step re-run on a still-warm
          # runner doesn't abort on "bucket already exists" under set -e.
          aws --endpoint-url http://localhost:9000 s3 mb s3://sdk-emulator-test || true
          # SDR ENABLE_ATLAN_UPLOAD handoff: customer-managed + internal Atlan buckets.
          aws --endpoint-url http://localhost:9000 s3 mb s3://sdk-customer-objectstore || true
          aws --endpoint-url http://localhost:9000 s3 mb s3://sdk-atlan-objectstore || true
          az storage container create --name sdk-emulator-test \
            --connection-string "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;" || true
          curl -sf -X POST "http://localhost:9095/storage/v1/b?project=test" \
            -H "Content-Type: application/json" -d '{"name":"sdk-emulator-test"}' || true

      - name: Run storage emulator tests
        if: needs.changes.outputs.sdk == 'true'
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AZURE_STORAGE_ENDPOINT: http://localhost:10000
          GCS_EMULATOR_ENDPOINT: http://localhost:9095
        run: uv run pytest tests/integration/storage -m storage_emulator -v --timeout=120

      - name: Teardown emulators
        if: always() && needs.changes.outputs.sdk == 'true'
        run: docker rm -f minio azurite gcs-testbench gcs-proxy 2>/dev/null || true

  matrix-builder:
    name: Build Test Matrix
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get PR Labels
        id: get-labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const labelNames = labels.map(label => label.name).join(',');
            console.log(`PR Labels: ${labelNames}`);
            core.setOutput('labels', labelNames);

      - name: Build matrix from PR labels
        id: set-matrix
        run: |
          # For pull_request, github.base_ref is the branch name (e.g. 'main').
          # For merge_group, github.base_ref is empty; use the event's base_ref
          # and strip the refs/heads/ prefix.
          TARGET_BRANCH="${{ github.base_ref }}"
          if [[ -z "$TARGET_BRANCH" ]]; then
            TARGET_BRANCH="${{ github.event.merge_group.base_ref }}"
            TARGET_BRANCH="${TARGET_BRANCH#refs/heads/}"
          fi
          # Default matrix if no label provided
          DEFAULT_MATRIX="{\"include\":[{\"repo_name\":\"atlan-openapi-app\",\"target_branch\":\"${TARGET_BRANCH}\"},{\"repo_name\":\"atlan-mysql-app\",\"target_branch\":\"${TARGET_BRANCH}\"},{\"repo_name\":\"atlan-metabase-app\",\"target_branch\":\"${TARGET_BRANCH}\"}]}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Parse labels from GitHub Script output
            LABELS="${{ steps.get-labels.outputs.labels }}"

            FOUND_LABEL=false
            INCLUDES=""

            echo "Found labels: ${LABELS}"

            IFS=',' read -ra LABEL_ARRAY <<< "$LABELS"
            for LABEL in "${LABEL_ARRAY[@]}"; do
              if [[ $LABEL =~ ^([^:]+):([^:]+)$ ]]; then
                REPO="${BASH_REMATCH[1]}"
                BRANCH="${BASH_REMATCH[2]}"

                # Add comma if not the first entry
                if [[ "$FOUND_LABEL" == "true" ]]; then
                  INCLUDES="${INCLUDES},"
                fi

                # Add this pair as a direct include entry
                INCLUDES="${INCLUDES}{\"repo_name\":\"${REPO}\",\"target_branch\":\"${BRANCH}\"}"
                FOUND_LABEL=true
                echo "Added pair: $REPO:$BRANCH"
              fi
            done

            # Generate matrix JSON with includes
            if [[ "$FOUND_LABEL" == "true" ]]; then
              MATRIX="{\"include\":[${INCLUDES}]}"
              echo "Generated matrix from labels: $MATRIX"
            else
              MATRIX="$DEFAULT_MATRIX"
              echo "No repo:branch labels found, using default matrix"
            fi
          else
            MATRIX="$DEFAULT_MATRIX"
            echo "Not a PR event, using default matrix"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix output: $MATRIX"

  # Build a PR-scoped SDK runtime base image so the connector e2e tests can
  # build the connector FROM the *rebuilt* base — exercising Dockerfile /
  # base-image / daprd-apk changes that the pip-install (application_sdk_ref)
  # path can't reach.
  #
  # Gated on the 'e2e' label ONLY (the same deliberate opt-in as
  # connector-tests below) — NOT on the `container` paths-filter or the
  # trivy-container scan. On merge_group this job is skipped and the
  # connector dispatch passes no base_image_ref, so the connector builds
  # FROM the released base exactly as before.
  #
  # Pushes to the public Harbor project (anonymous-pull), so the connector
  # build pulls it through the same path it already uses for
  # `FROM registry.atlan.com/public/app-runtime-base:<tag>` — no extra
  # registry auth on the connector side. Fork PRs are excluded (no secrets).
  build-sdk-base-image:
    name: Build SDK base image (e2e)
    needs: changes
    # sdk OR container: a Dockerfile-only PR (the prime base-image use case,
    # e.g. a daprd / base bump) is container==true / sdk==false — it must
    # still rebuild the base so the connector e2e exercises the new image.
    if: |
      (needs.changes.outputs.sdk == 'true' || needs.changes.outputs.container == 'true') &&
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'e2e') &&
      github.event.pull_request.head.repo.fork != true &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.ref.outputs.image }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Compute PR base image ref
        id: ref
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "image=registry.atlan.com/public/app-runtime-base:pr-${PR_NUMBER}-sha-${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Log in to Atlan Harbor Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: registry.atlan.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Log in to Chainguard Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: cgr.dev
          username: ${{ secrets.CHAINGUARD_USERNAME }}
          password: ${{ secrets.CHAINGUARD_PASSWORD }}
      - name: Build, scan, and push PR base image
        uses: ./.github/actions/secure-build-push-apps
        with:
          branch: ${{ github.ref_name }}
          context: .
          file: ./Dockerfile
          push: true
          # amd64 only — GitHub-hosted e2e runners are amd64; the connector
          # build (sdr-e2e) is single-platform too. Keeps the rebuild fast.
          platforms: linux/amd64
          tags: ${{ steps.ref.outputs.image }}
          build-args: |
            ACCESS_TOKEN_USR=$GITHUB_ACTOR
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
        env:
          DOCKER_CLIENT_TIMEOUT: 600
          COMPOSE_HTTP_TIMEOUT: 600

  # Connector tests: dispatches tests.yaml to each connector repo.
  # Triggers:
  #   merge_group — always runs on code-changing merge queue entries (the
  #     primary gate). Each entry has a unique SHA so runs are parallel.
  #     build-sdk-base-image is skipped here, so base_image_ref is omitted
  #     and connectors build FROM the released base.
  #   pull_request + 'e2e' label — opt-in during PR development; also used
  #     to release-gate the release PR before merging. The connector-side
  #     e2e job serialises itself via its own concurrency group, so
  #     simultaneous e2e-labelled PRs queue safely on the connector side.
  #     On this path base_image_ref is the freshly-built PR base image, so
  #     the connector is rebuilt on top of the SDK PR's runtime image.
  connector-tests:
    name: Connector Tests (${{ matrix.repo_name }})
    needs: [changes, matrix-builder, build-sdk-base-image]
    # always() so a *skipped* build-sdk-base-image (merge_group path) does
    # not auto-skip this job. The explicit result clause still BLOCKS this
    # job when the base build genuinely fails on the e2e path — a base that
    # won't build is the signal, not something to mask by silently falling
    # back to the released base.
    if: |
      always() &&
      (needs.changes.outputs.sdk == 'true' || needs.changes.outputs.container == 'true') &&
      needs.matrix-builder.result == 'success' &&
      (needs.build-sdk-base-image.result == 'success' || needs.build-sdk-base-image.result == 'skipped') && (
        github.event_name == 'merge_group' ||
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'e2e') &&
          github.event.pull_request.head.repo.fork != true &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        )
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-builder.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: "./.github/actions/e2e-apps"
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          repo-name: ${{ matrix.repo_name }}
          target-branch: "refs/heads/${{ matrix.target_branch }}"
          workflow: tests.yaml
          workflow-inputs: ${{ github.event_name == 'merge_group' && format('{{"application_sdk_ref":"{0}"}}', github.sha) || format('{{"application_sdk_ref":"{0}","run_e2e":"true","base_image_ref":"{1}"}}', github.event.pull_request.head.sha, needs.build-sdk-base-image.outputs.image) }}

  # (sdr-matrix-builder, sdr-e2e-apps, and e2e-full-mysql removed —
  # superseded by connector-tests + the 'e2e' label on tests.yaml)

