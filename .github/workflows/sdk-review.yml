# SDK Review — dispatches to mothership rover-native sandbox
#
# Parses @sdk-review comments on PRs and POSTs to mothership's
# pr-review dispatch endpoint with the sdk-reviewer snapshot.
#
# Commands:
#   @sdk-review                       → Review only
#   @sdk-review auto-complete         → Review + auto-fix loop
#   @sdk-review challenge: <reason>   → Re-evaluate disputed findings
#   @sdk-review override: <reason>    → Admin force-pass
#   @sdk-review stop / cancel         → Cancel in-progress review
#   @sdk-review retrospect            → Learn from recent PR patterns

name: SDK Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  dispatch:
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '@sdk-review')
      && (
        github.event.comment.author_association == 'OWNER'
        || github.event.comment.author_association == 'MEMBER'
        || github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Prevent double-dispatch: only one review per PR at a time
    concurrency:
      group: sdk-review-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Parse command
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim();
            const commenter = context.payload.comment.user.login;
            const prNumber = context.payload.issue.number;

            let command = 'review';
            let commandContext = '';

            if (/\bstop\b/i.test(body) || /\bcancel\b/i.test(body)) {
              command = 'stop';
            } else if (/\bretrospect\b/i.test(body)) {
              command = 'retrospect';
            } else if (/\bauto-complete\b/i.test(body) || /\bresolve all\b/i.test(body)) {
              command = 'auto-complete';
              const after = body.replace(/@sdk-review\s*(auto-complete|resolve all\s*issues?)\s*/i, '').trim();
              if (after) commandContext = after;
            } else if (/\bchallenge:\s*/i.test(body)) {
              command = 'challenge';
              commandContext = body.replace(/.*challenge:\s*/i, '').trim();
            } else if (/\boverride:\s*/i.test(body)) {
              command = 'override';
              commandContext = body.replace(/.*override:\s*/i, '').trim();
            } else {
              const after = body.replace(/@sdk-review\s*/i, '').trim();
              if (after) commandContext = after;
            }

            core.setOutput('command', command);
            core.setOutput('context', commandContext);
            core.setOutput('commenter', commenter);
            core.setOutput('pr_number', String(prNumber));

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Connect to VPN
        id: vpn
        uses: atlanhq/github-actions/globalprotect-connect-action@main
        with:
          portal-url: ${{ vars.GLOBALPROTECT_PORTAL_URL }}
          username: ${{ secrets.GLOBALPROTECT_USERNAME }}
          password: ${{ secrets.GLOBALPROTECT_PASSWORD }}

      - name: Verify VPN and dispatch
        env:
          MOTHERSHIP_URL: ${{ vars.MOTHERSHIP_URL }}
          HARNESS_TOKEN: ${{ secrets.HARNESS_TOKEN }}
          PR_NUMBER: ${{ steps.parse.outputs.pr_number }}
          COMMAND: ${{ steps.parse.outputs.command }}
          COMMAND_CONTEXT: ${{ steps.parse.outputs.context }}
          COMMENTER: ${{ steps.parse.outputs.commenter }}
        run: |
          # Retry VPN connectivity check (mothership may take a moment after VPN connects)
          for attempt in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${MOTHERSHIP_URL}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "VPN connected, mothership reachable (attempt $attempt)"
              break
            fi
            echo "Mothership unreachable (status=$STATUS), retrying in 5s (attempt $attempt/5)..."
            sleep 5
          done

          if [ "$STATUS" != "200" ]; then
            echo "::error::Cannot reach mothership after 5 attempts. VPN may have failed."
            exit 1
          fi

          # Build JSON payload safely using jq
          PAYLOAD=$(jq -n \
            --arg pr_url "https://github.com/${{ github.repository }}/pull/${PR_NUMBER}" \
            --arg review_mode "standard" \
            --arg snapshot "sdk-reviewer" \
            --arg command "${COMMAND}" \
            --arg command_context "${COMMAND_CONTEXT}" \
            --arg commenter "${COMMENTER}" \
            '{
              pr_url: $pr_url,
              review_mode: $review_mode,
              pipeline: "rover",
              snapshot: $snapshot,
              command: $command,
              command_context: $command_context,
              commenter: $commenter
            }')

          # Dispatch with retry (mothership may be restarting)
          for attempt in 1 2 3; do
            STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" --max-time 30 \
              -X POST "${MOTHERSHIP_URL}/api/pr-review/dispatch" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${HARNESS_TOKEN}" \
              -d "$PAYLOAD")

            echo "Dispatch attempt $attempt: status=$STATUS"

            if [ "$STATUS" = "202" ]; then
              echo "Dispatched successfully"
              cat /tmp/response.json
              exit 0
            fi

            if [ "$STATUS" -ge 400 ] && [ "$STATUS" -lt 500 ]; then
              echo "::error::Client error $STATUS — not retrying"
              cat /tmp/response.json
              exit 1
            fi

            echo "Server error or timeout (status=$STATUS), retrying in 5s..."
            sleep 5
          done

          echo "::error::Dispatch failed after 3 attempts"
          cat /tmp/response.json 2>/dev/null
          exit 1
