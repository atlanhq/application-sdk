name: Scheduled Checks

on:
  schedule:
    - cron: 0 0 * * * # daily at 00:00

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Close Stale PRs
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          repo-token: ${{ secrets.ORG_PAT_GITHUB }}
          stale-issue-message: 'Stale Issue'
          stale-pr-message: 'Stale Pull Request'
          stale-issue-label: 'Stale'
          stale-pr-label: 'Stale'
          days-before-stale: 60
          debug-only: 'true'

  trivy:
    name: Trivy Code Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: "./.github/actions/trivy"

  # Nightly real-cloud storage integration tests against main (no PR context →
  # no label gate). Same suites as the label-gated job in pull_request.yaml;
  # conftest skips any cloud whose creds aren't set, so this stays green until
  # all nine secrets are registered.
  storage-integration:
    name: Storage Integration Tests — nightly (S3 / Azure / GCS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Keyless: GitHub OIDC for all three clouds (no static secrets). Overrides the
    # workflow-level permissions to grant id-token for the OIDC exchange.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: "./.github/actions/setup-deps"
      - name: AWS — assume the integration role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_INTEG_ROLE_ARN }}
          aws-region: ${{ vars.AWS_INTEG_REGION }}
      - name: Azure — login (OIDC federated, no secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_INTEG_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_INTEG_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_INTEG_SUBSCRIPTION_ID }}
      - name: GCS — Workload Identity Federation (sets ADC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_INTEG_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_INTEG_SA }}
      - name: Azure — write the federated token file for obstore WI auth
        run: |
          curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | python3 -c 'import sys,json;sys.stdout.write(json.load(sys.stdin)["value"])' \
            > "${RUNNER_TEMP}/azure-federated-token"
      - name: Run storage integration tests (keyless)
        env:
          S3_BUCKET: ${{ vars.S3_INTEG_BUCKET }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_INTEG_REGION }}
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_INTEG_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_INTEG_CONTAINER }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_INTEG_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_INTEG_TENANT_ID }}
          AZURE_FEDERATED_TOKEN_FILE: ${{ runner.temp }}/azure-federated-token
          GCS_BUCKET: ${{ vars.GCS_INTEG_BUCKET }}
          GCS_PROJECT_ID: ${{ vars.GCS_INTEG_PROJECT_ID }}
        run: |
          uv run pytest tests/integration/storage/ \
            -m "s3_integration or azure_integration or gcs_integration" \
            -v --timeout=60
