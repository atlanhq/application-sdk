name: Application SDK Docker Image

on:
  workflow_dispatch:  # Allow manual triggering
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'mkdocs.yml'

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      lowercase_branch: ${{ steps.get_lowercase_branch.outputs.lowercase_branch }}
      sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get branch name
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
        id: get_branch

      - name: Lowercase branch name
        run: echo "lowercase_branch=$(echo '${{ steps.get_branch.outputs.branch }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        id: get_lowercase_branch

      - name: Get short SHA
        id: get_sha
        shell: bash
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  push-to-ghcr:
    runs-on: ubuntu-latest
    needs: prepare
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-ghcr
      cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Mint fleet App token
        # Not used for GHCR (the App only has repo-level Packages
        # permission, and these packages are org-level -- see
        # docs/standards/build-security.md), only for the generic GHA cache
        # API auth secure-build-push-apps forwards as github-token.
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: ${{ github.event.repository.name }}

      - name: Login to GitHub Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Log in to Chainguard Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: cgr.dev
          username: ${{ secrets.CHAINGUARD_USERNAME }}
          password: ${{ secrets.CHAINGUARD_PASSWORD }}

      - name: Build and push docker image to GHCR
        id: ghcr_docker_build
        uses: ./.github/actions/secure-build-push-apps
        with:
          branch: ${{ github.ref_name }}
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/atlanhq/app-runtime-base-${{ needs.prepare.outputs.lowercase_branch }}:sha-${{ needs.prepare.outputs.sha }}
          github-token: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}
        env:
          DOCKER_CLIENT_TIMEOUT: 600
          COMPOSE_HTTP_TIMEOUT: 600
