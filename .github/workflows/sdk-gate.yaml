name: SDK Gate

# Single composing gate for the SDK repo — NOT reused by app repos.
#
# Composes the three SDK test areas behind one always-concluding required
# check:
#   - SDK Tests        (sdk-tests-reusable.yaml)         — unit / integration / storage
#   - Conformance      (conformance-reusable.yaml)       — C/E/P/O/D rule series
#   - Contract Toolkit (contract-toolkit-reusable.yaml)  — PKL generate / lint / docs
#
# Design:
#   - Selective: each area is gated on a paths-filter output, so a PR that
#     touches only docs / .claude / .agents / .vscode / .github-meta skips all
#     three areas and the gate goes green in seconds.
#   - Force-all: release/* and bump-version* head refs, and v* tags, run every
#     area regardless of changed paths (release safety net).
#   - Required-safe: the `gate` job always runs (`if: always()`) and concludes,
#     applying "success or skipped → pass, anything else → fail".  It is the
#     SOLE required status check for these three areas; the individual area
#     checks must NOT be marked required (a path-skipped reusable would leave
#     them pending forever — the exact failure mode this replaces).
#
# Orthogonal checks (Trivy code/container scans, Conventional Commits, PR-title,
# docstring coverage) stay in pull_request.yaml and remain independently
# required — they are intentionally not folded into this gate.

on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    tags: ["v*"]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # Central change detection for the SDK and toolkit areas + the force-all
  # decision.  Conformance is NOT centralized here: conformance-reusable.yaml is
  # shared with app repos and self-selects per rule series internally, so the
  # `conformance` filter below is a coarse "is anything conformance-relevant
  # touched" gate only — the precise per-series selection still lives in the
  # reusable.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      toolkit: ${{ steps.filter.outputs.toolkit }}
      conformance: ${{ steps.filter.outputs.conformance }}
      force_all: ${{ steps.force.outputs.force_all }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # No explicit `base`: for pull_request, paths-filter diffs against the PR
      # base automatically; for merge_group it diffs the queued merge ref
      # against the default branch.  On a tag push there is no diff base, but
      # `force_all` is true for v* tags so the area `if:`s fire regardless.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            sdk:
              - 'application_sdk/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/unit-tests/**'
              - '.github/actions/setup-deps/**'
              - '.github/actions/docstring-coverage/**'
              # Markdown-only changes never affect SDK behaviour. Listed LAST so
              # paths-filter's last-match-wins excludes e.g.
              # application_sdk/README.md while application_sdk/foo.py still runs.
              - '!**/*.md'
            toolkit:
              - 'contract-toolkit/**'
              - 'application_sdk/contracts/**'
              - 'application_sdk/credentials/**'
              - 'application_sdk/handler/**'
              - 'application_sdk/templates/contracts/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/contract-toolkit-*.yml'
            conformance:
              - '**/*.py'
              - '.github/**'
              - '**/pyproject.toml'
              - '!**/*.md'

      - name: Compute force-all
        id: force
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          force=false
          # Release / version-bump PRs run the full suite before publish.
          if [[ "$HEAD_REF" == release/* || "$HEAD_REF" == bump-version* ]]; then
            force=true
          fi
          # v* tag pushes (the release itself) run everything.
          if [[ "$REF_TYPE" == "tag" && "$REF_NAME" == v* ]]; then
            force=true
          fi
          echo "force_all=$force" >> "$GITHUB_OUTPUT"
          echo "force_all=$force"

  sdk-tests:
    name: SDK Tests
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.force_all == 'true'
    uses: ./.github/workflows/sdk-tests-reusable.yaml
    secrets: inherit

  conformance:
    name: Conformance
    needs: changes
    if: needs.changes.outputs.conformance == 'true' || needs.changes.outputs.force_all == 'true'
    uses: ./.github/workflows/conformance-reusable.yaml
    with:
      # Dogfood the in-flight suite: run the PR's own conformance package, not
      # the published one. (merge_group / tag have no PR head — fall back to sha.)
      conformance-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      exclude-paths-e: "tools/,contract-toolkit/"
      exclude-paths-p: "tools/,contract-toolkit/"
      # O-series excludes the conformance package itself: the suite legitimately
      # uses stdlib json for SARIF string output (orjson returns bytes).
      exclude-paths-o: "tools/,contract-toolkit/,packages/conformance/"
      event_name: ${{ github.event_name }}
      force-all: ${{ needs.changes.outputs.force_all == 'true' }}
    secrets: inherit

  toolkit:
    name: Contract Toolkit
    needs: changes
    if: needs.changes.outputs.toolkit == 'true' || needs.changes.outputs.force_all == 'true'
    uses: ./.github/workflows/contract-toolkit-reusable.yaml
    secrets: inherit

  # ── The single required check ───────────────────────────────────────────────
  # Always runs and always concludes, so branch protection can require exactly
  # this one context for all three areas.  A reusable-workflow call that was
  # skipped (its area was untouched) reports `skipped`; a call whose jobs failed
  # reports `failure`.  success|skipped → pass; failure|cancelled|anything
  # else → fail (do not let `cancelled` slip through).
  gate:
    name: Gate
    needs: [sdk-tests, conformance, toolkit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate composed areas
        env:
          SDK_RESULT: ${{ needs.sdk-tests.result }}
          CONFORMANCE_RESULT: ${{ needs.conformance.result }}
          TOOLKIT_RESULT: ${{ needs.toolkit.result }}
        run: |
          set -euo pipefail
          ok=true
          check() {
            local name="$1" result="$2"
            if [[ "$result" == "success" || "$result" == "skipped" ]]; then
              echo "✓ $name: $result"
            else
              echo "✗ $name: $result"
              ok=false
            fi
          }
          check "SDK Tests"        "$SDK_RESULT"
          check "Conformance"      "$CONFORMANCE_RESULT"
          check "Contract Toolkit" "$TOOLKIT_RESULT"
          if [[ "$ok" != "true" ]]; then
            echo "::error::SDK gate FAILED — one or more areas did not pass."
            exit 1
          fi
          echo "SDK gate passed."
