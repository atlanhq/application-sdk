name: tests-reusable

# Reusable workflow for the standard connector tests + e2e scaffold.
# Each connector's per-app tests.yaml collapses to a thin caller:
#
#     name: Tests
#     jobs:
#       tests:
#         uses: atlanhq/application-sdk/.github/workflows/tests-reusable.yaml@main
#         with:
#           app-name: mysql
#           ...
#         secrets: inherit
#       tests-gate:
#         name: Tests Gate
#         needs: [tests]
#         if: always()
#         ...  # gate logic using needs.tests.outputs.*
#
# Standard boilerplate baked in this reusable so apps don't copy-paste it:
#   - 60-min job timeout (override via timeout-minutes input)
#   - Concurrency group on github.ref — queues rather than races same branch
#   - pull-requests:write + contents:read permissions
#   - distinct-id echo for cross-repo dispatch tracking
#   - connector-integration-tests composite with services-script hook (no-op
#     by default; used when source systems need CI-level startup rather than
#     pytest fixtures — see openapi's .github/test/setup-services.sh)
#   - Label/dispatch-gated full-DAG e2e job (inlined here — see the `e2e` job;
#     it was previously delegated to e2e-full-reusable.yaml, now folded in so
#     the whole suite is one reusable + one Tests Gate)
#
# GitHub check name hierarchy (caller → tests-reusable):
#   Tests / tests / Unit and integration  (pull_request)
#   Tests / tests / End-to-end            (pull_request)
#   Tests / tests / Tests Gate            (pull_request)
#
# Nested reusable depth: caller → tests-reusable = 2 (GitHub max is 4).
# secrets: inherit chains from the caller; the inlined e2e job reads secrets.*.
#
# Connectors that need OS-level native build deps (ODBC, SAP JCo, etc.) before
# uv sync cannot use this reusable — they need a bespoke tests.yaml with the
# native-deps pre-step before invoking connector-integration-tests directly.

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
        description: Connector app name (ATLAN_APPLICATION_NAME, e.g. mysql, openapi).
      app-image-name:
        required: false
        type: string
        default: ""
        description: GHCR image name for the e2e job (e.g. atlan-mysql-app). Empty disables image build.
      test-paths:
        required: false
        type: string
        default: ""
        description: |
          Space-separated pytest target paths.  Empty = auto-discover (honours
          testpaths in pyproject.toml).  Override to scope to a subset
          (e.g. "tests/unit/ tests/integration/").
      pytest-args:
        required: false
        type: string
        default: >-
          -n auto --dist=loadfile --tb=short
          --cov=app --cov-report=xml --cov-report=html --cov-report=term
          --cov-fail-under=0
        description: Extra arguments passed to pytest after test-paths.
      services-script:
        required: false
        type: string
        default: ""
        description: |
          Optional path (relative to the caller's repo root) of a shell script
          that starts runtime source services before tests run.  No-op when
          empty.  Prefer session-scoped pytest fixtures (mysql/metabase pattern)
          unless the service cannot be managed from inside pytest.  See
          openapi's .github/test/setup-services.sh for a reference demonstration
          of the pattern (used intentionally to exercise this hook end-to-end).
      e2e-test-path:
        required: false
        type: string
        default: "tests/e2e/"
        description: Pytest target path for the e2e job.
      enable-e2e:
        required: false
        type: boolean
        default: true
        description: Set to false to skip the e2e job entirely (e.g. hello-world).
      timeout-minutes:
        required: false
        type: number
        default: 60
        description: Timeout for the tests job in minutes.
      application-sdk-ref:
        required: false
        type: string
        default: ""
        description: Branch/SHA to pin atlanhq/application-sdk to for cross-repo dispatch. Empty = lockfile version.
      base-image-ref:
        required: false
        type: string
        default: ""
        description: Runtime base image override for the connector Docker build.
      agent-name-override:
        required: false
        type: string
        default: ""
        description: Override agent-name for the e2e job (default ci-<run_id>).
      distinct-id:
        required: false
        type: string
        default: ""
        description: Identifier echoed in step names for cross-repo dispatch tracking.
      run-e2e:
        required: false
        type: string
        default: ""
        description: Set to 'true' to trigger the e2e job from workflow_dispatch.
      two-store:
        required: false
        type: boolean
        default: false
        description: |
          Opt-in ADR-0014 two-store SDR posture for the e2e job — forwarded to
          the sdr-e2e action's `enable-two-store` input. When true, objectstore
          is forced to the CI-local binding while atlan-objectstore stays the
          tenant blobstorage, so a connector that forgets to bridge an artifact
          shows up as zero downstream assets instead of being masked by a shared
          bucket. Default false: existing callers are unaffected.

jobs:

  # ── Unit + Integration (testcontainers or services-script hook) ──────────
  tests:
    name: Unit and integration
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    concurrency:
      group: tests-${{ github.ref }}
      cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
    permissions:
      pull-requests: write
      contents: read
    outputs:
      summary: ${{ steps.tests.outputs.summary }}
    steps:
      - name: echo distinct-id ${{ inputs.distinct-id }}
        if: inputs.distinct-id != ''
        run: echo "Dispatched; SDK ref=${{ inputs.application-sdk-ref }}"

      - name: Run unit + integration tests
        id: tests
        uses: atlanhq/application-sdk/.github/actions/connector-integration-tests@main
        with:
          app-name: ${{ inputs.app-name }}
          test-paths: ${{ inputs.test-paths }}
          pytest-args: ${{ inputs.pytest-args }}
          services-script: ${{ inputs.services-script }}
          application-sdk-ref: ${{ inputs.application-sdk-ref }}

  # ── Discover e2e suites → matrix ─────────────────────────────────────────
  # Globs the connector's tests/e2e/test_*.py into a strategy.matrix so the
  # e2e job fans out one leg per suite (parallel, live per-job logs, per-suite
  # re-run, isolation). Connector-agnostic: the SDK never hard-codes a
  # connector's suites — the discovery script scans the checked-out tree.
  # Same label/dispatch gate the e2e job used to carry.
  discover-e2e:
    name: Discover e2e suites
    runs-on: ubuntu-latest
    if: |
      inputs.enable-e2e && (
        (github.event_name == 'workflow_dispatch' && inputs.run-e2e == 'true') ||
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'e2e') &&
          github.event.pull_request.head.repo.fork != true &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        )
      )
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      # codex-/return-dispatch on the apps-sdk side scans step *names* for
      # "distinct-id <value>". Emitting it here (the first job in the e2e path)
      # lets the SDK PR's dispatched run be located quickly via the GH API,
      # regardless of how the downstream matrix fans out.
      - name: distinct-id ${{ inputs.distinct-id }}
        if: inputs.distinct-id != ''
        shell: bash
        run: echo "Dispatched with distinct-id=${{ inputs.distinct-id }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Discover suites
        id: discover
        uses: atlanhq/application-sdk/.github/actions/discover-e2e-suites@main
        with:
          test-dir: ${{ inputs.e2e-test-path }}

  # ── Full-DAG e2e (system apps — extract→qi→publish→lineage) ─────────────
  # One matrix leg per discovered suite. fail-fast:false so one suite's failure
  # doesn't cancel the others, and "Re-run failed jobs" re-runs only the failed
  # leg. Each leg spins its own worker container polling the shared task queue;
  # legs are independent (own connection + AE workflow slug), so co-serving is
  # harmless. 120-min timeout (> ae_poll + atlas_poll + build/setup overhead).
  e2e:
    name: End-to-end (${{ matrix.name }})
    needs: discover-e2e
    if: needs.discover-e2e.result == 'success' && needs.discover-e2e.outputs.count != '0'
    strategy:
      fail-fast: false
      # Fallback to an empty matrix when discovery was skipped (no label / not
      # dispatched) so fromJson('') doesn't error at job-setup; the `if` above
      # also skips the job in that case.
      matrix: ${{ fromJson(needs.discover-e2e.outputs.matrix || '{"include":[]}') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      # Per-leg group so matrix legs run concurrently (a shared group would
      # serialise them). cancel-in-progress:false keeps re-runs from cancelling.
      group: tests-e2e-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: false
    permissions:
      pull-requests: write
      contents: read
      statuses: write
      packages: write
    env:
      SDR_TEST_TENANT: ${{ secrets.SDR_TEST_TENANT }}
      SDR_CLIENT_ID: ${{ secrets.SDR_CLIENT_ID }}
      SDR_CLIENT_SECRET: ${{ secrets.SDR_CLIENT_SECRET }}
      ATLAN_API_KEY: ${{ secrets.ATLAN_API_KEY }}
      # Derived so ATLAN_BASE_URL is always the same tenant as SDR_TEST_TENANT.
      ATLAN_BASE_URL: https://${{ secrets.SDR_TEST_TENANT }}
    steps:
      - name: distinct-id ${{ inputs.distinct-id }}
        if: inputs.distinct-id != ''
        shell: bash
        run: echo "Dispatched with distinct-id=${{ inputs.distinct-id }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # uv on the host for the sdr-e2e action's `uv run pytest` + summary steps.
      # The action self-installs uv only when application-sdk-ref is set
      # (SDK-PR dispatch); the plain-label path (empty ref) otherwise has no uv
      # and fails with `uv: command not found`. Install it unconditionally here.
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - uses: atlanhq/application-sdk/.github/actions/sdr-e2e@main
        with:
          app-name: ${{ inputs.app-name }}
          app-image-name: ${{ inputs.app-image-name }}
          # One suite per leg (the matrix file), not the whole e2e directory.
          test-path: ${{ matrix.file }}
          # Full-DAG defaults carried over from e2e-full-reusable.yaml. The
          # full-DAG pipeline lives alongside the SDR (testcontainer) pipeline
          # in connector repos, so these must be explicit — otherwise the action
          # falls back to the SDR component/compose set (wrong stack).
          secrets-script: .github/e2e/make-secrets-e2e-full.py
          components-dir: .github/e2e/e2e-full-components
          compose-overlay: .github/e2e/e2e-full-docker-compose.yaml
          # Bump the container-health wait because the worker has to establish
          # the Temporal connection with TLS + auth before /server/health greens.
          container-health-timeout-seconds: "120"
          # `-s` streams the harness poll-loop output in real time — each leg is
          # a single sequential pytest process, so this is live per-job again.
          pytest-extra-args: "-s"
          # Unique per-leg artifact name so parallel legs don't collide on
          # upload-artifact (which rejects duplicate names within a run).
          artifact-suffix: ${{ matrix.name }}
          # One slim summary is posted by the Tests Gate; suppress the per-leg
          # connector-PR comment so N legs don't post N comments.
          post-pr-comment: "false"
          application-sdk-ref: ${{ inputs.application-sdk-ref }}
          base-image-ref: ${{ inputs.base-image-ref }}
          enable-two-store: ${{ inputs.two-store }}
          # Push the test image with the org PAT (same identity build-and-publish
          # uses) so it can write PAT-published connector packages — a plain
          # GITHUB_TOKEN 403s on those (e.g. atlan-redshift-app). Available here
          # because callers invoke this reusable with `secrets: inherit`.
          ghcr-token: ${{ secrets.ORG_PAT_GITHUB }}

  # ── Aggregator gate (single required check for branch protection) ────────
  tests-passed:
    name: Tests Gate
    needs: [tests, discover-e2e, e2e]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Post unified test-summary comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59 # v3.12.0
        with:
          message-id: tests-summary
          message: |
            ## Tests Summary

            | Job | Status | Result |
            |---|---|---|
            | tests | ${{ needs.tests.result == 'success' && '✅ Passed' || (needs.tests.result == 'skipped' && '⊘ Skipped' || '❌ Failed') }} | `${{ needs.tests.outputs.summary || 'no summary' }}` |
            | e2e | ${{ needs.discover-e2e.result == 'skipped' && '⊘ Skipped — add `e2e` label to trigger' || (needs.e2e.result == 'success' && '✅ Passed' || (needs.e2e.result == 'skipped' && '⊘ No suites discovered' || '❌ Failed')) }} | per-suite results + live logs in the run |

            **Overall:** ${{ (needs.tests.result == 'success' && needs.discover-e2e.result != 'failure' && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')) && '✅ All passed' || '❌ Some failed' }} — [view run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        continue-on-error: true

      - name: Verify all test jobs succeeded
        run: |
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "::error::tests job did not succeed (result=${{ needs.tests.result }})"
            exit 1
          fi
          # Discovery skipped == e2e not requested (no label / not dispatched) → OK.
          # Discovery failed == real infra error → fail (e2e legs never ran).
          if [ "${{ needs.discover-e2e.result }}" != "success" ] && [ "${{ needs.discover-e2e.result }}" != "skipped" ]; then
            echo "::error::e2e discovery did not succeed (result=${{ needs.discover-e2e.result }})"
            exit 1
          fi
          # e2e matrix aggregate: success iff every leg passed; skipped when no
          # label or zero suites discovered.
          if [ "${{ needs.e2e.result }}" != "success" ] && [ "${{ needs.e2e.result }}" != "skipped" ]; then
            echo "::error::one or more e2e suites did not succeed (result=${{ needs.e2e.result }})"
            exit 1
          fi
          echo "All test jobs passed."
