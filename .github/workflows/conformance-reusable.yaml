# .github/workflows/conformance-reusable.yaml
#
# Reusable workflow: full conformance suite gate.
#
# Runs each rule series (C, E, P, O, D, L, T, I, B, K, S) as a separate leg of one matrix job so
# each appears as its own status check:
#   Conformance / suite / CI
#   Conformance / suite / Error handling
#   Conformance / suite / Prescriptions
#   Conformance / suite / Optimizations
#   Conformance / suite / Dependencies
#   Conformance / suite / Logging
#   Conformance / suite / Tests
#   Conformance / suite / Container images
#   Conformance / suite / Deprecations
#   Conformance / suite / Contract toolkit
#   Conformance / suite / Security
#   Conformance / Contracts
#   Conformance / Conformance Gate  (required gate)
#
# The series share an identical job body (checkout → changed-files filter → uv →
# run → upload → Security-tab upload), so they are expressed as a single
# `strategy.matrix` rather than copy-pasted jobs.  The only per-series
# values are the matrix entries (series letter, display name, sarif slug,
# changed-files path glob, and the caller's exclude-paths input).  Note C-series
# watches `.github/**`, D-series watches `**/pyproject.toml`, T-series watches
# `tests/integration/**`, I-series watches `Dockerfile`, and the AST series
# (E/P/O/L) watch `**/*.py`; that asymmetry is just a matrix field, not a
# separate job.
#
# Scope: the runner auto-detects whether the caller repo is the SDK or a consumer
# app (from its `[project].name`) and runs only the rules in scope.  The
# app-scoped rules (D001/D002 and the bootstrap-workflow-drift rule C002) no-op on
# the SDK itself with no per-caller configuration; the both-scoped rules — which
# include D003 (UnusedDependency) — run on the SDK as well.
#
# The matrix job is intentionally inline (not delegating to sub-workflows) so
# GitHub reports the legs at the correct depth — one level of workflow_call from
# the caller produces three-level check paths, not four.
#
# Usage from a connector SDK/app:
#   uses: atlanhq/application-sdk/.github/workflows/conformance-reusable.yaml@main
#
# Note: the default conformance-ref='' path requires atlan-application-sdk-conformance
# to be published on PyPI. Pin conformance-ref to a git SHA only when testing
# unreleased suite changes.
#
# ── Suppression vs path exclusion ─────────────────────────────────────────────
#
# There are two ways to reduce the set of findings a check reports.  They serve
# different purposes and carry different audit properties:
#
#   # conformance: ignore[Exxx] <reason>   (or  # noqa: S110 — <reason>)
#     A per-site, in-source suppression for a specific finding.  The finding is
#     still emitted to the SARIF artifact as a suppressed result with the
#     justification text preserved — it is counted in atlan/summary.suppressing
#     and downloadable as a build artifact.  Suppressed results are stripped
#     from the Security tab upload so they do not create alerts or PR
#     annotations.  Use this for production code in the SDK/app that has a
#     legitimate, site-specific carve-out.
#
#   exclude-paths-c / exclude-paths-e / exclude-paths-p / exclude-paths-o / exclude-paths-i / exclude-paths-k
#     A path prefix removed from scanning entirely.  Nothing from that path
#     appears in the SARIF report.  Use this only for code that is categorically
#     outside the SDK/app surface — tooling, migration scripts, generated files,
#     or other paths that will never run in production.  Excluded paths are
#     recorded in atlan/excludedPaths in the SARIF run properties and surfaced
#     as a ::notice annotation so the reduced scope is always visible.
#     Extending this list to cover production code defeats the gate.
#
# ── conformance-ref override ──────────────────────────────────────────────────
#
#   conformance-ref: ""  (default)
#     Install atlan-application-sdk-conformance from PyPI (latest published).
#
#   conformance-ref: <branch|tag|sha>
#     Install from that git ref's subdirectory, enabling pre-release testing
#     of an unreleased conformance suite change before it is published.
#     The SDK's own conformance.yaml passes the PR HEAD sha here so it always
#     dogfoods its own in-flight suite.

name: "Conformance (reusable)"

on:
  workflow_call:
    inputs:
      conformance-ref:
        description: >
          Git ref of atlanhq/application-sdk to source the conformance suite from.
          Empty (default) uses the latest published PyPI package.
          Set to a branch/tag/sha to test an unreleased suite version.
        required: false
        default: ""
        type: string
      event_name:
        description: "Caller's github.event_name (push / pull_request / merge_group); reusable workflows always see 'workflow_call' internally"
        required: false
        default: ""
        type: string
      exclude-paths-c:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from C-series
          checks only, e.g. 'tools/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-e:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from E-series
          checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-p:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from P-series
          (prescription) checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-o:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from O-series
          (optimisation) checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-d:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from D-series
          (dependency) checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-l:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from L-series
          (logging) checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-t:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from T-series
          (test-marking) checks only, e.g. 'tests/integration/_example/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-i:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from I-series
          (container image) checks only.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-b:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from B-series
          (deprecation) checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-k:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from K-series
          (contract-toolkit) checks only.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-s:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from S-series
          (security / secret-hygiene) checks only.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      ledger-path:
        description: >
          Repo-relative path to the app's committed contract ledger
          (contract_schema.lock.json).  The guard compares this file between
          origin/main and HEAD and blocks any deletion or type change.
          Default: contract_schema.lock.json (repo root — convention for app repos).
          The SDK overrides this to packages/conformance/conformance/data/contract_schema.lock.json.
        required: false
        default: "contract_schema.lock.json"
        type: string
      force-all:
        description: >
          Run every rule series regardless of which paths changed.  Same effect
          as event_name == 'push'; the SDK's sdk-gate.yaml sets this on
          release / version-bump branches and v* tags so a release dry-runs the
          full suite.  Default: false (per-series path selection applies).
        required: false
        default: false
        type: boolean
      exit-zero:
        description: >
          When true, the detect command exits 0 even when blocking violations are
          found.  The SARIF invocation.exitCode still records the real result so
          Security-tab tracking is unaffected; only the CI job exit code changes.
          Use during soft-enforcement rollouts where violations should be observed
          but must not block merges.  Default: false (hard gate).
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Per-series checks (one matrix leg per rule series) ──────────────────────
  # Every leg shares this body; only the matrix entry differs.  `series`, `name`
  # and `slug` are workflow-controlled constants (safe to interpolate into the
  # shell); `exclude_paths` is the only caller-controlled value and is passed via
  # the step-level `EXCLUDE_PATHS` env var and quoted — never interpolated into
  # the `run:` script — so an exclude-path string can never inject shell.
  suite:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - series: C
            name: "CI"
            slug: ci
            paths: ".github/**"
            exclude_paths: ${{ inputs.exclude-paths-c }}
          - series: E
            name: "Error handling"
            slug: error-handling
            paths: "**/*.py"
            exclude_paths: ${{ inputs.exclude-paths-e }}
          - series: P
            name: "Prescriptions"
            slug: prescriptions
            # P016 reads both Python sources (@entrypoint code) and the
            # app/generated/ + contract/ trees (contract-side artifacts), so a
            # PR that only re-runs pkl eval and commits regenerated app/generated/
            # files — the canonical BLDX-1425 drift shape — must still trigger
            # this leg.  Brace expansion (micromatch) covers all three sources
            # with a single paths filter entry and no template change.
            paths: "{**/*.py,app/generated/**,contract/**}"
            exclude_paths: ${{ inputs.exclude-paths-p }}
          - series: O
            name: "Optimizations"
            slug: optimizations
            paths: "**/*.py"
            exclude_paths: ${{ inputs.exclude-paths-o }}
          # D003 (UnusedDependency) reads source imports too, but the changed-files
          # filter watches only `**/pyproject.toml` to keep this (env-syncing,
          # heavier) leg off every `*.py` PR.  A PR that removes the last import of
          # a still-declared dependency therefore won't re-run this leg — that
          # staleness is caught on push to main, where every leg runs
          # unconditionally.  Acceptable at WARN tier (mirrors the T-series above).
          - series: D
            name: "Dependencies"
            slug: dependency
            paths: "**/pyproject.toml"
            exclude_paths: ${{ inputs.exclude-paths-d }}
            # D001/D002/D003 all map declared dependencies to import name(s) via
            # installed package metadata, so the leg must run in an environment
            # where the caller's dependencies are installed — not the isolated
            # `uvx` env used by the other series.
            needs_env: "true"
          - series: L
            name: "Logging"
            slug: logging
            paths: "**/*.py"
            exclude_paths: ${{ inputs.exclude-paths-l }}
          # T001's verdict also depends on the unit-job deselection markers in
          # `pyproject.toml` (`addopts`), but the changed-files filter watches only
          # `tests/integration/**` to avoid running every other leg on pyproject
          # churn.  A PR that changes *only* `addopts` (e.g. dropping a `not <marker>`)
          # therefore won't re-run this leg — that staleness is caught on push to
          # main, where every leg runs unconditionally.  Acceptable at WARN tier.
          - series: T
            name: "Tests"
            slug: tests
            paths: "tests/integration/**"
            exclude_paths: ${{ inputs.exclude-paths-t }}
          # I-series (container image) is APP-scoped and no-ops on the SDK itself
          # since the SDK Dockerfile builds the base image, not a consumer app.
          # Watches only the root Dockerfile so Python-only PRs don't trigger it.
          - series: I
            name: "Container images"
            slug: container-image
            paths: "Dockerfile"
            exclude_paths: ${{ inputs.exclude-paths-i }}
          # B-series is mixed-scope: B001 (app) flags consumption of deprecated
          # SDK symbols, B002/B003/B004 (sdk) check the SDK's own deprecation
          # authoring.  Scope is auto-detected per caller, so on a consumer app
          # only B001 runs and on the SDK only B002–B004 run — no per-app config.
          - series: B
            name: "Deprecations"
            slug: deprecation
            paths: "**/*.py"
            exclude_paths: ${{ inputs.exclude-paths-b }}
          # K-series is APP-scoped and no-ops on the SDK itself (no contract/
          # directory).  Watches the contract source (K001/K002/K003) AND the
          # generated artifacts (K004/K005): a hand-edit to atlan.yaml or
          # app/generated/** with no contract/ change must still trigger this leg.
          - series: K
            name: "Contract toolkit"
            slug: contract-toolkit
            paths: "{contract/**,atlan.yaml,app.yaml,app/generated/**}"
            exclude_paths: ${{ inputs.exclude-paths-k }}
          # S-series (secret hygiene) is mixed-scope: S001 (hardcoded credentials)
          # is 'both'; S002 (raw-env credential reads) is APP-scoped and no-ops on
          # the SDK, which is the provider of the secret-store seam.  Scope is
          # auto-detected per caller, so no per-app config is needed.
          - series: S
            name: "Security"
            slug: security
            paths: "**/*.py"
            exclude_paths: ${{ inputs.exclude-paths-s }}
    steps:
      - name: "Checkout caller repo"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Detect changed files"
        id: changes
        # Skip when forcing (release/version-bump/tag) or on push-to-main: in
        # all those cases the downstream steps fire regardless (their `if:`s OR
        # in `inputs.event_name == 'push' || inputs.force-all`), and a tag push
        # has no clean diff base for paths-filter — running it could hard-fail
        # the leg and turn the gate red on a release. Mirrors sdk-gate.yaml,
        # which skips its own outer filter for the same reason.
        if: inputs.event_name != 'push' && !inputs.force-all
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        with:
          filters: |
            relevant:
              - "${{ matrix.paths }}"

      - name: "Set up uv"
        if: steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push' || inputs.force-all
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: "Run ${{ matrix.series }}-series checks"
        if: steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push' || inputs.force-all
        uses: ./.github/actions/run-conformance-detect
        with:
          series: ${{ matrix.series }}
          slug: ${{ matrix.slug }}
          exclude-paths: ${{ matrix.exclude_paths }}
          exit-zero: ${{ inputs.exit-zero }}
          conformance-ref: ${{ inputs.conformance-ref }}
          needs-env: ${{ matrix.needs_env }}

      - name: "Upload SARIF artifact"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push' || inputs.force-all) && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conformance-${{ matrix.slug }}-sarif
          path: ${{ matrix.slug }}.sarif

  # ── Contract ledger append-only guard ─────────────────────────────────────
  # Verifies that no entry was deleted from the committed contract ledger and
  # no recorded type was changed between origin/main and HEAD.  Adding entries
  # and status changes (active→deprecated→sunset) are always allowed.
  #
  # Uses `uvx atlan-application-sdk-conformance ledger-guard` so the guard
  # travels with the published package — no local script copy needed in app repos.
  # The ledger-path input lets each caller point to its own ledger; the SDK
  # overrides the default via conformance.yaml / sdk-gate.yaml.
  #
  # Requires fetch-depth: 0 so the full git history (and origin/main) is
  # available to `git show`.  Skipped on push to main (no base-ref diff).
  contract-ledger-guard:
    name: "Contracts"
    runs-on: ubuntu-latest
    if: inputs.event_name != 'push'
    steps:
      - name: "Checkout (full history)"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: "Set up uv"
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: "Guard contract_schema.lock.json (published package)"
        if: inputs.conformance-ref == ''
        env:
          LEDGER_PATH: ${{ inputs.ledger-path }}
        run: uvx atlan-application-sdk-conformance ledger-guard --base-ref origin/main --ledger-path "$LEDGER_PATH"

      - name: "Guard contract_schema.lock.json (in-flight conformance-ref)"
        if: inputs.conformance-ref != ''
        env:
          LEDGER_PATH: ${{ inputs.ledger-path }}
        run: >-
          uvx
          --from "atlan-application-sdk-conformance @ git+https://github.com/atlanhq/application-sdk@${{ inputs.conformance-ref }}#subdirectory=packages/conformance"
          atlan-application-sdk-conformance ledger-guard --base-ref origin/main --ledger-path "$LEDGER_PATH"

  # ── Required gate ─────────────────────────────────────────────────────────
  # Always runs so it can be marked a required check without ever becoming
  # "skipped" and blocking the merge queue.  A matrix job's aggregate result is
  # 'failure' if any leg fails, so a single `needs: [suite]` covers all series.
  gate:
    name: "Conformance Gate"
    runs-on: ubuntu-latest
    needs: [suite]
    if: always()
    steps:
      - name: "Evaluate conformance results"
        env:
          SUITE_RESULT: ${{ needs.suite.result }}
        run: |
          set -euo pipefail
          # Fail closed on anything that is not a clean pass. The matrix job's
          # aggregate result is 'failure' if any leg failed, 'cancelled' if a
          # run was cancelled, 'skipped' if every series self-skipped (nothing
          # relevant changed), 'success' otherwise. Only success|skipped pass —
          # 'cancelled' must NOT slip through (the old contains(...,'failure')
          # rule let it).
          if [[ "$SUITE_RESULT" == "success" || "$SUITE_RESULT" == "skipped" ]]; then
            echo "Conformance gate passed (suite result: $SUITE_RESULT)."
          else
            echo "::error::Conformance gate FAILED — suite result: $SUITE_RESULT."
            exit 1
          fi
