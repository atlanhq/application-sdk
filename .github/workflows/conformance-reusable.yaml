# .github/workflows/conformance-reusable.yaml
#
# Reusable workflow: full conformance suite gate.
#
# Runs C-series and E-series checks as separate jobs so each appears as its own
# status check:
#   Conformance / suite / CI
#   Conformance / suite / Error-handling
#   Conformance / suite / Conformance Gate  (required gate)
#
# Jobs are intentionally inline (not delegating to sub-workflows) so GitHub
# reports them at the correct depth — one level of workflow_call from the
# caller produces three-level check paths, not four.
#
# Usage from a connector SDK/app:
#   uses: atlanhq/application-sdk/.github/workflows/conformance-reusable.yaml@main
#
# Note: the default conformance-ref='' path requires atlan-application-sdk-conformance
# to be published on PyPI. Pin conformance-ref to a git SHA only when testing
# unreleased suite changes.
#
# ── Suppression vs path exclusion ─────────────────────────────────────────────
#
# There are two ways to reduce the set of findings a check reports.  They serve
# different purposes and carry different audit properties:
#
#   # conformance: ignore[Exxx] <reason>   (or  # noqa: S110 — <reason>)
#     A per-site, in-source suppression for a specific finding.  The finding is
#     still emitted to the SARIF artifact as a suppressed result with the
#     justification text preserved — it is counted in atlan/summary.suppressing
#     and downloadable as a build artifact.  Suppressed results are stripped
#     from the Security tab upload so they do not create alerts or PR
#     annotations.  Use this for production code in the SDK/app that has a
#     legitimate, site-specific carve-out.
#
#   exclude-paths-c / exclude-paths-e
#     A path prefix removed from scanning entirely.  Nothing from that path
#     appears in the SARIF report.  Use this only for code that is categorically
#     outside the SDK/app surface — tooling, migration scripts, generated files,
#     or other paths that will never run in production.  Excluded paths are
#     recorded in atlan/excludedPaths in the SARIF run properties and surfaced
#     as a ::notice annotation so the reduced scope is always visible.
#     Extending this list to cover production code defeats the gate.
#
# ── conformance-ref override ──────────────────────────────────────────────────
#
#   conformance-ref: ""  (default)
#     Install atlan-application-sdk-conformance from PyPI (latest published).
#
#   conformance-ref: <branch|tag|sha>
#     Install from that git ref's subdirectory, enabling pre-release testing
#     of an unreleased conformance suite change before it is published.
#     The SDK's own conformance.yaml passes the PR HEAD sha here so it always
#     dogfoods its own in-flight suite.

name: "Conformance (reusable)"

on:
  workflow_call:
    inputs:
      conformance-ref:
        description: >
          Git ref of atlanhq/application-sdk to source the conformance suite from.
          Empty (default) uses the latest published PyPI package.
          Set to a branch/tag/sha to test an unreleased suite version.
        required: false
        default: ""
        type: string
      upload-sarif:
        description: "Upload SARIF report to GitHub Security tab (requires security-events: write)"
        required: false
        default: true
        type: boolean
      event_name:
        description: "Caller's github.event_name (push / pull_request / merge_group); reusable workflows always see 'workflow_call' internally"
        required: false
        default: ""
        type: string
      exclude-paths-c:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from C-series
          checks only, e.g. 'tools/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-e:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from E-series
          checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-p:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from P-series
          (prescription) checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string
      exclude-paths-o:
        description: >
          Comma-separated repo-root-relative path prefixes to exclude from O-series
          (optimisation) checks only, e.g. 'tools/,contract-toolkit/'.  Default: nothing excluded.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  # ── CI series (C-series: action-pinning, workflow supply-chain) ─────────────
  ci:
    name: "CI"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout caller repo"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: "Detect changed files"
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            relevant:
              - '.github/**'

      - name: "Set up uv"
        if: steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: "Run C-series checks (published package)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref == ''
        run: |
          uvx atlan-application-sdk-conformance detect \
            --repo . \
            --series C \
            --output ci.sarif \
            ${{ inputs.exclude-paths-c != '' && format('--exclude "{0}"', inputs.exclude-paths-c) || '' }}

      - name: "Run C-series checks (from git ref)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref != ''
        run: |
          uv run \
            --with "atlan-application-sdk-conformance @ git+https://github.com/atlanhq/application-sdk@${{ inputs.conformance-ref }}#subdirectory=packages/conformance" \
            -- atlan-application-sdk-conformance detect \
            --repo . \
            --series C \
            --output ci.sarif \
            ${{ inputs.exclude-paths-c != '' && format('--exclude "{0}"', inputs.exclude-paths-c) || '' }}

      - name: "Upload SARIF artifact"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conformance-ci-sarif
          path: ci.sarif

      - name: "Strip suppressed results for Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        run: |
          jq '.runs[] |= (.results |= map(select(.suppressions == null or (.suppressions | length == 0))))' \
            ci.sarif > ci-upload.sarif

      - name: "Upload SARIF to Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ci-upload.sarif

  # ── Error-handling series (E-series: error patterns, exception hygiene) ─────
  error-handling:
    name: "Error-handling"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout caller repo"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: "Detect changed files"
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            relevant:
              - '**/*.py'

      - name: "Set up uv"
        if: steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: "Run E-series checks (published package)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref == ''
        run: |
          uvx atlan-application-sdk-conformance detect \
            --repo . \
            --series E \
            --output error-handling.sarif \
            ${{ inputs.exclude-paths-e != '' && format('--exclude "{0}"', inputs.exclude-paths-e) || '' }}

      - name: "Run E-series checks (from git ref)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref != ''
        run: |
          uv run \
            --with "atlan-application-sdk-conformance @ git+https://github.com/atlanhq/application-sdk@${{ inputs.conformance-ref }}#subdirectory=packages/conformance" \
            -- atlan-application-sdk-conformance detect \
            --repo . \
            --series E \
            --output error-handling.sarif \
            ${{ inputs.exclude-paths-e != '' && format('--exclude "{0}"', inputs.exclude-paths-e) || '' }}

      - name: "Upload SARIF artifact"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conformance-error-handling-sarif
          path: error-handling.sarif

      - name: "Strip suppressed results for Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        run: |
          jq '.runs[] |= (.results |= map(select(.suppressions == null or (.suppressions | length == 0))))' \
            error-handling.sarif > error-handling-upload.sarif

      - name: "Upload SARIF to Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: error-handling-upload.sarif

  # ── Prescription series (P-series: above-the-bar mandatory prescriptions) ───
  prescriptions:
    name: "Prescriptions"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout caller repo"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: "Detect changed files"
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            relevant:
              - '**/*.py'

      - name: "Set up uv"
        if: steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: "Run P-series checks (published package)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref == ''
        run: |
          uvx atlan-application-sdk-conformance detect \
            --repo . \
            --series P \
            --output prescriptions.sarif \
            ${{ inputs.exclude-paths-p != '' && format('--exclude "{0}"', inputs.exclude-paths-p) || '' }}

      - name: "Run P-series checks (from git ref)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref != ''
        run: |
          uv run \
            --with "atlan-application-sdk-conformance @ git+https://github.com/atlanhq/application-sdk@${{ inputs.conformance-ref }}#subdirectory=packages/conformance" \
            -- atlan-application-sdk-conformance detect \
            --repo . \
            --series P \
            --output prescriptions.sarif \
            ${{ inputs.exclude-paths-p != '' && format('--exclude "{0}"', inputs.exclude-paths-p) || '' }}

      - name: "Upload SARIF artifact"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conformance-prescriptions-sarif
          path: prescriptions.sarif

      - name: "Strip suppressed results for Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        run: |
          jq '.runs[] |= (.results |= map(select(.suppressions == null or (.suppressions | length == 0))))' \
            prescriptions.sarif > prescriptions-upload.sarif

      - name: "Upload SARIF to Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: prescriptions-upload.sarif

  # ── Optimisation series (O-series: below-the-bar recommendations, WARN) ─────
  optimizations:
    name: "Optimizations"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout caller repo"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: "Detect changed files"
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            relevant:
              - '**/*.py'

      - name: "Set up uv"
        if: steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: "Run O-series checks (published package)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref == ''
        run: |
          uvx atlan-application-sdk-conformance detect \
            --repo . \
            --series O \
            --output optimizations.sarif \
            ${{ inputs.exclude-paths-o != '' && format('--exclude "{0}"', inputs.exclude-paths-o) || '' }}

      - name: "Run O-series checks (from git ref)"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && inputs.conformance-ref != ''
        run: |
          uv run \
            --with "atlan-application-sdk-conformance @ git+https://github.com/atlanhq/application-sdk@${{ inputs.conformance-ref }}#subdirectory=packages/conformance" \
            -- atlan-application-sdk-conformance detect \
            --repo . \
            --series O \
            --output optimizations.sarif \
            ${{ inputs.exclude-paths-o != '' && format('--exclude "{0}"', inputs.exclude-paths-o) || '' }}

      - name: "Upload SARIF artifact"
        if: (steps.changes.outputs.relevant == 'true' || inputs.event_name == 'push') && !cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conformance-optimizations-sarif
          path: optimizations.sarif

      - name: "Strip suppressed results for Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        run: |
          jq '.runs[] |= (.results |= map(select(.suppressions == null or (.suppressions | length == 0))))' \
            optimizations.sarif > optimizations-upload.sarif

      - name: "Upload SARIF to Security tab"
        if: ${{ inputs.upload-sarif && inputs.event_name == 'push' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: optimizations-upload.sarif

  # ── Required gate ─────────────────────────────────────────────────────────
  # Always runs so it can be marked a required check without ever becoming
  # "skipped" and blocking the merge queue.
  gate:
    name: "Conformance Gate"
    runs-on: ubuntu-latest
    needs: [ci, error-handling, prescriptions, optimizations]
    if: always()
    steps:
      - name: "Evaluate conformance results"
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::Conformance gate FAILED — one or more series found violations."
            exit 1
          fi
          echo "Conformance gate passed (series: ${{ join(needs.*.result, ', ') }})."
