# Regenerate Capability Manifest — slash-command workflow
#
# Triggered when a PR participant comments "/regen-manifest".
# Regenerates docs/agents/sdk-capabilities.md via `uv run poe regen-capabilities`
# and pushes the result as github-actions[bot].
#
# Modelled on auto-fix-vulnerabilities.yaml. Key design choices:
#   - A minted atlan-app-fleet App checkout token so the resulting push re-fires
#     PR check workflows (same pattern as auto-fix-vulnerabilities.yaml and
#     release-version-bump.yaml). Confirmed empirically that App-token pushes
#     re-trigger downstream workflows the same way a real PAT identity does.
#   - github-actions[bot] identity, NOT atlan-ci (nor the App), so the bot commit
#     does not auto-satisfy the wildcard CODEOWNERS rule that includes @atlan-ci.
#   - Fork PRs are rejected immediately with an explanatory comment.
#   - fetch-depth: 0 for the same reason as the drift-check workflow (source-sha).

name: Regenerate Capability Manifest

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    name: Regenerate Capability Manifest
    # Only fire for PR comments containing the command, from repo members or above.
    # CONTRIBUTOR/NONE/FIRST_TIME_CONTRIBUTOR are excluded to prevent outside commenters
    # from triggering a write to the repo (even though the write is deterministic and
    # low-risk, the permission gate follows the same pattern as sdk-review).
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/regen-manifest') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get PR metadata
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('number', String(context.issue.number));
            core.setOutput('is_fork', String(pr.data.head.repo.fork));
            core.setOutput('is_bump_version', String(pr.data.head.ref.startsWith('bump-version')));

      - name: Reject on fork
        if: steps.pr.outputs.is_fork == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🚫 `/regen-manifest` cannot push to fork branches. Please run `uv run poe regen-capabilities` locally and push.',
            });
            core.setFailed('fork PR — cannot push');

      - name: Skip on bump-version branch
        if: steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'ℹ️ `/regen-manifest` is skipped on version-bump branches.',
            });

      - name: React to comment
        if: steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Mint fleet App token
        id: app-token
        if: steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version != 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: application-sdk

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version != 'true'
        with:
          ref: ${{ steps.pr.outputs.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        if: steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version != 'true'
        with:
          version: "0.11.30"

      - name: Regenerate capability manifest
        if: steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version != 'true'
        run: uv run poe regen-capabilities

      - name: Commit and push
        if: steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version != 'true'
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/agents/sdk-capabilities.md
          if git diff --staged --quiet; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(docs): regenerate capability manifest

          Triggered by /regen-manifest on PR #${{ steps.pr.outputs.number }}.
          Generated by .claude/skills/capability-manifest."
            git push
            echo "status=pushed" >> "$GITHUB_OUTPUT"
          fi

      - name: Reply on PR
        if: always() && steps.pr.outputs.is_fork != 'true' && steps.pr.outputs.is_bump_version != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const status = '${{ steps.commit.outputs.status }}';
            let body;
            if (status === 'pushed') {
              body = '✅ Capability manifest regenerated and pushed. The updated SDK-surface diff is now visible in **Files changed**.';
            } else if (status === 'clean') {
              body = 'ℹ️ Capability manifest is already current — nothing to commit.';
            } else {
              body = '⚠️ Regeneration failed or was skipped. Check the [workflow logs](' +
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
