# Reusable publish workflow for Atlan first-party app repos.
#
# Uses the `atlan` CLI to build the image and register the version in the
# Global Marketplace. Draft/active status is determined by GM based on
# the target channel and caller's tenant.
#
# The CLI handles:
#   - Reading atlan.yaml for app name and config
#   - Resolving git ref and SHA, computing image tag
#   - Triggering/watching the build workflow (build-image.yaml)
#   - Registering the version + creating a release in the marketplace
#
# Usage in each app repo (.github/workflows/publish.yaml):
#
#   jobs:
#     publish:
#       uses: atlanhq/application-sdk/.github/workflows/publish-app.yaml@main
#       with:
#         ref: ${{ inputs.ref || github.ref }}
#         channel: ${{ inputs.channel }}
#         tenants: ${{ inputs.tenants || '' }}
#       secrets: inherit
#
name: Publish Atlan App

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or SHA to checkout, build, and publish (default: caller's ref)"
        required: false
        type: string
      channel:
        description: "Target channel (e.g. 'all' for draft release requiring approval). Ignored when tenants is set."
        required: false
        type: string
        default: "all"
      tenants:
        description: "Comma-separated tenant IDs for targeted publish. Takes precedence over channel."
        required: false
        type: string
        default: ""
      base_url:
        description: "Marketplace API base URL (Heracles gateway)"
        required: false
        type: string
        default: "https://home.atlan.com"
      cli_version:
        description: "Atlan CLI version to install"
        required: false
        type: string
        default: "v0.1.11"
    secrets:
      ORG_PAT_GITHUB:
        required: true
        description: >-
          Fallback PAT for gh CLI auth (workflow-dispatch trigger/poll of the
          caller's own build workflow, and the atlan-cli-releases download),
          used if the fleet App token can't be minted. Not used for GHCR --
          the actual image build+push happens in the caller's own separate
          build workflow, authenticated there with its own secrets.
      APP_PUBLISH_TOKEN:
        required: true
        description: "API token for marketplace publish"
      FLEET_APP_ID:
        required: false
        description: "atlan-app-fleet App ID (org secret). Not passed explicitly by any current caller — auto-available via 'secrets: inherit'. Declared here so the contract is self-documenting."
      FLEET_APP_PRIVATE_KEY:
        required: false
        description: "atlan-app-fleet App private key (org secret). Same availability as FLEET_APP_ID above."

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Mint fleet App token
        # Used for gh CLI auth only (release download + the workflow-dispatch
        # trigger/poll the atlan CLI shells out to for the caller's own build
        # workflow) -- no GHCR interaction happens in this file.
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: ${{ github.event.repository.name }}

      - name: Install Atlan CLI
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}
        run: |
          set -euo pipefail

          VERSION="${{ inputs.cli_version }}"
          REPO="atlanhq/atlan-cli-releases"
          PATTERN="*Linux_amd64.tar.gz"

          if [ "$VERSION" = "latest" ]; then
            gh release download --repo "$REPO" --pattern "$PATTERN" --output atlan-cli.tar.gz
          else
            gh release download "$VERSION" --repo "$REPO" --pattern "$PATTERN" --output atlan-cli.tar.gz
          fi

          tar -xzf atlan-cli.tar.gz
          chmod +x atlan
          sudo mv atlan /usr/local/bin/atlan
          atlan --version

      - name: Configure Atlan CLI
        env:
          APP_PUBLISH_TOKEN: ${{ secrets.APP_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          atlan config atlan_base_url "${{ inputs.base_url }}"
          atlan config atlan_api_key "$APP_PUBLISH_TOKEN"

      - name: Publish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}
          CHANNEL: ${{ inputs.channel }}
          TENANTS: ${{ inputs.tenants }}
          REF: ${{ inputs.ref || github.ref }}
        run: |
          set -euo pipefail

          ARGS=()

          if [ -n "$REF" ]; then
            ARGS+=(--ref "$REF")
          fi

          # Tenants takes precedence over channel
          if [ -n "$TENANTS" ]; then
            ARGS+=(--tenants "$TENANTS")
          elif [ -n "$CHANNEL" ]; then
            ARGS+=(--channel "$CHANNEL")
          fi

          echo "Running: atlan app publish ${ARGS[*]}"
          atlan app publish "${ARGS[@]}"
