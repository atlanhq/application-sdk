# Throwaway — testing whether an org secret with "All repositories" visibility
# is readable directly (secrets.FLEET_APP_ID) inside a reusable workflow when
# called from a DIFFERENT repo, with no explicit secrets: passthrough or
# `secrets: inherit` from the caller. Delete after the answer is confirmed.
name: _throwaway Org Secret Visibility Test (Reusable)

on:
  workflow_call: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Mint fleet App token with no secrets passed by caller
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq

      - name: Confirm it minted a real token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh api rate_limit --jq '.rate'
