# Reusable build workflow for Atlan first-party app repos.
#
# Zero-input — reads atlan.yaml from the repo, derives everything from GitHub context.
# Image tag:  {branch}-{sha7}  (e.g. main-abc1234) — immutable, used by deploy systems
# Image URI:  ghcr.io/atlanhq/{repo}:{branch}-{sha7}  (same format on GHCR and DockerHub)
# Mutable:    ghcr.io/atlanhq/{repo}:{branch}         (always points to latest on branch)
#
# Optimisations:
#   1. Parallel matrix build — amd64 and arm64 build in parallel with scoped GHA cache
#   2. provenance: false — skips SLSA attestation (saves ~15s per arch)
#   3. Snyk runs as a separate non-blocking job after the manifest is merged
#
# Usage in each app repo (.github/workflows/build-image.yaml):
#
#   jobs:
#     build:
#       uses: atlanhq/application-sdk/.github/workflows/build-apps-image.yaml@main
#       with:
#         ref: ${{ inputs.ref || github.ref }}
#       secrets: inherit   # template only reads: ORG_PAT_GITHUB, SNYK_TOKEN, DOCKER_HUB_PAT_RW
#                          # permissions are declared in this workflow — callers don't need to repeat them
#
name: Build Atlan App Image

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or SHA to checkout and build (default: caller's ref)"
        required: false
        type: string
    secrets:
      # Declaring the only secrets this template reads.
      # Callers using `secrets: inherit` are safe — all other inherited secrets are unused.
      ORG_PAT_GITHUB:
        required: true
        description: "Org-level PAT for GHCR login — needed to pull private base images from other repos in the org"
      # Note: no SNYK_TOKEN needed — scanning is done with Trivy (no auth required)
      DOCKER_HUB_PAT_RW:
        required: false
        description: "DockerHub PAT (read/write) — only needed when atlan.yaml self_deployed_runtime=true"

permissions:
  contents: read
  packages: write
  security-events: write  # For Trivy SARIF upload

jobs:
  # ── Job 1: Read atlan.yaml, validate secrets, compute all image tags ──────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_name:         ${{ steps.manifest.outputs.app_name }}
      dockerfile:       ${{ steps.manifest.outputs.dockerfile }}
      enable_sdr:       ${{ steps.manifest.outputs.enable_sdr }}
      branch:           ${{ steps.tags.outputs.branch }}
      image_tag:        ${{ steps.tags.outputs.image_tag }}
      ghcr_base:        ${{ steps.tags.outputs.ghcr_base }}
      ghcr_image:       ${{ steps.tags.outputs.ghcr_image }}
      ghcr_branch_tag:  ${{ steps.tags.outputs.ghcr_branch_tag }}
      dockerhub_image:  ${{ steps.tags.outputs.dockerhub_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Read atlan.yaml
        id: manifest
        run: |
          if [ ! -f atlan.yaml ]; then
            echo "::error::atlan.yaml not found in repo root"
            exit 1
          fi

          # Parse once, write all outputs — avoids opening/parsing atlan.yaml three separate times
          python3 - <<'PYEOF'
          import yaml, sys, os

          try:
              with open('atlan.yaml') as f:
                  d = yaml.safe_load(f) or {}
          except yaml.YAMLError as e:
              print(f'::error::atlan.yaml is invalid YAML: {e}', file=sys.stderr)
              sys.exit(1)

          app_name   = d.get('name', '')
          build_tag  = d.get('build_tag', 'v1')
          dockerfile = d.get('dockerfile', './Dockerfile')
          # self_deployed_runtime: true → push image to shared external registry
          # so customers can pull it into their own environment.
          enable_sdr = 'true' if d.get('self_deployed_runtime', False) else 'false'

          if not app_name:
              print('::error::atlan.yaml is missing required "name" field', file=sys.stderr)
              sys.exit(1)

          if build_tag != 'v1':
              print(f"::error::Unsupported build_tag '{build_tag}'. Only 'v1' is supported by this template version.", file=sys.stderr)
              sys.exit(1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'app_name={app_name}\n')
              out.write(f'build_tag={build_tag}\n')
              out.write(f'dockerfile={dockerfile}\n')
              out.write(f'enable_sdr={enable_sdr}\n')

          print(f'Dockerfile path: {dockerfile}')
          print(f'SDR push enabled: {enable_sdr}')
          PYEOF

      - name: Validate SDR secrets
        if: steps.manifest.outputs.enable_sdr == 'true'
        env:
          HAS_PAT: ${{ secrets.DOCKER_HUB_PAT_RW != '' && 'true' || 'false' }}
        run: |
          if [ "$HAS_PAT" != "true" ]; then
            echo "::error::atlan.yaml sets self_deployed_runtime=true but DOCKER_HUB_PAT_RW secret is not set in this repo."
            exit 1
          fi

      - name: Compute image tags
        id: tags
        env:
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
          # REF is passed via env (not interpolated into run script body) — safe from shell injection
          REF: ${{ inputs.ref || github.ref }}
        run: |
          # Validate ref format before use
          if ! [[ "$REF" =~ ^(refs/heads/|refs/tags/)?[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid ref format: ${REF}"
            exit 1
          fi

          # Extract branch name from ref (refs/heads/main → main, feat/foo → feat-foo)
          BRANCH=$(echo "$REF" | sed 's|refs/heads/||' | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr '_' '-')

          # Immutable tag: first 7 chars of SHA (e.g. abc1234)
          IMAGE_TAG="${SHA:0:7}"

          # Single GHCR image repo per app; branch is part of the tag (not the image name)
          GHCR_BASE="ghcr.io/atlanhq/${REPO}"
          GHCR_IMAGE="${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}"
          GHCR_BRANCH_TAG="${GHCR_BASE}:${BRANCH}"  # mutable, always points to latest on branch

          DOCKERHUB_BASE="atlanhq/${REPO}"
          DOCKERHUB_IMAGE="${DOCKERHUB_BASE}:${BRANCH}-${IMAGE_TAG}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_branch_tag=${GHCR_BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${DOCKERHUB_IMAGE}" >> "$GITHUB_OUTPUT"

          echo "Branch: ${BRANCH}"
          echo "Immutable image: ${GHCR_IMAGE}"
          echo "Mutable branch tag: ${GHCR_BRANCH_TAG}"
          echo "DockerHub image: ${DOCKERHUB_IMAGE}"

  # ── Job 2: Build — parallel per architecture ──────────────────────────────────
  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build and push arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ needs.prepare.outputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          # Arch-specific digest tag — merged into the final manifest by the merge job
          tags: ${{ needs.prepare.outputs.ghcr_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.image_tag }}-${{ matrix.arch }}
          # Scoped cache — prevents amd64 and arm64 from overwriting each other's cache entries
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false  # skip SLSA provenance attestation — reduces push time per arch
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}

  # ── Job 3: Merge arch digests into a single multi-arch manifest ───────────────
  merge:
    name: Merge & Push Manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.enable_sdr == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: atlanhq
          password: ${{ secrets.DOCKER_HUB_PAT_RW }}

      - name: Create and push multi-arch manifest
        env:
          GHCR_BASE:       ${{ needs.prepare.outputs.ghcr_base }}
          GHCR_IMAGE:      ${{ needs.prepare.outputs.ghcr_image }}
          GHCR_BRANCH_TAG: ${{ needs.prepare.outputs.ghcr_branch_tag }}
          BRANCH:          ${{ needs.prepare.outputs.branch }}
          IMAGE_TAG:       ${{ needs.prepare.outputs.image_tag }}
        run: |
          # Combine the two arch-specific images into a single multi-arch manifest
          docker buildx imagetools create \
            --tag "${GHCR_IMAGE}" \
            --tag "${GHCR_BRANCH_TAG}" \
            "${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}-amd64" \
            "${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}-arm64"

          echo "Multi-arch manifest pushed:"
          echo "  Immutable: ${GHCR_IMAGE}"
          echo "  Branch:    ${GHCR_BRANCH_TAG}"

      - name: Push to Docker Hub (re-tag, no rebuild)
        if: needs.prepare.outputs.enable_sdr == 'true'
        env:
          GHCR_IMAGE:      ${{ needs.prepare.outputs.ghcr_image }}
          DOCKERHUB_IMAGE: ${{ needs.prepare.outputs.dockerhub_image }}
        run: |
          # Re-tag GHCR multi-arch manifest to DockerHub — no second build needed
          docker buildx imagetools create \
            --tag "${DOCKERHUB_IMAGE}" \
            "${GHCR_IMAGE}"
          echo "Pushed to DockerHub: ${DOCKERHUB_IMAGE}"

      - name: Summary
        run: |
          echo "### Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Immutable image | \`${{ needs.prepare.outputs.ghcr_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch tag (mutable) | \`${{ needs.prepare.outputs.ghcr_branch_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DockerHub image | \`${{ needs.prepare.outputs.dockerhub_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ needs.prepare.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ needs.prepare.outputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile | \`${{ needs.prepare.outputs.dockerfile }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SDR push | \`${{ needs.prepare.outputs.enable_sdr }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Trivy scan — non-blocking, runs after manifest is available ──────
  trivy:
    name: Trivy Container Scan
    needs: [prepare, merge]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true  # never block a release on a security scan
    permissions:
      security-events: write  # upload SARIF
      actions: read           # codeql-action telemetry (GET /actions/workflow-runs)

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Install Trivy
        # Download the binary directly from GitHub releases — bypasses setup-trivy
        # which fetches install.sh from trivy@main (currently broken).
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          TRIVY_VERSION=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/aquasecurity/trivy/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | sed 's/^v//')
          curl -sL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy

      - name: Run Trivy container scan
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            ${{ needs.prepare.outputs.ghcr_image }}

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true  # codeql telemetry endpoint is not accessible in reusable workflow context
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ── Job 5: Dispatch deployment to atlan-apps-deployment (main only) ───────────
  app-deployment-dispatcher:
    name: Dispatch App Deployment
    needs: [prepare, merge]
    if: github.ref == 'refs/heads/main' && needs.prepare.outputs.enable_sdr == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ['atlanhq/atlan-apps-deployment']
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3.0.0
        with:
          token: ${{ secrets.ORG_PAT_GITHUB }}
          repository: ${{ matrix.repo }}
          event-type: dispatch_app_builder_workflow
          client-payload: |-
            {
                "app_name": "${{ needs.prepare.outputs.app_name }}",
                "image_name": "${{ needs.prepare.outputs.dockerhub_image }}"
            }
