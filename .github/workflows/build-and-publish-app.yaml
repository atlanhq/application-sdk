# Unified build-and-publish entrypoint for Atlan first-party app repos.
#
# Combines image build (build-apps-image.yaml) and marketplace publish (publish-app.yaml)
# into a single entrypoint to eliminate double builds on push to main.
#
# Image tag:  {branch}-{sha7}  (e.g. main-abc1234) — immutable, used by deploy systems
# Image URI:  ghcr.io/atlanhq/{repo}:{branch}-{sha7}
# Mutable:    ghcr.io/atlanhq/{repo}:{branch}         (always points to latest on branch)
#
# Release:    when release_tag is provided (set to github.event.release.tag_name by caller),
#             additionally pushes a version-tag ladder to GHCR:
#             - Stable (no '-' in version): :latest, :VERSION, :MAJOR.MINOR, :MAJOR, :sha-{SHA7}
#             - Pre-release (rc/alpha/beta): :VERSION, :sha-{SHA7} only (no :latest or aliases)
#
# Build: parallel matrix (amd64 + arm64), merged into a multi-arch manifest.
# Publish: after build succeeds, registers the version in the Global Marketplace via API.
#
# Usage in each app repo (.github/workflows/build-and-publish.yaml):
#
#   jobs:
#     build-and-publish:
#       uses: atlanhq/application-sdk/.github/workflows/build-and-publish-app.yaml@main
#       with:
#         publish: ${{ github.event.inputs.publish != 'false' }}
#         channel: ${{ inputs.channel || 'all' }}
#         tenants: ${{ inputs.tenants || '' }}
#       secrets: inherit
#
name: Build & Publish Atlan App

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or SHA to checkout and build (default: caller's ref)"
        required: false
        type: string
      publish:
        description: "Whether to publish to marketplace after build (default: false)"
        required: false
        type: boolean
        default: false
      channel:
        description: "Target channel (e.g. 'all' for draft release requiring approval). Ignored when tenants is set."
        required: false
        type: string
        default: "all"
      tenants:
        description: "Comma-separated tenant IDs for targeted publish. Takes precedence over channel."
        required: false
        type: string
        default: ""
      base_url:
        description: "Marketplace API base URL (Heracles gateway)"
        required: false
        type: string
        default: "https://home.atlan.com"
      release_tag:
        description: "Git tag of the release (e.g. v1.2.3) — when set, pushes a version-tag ladder to GHCR in addition to the standard branch tags. Pass github.event.release.tag_name for release events."
        required: false
        type: string
        default: ""
      unit_tests_workflow_file:
        description: "Filename of the workflow in the caller's repo that runs the app's unit tests (e.g. 'unit-tests.yml', 'tests.yml'). When unset (default), the gate is skipped entirely — apps onboard at their pace and existing callers stay unaffected. When set, the gate looks for an existing successful run of this workflow on the publish SHA; if none is found, it dispatches the workflow on the publish ref and waits for the new run. The target workflow MUST declare 'workflow_dispatch:' in its 'on:' block. See docs/standards/unit-tests-gate.md."
        required: false
        type: string
        default: ""
      lfs:
        description: "Check out git-LFS objects before building the image (default false). Set true for apps that vendor LFS-tracked assets (e.g. large parser jars) into the Docker build context — without it the build copies the LFS pointer, not the real file. Only applied to the image-build checkout; other jobs do not need LFS content."
        required: false
        type: boolean
        default: false
      coverage_source:
        description: "Python package (or path) measured for unit-test coverage — passed to `pytest --cov=<value>` in the certify gate. Defaults to 'app', the standard SDK app package name, so existing callers are unaffected. Apps whose importable package differs override this (e.g. automation-engine sets 'automation_engine'); otherwise coverage measures a non-existent module, records 0%, and trips the app's coverage fail_under gate."
        required: false
        type: string
        default: "app"
    secrets:
      ORG_PAT_GITHUB:
        required: true
        description: "Org-level PAT for GHCR login and gh CLI auth"
      DOCKER_HUB_PAT_RW:
        required: false
        description: "DockerHub PAT (read/write) — only needed when atlan.yaml self_deployed_runtime=true"
      APP_PUBLISH_TOKEN:
        required: false
        description: "API token for marketplace publish — required when publish=true"
      SLACK_LEAK_SCAN_WEBHOOK:
        required: false
        description: "Slack incoming-webhook URL (hooks.slack.com) for credential-leak (creds-into-logs) WARNINGS. Org-level secret, passed via `secrets: inherit` — same convention as SLACK_DEP_COOLDOWN_WEBHOOK. Warnings are non-blocking; when unset the Slack ping is skipped. Never receives secret values — only file:line locations."

permissions:
  contents: read
  packages: write
  actions: write
  pull-requests: write
  checks: read

jobs:
  # ── Job 0: Channel + branch gate ─────────────────────────────────────────────
  # 'all'-channel releases reach every production tenant, so they MUST come
  # from the protected `main` branch. Fail here (before the multi-arch build
  # spends ~10 min) when channel=='all' and the build ref is not main.
  # Only runs when `publish: true` AND the caller has set
  # `unit_tests_workflow_file` — apps that have not onboarded skip the gate.
  # Beta, staging, and tenant-targeted publishes are unrestricted.
  validate-channel:
    name: Validate Channel + Branch
    if: inputs.publish
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enforce main-branch invariant for channel='all'
        env:
          # REF and CHANNEL/TENANTS are passed via env (not interpolated into
          # the script body) — protects against shell injection from branch
          # names containing backticks/$().
          REF: ${{ inputs.ref || github.ref }}
          CHANNEL: ${{ inputs.channel }}
          TENANTS: ${{ inputs.tenants }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          # Strip any trailing CR/LF that GitHub expression evaluation can inject.
          RELEASE_TAG="${RELEASE_TAG//$'\r'/}"
          RELEASE_TAG="${RELEASE_TAG//$'\n'/}"

          # Bypass the main-branch gate only when the ref is actually the
          # matching tag ref. Checking release_tag alone is insufficient:
          # a caller could pass any non-empty value from a feature branch
          # to skip the channel='all' protection.
          if [ -n "${RELEASE_TAG}" ] && [ "${REF}" = "refs/tags/${RELEASE_TAG}" ]; then
            echo "Tagged release (${RELEASE_TAG}) — main-branch gate skipped."
            exit 0
          fi

          # Mirror the channel-resolution rules used at publish time:
          #   tenants  -> specific  (skip gate)
          #   channel='' or 'all' -> all  (enforce gate)
          #   beta/staging/anything else -> skip gate
          #
          # Channel is lowercased before comparison so a stray 'ALL'/'All'
          # can't slip past — the downstream API treats target_channel
          # case-sensitively, so we normalize here.
          if [ -n "${TENANTS}" ]; then
            echo "Tenants targeting (${TENANTS}) — main-branch gate skipped."
            exit 0
          fi
          EFFECTIVE_CHANNEL="${CHANNEL:-all}"
          EFFECTIVE_CHANNEL="${EFFECTIVE_CHANNEL,,}"  # bash 4+ lowercase
          if [ "${EFFECTIVE_CHANNEL}" != "all" ]; then
            echo "Channel '${EFFECTIVE_CHANNEL}' — main-branch gate skipped."
            exit 0
          fi

          # Accept both the short ('main') and qualified ('refs/heads/main')
          # forms. Anything else falls through to the reject arm, including:
          #   - feature branches (refs/heads/feat-foo, feat/foo, …)
          #   - bare tag refs without release_tag (release_tag is handled above;
          #     bare tags without it are rejected)
          case "${REF}" in
            main|refs/heads/main)
              echo "Channel 'all' on main — proceeding."
              ;;
            *)
              echo "::error title=Publish blocked::Channel 'all' requires the main branch — got ref '${REF}'."
              {
                echo "### Publish blocked"
                echo ""
                echo "Releases to the **all** channel must be built from the **main** branch."
                echo ""
                echo "| Field | Value |"
                echo "|-------|-------|"
                echo "| Ref | \`${REF}\` |"
                echo "| Channel | \`${EFFECTIVE_CHANNEL}\` |"
                echo ""
                echo "Re-run with one of:"
                echo "- \`channel: beta\` or \`channel: staging\` (non-prod)"
                echo "- \`tenants: <comma-separated-ids>\` (targeted to specific tenants)"
                echo "- merge to \`main\` and let the push-trigger run"
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 1
              ;;
          esac

  # ── Job 0b: Unit-tests gate ──────────────────────────────────────────────────
  # Block publish unless the app's `unit_tests_workflow_file` has completed
  # successfully for the publish SHA. The gate runs before any build minutes
  # are spent so a failing test surfaces at minute 0 rather than after the
  # multi-arch build.
  #
  # How it works:
  #   1. Resolve the publish SHA.
  #   2. Look for an existing run of `unit_tests_workflow_file` on that
  #      commit (any conclusion).
  #   3. If no run exists, dispatch the workflow on the publish ref and
  #      capture the new run ID.
  #   4. Poll the run by ID until it completes; gate passes iff conclusion
  #      is `success`.
  #
  # The gate tracks runs by ID, not by check name — so apps don't need any
  # particular naming convention on their test jobs.
  #
  # Contract: the consumer app's `unit_tests_workflow_file` MUST
  #   1. Exist at `.github/workflows/<filename>`.
  #   2. Declare `workflow_dispatch:` in its `on:` block.
  #   3. Run unit tests and exit non-zero on test/coverage failure.
  # See docs/standards/unit-tests-gate.md.
  #
  # Only runs when `publish: true` AND the caller has set
  # `unit_tests_workflow_file` — apps that have not onboarded skip the gate.
  unit-tests-gate:
    name: Unit-tests gate
    # Permanently disabled (#1943): unit-test enforcement now lives in the
    # `certify` job, which runs the app's tests directly. The job body and the
    # `unit_tests_workflow_file` input are retained for backward compatibility
    # — callers that still pass the input validate fine and the value is simply
    # ignored, so nothing fails hard. Revert this line to re-enable the gate.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve SHA, find or dispatch tests run
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Resolve to a concrete SHA regardless of whether the caller passed
          # a branch name (`feat/foo`), a full ref (`refs/heads/main`), a tag,
          # or a SHA. The /commits/{ref} endpoint accepts all of these.
          REF: ${{ inputs.ref || github.sha }}
          # gh workflow run accepts a branch / tag name only, never a bare
          # SHA. Prefer the caller's ref input, then the calling workflow's
          # branch name (`github.ref_name`).
          DISPATCH_REF: ${{ inputs.ref || github.ref_name }}
          WORKFLOW_FILE: ${{ inputs.unit_tests_workflow_file }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SHA=$(gh api "/repos/${REPO}/commits/${REF}" --jq '.sha')
          echo "Resolved '${REF}' → ${SHA}"

          # Look for an existing run of this workflow on this commit. Any
          # conclusion — the next step will inspect the result.
          EXISTING=$(gh run list \
            --repo "${REPO}" \
            --workflow "${WORKFLOW_FILE}" \
            --commit "${SHA}" \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')

          if [ -n "${EXISTING}" ]; then
            echo "Found existing run ${EXISTING} of '${WORKFLOW_FILE}' on ${SHA} — reusing."
            echo "run_id=${EXISTING}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # No prior run on this SHA. Dispatch fresh on the publish ref.
          # `gh workflow run` doesn't return the new run's ID, so capture
          # it by listing recent dispatches after the trigger.
          echo "No existing run of '${WORKFLOW_FILE}' on ${SHA}. Dispatching on '${DISPATCH_REF}'..."
          # `gh run list --branch` compares against the short headBranch (e.g. 'main'),
          # not the full ref ('refs/heads/main'). Strip the prefix so the filter actually
          # matches the dispatched run.
          DISPATCH_BRANCH="${DISPATCH_REF#refs/heads/}"
          DISPATCH_BRANCH="${DISPATCH_BRANCH#refs/tags/}"
          BEFORE=$(date -u +%FT%TZ)
          if ! gh workflow run "${WORKFLOW_FILE}" --repo "${REPO}" --ref "${DISPATCH_REF}"; then
            {
              echo "### Publish blocked: failed to dispatch '${WORKFLOW_FILE}'"
              echo ""
              echo "The gate tried to dispatch \`${WORKFLOW_FILE}\` on \`${DISPATCH_REF}\` for SHA \`${SHA}\` but the dispatch failed."
              echo ""
              echo "Common causes:"
              echo "- The workflow does not declare \`workflow_dispatch:\` in its \`on:\` block."
              echo "- The file does not exist at \`.github/workflows/${WORKFLOW_FILE}\`."
              echo "- The branch \`${DISPATCH_REF}\` does not exist."
              echo ""
              echo "Contract + template: <https://github.com/atlanhq/application-sdk/blob/main/docs/standards/unit-tests-gate.md>"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "::error title=Publish blocked::Failed to dispatch '${WORKFLOW_FILE}'. See workflow summary."
            exit 1
          fi

          # Poll for up to 60 seconds for the dispatched run to register.
          # GitHub usually surfaces it within ~5–10s; allow margin for slow
          # API replication.
          echo "Dispatched. Polling for the new run to appear..."
          RUN_ID=""
          for i in $(seq 1 12); do
            sleep 5
            RUN_ID=$(gh run list \
              --repo "${REPO}" \
              --workflow "${WORKFLOW_FILE}" \
              --branch "${DISPATCH_BRANCH}" \
              --event workflow_dispatch \
              --created ">${BEFORE}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "${RUN_ID}" ]; then
              echo "New run registered after ${i} attempt(s): ${RUN_ID}"
              break
            fi
            echo "Attempt ${i}/12 — run not yet visible, retrying..."
          done

          if [ -z "${RUN_ID}" ]; then
            echo "::error title=Publish blocked::Dispatched '${WORKFLOW_FILE}' but the new run never registered within 60s."
            exit 1
          fi

          echo "run_id=${RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Wait for tests run to complete
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.prepare.outputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Polling run ${RUN_ID} every 30s (timeout 30m)..."
          # Loop bound covers the 30-min job timeout. The job-level
          # timeout-minutes already enforces an outer cap; this inner cap
          # avoids tight infinite loops if `gh run view` ever returns junk.
          for i in $(seq 1 70); do
            RESULT=$(gh run view "${RUN_ID}" --repo "${REPO}" --json status,conclusion,url)
            STATUS=$(echo "${RESULT}" | jq -r '.status')
            CONCLUSION=$(echo "${RESULT}" | jq -r '.conclusion // ""')
            URL=$(echo "${RESULT}" | jq -r '.url')
            echo "  iteration ${i}: status=${STATUS} conclusion=${CONCLUSION}"
            if [ "${STATUS}" = "completed" ]; then
              echo "conclusion=${CONCLUSION}" >> "${GITHUB_OUTPUT}"
              echo "url=${URL}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            sleep 25
          done
          echo "::error title=Publish blocked::Tests run ${RUN_ID} did not complete within the gate timeout."
          exit 1

      # Enforcement (DISTR-456 flip): a non-success conclusion exits non-zero,
      # so `prepare`'s `if: !failure()` skips the whole build + publish chain.
      # The gate runs before any build minutes are spent, so a failing unit
      # test surfaces at minute 0 rather than after the multi-arch build.
      - name: Block publish if tests did not succeed
        if: steps.wait.outputs.conclusion != 'success'
        env:
          CONCLUSION: ${{ steps.wait.outputs.conclusion }}
          URL: ${{ steps.wait.outputs.url }}
          WORKFLOW_FILE: ${{ inputs.unit_tests_workflow_file }}
        run: |
          {
            echo "### ❌ Publish blocked — unit tests did not pass"
            echo ""
            echo "Run of \`${WORKFLOW_FILE}\` concluded as \`${CONCLUSION}\`."
            echo ""
            echo "Failing run: ${URL}"
            echo ""
            echo "Build and publish will not proceed until the unit-tests gate passes. Fix the failing tests and re-run."
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "::error title=Publish blocked::${WORKFLOW_FILE} concluded as ${CONCLUSION}. Build and publish blocked. See: ${URL}"
          exit 1

  # ── Job 0c: App certification — generic readiness checks ──────────────────────
  # Runs v3-shape, contract-drift, unit tests, and coverage against the checked-
  # out app source before publish — no per-app wiring needed. Unit test pass/fail
  # blocks publish; other layers annotate warn-only. Only when `publish: true`.
  # See docs/standards/app-certification.md.
  certify:
    name: Certify app
    if: inputs.publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout app
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          path: app
          fetch-depth: 1

      - name: Checkout application-sdk (migration tooling)
        # tools.migrate_v3 ships in the SDK repo, not the published package —
        # pinned to main so the check tracks the latest released rules.
        # ORG_PAT_GITHUB is required because this workflow runs in the context
        # of a consumer app repo whose GITHUB_TOKEN is scoped to that repo and
        # cannot read other org repos (even public ones via cross-repo reusable
        # workflow invocations). An org PAT grants the necessary read access.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: atlanhq/application-sdk
          ref: main
          path: sdk
          token: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.20"

      # ── 1. v3 shape ─────────────────────────────────────────────────────────
      - name: Install SDK (migration tooling)
        id: sdk_install
        continue-on-error: true
        working-directory: sdk
        run: uv sync --all-extras

      - name: "v3 shape — check_migration"
        id: check_migration
        if: steps.sdk_install.outcome == 'success'
        continue-on-error: true
        working-directory: sdk
        run: |
          set -euo pipefail
          if uv run python -m tools.migrate_v3.check_migration --no-color ../app; then
            echo "check_migration: no FAILs"
          else
            echo "::warning::check_migration reported FAILs — see output above"
            exit 1
          fi

      # ── 2. App dependencies ───────────────────────────────────────────────────
      - name: Install app dependencies
        id: app_install
        continue-on-error: true
        working-directory: app
        run: uv sync --all-extras --frozen

      # PKL is required by pkl-based apps' `poe generate` (run in the Contract
      # drift step below, which does `rm -rf app/generated && pkl eval ...`).
      # The contract-toolkit-* workflows install it but this Certify job did
      # not, so for pkl apps `poe generate` failed with `pkl: not found` AFTER
      # wiping app/generated — breaking the enforced unit-test step.
      - name: Install PKL
        if: steps.app_install.outcome == 'success'
        run: |
          set -euo pipefail
          PKL_VERSION="0.27.2"
          curl -fsSL -o /tmp/pkl "https://github.com/apple/pkl/releases/download/${PKL_VERSION}/pkl-linux-amd64"
          chmod +x /tmp/pkl
          sudo mv /tmp/pkl /usr/local/bin/pkl
          pkl --version

      # Most app `poe generate` tasks invoke `pkl eval --ca-certificates
      # ~/.pkl-ca-bundle.pem ...` — that path is Atlan's local-dev convention
      # (per atlan-cli's defaultCert and ~20 connector pyproject.toml files)
      # for honoring the corporate proxy/VPN CA. GitHub runners have no such
      # file, so pkl fails with "Cannot find CA certificate file" BEFORE it
      # can resolve `@app-contract-toolkit/NativeApp.pkl` over HTTPS. Seed
      # ~/.pkl-ca-bundle.pem from the runner's system trust store so every
      # app's `--ca-certificates ~/.pkl-ca-bundle.pem` resolves to a valid
      # bundle in CI without app-side changes.
      - name: Seed pkl CA bundle from system trust store
        if: steps.app_install.outcome == 'success'
        run: |
          set -euo pipefail
          SYSTEM_CA="/etc/ssl/certs/ca-certificates.crt"
          if [ ! -f "$SYSTEM_CA" ]; then
            echo "::warning::System CA bundle $SYSTEM_CA not found; skipping pkl CA seed."
            exit 0
          fi
          cp "$SYSTEM_CA" "$HOME/.pkl-ca-bundle.pem"
          echo "Seeded $HOME/.pkl-ca-bundle.pem from $SYSTEM_CA"

      # ── 3. Contract drift (enforced) ─────────────────────────────────────────
      # Failure here exits non-zero and (via the standard step-fail cascade)
      # also fails the job. Unit tests + coverage below use `always() &&` so
      # they still run and report — the user sees every signal in one pass —
      # even though the job's final status is already failed.
      - name: "Contract drift — poe generate must be a no-op"
        id: contract_drift
        if: steps.app_install.outcome == 'success'
        working-directory: app
        run: |
          set -euo pipefail
          if [ ! -f contract/app.pkl ]; then
            echo "No contract/app.pkl — skipping contract-drift check."
            exit 0
          fi
          if ! uv run poe --help >/dev/null 2>&1; then
            echo "::warning::'poe' task runner not available — cannot run drift check."
            exit 0
          fi
          uv run poe generate || { echo "::error::'poe generate' failed"; exit 1; }
          if ! git diff --exit-code -- generated/; then
            echo "::error::generated/ is stale — run 'poe generate' locally and commit."
            exit 1
          fi

      # ── 4. Unit tests (enforced) + coverage threshold (warn-only) ───────────────
      - name: "Unit tests"
        id: unit
        if: always() && steps.app_install.outcome == 'success'
        continue-on-error: true
        working-directory: app
        run: |
          set -euo pipefail
          if [ ! -d tests/unit ]; then
            echo "No tests/unit/ — skipping."
            exit 0
          fi
          # --all-groups so the app's test dependency group (pytest plugins like
          # pytest-asyncio, etc.) is installed. `uv run` otherwise re-syncs to only
          # the default groups, pruning any test deps an app keeps in a non-default
          # group — which silently breaks async/plugin-dependent suites and trips
          # this gate on a packaging gap rather than a real failure.
          uv run --all-groups --with pytest-cov pytest tests/unit --cov=${{ inputs.coverage_source }} --cov-report=term

      - name: "Coverage threshold (>=85%)"
        id: coverage_threshold
        if: always() && steps.unit.outcome == 'success'
        continue-on-error: true
        working-directory: app
        run: |
          set -euo pipefail
          if [ ! -f .coverage ]; then
            echo "No .coverage data (unit tests skipped) — skipping threshold check."
            exit 0
          fi
          uv run coverage report --data-file=.coverage --fail-under=85

      # ── Verdict ───────────────────────────────────────────────────────────────
      # Unit test pass/fail (UT) and contract drift (CD) ENFORCE: a ❌ exits
      # non-zero, trips `prepare`'s `if: !failure()`, and skips build + publish.
      # (CD's enforcement comes from the step itself — no continue-on-error.
      # The verdict re-checks CD only to render the summary correctly.)
      # Coverage threshold (COV) and v3 shape (CM) are warn-only — they
      # annotate but do not block.
      - name: Certification verdict
        if: always()
        env:
          CM: ${{ steps.check_migration.outcome }}
          CD: ${{ steps.contract_drift.outcome }}
          UT: ${{ steps.unit.outcome }}
          COV: ${{ steps.coverage_threshold.outcome }}
          SDK_INSTALL: ${{ steps.sdk_install.outcome }}
          APP_INSTALL: ${{ steps.app_install.outcome }}
        run: |
          set -euo pipefail
          render() {
            case "$2" in
              success) icon="✅" ;;
              failure) icon="❌" ;;
              skipped) icon="➖" ;;
              *)       icon="❓" ;;
            esac
            echo "- $icon **$1** — $2"
          }
          cm_label="v3 shape (check_migration) — warn-only"
          [ "$SDK_INSTALL" != "success" ] && cm_label="$cm_label (sdk install failed)"
          app_label=""
          [ "$APP_INSTALL" != "success" ] && app_label=" (app install failed)"
          {
            echo "### App certification"
            echo ""
            render "$cm_label" "$CM"
            render "Contract drift (poe generate) — enforced${app_label}" "$CD"
            render "Unit tests — enforced${app_label}" "$UT"
            render "Coverage (>=85%) — warn-only" "$COV"
            echo ""
            echo "**Unit tests and contract drift block publish on ❌.** Coverage threshold and v3 shape are warn-only during rollout. See [docs/standards/app-certification.md](https://github.com/atlanhq/application-sdk/blob/main/docs/standards/app-certification.md)."
          } >> "${GITHUB_STEP_SUMMARY}"
          if [ "$SDK_INSTALL" != "success" ]; then
            echo "::warning title=Certification incomplete::SDK install failed, so check_migration did not run."
          fi
          if [ "$APP_INSTALL" != "success" ]; then
            echo "::warning title=Certification incomplete::App install failed; contract drift and unit tests did not run."
          fi
          if [ "$CM" = "failure" ]; then
            echo "::warning title=Certification warning (warn-only)::v3 shape failed; publish proceeded (warn-only)."
          fi
          if [ "$COV" = "failure" ]; then
            echo "::warning title=Certification warning (warn-only)::Coverage below 85%; publish proceeded (warn-only)."
          fi
          if [ "$CD" = "failure" ]; then
            {
              echo ""
              echo "### ❌ Publish blocked — contract drift"
              echo ""
              echo "\`poe generate\` either failed or produced changes in \`app/generated/\`. Run it locally and commit the diff."
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "::error title=Publish blocked::Contract drift detected. Build and publish blocked."
          fi
          if [ "$UT" = "failure" ]; then
            {
              echo ""
              echo "### ❌ Publish blocked — unit tests failed"
              echo ""
              echo "Fix the failing tests and re-run."
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "::error title=Publish blocked::Unit tests failed. Build and publish blocked."
          fi
          if [ "$CD" = "failure" ] || [ "$UT" = "failure" ]; then
            exit 1
          fi
          exit 0

  # ── Job 0d: Credential-leak gate ──────────────────────────────────────────────
  # Two deterministic layers (no LLM, no token), run before any build minutes:
  #   1. Hardcoded secrets (gitleaks) — BLOCKING. A committed secret (API key,
  #      token, private key) fails the job, which trips prepare's `!failure()`
  #      and skips build + publish. High precision; honors .gitleaks.toml.
  #   2. Creds-into-logs (scan.py) — WARN-ONLY. Flags credentials reaching
  #      log/print/format/CLI sinks (the APP-1602 audit class). Pure-regex
  #      detection has an irreducible false-positive rate (it cannot always tell
  #      a logged secret value from a logged non-secret field), so it does NOT
  #      block: it annotates the run summary and pings Slack when there are
  #      warnings. Honors an app-level .credential-leak-allow allowlist.
  # Only runs when publish=true (matches validate-channel / certify).
  # See docs/standards/credential-leak-gate.md.
  leak-scan:
    name: Credential leak gate
    if: inputs.publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout app
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          path: app
          fetch-depth: 1

      - name: Checkout SDK gate assets
        # Pull only the vendored scanner + ruleset from the SDK at main, so the
        # gate is self-contained at publish time (no private cross-repo fetch of
        # the connector-pulse nightly skill). ORG_PAT_GITHUB grants the
        # cross-repo read a consumer app's scoped GITHUB_TOKEN cannot.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: atlanhq/application-sdk
          ref: main
          path: sdk
          sparse-checkout: .github/scripts/credential-leak-gate
          sparse-checkout-cone-mode: false
          token: ${{ secrets.ORG_PAT_GITHUB }}

      # ── Layer 1: deterministic hardcoded-secret scan (gitleaks) ───────────────
      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.2
          # Pin the artifact by SHA-256 (not just version): the checksum is
          # hardcoded here, so a tampered release asset fails verification
          # rather than being trusted because it sits at the right URL.
          GITLEAKS_SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: gitleaks — hardcoded secrets
        id: gitleaks
        working-directory: app
        run: |
          set -euo pipefail
          # Scan the working tree, not git history: a publish checkout is a
          # single shallow commit. Drop .git so gitleaks doesn't walk internals.
          rm -rf .git
          CONFIG_ARGS=()
          if [ -f .gitleaks.toml ]; then
            echo "Using app-level .gitleaks.toml allowlist"
            CONFIG_ARGS=(--config .gitleaks.toml)
          fi
          set +e
          # --redact: replace secret values with "REDACTED" in the report, so
          # the raw secret never lands on disk. The summary/Slack steps read only
          # File/StartLine/RuleID anyway, but this is defense-in-depth.
          gitleaks dir \
            --redact \
            --report-format json \
            --report-path /tmp/gitleaks-report.json \
            "${CONFIG_ARGS[@]}" \
            .
          RC=$?
          set -e
          COUNT=$(jq 'length' /tmp/gitleaks-report.json 2>/dev/null || echo 0)
          if [ "$RC" -ne 0 ] || [ "$COUNT" -gt 0 ]; then
            # Emit redacted finding LOCATIONS only — never the secret value
            # (the report's Secret/Match fields are not printed or uploaded).
            {
              echo "### ❌ Publish blocked — hardcoded secret(s) detected"
              echo ""
              echo "gitleaks found ${COUNT} hardcoded secret(s) in the source. Locations only (values withheld):"
              echo ""
              jq -r '.[] | "- `\(.File):\(.StartLine)` — rule: \(.RuleID)"' /tmp/gitleaks-report.json 2>/dev/null || true
              echo ""
              echo "Remove the secret(s), **rotate** any that were committed, and re-run. Allowlist confirmed false positives in \`.gitleaks.toml\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Publish blocked::gitleaks found ${COUNT} hardcoded secret(s). See workflow summary."
            exit 1
          fi
          echo "gitleaks: no hardcoded secrets found."

      - name: Notify Slack on hardcoded-secret block
        # The gitleaks layer hard-blocks the publish — alert Slack too. Runs only
        # when the gitleaks step failed. Same webhook + host allowlist + hardened
        # curl as the warn-only creds-into-logs notifier. Posts finding LOCATIONS
        # only (never the secret value). Exits 0 so it can't mask the block.
        if: always() && steps.gitleaks.outcome == 'failure'
        env:
          WEBHOOK: ${{ secrets.SLACK_LEAK_SCAN_WEBHOOK }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::notice::SLACK_LEAK_SCAN_WEBHOOK not set — skipping Slack notification."
            exit 0
          fi
          case "$WEBHOOK" in
            https://hooks.slack.com/*) ;;
            *) echo "::warning::SLACK_LEAK_SCAN_WEBHOOK is not a hooks.slack.com URL — refusing to send."; exit 0 ;;
          esac
          R=/tmp/gitleaks-report.json
          COUNT=$(jq 'length' "$R" 2>/dev/null || echo "?")
          # Top 10 locations only — the report's Secret/Match fields are never read.
          LOCS=$(jq -r '.[] | "• `\(.File):\(.StartLine)` — \(.RuleID)"' "$R" 2>/dev/null | head -10)
          TEXT=$(printf ':no_entry: *Publish BLOCKED — hardcoded secret(s)*\n*App repo:* `%s`\ngitleaks found %s secret(s) in source. Remove and *rotate* them — locations below (values withheld):\n%s\n<%s|View workflow run>' \
            "$REPO" "$COUNT" "$LOCS" "$RUN_URL")
          jq -n --arg t "$TEXT" '{text: $t}' \
            | curl -sS --fail --max-time 10 -X POST -H 'Content-type: application/json' --data @- "$WEBHOOK" \
            || echo "::warning::Slack notification failed (non-blocking)."

      # ── Layer 2: creds-into-logs scan (regex, no LLM) — WARN-ONLY ─────────────
      - name: Creds-into-logs scan (warn-only)
        id: credscan
        # `|| true`: this layer never fails the job. scan.py exits non-zero when
        # it finds CRITICAL/HIGH, but here that is advisory — only gitleaks
        # (Layer 1) blocks the publish. The verdict JSON is the source of truth.
        run: |
          set -uo pipefail
          python3 sdk/.github/scripts/credential-leak-gate/scan.py \
            --root app \
            --report /tmp/leak-gate-verdict.json || true
          # Surface counts for the summary + Slack steps. Defaults are safe if
          # the scan errored (warn-only — an operational failure must not block).
          V=/tmp/leak-gate-verdict.json
          if [ -f "$V" ] && jq empty "$V" 2>/dev/null; then
            echo "findings=$(jq -r '.summary.total_findings // 0' "$V")" >> "$GITHUB_OUTPUT"
            echo "blocking=$(jq -r '.summary.blocking // 0' "$V")" >> "$GITHUB_OUTPUT"
            echo "critical=$(jq -r '.summary.critical // 0' "$V")" >> "$GITHUB_OUTPUT"
            echo "high=$(jq -r '.summary.high // 0' "$V")" >> "$GITHUB_OUTPUT"
            echo "medium=$(jq -r '.summary.medium // 0' "$V")" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=Creds-into-logs scan incomplete::No valid verdict produced; reporting 0 (warn-only, publish not blocked)."
            echo "findings=0" >> "$GITHUB_OUTPUT"
            echo "blocking=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Creds-into-logs report (run summary)
        if: always() && steps.gitleaks.outcome == 'success'
        env:
          WARN: ${{ steps.credscan.outputs.blocking || '0' }}
          CRIT: ${{ steps.credscan.outputs.critical || '0' }}
          HIGH: ${{ steps.credscan.outputs.high || '0' }}
          MED: ${{ steps.credscan.outputs.medium || '0' }}
        run: |
          set -euo pipefail
          V=/tmp/leak-gate-verdict.json
          if [ "${WARN}" -gt 0 ]; then
            {
              echo "### ⚠️ Credential leak warnings (non-blocking)"
              echo ""
              echo "gitleaks: ✅ no hardcoded secrets (blocking layer passed)."
              echo ""
              echo "Creds-into-logs found ${WARN} likely finding(s) (${CRIT} critical, ${HIGH} high). **This does not block the publish** — review and fix, or allowlist confirmed false positives in \`.credential-leak-allow\`. Locations only (values never recorded):"
              echo ""
              jq -r '.findings[]? | select(.severity=="CRITICAL" or .severity=="HIGH") | "- `\(.file):\(.line)` — \(.pattern_id) (var: \(.variable_name), \(.severity))"' "$V"
              echo ""
              echo "See docs/standards/credential-leak-gate.md."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Credential-leak warnings::${WARN} credential(s) may reach a log/CLI sink (non-blocking). See run summary."
          else
            {
              echo "### ✅ Credential leak gate"
              echo ""
              echo "gitleaks: ✅ no hardcoded secrets (blocking). Creds-into-logs: ✅ no warnings (${MED} medium, non-blocking)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify Slack on warnings
        # Warn-only signal → Slack. Gated on the step OUTPUT (not the secret):
        # secrets are unavailable in `if:`, so the secret presence is checked
        # inside the step instead. Mirrors reusable-dep-cooldown.yml.
        if: always() && steps.gitleaks.outcome == 'success' && (steps.credscan.outputs.blocking || '0') != '0'
        env:
          WEBHOOK: ${{ secrets.SLACK_LEAK_SCAN_WEBHOOK }}
          CRIT: ${{ steps.credscan.outputs.critical }}
          HIGH: ${{ steps.credscan.outputs.high }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "::notice::SLACK_LEAK_SCAN_WEBHOOK not set — skipping Slack notification."
            exit 0
          fi
          # Host allowlist: refuse to send if the secret is ever tampered to
          # point somewhere other than Slack.
          case "$WEBHOOK" in
            https://hooks.slack.com/*) ;;
            *) echo "::warning::SLACK_LEAK_SCAN_WEBHOOK is not a hooks.slack.com URL — refusing to send."; exit 0 ;;
          esac
          V=/tmp/leak-gate-verdict.json
          # Top 10 locations only — never secret values.
          LOCS=$(jq -r '.findings[]? | select(.severity=="CRITICAL" or .severity=="HIGH") | "• `\(.file):\(.line)` — \(.pattern_id) (\(.severity))"' "$V" | head -10)
          TEXT=$(printf ':warning: *Credential-leak warning — publish NOT blocked*\n*App repo:* `%s`\n%s critical, %s high credential(s) reaching log/CLI sinks — locations below (values withheld):\n%s\n<%s|View workflow run>' \
            "$REPO" "$CRIT" "$HIGH" "$LOCS" "$RUN_URL")
          # jq builds the JSON so the message is safely escaped. --fail/--max-time
          # so a hung Slack endpoint can't stall or fail the job (warn-only).
          jq -n --arg t "$TEXT" '{text: $t}' \
            | curl -sS --fail --max-time 10 -X POST -H 'Content-type: application/json' --data @- "$WEBHOOK" \
            || echo "::warning::Slack notification failed (non-blocking)."

  # ── Job 1: Read atlan.yaml, validate secrets, compute all image tags ──────────
  prepare:
    needs: [validate-channel, unit-tests-gate, certify, leak-scan]
    # `needs: [...]` only enforces ordering when those jobs run. When
    # publish=false, all of them are skipped via their `if:` — which by default
    # would propagate "skipped" to dependents. The condition below explicitly
    # allows prepare to run when those jobs are skipped OR successful, but NOT
    # when one failed. `certify` enforces unit tests and contract drift: a
    # failing run exits non-zero, which trips `failure()` here and correctly
    # skips prepare → build → publish. Its other layers (v3 shape, coverage
    # threshold) stay warn-only (always exit 0) so they never trip this yet.
    # `leak-scan` blocks ONLY on its gitleaks (hardcoded-secret) layer: that
    # step exits non-zero, fails the job, and trips `failure()` here to skip the
    # publish. Its creds-into-logs layer is warn-only (annotates + pings Slack,
    # never fails the job), so warnings do not block. `unit-tests-gate` is
    # currently warn-only; its enforcement-flip is tracked separately.
    if: ${{ !failure() && !cancelled() }}
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_name:         ${{ steps.manifest.outputs.app_name }}
      app_id:           ${{ steps.manifest.outputs.app_id }}
      dockerfile:       ${{ steps.manifest.outputs.dockerfile }}
      enable_sdr:       ${{ steps.manifest.outputs.enable_sdr }}
      release_model:    ${{ steps.manifest.outputs.release_model }}
      deploy_config:    ${{ steps.manifest.outputs.deploy_config }}
      sdk_version:      ${{ steps.manifest.outputs.sdk_version }}
      entrypoints: ${{ steps.manifest.outputs.entrypoints }}
      app_configs:      ${{ steps.app_configs.outputs.app_configs }}
      branch:           ${{ steps.tags.outputs.branch }}
      image_tag:        ${{ steps.tags.outputs.image_tag }}
      ghcr_base:        ${{ steps.tags.outputs.ghcr_base }}
      ghcr_image:       ${{ steps.tags.outputs.ghcr_image }}
      ghcr_branch_tag:  ${{ steps.tags.outputs.ghcr_branch_tag }}
      dockerhub_image:  ${{ steps.tags.outputs.dockerhub_image }}
      release_tags:     ${{ steps.tags.outputs.release_tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Checkout SDK helper scripts
        # Pull only ``.github/scripts/`` from the SDK at main.
        # github.workflow_ref and github.workflow_sha both resolve to the *caller's*
        # ref in a reusable workflow context (GitHub bug) — ref is pinned to main
        # so it always picks up the latest released version of the scripts.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: atlanhq/application-sdk
          ref: main
          path: .sdk-entrypoint
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Read atlan.yaml
        id: manifest
        # Inputs validated and outputs written by parse_atlan_yaml.py — see
        # .sdk-entrypoint/.github/scripts/parse_atlan_yaml.py for rules.
        # Unit-tested in tests/test_parse_atlan_yaml.py in the SDK repo.
        run: python3 .sdk-entrypoint/.github/scripts/parse_atlan_yaml.py

      - name: Validate atlan.yaml deploy config
        # Run platform guardrail rules on the deploy block before image build.
        # Fails fast with ::error file=atlan.yaml:: annotations so violations
        # show inline on the PR diff. Skipped when atlan.yaml has no deploy
        # block (driver no-ops on empty DEPLOY_CONFIG).
        # See .sdk-entrypoint/.github/scripts/config_validator.py for rules,
        # validate_atlan_yaml.py for the CI driver,
        # tests/test_config_validator.py for coverage.
        env:
          DEPLOY_CONFIG: ${{ steps.manifest.outputs.deploy_config }}
          SDK_VERSION:   ${{ steps.manifest.outputs.sdk_version }}
        run: python3 .sdk-entrypoint/.github/scripts/validate_atlan_yaml.py

      - name: Validate SDR secrets
        if: steps.manifest.outputs.enable_sdr == 'true'
        env:
          HAS_PAT: ${{ secrets.DOCKER_HUB_PAT_RW != '' && 'true' || 'false' }}
        run: |
          if [ "$HAS_PAT" != "true" ]; then
            echo "::error::atlan.yaml sets self_deployed_runtime=true but DOCKER_HUB_PAT_RW secret is not set in this repo."
            exit 1
          fi

      - name: Validate publish secrets
        if: inputs.publish
        env:
          HAS_TOKEN: ${{ secrets.APP_PUBLISH_TOKEN != '' && 'true' || 'false' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::error::publish=true but APP_PUBLISH_TOKEN secret is not set in this repo."
            exit 1
          fi

      - name: Read app/generated/ for app_configs
        # Glob the connector form JSON files the app ships under app/generated/
        # and emit them as a single base64-encoded JSON blob. Base64 keeps the
        # value inert to Kong's bluemonday XSS plugin on the upstream
        # /marketplace/publish route (the raw JSON contains chars like
        # `<account-id>`, `>`, PEM markers, and Jinja `{% %}` that trip it).
        # GM decodes the field in its VersionBody validator. Apps that don't
        # ship app/generated/ produce an empty output and the publish step
        # omits the field entirely.
        id: app_configs
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, pathlib, sys
          generated_dir = pathlib.Path("app/generated")
          form_files = {}
          if generated_dir.is_dir():
              for f in sorted(generated_dir.rglob("*.json")):
                  try:
                      form_files[f.name] = json.loads(f.read_text())
                  except json.JSONDecodeError as e:
                      # Hard-fail with a GitHub Actions error annotation. Silently
                      # dropping the file would publish an app_configs missing a
                      # connector form, which surfaces later as a broken install
                      # on tenants. Better to block the publish here.
                      print(f"::error file={f}::Invalid JSON in connector form: {e}")
                      sys.exit(1)
          if form_files:
              value = base64.b64encode(json.dumps(form_files).encode("utf-8")).decode("ascii")
          else:
              value = ""
          print(f"[app_configs] found {len(form_files)} files: {list(form_files.keys())}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              print(f"app_configs={value}", file=fh)
          PYEOF

      - name: Compute image tags
        id: tags
        env:
          REPO: ${{ github.event.repository.name }}
          REF: ${{ inputs.ref || github.ref }}
        run: |
          # Resolve SHA from the checked-out HEAD rather than github.sha.
          # github.sha is always the trigger branch (main), not the ref input —
          # so for entrypoint_dispatch with a custom ref, github.sha would be wrong.
          SHA=$(git rev-parse HEAD)
          if ! [[ "$REF" =~ ^(refs/heads/|refs/tags/)?[a-zA-Z0-9/_.-]+$ ]]; then
            echo "::error::Invalid ref format: ${REF}"
            exit 1
          fi

          BRANCH=$(echo "$REF" | sed 's|refs/heads/||' | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr '_' '-')

          # Release builds arrive with ref=refs/tags/v*, producing a slug like
          # refs-tags-v0.3.0 for the immutable/branch image tags in GHCR.
          # Override to 'main' so those tags are clean — the release tag was
          # cut from main by tag-and-release.yaml, so this is semantically correct.
          RELEASE_TAG_EARLY="${{ inputs.release_tag }}"
          RELEASE_TAG_EARLY="${RELEASE_TAG_EARLY//$'\r'/}"
          RELEASE_TAG_EARLY="${RELEASE_TAG_EARLY//$'\n'/}"
          if [ -n "${RELEASE_TAG_EARLY}" ] && [ "${REF}" = "refs/tags/${RELEASE_TAG_EARLY}" ]; then
            BRANCH="main"
          fi

          IMAGE_TAG="${SHA:0:7}"

          GHCR_BASE="ghcr.io/atlanhq/${REPO}"
          GHCR_IMAGE="${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}"
          GHCR_BRANCH_TAG="${GHCR_BASE}:${BRANCH}"

          DOCKERHUB_BASE="atlanhq/${REPO}"
          DOCKERHUB_IMAGE="${DOCKERHUB_BASE}:${BRANCH}-${IMAGE_TAG}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ghcr_base=${GHCR_BASE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_branch_tag=${GHCR_BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${DOCKERHUB_IMAGE}" >> "$GITHUB_OUTPUT"

          # Release-event tag ladder: version-pinned + :latest (stable) or version-only (pre-release)
          RELEASE_TAG="${{ inputs.release_tag }}"
          # Strip any accidental whitespace/newlines and validate semver format
          RELEASE_TAG="${RELEASE_TAG//$'\r'/}"
          RELEASE_TAG="${RELEASE_TAG//$'\n'/}"
          RELEASE_TAGS=""
          if [ -n "${RELEASE_TAG}" ]; then
            if [[ ! "${RELEASE_TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Invalid release_tag format: '${RELEASE_TAG}'"
              exit 1
            fi
            VERSION="${RELEASE_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            if echo "$VERSION" | grep -qvF '-'; then
              RELEASE_TAGS=$(printf '%s\n' \
                "${GHCR_BASE}:latest" \
                "${GHCR_BASE}:${VERSION}" \
                "${GHCR_BASE}:${MINOR}" \
                "${GHCR_BASE}:${MAJOR}" \
                "${GHCR_BASE}:sha-${IMAGE_TAG}")
            else
              RELEASE_TAGS=$(printf '%s\n' \
                "${GHCR_BASE}:${VERSION}" \
                "${GHCR_BASE}:sha-${IMAGE_TAG}")
            fi
          fi
          DELIM=$(openssl rand -hex 8)
          { echo "release_tags<<${DELIM}"; printf '%s\n' "${RELEASE_TAGS}"; echo "${DELIM}"; } >> "$GITHUB_OUTPUT"

          echo "Branch: ${BRANCH}"
          echo "Immutable image: ${GHCR_IMAGE}"
          echo "Mutable branch tag: ${GHCR_BRANCH_TAG}"
          echo "DockerHub image: ${DOCKERHUB_IMAGE}"
          if [ -n "${RELEASE_TAGS}" ]; then printf 'Release tags:\n%s\n' "${RELEASE_TAGS}"; fi

  # ── Job 2: Build — parallel per architecture ──────────────────────────────────
  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    # Explicit override needed: when publish=false, validate-channel is skipped
    # via its `if:`. The default `success()` propagates that skip through the
    # needs chain, so without this override `build` skips even though `prepare`
    # successfully ran with its own override.
    if: ${{ !failure() && !cancelled() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          lfs: ${{ inputs.lfs }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build and push arch image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ${{ needs.prepare.outputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.prepare.outputs.ghcr_base }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.image_tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}

  # ── Job 3: Merge arch digests into a single multi-arch manifest ───────────────
  merge:
    name: Merge & Push Manifest
    needs: [prepare, build]
    if: ${{ !failure() && !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # A job-level `permissions` block REPLACES the workflow-level default, so we
    # re-declare what merge needs. `id-token: write` is required for cosign
    # keyless signing of the Docker Hub image (OIDC token exchange with Fulcio).
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install Cosign
        if: needs.prepare.outputs.enable_sdr == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.enable_sdr == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: docker.io
          username: atlanhq
          password: ${{ secrets.DOCKER_HUB_PAT_RW }}

      - name: Create and push multi-arch manifest
        env:
          GHCR_BASE:       ${{ needs.prepare.outputs.ghcr_base }}
          GHCR_IMAGE:      ${{ needs.prepare.outputs.ghcr_image }}
          GHCR_BRANCH_TAG: ${{ needs.prepare.outputs.ghcr_branch_tag }}
          BRANCH:          ${{ needs.prepare.outputs.branch }}
          IMAGE_TAG:       ${{ needs.prepare.outputs.image_tag }}
          RELEASE_TAGS:    ${{ needs.prepare.outputs.release_tags }}
        run: |
          # Build --tag args: always include immutable + mutable branch tags,
          # plus the version-tag ladder if this is a release build.
          TAG_ARGS=(--tag "${GHCR_IMAGE}" --tag "${GHCR_BRANCH_TAG}")
          if [ -n "${RELEASE_TAGS}" ]; then
            while IFS= read -r tag; do
              [ -n "$tag" ] && TAG_ARGS+=(--tag "$tag")
            done <<< "${RELEASE_TAGS}"
          fi

          docker buildx imagetools create \
            "${TAG_ARGS[@]}" \
            "${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}-amd64" \
            "${GHCR_BASE}:${BRANCH}-${IMAGE_TAG}-arm64"

          echo "Multi-arch manifest pushed:"
          echo "  Immutable: ${GHCR_IMAGE}"
          echo "  Branch:    ${GHCR_BRANCH_TAG}"
          if [ -n "${RELEASE_TAGS}" ]; then
            echo "  Release tags:"
            while IFS= read -r tag; do [ -n "$tag" ] && echo "    ${tag}"; done <<< "${RELEASE_TAGS}"
          fi

      - name: Install crane
        if: needs.prepare.outputs.enable_sdr == 'true'
        uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6

      # setup-crane's final step runs `crane auth login ghcr.io` with the
      # calling repo's GITHUB_TOKEN, overwriting the ghcr.io credential the
      # "Log in to GHCR" step wrote. GITHUB_TOKEN has no access to
      # PAT-published GHCR packages, so `crane copy` would fail with DENIED.
      # Log back in with the org PAT before copying.
      - name: Restore GHCR auth (setup-crane clobbers it with GITHUB_TOKEN)
        if: needs.prepare.outputs.enable_sdr == 'true'
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT:  ${{ secrets.ORG_PAT_GITHUB }}
        run: crane auth login ghcr.io --username "${GHCR_USER}" --password-stdin <<< "${GHCR_PAT}"

      - name: Push to Docker Hub (re-tag, no rebuild)
        id: dockerhub_push
        if: needs.prepare.outputs.enable_sdr == 'true'
        env:
          GHCR_IMAGE:      ${{ needs.prepare.outputs.ghcr_image }}
          DOCKERHUB_IMAGE: ${{ needs.prepare.outputs.dockerhub_image }}
        run: |
          set -euo pipefail
          # Use `crane copy`, not `docker buildx imagetools create`, for the
          # cross-registry GHCR -> Docker Hub copy. imagetools uploads each blob
          # to Docker Hub with a monolithic PUT, which Docker Hub rejects with
          # HTTP 400 once a layer is large (e.g. apps that vendor a ~100MB jar).
          # crane does chunked uploads + cross-repo blob mounts, so it handles
          # large layers and copies the full multi-arch index byte-identically.
          # Auth comes from ~/.docker/config.json written by the GHCR + Docker Hub
          # login steps above.
          crane copy "${GHCR_IMAGE}" "${DOCKERHUB_IMAGE}"
          echo "Pushed to DockerHub: ${DOCKERHUB_IMAGE}"

          # Resolve the pushed manifest digest so we can sign by digest (immutable)
          # rather than by tag (mutable). `${DOCKERHUB_IMAGE%%:*}` strips the tag.
          DIGEST="$(crane digest "${DOCKERHUB_IMAGE}")"
          echo "digest_ref=${DOCKERHUB_IMAGE%%:*}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign Docker Hub image (cosign keyless)
        if: needs.prepare.outputs.enable_sdr == 'true'
        env:
          # Keyless signing — no long-lived key. Cosign uses the job's ambient
          # GitHub OIDC token (id-token: write) to obtain a short-lived Fulcio
          # cert and records the signature in the Rekor transparency log.
          DIGEST_REF: ${{ steps.dockerhub_push.outputs.digest_ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "${DIGEST_REF}"
          echo "Signed (keyless): ${DIGEST_REF}"

      - name: Summary
        run: |
          echo "### Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Immutable image | \`${{ needs.prepare.outputs.ghcr_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch tag (mutable) | \`${{ needs.prepare.outputs.ghcr_branch_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DockerHub image | \`${{ needs.prepare.outputs.dockerhub_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed digest (cosign) | \`${{ steps.dockerhub_push.outputs.digest_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ needs.prepare.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ needs.prepare.outputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile | \`${{ needs.prepare.outputs.dockerfile }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SDR push | \`${{ needs.prepare.outputs.enable_sdr }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Security scan — Trivy + allowlist gate (non-blocking on merge path) ──
  security-scan:
    name: Security Scan
    needs: [prepare, merge]
    if: ${{ !failure() && !cancelled() && needs.merge.result == 'success' }}
    uses: atlanhq/application-sdk/.github/workflows/build-and-scan.yaml@main
    with:
      image: ${{ needs.prepare.outputs.ghcr_image }}
      fail_on_findings: false
    secrets: inherit

  # ── Job 5: Dispatch deployment to atlan-apps-deployment (main only) ───────────
  app-deployment-dispatcher:
    name: Dispatch App Deployment
    needs: [prepare, merge, security-scan]
    if: ${{ !failure() && !cancelled() && needs.merge.result == 'success' && needs.security-scan.result == 'success' && github.ref == 'refs/heads/main' && needs.prepare.outputs.enable_sdr == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ['atlanhq/atlan-apps-deployment']
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.ORG_PAT_GITHUB }}
          repository: ${{ matrix.repo }}
          event-type: dispatch_app_builder_workflow
          client-payload: |-
            {
                "app_name": "${{ needs.prepare.outputs.app_name }}",
                "image_name": "${{ needs.prepare.outputs.dockerhub_image }}"
            }

  # ── Job 7: Publish to Global Marketplace ────────────────────────────────────
  publish:
    name: Publish to Marketplace
    needs: [prepare, merge, security-scan]
    if: ${{ !failure() && !cancelled() && needs.prepare.result == 'success' && needs.merge.result == 'success' && needs.security-scan.result == 'success' && inputs.publish }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Publish version
        env:
          BASE_URL: ${{ inputs.base_url }}
          APP_PUBLISH_TOKEN: ${{ secrets.APP_PUBLISH_TOKEN }}
          GHCR_IMAGE: ${{ needs.prepare.outputs.ghcr_image }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
          APP_ID: ${{ needs.prepare.outputs.app_id }}
          APP_NAME: ${{ needs.prepare.outputs.app_name }}
          DEPLOY_CONFIG: ${{ needs.prepare.outputs.deploy_config }}
          ENABLE_SDR: ${{ needs.prepare.outputs.enable_sdr }}
          SDK_VERSION: ${{ needs.prepare.outputs.sdk_version }}
          ENTRYPOINTS: ${{ needs.prepare.outputs.entrypoints }}
          CHANNEL: ${{ inputs.channel }}
          TENANTS: ${{ inputs.tenants }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_MODEL: ${{ needs.prepare.outputs.release_model }}
          APP_CONFIGS: ${{ needs.prepare.outputs.app_configs }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GITHUB_ACTOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail

          # Strip CR/LF that GitHub expression evaluation can inject.
          RELEASE_TAG="${RELEASE_TAG//$'\r'/}"
          RELEASE_TAG="${RELEASE_TAG//$'\n'/}"
          RELEASE_MODEL="${RELEASE_MODEL//$'\r'/}"
          RELEASE_MODEL="${RELEASE_MODEL//$'\n'/}"

          # Semver-release gate: apps that opt in via release_model=semver
          # must supply an explicit release_tag for any channel='all' publish.
          # Merge-to-main builds the image (already in GHCR) but does not publish
          # to all tenants — only a GitHub Release (which sets release_tag) does.
          # Tenant-targeted and non-all-channel publishes are unrestricted.
          EFFECTIVE_CHANNEL="${CHANNEL:-all}"
          EFFECTIVE_CHANNEL="${EFFECTIVE_CHANNEL,,}"
          if [ "${RELEASE_MODEL}" = "semver" ] && [ -z "${RELEASE_TAG}" ] && [ -z "${TENANTS}" ] && [ "${EFFECTIVE_CHANNEL}" = "all" ]; then
            echo "::error title=Publish blocked::App declares release_model=semver — publishing to channel='all' requires an explicit release tag. The image is already in GHCR; cut a GitHub Release from main to publish to all tenants."
            {
              echo "### Publish blocked — semver release required"
              echo ""
              echo "This app has \`release_model: semver\` in \`atlan.yaml\`."
              echo "Publishing to the **all** channel requires an explicit GitHub Release."
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| Built image | \`${GHCR_IMAGE}\` |"
              echo "| Channel | \`${EFFECTIVE_CHANNEL}\` |"
              echo ""
              echo "**Next step:** create a GitHub Release from \`main\` — the image above is already built and ready."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          # Resolve who to attribute as the release creator.
          #
          # For `push` events (the squash/merge-to-main auto-publish flow),
          # github.triggering_actor is whoever clicked "Merge" — not the PR
          # author — which surfaces the wrong person as "Created by:" in the
          # GM Slack approval message. Look up the PR for the merge SHA via
          # /commits/{sha}/pulls and use its author when available. Falls back
          # to triggering_actor when there's no associated PR (direct push).
          #
          # For every other event (workflow_dispatch, release, schedule, …)
          # the trigger is an explicit deliberate action — attribute to whoever
          # initiated it. This preserves the pre-fix behavior for those paths.
          #
          # NOTE: `gh api` writes its JSON error body to stdout on non-2xx,
          # so the assignment must be gated on the exit code — otherwise an
          # error payload would contaminate PR_AUTHOR and break the fallback.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              PR_AUTHOR=""
              if RAW=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
                           --jq '.[0].user.login // empty' 2>/dev/null); then
                  PR_AUTHOR="${RAW}"
              fi
              ACTOR="${PR_AUTHOR:-${GITHUB_ACTOR}}"
          else
              ACTOR="${GITHUB_ACTOR}"
          fi
          GH_EMAIL=""
          if EMAIL_RAW=$(gh api "users/${ACTOR}" --jq '.email // empty' 2>/dev/null); then
              GH_EMAIL="${EMAIL_RAW}"
          fi
          export CREATED_BY="${GH_EMAIL:-${ACTOR}}"

          # Build JSON payload matching the CLI's registerInMarketplace format
          BODY=$(python3 - <<'PYEOF'
          import json, os

          # Prefer release_tag (e.g. v0.3.0) over commit SHA for the GM version.
          # Backward compatible: apps that don't pass release_tag get SHA as before.
          release_tag = os.environ.get("RELEASE_TAG", "").strip()
          version = release_tag if release_tag else os.environ["IMAGE_TAG"]

          # Semver apps send the plain version tag (e.g. :0.3.0) as the image
          # so the GM's semver gate accepts it. The release ladder strips the
          # leading 'v' (v0.3.0 → 0.3.0), so we do the same here to reference
          # a tag that actually exists in GHCR. CD apps always send the immutable
          # branch-sha tag regardless of whether release_tag is set.
          release_model = os.environ.get("RELEASE_MODEL", "").strip()
          ghcr_image = os.environ["GHCR_IMAGE"]
          if release_tag and release_model == "semver":
              image_base = ghcr_image.rsplit(":", 1)[0]
              version_tag = release_tag.lstrip("v")  # match release ladder: v0.3.0 → 0.3.0
              image = f"{image_base}:{version_tag}"
          else:
              image = ghcr_image

          body = {
              "app_id": os.environ["APP_ID"],
              "image": image,
              "version": version,
              "branch": os.environ["BRANCH"],
              "repo": os.environ["REPO_URL"],
              "source": "ci_publish",
          }

          config = os.environ.get("DEPLOY_CONFIG", "").strip()
          # SDR capability rides inside the opaque config YAML — GM stores
          # versions.config as raw TEXT and echoes it back in the tenant
          # catalog, so LM can gate "Install on more environments" per app
          # without a GM schema change. Only injected when true: absence
          # means not SDR-capable (keeps non-SDR configs byte-identical).
          if os.environ.get("ENABLE_SDR", "").strip() == "true":
              config = f"self_deployed_runtime: true\n{config}".strip()
          if config:
              body["config"] = config

          sdk = os.environ.get("SDK_VERSION", "").strip()
          if sdk:
              body["sdk_version"] = sdk

          # entrypoints: native multi-package declarations from atlan.yaml.
          # Absent → GM falls back to App.argo_package_names for entrypoint expansion.
          wp = os.environ.get("ENTRYPOINTS", "").strip()
          if wp:
              body["entrypoints"] = json.loads(wp)

          tenants = os.environ.get("TENANTS", "").strip()
          if tenants:
              body["allowed_tenants"] = [t.strip() for t in tenants.split(",") if t.strip()]
          else:
              body["target_channel"] = os.environ.get("CHANNEL", "all") or "all"

          created_by = os.environ.get("CREATED_BY", "").strip()
          if created_by:
              body["created_by"] = created_by

          if release_model:
              body["release_model"] = release_model

          # Base64-encoded JSON blob of connector form files (see prepare job).
          # GM's VersionBody validator decodes this back to the JSON string.
          app_configs = os.environ.get("APP_CONFIGS", "").strip()
          if app_configs:
              body["app_configs"] = app_configs

          print(json.dumps(body))
          PYEOF
          )

          echo "Publishing ${APP_NAME} (${IMAGE_TAG}) to marketplace..."

          RESPONSE=$(curl -sS --fail-with-body -X POST \
            "${BASE_URL}/api/service/marketplace/publish" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${APP_PUBLISH_TOKEN}" \
            -d "$BODY") || { echo "Publish failed: $RESPONSE"; exit 1; }

          echo "$RESPONSE" | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          d = r.get('data', {})
          vid = d.get('version_id', 'N/A')
          rid = d.get('release_id', 'N/A')
          aid = d.get('app_id', 'N/A')
          print(f'Version: {vid}')
          print(f'Release: {rid}')
          print(f'App ID:  {aid}')
          "

          CHANNEL_USED="${CHANNEL:-all}"
          if [ -n "$TENANTS" ]; then
            CHANNEL_USED="tenants: $TENANTS"
          fi
          if [ "$CHANNEL_USED" = "all" ]; then
            echo "Channel 'all' creates a draft release — admin approval required"
          fi

          echo "### Publish complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published \`${APP_NAME}\` version \`${IMAGE_TAG}\` to \`${CHANNEL_USED}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Refer to [Global Marketplace](https://globalmarketplaceui.atlan.com/admin/) for approval." >> $GITHUB_STEP_SUMMARY
