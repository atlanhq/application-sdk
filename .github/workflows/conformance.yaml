name: "Conformance"

# PR / merge_group conformance gating now lives in sdk-gate.yaml (the composing
# SDK gate), which calls conformance-reusable.yaml as one of its three areas.
# This workflow is kept ONLY for the push-to-main run: with event_name == 'push'
# the reusable runs every series and publishes the per-series SARIF artifacts.
# conformance-upload-sarif.yaml then picks those up via `workflow_run` on this
# workflow's name ("Conformance") and uploads the branch baseline to the GitHub
# Security tab — so the workflow NAME and the push-to-main trigger must stay.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  suite:
    uses: ./.github/workflows/conformance-reusable.yaml
    with:
      conformance-ref: ${{ github.event.pull_request.head.sha || github.sha }}
      exclude-paths-e: "tools/,contract-toolkit/"
      exclude-paths-p: "tools/,contract-toolkit/"
      # O-series (orjson) excludes the conformance package itself: the suite
      # legitimately uses stdlib json for SARIF string output (orjson returns bytes).
      exclude-paths-o: "tools/,contract-toolkit/,packages/conformance/"
      # B-series (sdk scope) grades only application_sdk/ deprecation authoring;
      # exclude the conformance package (its tests embed deprecation-notice strings).
      exclude-paths-b: "tools/,contract-toolkit/,packages/conformance/"
      event_name: ${{ github.event_name }}
