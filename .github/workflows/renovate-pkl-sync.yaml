name: Sync Pkl contract artifacts for Renovate (Reusable)

# Reusable merge gate for Renovate (and Dependabot) app-contract-toolkit PRs.
#
# When Renovate bumps the @<version> URI in contract/PklProject, two committed
# artifacts go stale and must be regenerated so the PR is self-contained and CI
# passes without a manual step:
#
#   1. contract/PklProject.deps.json — the Pkl lock (URI + checksum).
#      Refreshed with `pkl project resolve contract/`.
#   2. app/generated/** (+ atlan.yaml / app.yaml) — the generated contract
#      artifacts. A toolkit bump can change generated output (e.g. a manifest
#      field), so we re-run `pkl eval -m . contract/app.pkl` — the same
#      canonical command used to author these files — and commit the result.
#      Without this the lock advances but the generated artifacts keep the old
#      output, defeating the point of the bump.
#
# Scope: this assumes the standard repo-root layout (contract/PklProject,
# contract/app.pkl, generated output at the repo root). Apps with a
# non-standard layout (e.g. app/contract/, or a monorepo apps/*/contract/) are
# out of scope — the regeneration step self-skips when contract/app.pkl is
# absent, so the workflow degrades to a pure re-resolve and never errors.
#
# Consumer repos call this from their own .github/workflows/renovate-pkl-sync.yaml:
#
#   on:
#     push:
#       branches: ['renovate/**']
#       paths: ['contract/PklProject']
#   permissions:
#     contents: write
#   jobs:
#     sync:
#       uses: atlanhq/application-sdk/.github/workflows/renovate-pkl-sync.yaml@main
#
# The GITHUB_TOKEN in the called workflow inherits the caller's contents:write
# permission, which is enough to commit and push to the renovate/** branch.

on:
  workflow_call:
    inputs:
      pkl-version:
        description: Pkl toolchain version to use.
        required: false
        default: "0.27.2"
        type: string
    secrets:
      push_token:
        description: >
          PAT of an org member to use for the commit push. Required on public
          repos — a GITHUB_TOKEN push from github-actions[bot] triggers
          GitHub's outside-collaborator workflow re-approval gate. Falls back
          to GITHUB_TOKEN when omitted (fine for private repos).
        required: false

permissions:
  contents: write

jobs:
  sync-pkl-deps:
    name: Re-resolve and regenerate Pkl contract artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.push_token || secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # uv provides `uvx ruff`, used to format the generated Python below.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install pkl
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/pkl \
            "https://github.com/apple/pkl/releases/download/${{ inputs.pkl-version }}/pkl-linux-amd64"
          chmod +x /tmp/pkl
          sudo mv /tmp/pkl /usr/local/bin/pkl

      - name: Re-resolve PklProject.deps.json
        run: pkl project resolve contract/

      - name: Regenerate contract artifacts
        # Best-effort by design: this step must NEVER fail the job. The
        # re-resolve above has already produced the lock; if regeneration hits
        # any snag (eval error, transient package fetch, ruff hiccup) we fall
        # back to committing just the lock — i.e. exactly what this workflow did
        # before regeneration existed — rather than blocking the PR. Note the
        # absence of `set -e`: failures are handled explicitly, not fatally.
        run: |
          set -uo pipefail

          if [ ! -f contract/app.pkl ]; then
            echo "::notice::No contract/app.pkl at repo root — skipping artifact regeneration (re-resolve only)."
            exit 0
          fi

          # Generate into a throwaway dir first and only swap the result into the
          # working tree on full success. This keeps the step atomic: a failed
          # eval leaves the committed app/generated untouched, so the commit step
          # never publishes a half-deleted / half-regenerated state.
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          # --project-dir contract: the contract is a Pkl project that declares
          # app-contract-toolkit as a *remote package* dependency, so eval must
          # load that project to resolve the `@app-contract-toolkit` import (the
          # bare `pkl eval contract/app.pkl` from the repo root finds no project
          # and fails). -m writes every output key at its natural path relative
          # to the output base.
          if ! pkl eval --project-dir contract -m "$tmp" contract/app.pkl; then
            echo "::warning::pkl eval failed — falling back to lock-only sync (generated artifacts left unchanged)."
            exit 0
          fi

          # The generated Python model (_input.py) is emitted unformatted; this
          # commit bypasses pre-commit, so format it here exactly as
          # regenerate-all.sh does (best-effort) for apps that lint app/generated.
          PY_FILES="$(find "$tmp/app/generated" -name '_input.py' 2>/dev/null || true)"
          if [ -n "$PY_FILES" ]; then
            echo "$PY_FILES" | xargs uvx ruff check --fix --select F401 --quiet || true
            echo "$PY_FILES" | xargs uvx ruff format || true
          fi

          # Swap freshly generated outputs into the tree. Replacing app/generated
          # wholesale clears any orphaned files from a removed/renamed bundle.
          if [ -d "$tmp/app/generated" ]; then
            rm -rf app/generated
            mkdir -p app
            cp -R "$tmp/app/generated" app/generated
          fi
          [ -f "$tmp/atlan.yaml" ] && cp "$tmp/atlan.yaml" atlan.yaml
          [ -f "$tmp/app.yaml" ]   && cp "$tmp/app.yaml"   app.yaml
          echo "Regenerated contract artifacts."

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the known re-resolve / generation outputs (-A also stages
          # deletions of orphaned generated files). Avoids picking up incidental
          # working-tree noise such as ruff caches.
          for p in contract/PklProject.deps.json app/generated atlan.yaml app.yaml; do
            if [ -e "$p" ]; then
              git add -A -- "$p"
            fi
          done

          if ! git diff --cached --quiet; then
            git commit -m "chore: sync Pkl deps and regenerate contract artifacts for app-contract-toolkit"
            git push
          else
            echo "No contract artifact changes to commit."
          fi
