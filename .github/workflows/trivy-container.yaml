# Trivy container scan. This can be reused across all the applications.
#
# Runs Trivy, checks findings against .security/allowlist.json in the caller
# repo, posts a summary comment on PRs, and fails on new/expired entries.
# Snyk is handled separately via verify-snyk-status.yml (central org workflow).

name: Atlan Application Trivy container scan

on:
  workflow_call:
    secrets:
      ORG_PAT_GITHUB:
        required: true
      CHAINGUARD_USERNAME:
        required: true
      CHAINGUARD_PASSWORD:
        required: true

    inputs:
      skip-files:
        description: "Comma-separated list of files or directories to be skipped"
        required: false
        type: string
      fail-on-vulns:
        description: "Whether to fail if new/expired HIGH/CRITICAL vulnerabilities are found"
        required: false
        type: string
        default: 'true'

permissions:
  contents: read
  pull-requests: write
  actions: read
  security-events: write

jobs:
  build:
    runs-on: "ubuntu-24.04"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # Composite handles build, Trivy JSON+SARIF scan, SARIF upload.
      # fail-on-vulns is disabled here — the allowlist gate below takes over.
      - id: trivy-scan
        uses: "atlanhq/application-sdk/.github/actions/trivy-container@main"
        with:
          chainguard-username: ${{ secrets.CHAINGUARD_USERNAME }}
          chainguard-password: ${{ secrets.CHAINGUARD_PASSWORD }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          skip-files: ${{ inputs.skip-files }}
          fail-on-vulns: 'false'

      - name: Check against allowlist
        id: gate
        env:
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-vulns }}
        run: |
          python3 - <<'PYEOF'
          import json, sys, os
          from datetime import datetime

          allowlist_path = ".security/allowlist.json"
          if os.path.exists(allowlist_path):
              with open(allowlist_path) as f:
                  allowlist = json.load(f)
          else:
              print("No .security/allowlist.json found — findings reported but gate disabled.")
              allowlist = None

          today = datetime.now().strftime("%Y-%m-%d")
          all_vulns = {}

          trivy_path = "trivy-container-results.json"
          if not os.path.exists(trivy_path):
              print("ERROR: Trivy results file not found — scan may have failed")
              sys.exit(1)

          trivy_count = 0
          with open(trivy_path) as f:
              trivy = json.load(f)
          for result in trivy.get("Results", []):
              for vuln in result.get("Vulnerabilities", []):
                  vid = vuln.get("VulnerabilityID")
                  if vid and vid not in all_vulns:
                      all_vulns[vid] = {
                          "id": vid,
                          "severity": vuln.get("Severity", "").upper(),
                          "package": vuln.get("PkgName", ""),
                          "installed": vuln.get("InstalledVersion", ""),
                          "fixed": vuln.get("FixedVersion", ""),
                      }
                      trivy_count += 1

          unique = list(all_vulns.values())

          if allowlist is None:
              summary = f"### \U0001f6e1\ufe0f Security Gate\n\nNo `.security/allowlist.json` — {len(unique)} CRITICAL/HIGH findings reported (gate disabled).\n"
              for v in sorted(unique, key=lambda x: {"CRITICAL": 0, "HIGH": 1}.get(x["severity"], 9)):
                  print(f"  {v['severity']:8s} {v['id']} {v['package']}@{v['installed']}")
              with open("/tmp/scan_comment.md", "w") as f:
                  f.write(summary)
              with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
                  f.write(summary)
              sys.exit(0)

          allowed, expired, new_vulns = [], [], []
          for v in unique:
              entry = allowlist.get(v["id"])
              if entry and not str(v["id"]).startswith("_"):
                  if today > entry.get("expires", "9999-12-31"):
                      expired.append(v)
                  else:
                      allowed.append(v)
              else:
                  new_vulns.append(v)

          sev_order = {"CRITICAL": 0, "HIGH": 1}
          new_vulns.sort(key=lambda x: sev_order.get(x["severity"], 9))
          expired.sort(key=lambda x: sev_order.get(x["severity"], 9))

          print(f"Trivy: {trivy_count} findings | Total: {len(unique)} | Allowlisted: {len(allowed)} | Expired: {len(expired)} | New: {len(new_vulns)}")

          fail_on_findings = os.environ.get("FAIL_ON_FINDINGS", "true").lower() == "true"
          blockers = new_vulns + expired

          if blockers:
              status = "Failed" if fail_on_findings else "Warning"
              summary = f"### \U0001f6e1\ufe0f Security Gate {status}\n\n"
              summary += f"Trivy: {trivy_count} findings | Total: {len(unique)} | Allowlisted: {len(allowed)} | **New: {len(new_vulns)}**"
              if expired:
                  summary += f" | Expired: {len(expired)}"
              summary += "\n\n"
              summary += "| Severity | ID | Package | Fix Available |\n"
              summary += "|----------|----|---------|---------------|\n"
              for v in blockers:
                  fix = v["fixed"] if v["fixed"] else "No fix"
                  summary += f"| {v['severity']} | `{v['id']}` | `{v['package']}@{v['installed']}` | {fix} |\n"
              summary += "\n**To resolve:** fix the vulnerability or add it to `.security/allowlist.json` with owner approval.\n"
              with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
                  f.write(summary)
              with open("/tmp/scan_comment.md", "w") as f:
                  f.write(summary)
              if fail_on_findings:
                  print(f"GATE FAILED: {len(blockers)} non-allowlisted vulnerabilities")
                  sys.exit(1)
              else:
                  print(f"GATE WARNING: {len(blockers)} non-allowlisted vulnerabilities (non-blocking)")
          else:
              summary = f"### \U0001f6e1\ufe0f Security Gate Passed\n\n"
              summary += f"Trivy: {trivy_count} findings | Total: {len(unique)} CRITICAL/HIGH | All allowlisted \u2705\n"
              with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
                  f.write(summary)
              with open("/tmp/scan_comment.md", "w") as f:
                  f.write(summary)
              print(f"GATE PASSED: All {len(unique)} vulnerabilities are allowlisted")
          PYEOF

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/scan_comment.md', 'utf8');
            } catch {
              body = '### \u{1F6E1}\uFE0F Security Gate\n\nScan results unavailable.';
            }
            const marker = '### \u{1F6E1}\uFE0F Security Gate';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
