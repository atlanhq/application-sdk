# Auto-dismiss the @sdk-review bot's atlan-ci approval the moment any
# human comments or reviews on the PR.
#
# Why this exists:
#   The companion `sdk-review.yml` workflow has the bot post a
#   formal `gh pr review --approve` as `atlan-ci` on a READY_TO_MERGE
#   verdict. atlan-ci is in CODEOWNERS, so that approval satisfies
#   `require_code_owner_review` on `main` — bot can actually unblock
#   merges. The catch: once posted, the bot's approval persists even
#   after the human dismisses theirs, so the bot could SOLO-satisfy
#   the merge gate.
#
#   This workflow patches that: when a human posts feedback that
#   could change the merge calculus (a top-level PR comment, a
#   review with state `changes_requested` or `commented`, or an
#   edit/dismissal of an existing review), we walk the PR's reviews
#   and dismiss every APPROVED review by `atlan-ci` whose body
#   starts with the bot's signature line. Net effect: bot's
#   auto-approval stands until a human pushes back or asks a
#   question — at which point the gate returns to requiring a fresh
#   human code-owner approval.
#
# What it does NOT dismiss:
#   - atlan-ci approvals posted by humans manually using the account.
#     The body-text signature ("**SDK reviewer's verdict:**") is what
#     scopes this dismissal to bot-posted approvals only.
#   - Any review by a human reviewer.
#   - Approvals posted by other bots (claude[bot], github-actions[bot]).
#   - A human review submission whose state is `approved` — a human
#     approval is a positive signal, not a reason to drop the bot's
#     parallel approval. Only non-approval submissions (changes
#     requested, comments) and PR-level comments trigger dismissal.

name: SDK Review — auto-dismiss bot approval on human activity

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: write

jobs:
  sdk-review-dismiss:
    # Skip if the actor is one of our service accounts / bots — we only
    # want to react to *human* engagement. `endsWith(..., '[bot]')`
    # catches every GitHub App (mothership-ai[bot], claude[bot],
    # github-actions[bot], dependabot[bot], etc.). `atlan-ci` is a
    # regular User account (not an App, no [bot] suffix) so it has to
    # be excluded explicitly — without this, the bot's own approval
    # would trigger this workflow and dismiss itself.
    #
    # For issue_comment events, also require the comment is on a PR
    # (issue_comment fires for both Issues and PRs). The PR-side has
    # `github.event.issue.pull_request` populated; Issues-side does not.
    #
    # Also skip when a human submits an `approved` review — the human
    # is endorsing the change, so there's no reason to retract the
    # bot's parallel approval. `changes_requested` and `commented`
    # review submissions, as well as edits and dismissals of any
    # existing review, still trigger; so do top-level PR comments.
    if: >-
      (
        github.event_name == 'pull_request_review'
        || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
      )
      && !endsWith(github.actor, '[bot]')
      && github.actor != 'atlan-ci'
      && !(
        github.event_name == 'pull_request_review'
        && github.event.action == 'submitted'
        && github.event.review.state == 'approved'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dismiss @sdk-review atlan-ci approval(s)
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
          REPO: ${{ github.repository }}
          # For pull_request_review events the PR number is at
          # event.pull_request.number; for issue_comment on a PR it's
          # at event.issue.number. The `||` picks whichever is set.
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          TRIGGER_ACTOR: ${{ github.actor }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Find every APPROVED atlan-ci review whose body bears the
          # bot's signature. The signature is the leading text of the
          # body we post in sdk-review.yml. Using `startswith` (anchored)
          # avoids any chance of matching human-authored reviews that
          # happen to quote that string.
          REVIEW_IDS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --paginate \
            --jq '[.[] | select(.user.login == "atlan-ci" and .state == "APPROVED" and ((.body // "") | startswith("**SDK reviewer'"'"'s verdict:**")))] | .[].id')

          if [ -z "$REVIEW_IDS" ]; then
            echo "No @sdk-review atlan-ci approval found on PR #${PR_NUMBER} — nothing to dismiss."
            exit 0
          fi

          DISMISS_MESSAGE="Human activity by @${TRIGGER_ACTOR} (${TRIGGER_EVENT}) detected on this PR — the @sdk-review bot's auto-approval has been dismissed. Re-comment \`@sdk-review\` once the PR is ready for the bot to re-approve, or have a code owner approve manually."

          # Dismiss each. The API is `PUT /repos/{}/pulls/{}/reviews/{}/dismissals`
          # with `{message}` in the body. The dismissal is recorded as atlan-ci
          # dismissing its own review.
          for review_id in $REVIEW_IDS; do
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews/${review_id}/dismissals" \
              -X PUT \
              -f message="$DISMISS_MESSAGE"
            echo "Dismissed atlan-ci review ${review_id} on PR #${PR_NUMBER}."
          done

          # The `sdk-review-approved` label is applied by the GHA
          # workflow alongside the approval (see sdk-review.yml). If we
          # dismissed the approval, the label is stale — strip it here so
          # the PR's label state matches its review state. Also strip the
          # legacy `test-sdk-review-approved` label so PRs that pre-date
          # the promotion don't end up wearing both prefixes. `|| true`
          # because labels may not be present.
          for label in "sdk-review-approved" "test-sdk-review-approved"; do
            gh pr edit "${PR_NUMBER}" --repo "${REPO}" --remove-label "${label}" 2>/dev/null || true
          done
          echo "Removed sdk-review-approved labels (if present) from PR #${PR_NUMBER}."
