name: Validate Contract Toolkit PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'contract-toolkit/**'

jobs:
  # -----------------------------------------------------------------------
  # 1. Regenerate all examples, fail if output doesn't match committed files
  # -----------------------------------------------------------------------
  generate:
    name: Verify generated output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6.0.1

      - name: Install PKL
        run: |
          curl -L -o pkl https://github.com/apple/pkl/releases/download/0.27.2/pkl-linux-amd64
          chmod +x pkl
          sudo mv pkl /usr/local/bin/

      - name: Regenerate all examples
        working-directory: contract-toolkit
        run: |
          chmod +x scripts/regenerate-all.sh
          ./scripts/regenerate-all.sh

      - name: Check for uncommitted changes
        working-directory: contract-toolkit
        run: |
          STALE=0
          if ! git diff --exit-code examples/; then
            STALE=1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard examples/)
          if [ -n "$UNTRACKED" ]; then
            echo "Untracked generated files:"
            echo "$UNTRACKED"
            STALE=1
          fi
          if [ "$STALE" -ne 0 ]; then
            echo "GENERATED OUTPUT IS STALE — run ./contract-toolkit/scripts/regenerate-all.sh"
            exit 1
          fi
          echo "Generated output is up to date."

  # -----------------------------------------------------------------------
  # 2. Invariant checks on generated files (no external deps)
  # -----------------------------------------------------------------------
  invariants:
    name: Check invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run invariant checks
        working-directory: contract-toolkit
        run: |
          chmod +x scripts/check-invariants.sh
          ./scripts/check-invariants.sh

  # -----------------------------------------------------------------------
  # 3. Python lint on generated _input.py files
  # -----------------------------------------------------------------------
  lint:
    name: Lint generated Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6.0.1

      - name: Lint _input.py files
        working-directory: contract-toolkit
        run: |
          echo ":: Checking format..."
          find examples -name '_input.py' | xargs uvx ruff format --check
          echo ":: Checking lint rules..."
          find examples -name '_input.py' | xargs uvx ruff check --per-file-ignores="examples/**/generated/*:F401"

  # -----------------------------------------------------------------------
  # 4. SDK import test — validate _input.py against real SDK types
  # -----------------------------------------------------------------------
  sdk-import:
    name: SDK import test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6.0.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install SDK from this branch
        run: uv pip install --system ".[workflows]"

      - name: Test imports
        working-directory: contract-toolkit
        run: python scripts/test-sdk-import.py

  # -----------------------------------------------------------------------
  # 5. Docs reminder — comment if src/ changed but docs weren't updated
  # -----------------------------------------------------------------------
  docs-check:
    name: Docs update check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check if docs need updating
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          if ! git diff --name-only "$BASE" "$HEAD" | grep -q '^contract-toolkit/src/'; then
            echo "No contract-toolkit/src/ changes — docs check not applicable."
            exit 0
          fi

          MISSING=""
          for doc in contract-toolkit/README.md contract-toolkit/docs/reference.md contract-toolkit/docs/index.html; do
            if ! git diff --name-only "$BASE" "$HEAD" | grep -q "^${doc}$"; then
              MISSING="${MISSING}\n- \`${doc}\`"
            fi
          done

          if [ -z "$MISSING" ]; then
            echo "All three docs updated."
            exit 0
          fi

          BODY="**Docs reminder:** \`contract-toolkit/src/\` was modified but these docs were not updated:$(echo -e "$MISSING")

          Per project convention, changes to \`src/\` should be reflected in all three:
          - \`contract-toolkit/README.md\`
          - \`contract-toolkit/docs/reference.md\`
          - \`contract-toolkit/docs/index.html\`"

          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("Docs reminder:"))] | length')

          if [ "$EXISTING" -eq 0 ]; then
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
