name: Release Conformance Package

# Fired automatically when a non-release PR that touches packages/conformance/**
# is merged to main. Runs .github/scripts/conformance_release.py to compute the
# next semver (from conventional commits touching packages/conformance/** since
# the last conformance-v* tag), bumps pyproject.toml + __init__.py, prepends a
# new entry to packages/conformance/CHANGELOG.md, and creates or updates the
# bump-version-conformance PR labeled release:conformance.
# Merging that PR triggers Publish Conformance Package (conformance-publish.yml),
# which handles the PyPI publish and tag.

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "packages/conformance/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize release runs. When two conformance PRs merge close together, each
# merge fires this workflow; without serialization they race to force-push the
# shared bump branch and the run with the *older* main snapshot can win, dropping
# the other PR's changelog entry (see PR #2596). cancel-in-progress: false lets
# the in-flight run finish, then the newest queued run regenerates against a main
# that includes every merged PR.
concurrency:
  group: conformance-release
  cancel-in-progress: false

env:
  RELEASE_LABEL: "release:conformance"
  BUMP_BRANCH: "bump-version-conformance"

jobs:
  open-release-pr:
    name: Open or update conformance release PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        !startsWith(github.event.pull_request.head.ref, 'bump-version-conformance')
      )
    steps:
      - name: Mint fleet App token
        # A real (non-github-actions[bot]) identity is required so the push
        # below re-fires the bump PR's required checks. No workflow auto-merges
        # this PR (GitHub blocks self-approval regardless of author identity),
        # so there's no bypass-actor dependency to preserve here.
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: application-sdk

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"

      - name: Compute version, bump pyproject + __init__, update CHANGELOG
        id: versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/conformance_release.py

      - name: Sanity-build package
        if: steps.versions.outputs.skip != 'true'
        run: cd packages/conformance && uv build

      - name: Push bump branch and open or update PR
        if: steps.versions.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          new_version="${{ steps.versions.outputs.new }}"

          git config --global user.name 'atlan-ci'
          git config --global user.email 'it@atlan.com'

          git checkout -b "${BUMP_BRANCH}"
          git add packages/conformance/pyproject.toml \
                  packages/conformance/conformance/__init__.py \
                  packages/conformance/CHANGELOG.md
          git commit -m "chore(conformance): release v${new_version}"
          git push origin "${BUMP_BRANCH}" --force-with-lease

          existing="$(gh pr list \
            --head "${BUMP_BRANCH}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$existing" ]; then
            echo "PR #${existing} already exists for ${BUMP_BRANCH}; force-push updated it."
          else
            body_file="$(mktemp)"
            {
              echo "Automated release PR for atlan-application-sdk-conformance v${new_version}."
              echo
              echo "Merging this PR triggers Publish Conformance Package, which builds"
              echo "the wheel + sdist and publishes to PyPI, then creates the"
              echo "conformance-v${new_version} tag."
              echo
              echo "## Release notes"
              echo
              cat /tmp/conformance-release-notes.md
            } > "$body_file"

            gh pr create \
              --base main \
              --head "${BUMP_BRANCH}" \
              --title "chore(conformance): release v${new_version}" \
              --body-file "$body_file" \
              --label "${RELEASE_LABEL}"
          fi
