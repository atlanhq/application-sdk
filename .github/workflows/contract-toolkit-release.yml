name: Release Contract Toolkit

# Fired automatically when a non-release PR that touches contract-toolkit files is
# merged to main. Runs .github/scripts/contract_toolkit_release.py to compute the
# next semver (from conventional commits touching contract-toolkit/** since the last
# contract-toolkit-v* tag), bumps contract-toolkit/src/PklProject, prepends a new
# entry to contract-toolkit/CHANGELOG.md, and creates or updates the
# bump-version-contract-toolkit PR labeled release:contract-toolkit.
# Merging that PR triggers Publish Contract Toolkit (contract-toolkit-publish.yml),
# which handles gh-pages publish, tag, and release.

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "contract-toolkit/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  PKG_NAME: app-contract-toolkit
  PKL_VERSION: "0.27.2"
  RELEASE_LABEL: "release:contract-toolkit"
  BUMP_BRANCH: "bump-version-contract-toolkit"

jobs:
  open-release-pr:
    name: Open or update contract toolkit release PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        !startsWith(github.event.pull_request.head.ref, 'bump-version-contract-toolkit')
      )
    steps:
      - name: Mint fleet App token
        # A real (non-github-actions[bot]) identity is required so the push
        # below re-fires the bump PR's required checks. No workflow auto-merges
        # this PR (GitHub blocks self-approval regardless of author identity),
        # so there's no bypass-actor dependency to preserve here.
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: application-sdk

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install PKL
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/pkl "https://github.com/apple/pkl/releases/download/${PKL_VERSION}/pkl-linux-amd64"
          chmod +x /tmp/pkl
          sudo mv /tmp/pkl /usr/local/bin/pkl

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Compute version, bump PklProject, update CHANGELOG
        id: versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/contract_toolkit_release.py

      - name: Regenerate conformance toolkit baseline
        # Reuse the conformance suite's own generator — the single source of truth
        # for the baseline's parse + serialize — so the release PR clears its own
        # K007/K008 drift gate (test_committed_baseline_matches_fresh_read). uvx runs
        # it straight from the in-repo package, so nothing is added to this job's
        # dependencies. --outfile targets the repo working copy (the CLI's default
        # writes inside the ephemeral install); the Push step below git-adds it.
        if: steps.versions.outputs.skip != 'true'
        run: |
          set -euo pipefail
          uvx --from ./packages/conformance atlan-application-sdk-conformance \
            gen-toolkit-baseline --sdk-root . \
            --outfile packages/conformance/conformance/data/toolkit_baseline.json

      - name: Sanity-build package
        if: steps.versions.outputs.skip != 'true'
        run: pkl project package contract-toolkit/src/ --output-path .out/ --skip-publish-check

      - name: Push bump branch and open or update PR
        if: steps.versions.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          new_version="${{ steps.versions.outputs.new }}"

          git config --global user.name 'atlan-ci'
          git config --global user.email 'it@atlan.com'

          git checkout -b "${BUMP_BRANCH}"
          git add contract-toolkit/src/PklProject contract-toolkit/CHANGELOG.md \
            packages/conformance/conformance/data/toolkit_baseline.json
          git commit -m "chore(contract-toolkit): release v${new_version}"
          git push origin "${BUMP_BRANCH}" --force-with-lease

          existing="$(gh pr list \
            --head "${BUMP_BRANCH}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$existing" ]; then
            echo "PR #${existing} already exists for ${BUMP_BRANCH}; force-push updated it."
          else
            body_file="$(mktemp)"
            {
              echo "Automated release PR for app-contract-toolkit v${new_version}."
              echo
              echo "Merging this PR triggers Publish Contract Toolkit, which builds the"
              echo "PKL package, publishes it under contracts/ on the gh-pages"
              echo "branch, and creates the contract-toolkit-v${new_version} tag."
              echo
              echo "## Release notes"
              echo
              cat /tmp/contract-toolkit-release-notes.md
            } > "$body_file"

            gh pr create \
              --base main \
              --head "${BUMP_BRANCH}" \
              --title "chore(contract-toolkit): release v${new_version}" \
              --body-file "$body_file" \
              --label "${RELEASE_LABEL}"
          fi
