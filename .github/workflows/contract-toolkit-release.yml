name: Release Contract Toolkit

# Fired automatically when a non-release PR that touches contract-toolkit files is
# merged to main. Runs .github/scripts/contract_toolkit_release.py to compute the
# next semver (from conventional commits touching contract-toolkit/** since the last
# contract-toolkit-v* tag), bumps contract-toolkit/src/PklProject, prepends a new
# entry to contract-toolkit/CHANGELOG.md, and creates or updates the
# bump-version-contract-toolkit PR labeled release:contract-toolkit.
# Merging that PR triggers Publish Contract Toolkit (contract-toolkit-publish.yml),
# which handles gh-pages publish, tag, and release.

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "contract-toolkit/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  PKG_NAME: app-contract-toolkit
  PKL_VERSION: "0.27.2"
  RELEASE_LABEL: "release:contract-toolkit"
  BUMP_BRANCH: "bump-version-contract-toolkit"

jobs:
  open-release-pr:
    name: Open or update contract toolkit release PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        !startsWith(github.event.pull_request.head.ref, 'bump-version-contract-toolkit')
      )
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Install PKL
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/pkl "https://github.com/apple/pkl/releases/download/${PKL_VERSION}/pkl-linux-amd64"
          chmod +x /tmp/pkl
          sudo mv /tmp/pkl /usr/local/bin/pkl

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Compute version, bump PklProject, update CHANGELOG
        id: versions
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/contract_toolkit_release.py

      - name: Sanity-build package
        if: steps.versions.outputs.skip != 'true'
        run: pkl project package contract-toolkit/src/ --output-path .out/ --skip-publish-check

      - name: Push bump branch and open or update PR
        if: steps.versions.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          set -euo pipefail
          new_version="${{ steps.versions.outputs.new }}"

          git config --global user.name 'atlan-ci'
          git config --global user.email 'it@atlan.com'

          git checkout -b "${BUMP_BRANCH}"
          git add contract-toolkit/src/PklProject contract-toolkit/CHANGELOG.md
          git commit -m "chore(contract-toolkit): release v${new_version}"
          git push origin "${BUMP_BRANCH}" --force-with-lease

          existing="$(gh pr list \
            --head "${BUMP_BRANCH}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$existing" ]; then
            echo "PR #${existing} already exists for ${BUMP_BRANCH}; force-push updated it."
          else
            body_file="$(mktemp)"
            {
              echo "Automated release PR for app-contract-toolkit v${new_version}."
              echo
              echo "Merging this PR triggers Publish Contract Toolkit, which builds the"
              echo "PKL package, publishes it under contracts/ on the gh-pages"
              echo "branch, and creates the contract-toolkit-v${new_version} tag."
              echo
              echo "## Release notes"
              echo
              cat /tmp/contract-toolkit-release-notes.md
            } > "$body_file"

            gh pr create \
              --base main \
              --head "${BUMP_BRANCH}" \
              --title "chore(contract-toolkit): release v${new_version}" \
              --body-file "$body_file" \
              --label "${RELEASE_LABEL}"
          fi
