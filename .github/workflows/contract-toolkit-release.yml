name: Release Contract Toolkit

# Phase A of the contract-toolkit release. Bumps the PklProject version,
# regenerates contract-toolkit/CHANGELOG.md, sanity-builds the package, and
# opens a PR labeled `release:contract-toolkit` against main. Merging that PR
# triggers Publish Contract Toolkit (contract-toolkit-publish.yml) which does
# the actual gh-pages publish, tag, and GitHub release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target version (for example 1.0.0). Must be greater than contract-toolkit/src/PklProject."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  PKG_NAME: app-contract-toolkit
  PKL_VERSION: "0.27.2"
  RELEASE_LABEL: "release:contract-toolkit"

jobs:
  open-release-pr:
    name: Open contract toolkit release PR
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Require main branch
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Run contract toolkit releases from main, not ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Install PKL
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/pkl "https://github.com/apple/pkl/releases/download/${PKL_VERSION}/pkl-linux-amd64"
          chmod +x /tmp/pkl
          sudo mv /tmp/pkl /usr/local/bin/pkl

      - name: Validate and apply version bump
        id: bump
        run: |
          set -euo pipefail
          file="contract-toolkit/src/PklProject"
          current="$(grep -oP 'version\s*=\s*"\K[^"]+' "$file")"
          new_version="${{ inputs.version }}"

          if [ -z "$(echo "$new_version" | tr -d '[:space:]')" ]; then
            echo "::error::version input is empty"
            exit 1
          fi

          if ! echo "$new_version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version '$new_version' is not valid semver (expected MAJOR.MINOR.PATCH)"
            exit 1
          fi

          if [ "$current" = "$new_version" ]; then
            echo "::error::version $new_version is already current"
            exit 1
          fi

          higher="$(printf '%s\n%s\n' "$current" "$new_version" | sort -V | tail -1)"
          if [ "$higher" != "$new_version" ]; then
            echo "::error::version $new_version is not greater than current $current"
            exit 1
          fi

          tag="contract-toolkit-v${new_version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::tag ${tag} already exists"
            exit 1
          fi

          branch="release/contract-toolkit-v${new_version}"
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            echo "::error::release branch ${branch} already exists on origin; close or delete the existing PR/branch before retrying"
            exit 1
          fi

          sed -i "s/version = \"${current}\"/version = \"${new_version}\"/" "$file"

          echo "old=${current}" >> "$GITHUB_OUTPUT"
          echo "new=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "Version: ${current} -> ${new_version}"

      - name: Render new release block
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: contract-toolkit/cliff.toml
          args: >-
            --unreleased
            --tag ${{ steps.bump.outputs.tag }}
            --tag-pattern '^contract-toolkit-v[0-9].*'
            --include-path 'contract-toolkit/**'
            --github-repo ${{ github.repository }}
            --strip header
        env:
          OUTPUT: /tmp/contract-toolkit-new-block.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge new release block into toolkit changelog
        run: |
          set -euo pipefail
          changelog="contract-toolkit/CHANGELOG.md"
          new_block="/tmp/contract-toolkit-new-block.md"

          if [ ! -s "$new_block" ]; then
            echo "::error::cliff produced no release-block content at ${new_block}"
            exit 1
          fi

          # Insert the new block above the first existing "## [" version heading.
          # If there's no existing heading yet, append the block at end (first release).
          awk -v new_block_path="$new_block" '
            BEGIN { inserted = 0 }
            /^## \[/ && !inserted {
              while ((getline line < new_block_path) > 0) print line
              print ""
              inserted = 1
            }
            { print }
            END {
              if (!inserted) {
                while ((getline line < new_block_path) > 0) print line
              }
            }
          ' "$changelog" > "${changelog}.merged"
          mv "${changelog}.merged" "$changelog"

      - name: Load release body template
        run: |
          {
            echo 'GIT_CLIFF_TEMPLATE<<EOF'
            cat contract-toolkit/.github/release-notes.tmpl
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Render release body for PR
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: contract-toolkit/cliff.toml
          args: >-
            --unreleased
            --tag ${{ steps.bump.outputs.tag }}
            --tag-pattern '^contract-toolkit-v[0-9].*'
            --include-path 'contract-toolkit/**'
            --github-repo ${{ github.repository }}
            --strip all
        env:
          OUTPUT: /tmp/contract-toolkit-release-notes.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize release body whitespace
        run: |
          set -euo pipefail
          awk '
            NF { blank=0; print; next }
            !blank { print; blank=1 }
          ' /tmp/contract-toolkit-release-notes.md > /tmp/contract-toolkit-release-notes.normalized.md
          mv /tmp/contract-toolkit-release-notes.normalized.md /tmp/contract-toolkit-release-notes.md
          sed -i '/./,$!d' /tmp/contract-toolkit-release-notes.md

      - name: Sanity-build package
        run: pkl project package contract-toolkit/src/ --output-path .out/ --skip-publish-check

      - name: Push release branch and open PR
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          set -euo pipefail
          branch="${{ steps.bump.outputs.branch }}"
          version="${{ steps.bump.outputs.new }}"

          git config --global user.name 'atlan-ci'
          git config --global user.email 'it@atlan.com'

          git checkout -b "$branch"
          git add contract-toolkit/src/PklProject contract-toolkit/CHANGELOG.md
          git commit -m "chore(contract-toolkit): release v${version}"
          git push origin "$branch"

          body_file=$(mktemp)
          {
            echo "Automated release PR for app-contract-toolkit v${version}."
            echo
            echo "Merging this PR triggers Publish Contract Toolkit, which builds the"
            echo "PKL package, publishes it under app-contract-toolkit/ on the gh-pages"
            echo "branch, creates the contract-toolkit-v${version} tag, and creates the"
            echo "GitHub release. Do not hand-edit contract-toolkit/CHANGELOG.md."
            echo
            echo "## Release notes preview"
            echo
            cat /tmp/contract-toolkit-release-notes.md
          } > "$body_file"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(contract-toolkit): release v${version}" \
            --body-file "$body_file" \
            --label "${RELEASE_LABEL}"
