name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

env:
  ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
  CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: '1'

jobs:
  # @claude mention handler — triggered by comments/issues
  mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    timeout-minutes: 15
    concurrency:
      group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Connect to VPN
        uses: ./.github/actions/globalprotect-connect
        with:
          portal-url: vpn2.atlan.app
          username: ${{ secrets.GLOBALPROTECT_USERNAME }}
          password: ${{ secrets.GLOBALPROTECT_PASSWORD }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(git show:*),Bash(git blame:*),mcp__github_inline_comment__create_inline_comment"
            --append-system-prompt "When a user comment contains '/review' or asks you to review a PR, you MUST invoke the /review slash command. Do not attempt a freeform review."

  # Automatic code review — triggered on PR events and manual dispatch
  review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    timeout-minutes: 25
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Connect to VPN
        uses: ./.github/actions/globalprotect-connect
        with:
          portal-url: vpn2.atlan.app
          username: ${{ secrets.GLOBALPROTECT_USERNAME }}
          password: ${{ secrets.GLOBALPROTECT_PASSWORD }}

      - name: Resolve PR metadata
        id: pr
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF=$(gh pr view "$PR_NUMBER" --json baseRefName -q .baseRefName)
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          show_full_output: true
          prompt: |
            Review PR #${{ steps.pr.outputs.number }} for repo ${{ github.repository }}.
            IMPORTANT: Full git history is already checked out locally. Do NOT run `git fetch`.
            You have limited time — be efficient. Do NOT load skills or run /review.

            1. Get the diff: `git diff origin/${{ steps.pr.outputs.base_ref }}...HEAD`
            2. Read changed files as needed for context.
            3. Check for a previous review comment (containing <!-- CLAUDE_REVIEW -->) and track issue status across re-reviews.
            4. Review for these categories:
               - Performance & Scale — N+1 calls, unbounded iteration, memory accumulation, missing timeouts
               - Edge Case Failures — null cursors, missing field fallbacks, late config validation
               - Correctness — logic errors, wrong API usage, missing error handling
               - SDK Standards — exception re-raise, AtlanLoggerAdapter usage, type hints, Temporal patterns
            5. Post your review as a single PR comment (or update existing <!-- CLAUDE_REVIEW --> comment):
               `gh pr comment ${{ steps.pr.outputs.number }} --body "..."`
               Use markdown with severity labels: CRITICAL, WARNING, INFO.
               Include a <!-- REVIEW_DATA {"issues": [...], "reviewed_commit": "<sha>"} --> block for tracking.
            6. After posting the comment, make a decision:
               - Small, safe PR with no critical issues -> `gh pr review ${{ steps.pr.outputs.number }} --approve -b "..."`
               - Otherwise -> comment only (defer to human)
               Never use --request-changes.
          claude_args: |
            --model claude-sonnet-4-6 --timeout 600 --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh api:*)"
