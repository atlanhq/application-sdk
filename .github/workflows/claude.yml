name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [synchronize]
    branches:
      - main
      - refactor-v3
  # workflow_dispatch is how the auto-complete loop re-fires itself
  # between iterations. GitHub prevents GITHUB_TOKEN from triggering
  # issue_comment events (anti-infinite-loop guardrail), so the bot
  # can't post a '@sdk-review auto-complete --iteration=N' comment
  # and have it fire. workflow_dispatch IS allowed to be triggered
  # by GITHUB_TOKEN, so the 'Trigger re-review iteration' step calls
  # this endpoint instead, passing iteration state as inputs.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (internal auto-complete retrigger)"
        required: true
        type: string
      iteration:
        description: "Current iteration number (1-3)"
        required: true
        type: string
      max_iter:
        description: "Max iterations (1-3)"
        required: true
        type: string
      trigger_reason:
        description: "Why this was dispatched (audit trail)"
        required: false
        type: string
        default: "auto-complete retrigger"

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  actions: write      # sdk-review-stop needs this to cancel runs

env:
  ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
  CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: '1'

jobs:
  # ── @sdk-review handler ─────────────────────────────────────
  # The ONLY entry point for AI-assisted PR review on this repo.
  # Triggered by @sdk-review comments on PRs.
  # Runs the full multi-model review pipeline (3 Opus agents +
  # GPT-5.3-codex adversarial), with auto-fix loop, conflict
  # resolution, and inline comment Q&A.
  #
  # Commands:
  #   @sdk-review                     → Review only
  #   @sdk-review auto-complete       → Review + fix loop until clean
  #   @sdk-review stop                → Cancel an in-progress auto-complete
  #   @sdk-review challenge: <reason> → Re-evaluate prior review's findings
  #                                      against author pushback. Claude
  #                                      can STAND BY / WITHDRAW / SOFTEN
  #                                      each finding. Withdrawn findings
  #                                      are emitted as YAML for the
  #                                      retrospective learned-not-to-flag
  #                                      list (manual aggregation for v1).
  #   @sdk-review override: <reason>  → Admin force-pass
  #
  # Aliases (backward-compat): `resolve all issues` == `auto-complete`,
  # `cancel` == `stop`.
  #
  # Inline comment replies on previous bot comments → answer agent
  # responds in-thread (no separate trigger needed).
  sdk-review:
    # Two entry paths:
    #   1. issue_comment from a repo OWNER/MEMBER/COLLABORATOR containing
    #      '@sdk-review' (but not 'stop' / 'cancel').
    #   2. workflow_dispatch from the auto-complete loop (bot
    #      self-retrigger). GITHUB_TOKEN is ALLOWED to fire
    #      workflow_dispatch, unlike issue_comment where it is
    #      silently suppressed by GitHub's anti-loop guardrail.
    #
    # External fork contributors cannot enter either path: (1) is
    # gated on author_association, (2) cannot be triggered without
    # repo write access.
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@sdk-review') &&
        !contains(github.event.comment.body, '@sdk-review stop') &&
        !contains(github.event.comment.body, '@sdk-review cancel') &&
        github.event.comment.user.login != 'claude[bot]' &&
        github.event.comment.user.login != 'github-actions[bot]' &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      )
      ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.pr_number != ''
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      statuses: write
      actions: write        # needed to dispatch workflow_dispatch iterations
    timeout-minutes: 30
    concurrency:
      group: sdk-review-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORG_PAT_GITHUB }}

      # NOTE: VPN connect is intentionally AFTER Resolve PR metadata and
      # Acknowledge trigger. Those first two steps only talk to GitHub
      # (api.github.com, not behind VPN), and we want the 👀 reaction,
      # pending status check, and ack comment to appear within ~3 seconds
      # of the @sdk-review comment — not after the 30-60s VPN negotiation.

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_COMMENT_PR_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          DISPATCH_ITERATION: ${{ github.event.inputs.iteration }}
          DISPATCH_MAX_ITER: ${{ github.event.inputs.max_iter }}
        run: |
          # Two entry paths — resolve PR metadata from the appropriate
          # event source:
          #   issue_comment:      PR number in github.event.issue.number
          #                       Mode + iteration parsed from comment body
          #   workflow_dispatch:  PR number + iteration + max in inputs
          #                       Mode is always "auto-fix" (this path only
          #                       exists for the auto-complete retrigger loop)

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$DISPATCH_PR_NUMBER"
            MODE="auto-fix"
            ITERATION="$DISPATCH_ITERATION"
            MAX_ITER="$DISPATCH_MAX_ITER"
            # Commenter for override-check compat: use the retrigger's
            # original requester if we can find it (from the last
            # @sdk-review auto-complete comment on the PR); otherwise
            # fall back to the bot itself.
            COMMENTER=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
              --jq '[.[] | select(.body | test("@sdk-review\\s+auto[- ]?complete|@sdk-review\\s+resolve"; "i"))
                    | select(.user.login != "github-actions[bot]")] | last | .user.login // "github-actions[bot]"')
            COMMENT_BODY=""  # no comment in dispatch path
          else
            PR_NUMBER="$ISSUE_COMMENT_PR_NUMBER"
            # Pull comment body and commenter from the event JSON safely — NEVER
            # interpolate user-controlled content via Actions template syntax into shell.
            COMMENT_BODY=$(jq -r '.comment.body' "$GITHUB_EVENT_PATH")
            COMMENTER=$(jq -r '.comment.user.login' "$GITHUB_EVENT_PATH")

            # Determine mode from comment body (grep on the bash variable,
            # never expanded via Actions template syntax — no shell-injection risk).
            #   override            → admin force-pass
            #   challenge           → re-evaluate prior review
            #   auto-complete       → review + fix loop (preferred name)
            #   resolve all issues  → alias for auto-complete (backward-compat)
            #   (none of the above) → review-only
            if printf '%s' "$COMMENT_BODY" | grep -qi "override"; then
              MODE=override
            elif printf '%s' "$COMMENT_BODY" | grep -qi "challenge"; then
              MODE=challenge
            elif printf '%s' "$COMMENT_BODY" | grep -qiE "auto[- ]?complete|resolve"; then
              MODE=auto-fix
            else
              MODE=review-only
            fi

            # For human-initiated auto-complete, this is iteration 1.
            # For human-initiated everything else, iteration/max irrelevant
            # but set sensible defaults.
            ITERATION=1
            MAX_ITER=3
          fi

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName)
          BASE_BRANCH=$(gh pr view "$PR_NUMBER" --json baseRefName -q .baseRefName)

          # Validate iteration/max are integers in [1,3]
          if ! [[ "$MAX_ITER" =~ ^[0-9]+$ ]] || [ "$MAX_ITER" -lt 1 ] || [ "$MAX_ITER" -gt 3 ]; then
            MAX_ITER=3
          fi
          if ! [[ "$ITERATION" =~ ^[0-9]+$ ]] || [ "$ITERATION" -lt 1 ] || [ "$ITERATION" -gt "$MAX_ITER" ]; then
            ITERATION=1
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "commenter=$COMMENTER" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "iteration=$ITERATION" >> "$GITHUB_OUTPUT"
          echo "max_iter=$MAX_ITER" >> "$GITHUB_OUTPUT"
          echo "event_name=$EVENT_NAME" >> "$GITHUB_OUTPUT"

          # IMPORTANT: do NOT write COMMENT_BODY into $GITHUB_OUTPUT — a crafted
          # multiline comment could inject arbitrary outputs.

          # Detect whether the PR modifies any file under .github/workflows/.
          # GITHUB_TOKEN from GH Actions can't push changes to workflow files
          # (403 "without `workflows` permission"). If this PR touches one,
          # skip branch-update attempts and tell the author — otherwise the
          # whole pipeline fails with a cascading cryptic error.
          TOUCHES_WORKFLOWS=$(gh pr view "$PR_NUMBER" --json files \
            --jq '[.files[].path | select(startswith(".github/workflows/"))] | length')
          if [ "${TOUCHES_WORKFLOWS:-0}" -gt 0 ]; then
            echo "touches_workflows=true" >> "$GITHUB_OUTPUT"
          else
            echo "touches_workflows=false" >> "$GITHUB_OUTPUT"
          fi

          # Classify PR complexity for smart agent routing.
          #   tests-only → all changed .py files are under tests/ (no production code)
          #                 → dispatch ONLY Agent B (QUALITY/TEST), skip A + C + Codex
          #   standard   → full 3-agent + Codex pipeline
          ALL_FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')
          PY_FILES=$(printf '%s' "$ALL_FILES" | grep '\.py$' || echo "")
          NON_TEST_PY=$(printf '%s' "$PY_FILES" | grep -v '^tests/' || echo "")

          if [ -n "$PY_FILES" ] && [ -z "$NON_TEST_PY" ]; then
            COMPLEXITY="tests-only"
          else
            COMPLEXITY="standard"
          fi
          echo "complexity=$COMPLEXITY" >> "$GITHUB_OUTPUT"
          echo "Classified PR complexity: $COMPLEXITY"

      # Instant UX feedback: 👀 reaction + pending status check + ack comment.
      # All three happen in the first ~5 s so the user sees @sdk-review
      # was picked up.
      #
      # Also computes the Review/Re-review verb by counting prior
      # SDK_REVIEW_V2 comments BEFORE Claude posts a new one. Exposes
      # as an output so the Claude session + Finalize can use it for
      # consistent wording across ack / review comment / approval body.
      - name: Acknowledge trigger
        id: ack
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          EVENT_NAME: ${{ steps.pr.outputs.event_name }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          MODE: ${{ steps.pr.outputs.mode }}
          ITERATION: ${{ steps.pr.outputs.iteration }}
          MAX_ITER: ${{ steps.pr.outputs.max_iter }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Count prior SDK_REVIEW_V2 comments (none posted yet in this run).
          #   0  → first Review on this PR
          #   >0 → Re-review (there's a prior review in the history)
          PRIOR_REVIEWS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '[.[] | select(.body | contains("SDK_REVIEW_V2"))] | length' 2>/dev/null || echo 0)
          if [ "${PRIOR_REVIEWS:-0}" -gt 0 ]; then
            VERB="Re-review"
          else
            VERB="Review"
          fi
          echo "verb=$VERB" >> "$GITHUB_OUTPUT"
          echo "Detected verb: $VERB (prior SDK_REVIEW_V2 comments: $PRIOR_REVIEWS, event: $EVENT_NAME)"

          # 👀 reaction on the triggering comment (skip for workflow_dispatch
          # — no triggering comment exists; this is an auto-retrigger)
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content=eyes 2>/dev/null || true
          fi

          # Map internal mode name to user-friendly label
          case "$MODE" in
            auto-fix)     LABEL="auto-complete" ;;
            review-only)  LABEL="review" ;;
            override)     LABEL="override (admin)" ;;
            challenge)    LABEL="challenge re-review" ;;
            *)            LABEL="$MODE" ;;
          esac

          # Size-aware time estimate based on total lines changed.
          # Bucketed so users aren't misled by a fixed "~5-8 min" when
          # they've pushed a 3,000-line PR that will realistically take
          # 15-25 min (big diff → bigger subagent context → slower).
          # Simple honest estimate — ~10 min for most PRs.
          # With 3 subagents + Codex adversarial + reconcile + CI wait,
          # even small PRs take ~8-10 min. Large PRs or auto-complete
          # can take longer.
          TOTAL_LINES=$(gh pr view "$PR_NUMBER" --json files \
            --jq '[.files[] | (.additions // 0) + (.deletions // 0)] | add // 0' 2>/dev/null || echo 0)
          if [ "$TOTAL_LINES" -lt 500 ]; then
            EST="~10 min"
          elif [ "$TOTAL_LINES" -lt 2000 ]; then
            EST="~10-15 min"
          else
            EST="~15-25 min (large PR)"
          fi
          if [ "$MODE" = "auto-fix" ]; then
            EST="${EST}, possibly longer with fix iterations"
          fi

          # Set sdk-review status check to pending
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context=sdk-review \
            -f description="SDK ${VERB} starting (${LABEL})... ${EST}" \
            -f target_url="${RUN_URL}" 2>/dev/null || true

          # Add a "stop" hint when auto-complete is running
          STOP_HINT=""
          if [ "$MODE" = "auto-fix" ]; then
            STOP_HINT=$'\n\n> 💡 Comment `@sdk-review stop` to cancel.'
          fi

          BODY="🔄 **SDK ${VERB} starting** (${LABEL}) — ${EST}. [Watch live progress](${RUN_URL})${STOP_HINT}"
          gh pr comment "$PR_NUMBER" --body "$BODY"

      # Connect to VPN AFTER the ack (Resolve + Acknowledge only need
      # api.github.com, not the internal VPN'd services). This means
      # the 👀 reaction, pending status, and ack comment appear in ~3s
      # instead of ~30-60s. VPN is required for the Claude session
      # below to reach llmproxy.atlan.dev.
      - name: Connect to VPN
        uses: ./.github/actions/globalprotect-connect
        with:
          portal-url: vpn2.atlan.app
          username: ${{ secrets.GLOBALPROTECT_USERNAME }}
          password: ${{ secrets.GLOBALPROTECT_PASSWORD }}

      # Pre-flight: Try to resolve conflicts BEFORE running the review
      # Tier 1: GitHub API update-branch
      # Tier 2: git merge
      # Tier 3: Claude Code semantic resolver (next step, only if needed)
      #
      # SECURITY: Branch names are attacker-controlled (PR author creates
      # the branch). All branch/PR values are passed via env: not
      # interpolated into shell via Actions template syntax.
      - name: Conflict pre-flight (Tier 1 + 2)
        id: conflicts
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          BASE: ${{ steps.pr.outputs.base_branch }}
          HEAD: ${{ steps.pr.outputs.head_branch }}
        run: |
          # Set git identity BEFORE any merge/commit so we don't cascade
          # into 'empty ident name' errors if a tier step runs.
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          MERGE_STATE=$(gh pr view "$PR" --json mergeStateStatus -q .mergeStateStatus)
          MERGEABLE=$(gh pr view "$PR" --json mergeable -q .mergeable)

          if [ "$MERGEABLE" = "MERGEABLE" ] && [ "$MERGE_STATE" = "CLEAN" ]; then
            echo "needs_resolution=false" >> "$GITHUB_OUTPUT"
            echo "No conflicts."
            exit 0
          fi

          # Tier 1: API update-branch
          if gh api "repos/${REPO}/pulls/$PR/update-branch" \
             -X PUT -f update_method=merge 2>/dev/null; then
            echo "needs_resolution=false" >> "$GITHUB_OUTPUT"
            echo "Resolved via Tier 1 (API update-branch)."
            exit 0
          fi

          # Tier 2: git merge
          git fetch origin "$BASE" "$HEAD"
          git checkout "$HEAD"
          if git merge "origin/$BASE" --no-edit; then
            if git push origin "$HEAD"; then
              echo "needs_resolution=false" >> "$GITHUB_OUTPUT"
              echo "Resolved via Tier 2 (git merge)."
              exit 0
            else
              echo "::warning::Tier 2 merge succeeded locally but push failed — likely workflow-file or branch-protection issue. Aborting merge."
              # Undo the merge commit we just made locally
              git reset --hard "origin/$HEAD" 2>/dev/null || true
              echo "needs_resolution=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Tier 2 failed — abort (if there's anything to abort) and
          # signal Tier 3 needed.
          git merge --abort 2>/dev/null || true
          echo "needs_resolution=true" >> "$GITHUB_OUTPUT"
          echo "Tiers 1+2 failed. Will spawn Tier 3 (Claude semantic resolver)."

      # Tier 3: Claude Code semantic conflict resolver
      # Only runs if Tiers 1+2 failed.
      - name: Resolve conflicts (Tier 3 — Claude session)
        id: resolve
        if: steps.conflicts.outputs.needs_resolution == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          show_full_output: true
          prompt: |
            Resolve merge conflicts on PR #${{ steps.pr.outputs.number }}.

            Branch: ${{ steps.pr.outputs.head_branch }} (PR)
            Base:   ${{ steps.pr.outputs.base_branch }}

            Process:
            1. git fetch origin ${{ steps.pr.outputs.base_branch }} ${{ steps.pr.outputs.head_branch }}
            2. git checkout ${{ steps.pr.outputs.head_branch }}
            3. git merge origin/${{ steps.pr.outputs.base_branch }} --no-edit
               (this creates conflict markers)
            4. List conflicting files: git diff --name-only --diff-filter=U
            5. For each conflicting file:
               a. Read the FULL file (with conflict markers)
               b. Understand each side's intent from surrounding context
               c. Resolve markers based on intent
               d. Common patterns:
                  - Both added imports → combine, let isort sort
                  - Both added tests in same class → include both
                  - Function renamed in base, called with old name in PR
                    → update call sites to new name
                  - Same function modified differently → merge if intents
                    are compatible

            6. SAFETY GUARDRAILS — ABORT if any conflict involves:
               - Business logic changes in the same function in
                 incompatible ways
               - Security-sensitive code (auth, credentials, secrets)
               - Infrastructure/deployment configuration
               - Database migrations or schema changes
               - Removed in one branch, modified in the other

            7. Verify:
               a. uv run pre-commit run --all-files
               b. uv run pytest tests/unit/ -x --timeout=120

            8. If verification passes:
               git add <resolved files>
               git commit -m "merge: resolve conflicts with ${{ steps.pr.outputs.base_branch }} (auto-resolved)"
               git push origin ${{ steps.pr.outputs.head_branch }}
               Output: RESOLVED

            9. If anything fails or guardrail tripped:
               git merge --abort
               Output: ABORTED:<reason>

            Be conservative. When in doubt, ABORT and let a human handle it.
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(git fetch:*),Bash(git checkout:*),Bash(git merge:*),Bash(git diff:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git log:*),Bash(git show:*),Bash(uv run:*),Bash(python3:*),Bash(python:*),Bash(cat:*),Bash(ls:*),Bash(wc:*),Bash(head:*),Bash(tail:*),Bash(grep:*),Bash(find:*),Bash(diff:*),Bash(sed:*),Bash(awk:*),Bash(echo:*),Bash(mkdir:*),Bash(ruff:*)"
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          GH_TOKEN: ${{ github.token }}

      # If Tier 3 aborted, stop here and ask for human intervention
      - name: Handle Tier 3 abort
        if: |
          steps.conflicts.outputs.needs_resolution == 'true' &&
          contains(steps.resolve.outputs.result, 'ABORTED')
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state=failure \
            -f context=sdk-review \
            -f description="Conflicts require manual resolution." 2>/dev/null || true

          gh label create "needs-rebase" --color "e4e669" --force 2>/dev/null
          gh pr edit "$PR" --add-label "needs-rebase"

          gh pr comment "$PR" --body "Merge conflicts require manual resolution. Auto-resolution attempts: Tier 1 (GitHub API update-branch) failed; Tier 2 (git merge) failed; Tier 3 (Claude Code semantic resolver) aborted (likely involves business logic, security, or infra config). Please rebase manually and re-run @sdk-review."

          exit 1  # Stop the workflow here

      # Pre-fetch the PR diff and file list so the Claude session can
      # read them from disk instead of fetching via gh CLI. This avoids
      # permission/sandbox issues with chained commands and output
      # redirection inside claude-code-action.
      - name: Pre-fetch PR diff and file list
        if: steps.pr.outputs.mode != 'override' && steps.pr.outputs.mode != 'challenge'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/sdkreview
          gh pr diff ${{ steps.pr.outputs.number }} > /tmp/sdkreview/diff.patch
          gh pr view ${{ steps.pr.outputs.number }} --json files --jq '.files[].path' > /tmp/sdkreview/files.txt
          echo "Pre-fetched diff ($(wc -l < /tmp/sdkreview/diff.patch) lines) and file list ($(wc -l < /tmp/sdkreview/files.txt) files)"

      # Main review session (Opus)
      # v1 implementation: single-session review (no Agent subagents).
      # The Agent tool (for subagents) caused auth failures because subagents
      # don't inherit the LiteLLM-specific auth. Keep the review simple for v1;
      # add subagents back once we verify subagent auth works with the proxy.
      #
      # SECURITY: No user-controlled content is interpolated into this prompt
      # via Actions template syntax. The comment body / commenter / mode / etc. are not embedded
      # here — the Claude session fetches everything it needs via gh CLI
      # using trusted identifiers (PR number, repo, head SHA) only.
      - name: SDK Review (Session A — Review)
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          show_full_output: true
          prompt: |
            You are reviewing PR #${{ steps.pr.outputs.number }} for the Atlan application-sdk (repo ${{ github.repository }}).

            Mode: ${{ steps.pr.outputs.mode }}

            IMPORTANT: Full git history is already checked out locally. Do NOT run git fetch.

            ## Setup

            The triggering commenter's GitHub login is: ${{ steps.pr.outputs.commenter }}
            This is the actual human who posted "@sdk-review ..."
            (extracted from the issue_comment event payload — NOT the
            last comment on the PR, which is the bot's acknowledgment).

            The review verb is: ${{ steps.ack.outputs.verb }}
            This is either "Review" (first time) or "Re-review" (prior
            SDK_REVIEW_V2 comment exists). Use this exact verb in every
            heading / summary you post — NEVER hard-code "SDK Review:".

            The review complexity is: ${{ steps.pr.outputs.complexity }}
            This is either "tests-only" or "standard".

            ## Review Process

            If the mode is "override":
            1. Check if the commenter is a repo admin:
               gh api repos/${{ github.repository }}/collaborators/"${{ steps.pr.outputs.commenter }}"/permission --jq .permission
            2. Extract the override reason from the triggering comment body
               (everything after "@sdk-review override:"). Fall back to
               "no reason provided" if empty.
            3. If "admin" → post a PR comment with the EXACT format below
               (keep the SDK_REVIEW_V2 marker + the `### Verdict:` line —
               downstream steps parse both). Use the verb "${{ steps.ack.outputs.verb }}"
               in the heading:

               <!-- SDK_REVIEW_V2 -->
               ## SDK ${{ steps.ack.outputs.verb }}: PR #<num> — <title>

               ### Verdict: READY TO MERGE

               > ⚠️ **Admin override** by @${{ steps.pr.outputs.commenter }}.
               > **Reason:** <reason>
               >
               > This PR is being approved via admin override,
               > bypassing normal SDK review findings. The reason
               > above is recorded for audit.

               Then output VERDICT:READY_TO_MERGE and stop.

            4. If not admin → post a PR comment:
               "Only repo admins can override the sdk-review check."
               Output VERDICT:NEEDS_FIXES and stop.

            If the mode is "challenge":
            A challenge is a formal pushback on a prior review — the
            author believes one or more findings were wrong. You must
            re-evaluate the PR in light of their pushback, honestly
            and without sycophancy.

            1. Fetch the most recent prior SDK_REVIEW_V2 comment:
               gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments --paginate \
                 --jq '[.[] | select(.body | contains("SDK_REVIEW_V2"))] | last | .body'

            2. Fetch the triggering challenge comment body via $GITHUB_EVENT_PATH
               (same as any @sdk-review comment — mode=challenge was
               detected because it contains "challenge"). Extract any
               reason the author gave after "@sdk-review challenge:".

            3. Fetch author's replies on bot-posted inline review comments:
               gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/comments \
                 --jq '[.[] | select(.user.login != "github-actions[bot]")] | .[] | {path, line, body, in_reply_to_id}'

            4. Re-read the changed files (not just the diff) so you can
               evaluate findings in context again with fresh eyes.

            5. For EACH finding in the prior review, decide one of:
               - **STAND BY**: the finding is still valid. Explain WHY,
                 addressing the author's specific objection.
               - **WITHDRAW**: the finding was wrong. Acknowledge
                 explicitly (e.g. "I initially flagged this as a bare
                 except; on re-read, the exception is intentional and
                 narrowly scoped — retracting this finding.").
               - **SOFTEN**: downgrade severity (e.g. Critical → Minor).
                 Explain what changed your assessment.

            6. Post a new SDK_REVIEW_V2 comment with this format (use
               the verb = "Re-review" since challenge implies
               prior review exists):

               <!-- SDK_REVIEW_V2 -->
               ## SDK Re-review (challenge response): PR #<num> — <title>

               ### Verdict: <updated verdict>

               > Re-evaluated prior findings against the author's
               > challenge: "<quote their reason if given>".
               > <1-line summary of outcome — how many stood, withdrawn, softened>

               ### Changes from prior review

               - **[STAND BY]** `file:line` — <original finding> — <why it still holds>
               - **[WITHDRAWN]** `file:line` — <original finding> — <why you now agree>
               - **[SOFTENED]** `file:line` — <original> (was Critical, now Minor) — <why>

               ### Findings by File (current state)

               <same format as review mode, but reflecting post-challenge state>

               ### Retrospective (for learned-not-to-flag list)

               \`\`\`yaml
               # For each WITHDRAWN finding, emit an entry. This YAML
               # block is machine-parseable so a future step can append
               # these to a learned-not-to-flag log.
               withdrawn_findings:
                 - file: <path>
                   line: <N>
                   original_text: <verbatim prior finding>
                   author_challenge: <quote author's objection>
                   why_withdrawn: <your reasoning>
               \`\`\`
               (Omit the whole "Retrospective" section if no findings
               were withdrawn in this pass.)

            7. Verdict logic for challenge mode:
               - If ALL prior blockers are withdrawn/softened below
                 Critical → verdict is READY_TO_MERGE.
               - If some challenges are valid but others stand, and
                 remaining findings meet the normal bar → NEEDS_FIXES
                 or READY_TO_MERGE as appropriate.
               - Output the verdict as the LAST LINE: VERDICT:<verdict>

            8. Do NOT re-post inline comments (the original ones from
               the prior review still stand on the lines that haven't
               changed). If you withdraw a finding, you may OPTIONALLY
               reply to its inline thread acknowledging the retraction.

            Stop here if mode is "challenge". Do not proceed to the
            regular review flow below.

            Otherwise, do the review:

            ## Review setup

            The PR diff and file list have been pre-fetched to disk:
              - /tmp/sdkreview/diff.patch (the full PR diff)
              - /tmp/sdkreview/files.txt (list of changed file paths)
            Read these directly — do NOT re-fetch via gh pr diff.

            1. Read the diff from /tmp/sdkreview/diff.patch.

            2. Read the changed files in full using Read tool.

            3. Read these SDK review rules (ALL of them):
               - .claude/skills/sdk-review/references/v3-architecture-rules.md
               - .claude/skills/sdk-review/references/code-quality-rules.md
               - .claude/skills/sdk-review/references/security-rules.md
               - .claude/skills/sdk-review/references/test-quality-rules.md
               - .claude/skills/sdk-review/references/dx-rules.md
               - .claude/skills/sdk-review/references/structural-rules.md
               - .claude/skills/sdk-review/references/retro-log.md
                 (learned-not-to-flag — patterns previously withdrawn
                 after author challenges. DO NOT flag these again
                 without additional evidence.)

               If $SDK_REVIEW_COMPLEXITY is "tests-only", you may skip
               v3-architecture-rules.md, security-rules.md, and
               structural-rules.md (no production code to check).

            4. Analyze the PR across these 3 dimensions:
               - CORRECTNESS: architecture (ADR compliance, contract
                 safety, determinism), security (secrets, injection,
                 isolation), logical bugs
               - QUALITY: code quality (imports, logging, naming,
                 size), test coverage, developer experience
               - STRUCTURE: holistic — symptoms vs causes, file
                 health, dependency direction, v3 replacements

            5. Check guardrails G1-G8 (defined in the reference
               rules). Any violation is a blocker.

            6. Post a summary comment to the PR using `gh pr comment`.
               Use the verb "${{ steps.ack.outputs.verb }}" in the heading.
               When the verb is "Re-review", include a short
               delta note in the summary line — did the latest changes
               resolve prior findings, introduce new ones, or neither?
               Look at the most recent prior SDK_REVIEW_V2 comment on
               the PR for context (fetch via `gh api`).

               Format:

               <!-- SDK_REVIEW_V2 -->
               ## SDK ${{ steps.ack.outputs.verb }}: PR #<num> — <title>

               ### Verdict: READY TO MERGE | NEEDS FIXES | BLOCKED | NEEDS HUMAN REVIEW

               > <1-2 sentence summary of current status — for Re-review,
               > mention whether prior findings were resolved and whether
               > new issues were introduced by the latest changes>

               ### Delta from prior review
               (INCLUDE THIS SECTION ONLY IF the verb is "Re-review".
                For each finding in the prior SDK_REVIEW_V2 comment, emit
                one bullet with one of the four markers. If no changes
                for a category, write "- None".)

               - **[RESOLVED]** `file:line` — prior finding "..." — fixed in this iteration
               - **[STILL]** `file:line` — prior finding "..." — still present
               - **[NEW]** `file:line` — introduced by this iteration
               - **[REGRESSION]** `file:line` — was flagged, fixed, now re-introduced

               ### Findings by File

               **`<path>`**
               - **Critical** [TAG] L42 — description. Fix: <what to do>
               - **Important** [TAG] L56 — description. Fix: <what to do>

               **`<another file>`**
               - ...

               (tags: [ARCH], [SEC], [BUG], [QUAL], [TEST], [DX], [STRUCT])

               ### Strengths (if any)
               - ...

            7. For each finding post an inline comment on the exact line using:
               gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/comments \
                 -f body="<severity tag, description, fix>" \
                 -f commit_id="${{ steps.pr.outputs.head_sha }}" \
                 -f path="<file>" \
                 -F line=<N> \
                 -f side="RIGHT"
               Max 15 inline comments, prioritize Critical > Important > Minor.

            7b. AUTO-RESOLVE previously-flagged findings that are now fixed.

                On a re-review (when verb is "Re-review"), fetch prior
                inline review threads authored by github-actions[bot]:

                  gh api graphql -f query='
                    query($owner:String!,$name:String!,$num:Int!) {
                      repository(owner:$owner, name:$name) {
                        pullRequest(number:$num) {
                          reviewThreads(first:100) {
                            nodes { id isResolved
                              comments(first:1) {
                                nodes { author{login} path line body }
                              }
                            }
                          }
                        }
                      }
                    }' -F owner=atlanhq -F name=application-sdk -F num=${{ steps.pr.outputs.number }}

                For each un-resolved thread whose comment author is
                github-actions[bot], check whether the finding STILL
                applies to the current code (read the file at that path
                and line). If the finding has been addressed (code no
                longer has the issue, or the line/file is gone), resolve
                the thread:

                  gh api graphql -f query='
                    mutation($id:ID!) {
                      resolveReviewThread(input:{threadId:$id}) {
                        thread { id isResolved }
                      }
                    }' -F id=<thread id>

                Do NOT resolve threads the author has explicitly
                responded to arguing the finding is wrong — those go
                through the `@sdk-review challenge:` flow.

            8. Severity rules (IMPORTANT — read carefully):

               Any finding that would FAIL a standard linter or pre-commit
               check on this repo (bare `except:` / E722, f-string passed
               to `logger.*`, `print()` in production code, unused imports,
               mutable default args, etc.) is at least **Important** —
               never Minor. If CI would reject the code, the review must
               not call it Minor.

               Any hardcoded secret, SQL injection, auth bypass, tenant
               isolation break, missing input validation on public endpoint,
               logging of credentials/tokens → always **Critical**.

               Missing type hints, missing docstrings, formatting nits,
               naming preferences → Minor.

            9. Verdict rules:

               - Any Critical security finding [SEC] → BLOCKED.
               - Any Critical non-security finding OR any Important
                 finding OR 3+ Minor findings → NEEDS_FIXES.
               - No Critical, zero Important, fewer than 3 Minor →
                 READY_TO_MERGE.
               - Major design smells (god function, dependency direction
                 violation, dumping ground, contract break) that aren't
                 a simple patch → NEEDS_HUMAN_REVIEW.

            10. Output the verdict as the LAST LINE of your response:
                VERDICT:<verdict>

            Do NOT use the Task or Agent tool — do everything
            directly in this session. Subagents hang on the LiteLLM
            proxy and cause timeouts.
            Do NOT set a commit status check (Finalize handles that).
            Do NOT proceed to auto-fix — that is a separate workflow step.
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Glob,Grep,Bash(mkdir:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr edit:*),Bash(gh pr checks:*),Bash(gh pr review:*),Bash(gh api:*),Bash(gh label:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*),Bash(cat:*),Bash(jq:*),Bash(python3:*),Bash(python:*),Bash(wc:*),Bash(ls:*),Bash(head:*),Bash(tail:*),Bash(sort:*),Bash(grep:*),Bash(find:*),Bash(echo:*),Bash(tr:*),Bash(cut:*),Bash(uniq:*),Bash(diff:*),Bash(xargs:*),Bash(basename:*),Bash(dirname:*),Bash(realpath:*),Bash(tee:*),Bash(stat:*),Bash(file:*),Bash(sed:*),Bash(awk:*)"
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          GH_TOKEN: ${{ github.token }}

      # Adversarial review (Wave 2 — GPT-5.3-codex via LiteLLM).
      # Second cross-model opinion. Posts a separate comment with
      # SDK_REVIEW_V2_ADVERSARIAL marker. Runs BEFORE verdict parsing
      # so Reconcile (next step) can fold Codex's disagreements back
      # into the Opus SDK_REVIEW_V2 comment, and Parse verdict reads
      # the reconciled version.
      - name: Adversarial review (GPT-5.3-codex)
        id: adversarial
        if: |
          steps.pr.outputs.mode != 'override' &&
          steps.pr.outputs.mode != 'challenge' &&
          steps.pr.outputs.complexity != 'tests-only'
        timeout-minutes: 8
        continue-on-error: true
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          CLAUDE_REVIEW=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            | jq -r '[.[] | select(.body | contains("SDK_REVIEW_V2"))
              | select(.body | contains("SDK_REVIEW_V2_ADVERSARIAL") | not)
              | select(.body | contains("SDK_REVIEW_V2_RECONCILED") | not)] | last | .body // ""')

          if [ -z "$CLAUDE_REVIEW" ]; then
            echo "No SDK_REVIEW_V2 comment found — skipping adversarial pass."
            echo "ran=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null | head -c 40000)

          if [ -z "$DIFF" ]; then
            echo "Empty diff — skipping adversarial pass."
            echo "ran=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          REQUEST_BODY=$(jq -n \
            --arg diff "$DIFF" \
            --arg claude "$CLAUDE_REVIEW" \
            '{
              model: "gpt-5.3-codex",
              messages: [
                {
                  role: "system",
                  content: "You are a senior Python engineer doing adversarial re-review. Another reviewer (Claude Opus) reviewed this PR. Output JSON ONLY — no prose. Fields: missed (array of findings the other review missed), false_positives (array of findings you think are wrong), severity_changes (array of {file,line,from,to,reason}). Each finding: {severity, tag, file, line, description}. If no disagreements, all arrays empty."
                },
                {
                  role: "user",
                  content: ("## PR diff\n```\n" + $diff + "\n```\n\n## Opus review\n" + $claude + "\n\nReturn STRICT JSON matching the schema described in the system prompt. No markdown, no prose outside the JSON.")
                }
              ],
              temperature: 0.2,
              max_tokens: 4000,
              response_format: {type: "json_object"}
            }')

          echo "Calling GPT-5.3-codex..."
          RESPONSE=$(curl -sS -X POST "https://llmproxy.atlan.dev/v1/chat/completions" \
            -H "Authorization: Bearer $LITELLM_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" 2>&1)

          CODEX_JSON=$(printf '%s' "$RESPONSE" | jq -r '.choices[0].message.content // ""')

          if [ -z "$CODEX_JSON" ]; then
            ERR=$(printf '%s' "$RESPONSE" | jq -r '.error.message // "unknown"')
            echo "::warning::Codex returned no content: $ERR"
            echo "ran=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Save JSON to disk for the Reconcile step
          printf '%s' "$CODEX_JSON" > /tmp/codex_disagreements.json

          # Codex findings saved to /tmp/codex_disagreements.json.
          # The Reconcile step will fold them into the main Opus review
          # comment in-place — no separate comment needed.
          echo "ran=true" >> "$GITHUB_OUTPUT"

      # Reconcile — fold Codex disagreements into the Opus SDK_REVIEW_V2
      # comment. If Codex caught something Opus missed, add it. If
      # Codex flagged a false positive, remove it. If severity differs,
      # pick the median (more conservative).
      #
      # Runs a short Claude session that reads both the Opus review
      # and the Codex JSON disagreements, edits the Opus comment in
      # place (PATCH), re-evaluates the verdict on the reconciled set.
      - name: Reconcile Opus + Codex findings
        if: steps.adversarial.outputs.ran == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          show_full_output: true
          prompt: |
            You are reconciling two reviews on PR #${{ steps.pr.outputs.number }}
            in repo ${{ github.repository }}.

            1. Fetch the most recent SDK_REVIEW_V2 comment (NOT
               _ADVERSARIAL, NOT _RECONCILED):
               gh api "repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments" --paginate \
                 --jq '[.[] | select(.body | contains("SDK_REVIEW_V2")
                   and (.body | contains("SDK_REVIEW_V2_ADVERSARIAL") | not)
                   and (.body | contains("SDK_REVIEW_V2_RECONCILED") | not))] | last'
               Remember its `id` (comment id) and `body`.

            2. Read /tmp/codex_disagreements.json (GPT-5.3-codex's
               disagreements, JSON schema: missed, false_positives,
               severity_changes).

            3. Produce a reconciled SDK_REVIEW_V2 comment body:
               - ADD each finding from Codex's `missed` array
                 (if not already in the Opus review).
               - REMOVE each finding from Codex's `false_positives`
                 array (match by file+line+description similarity).
                 Only remove if Codex's reasoning is strong.
               - ADJUST severity per `severity_changes` — but apply a
                 CONSERVATIVE rule: use the HIGHER of {Opus, Codex}
                 severity when they disagree (never silently downgrade
                 a Critical).
               - Re-evaluate verdict with the reconciled findings
                 using the standard rules (Critical [SEC] → BLOCKED,
                 any Important or 3+ Minor → NEEDS_FIXES, etc.).
               - Add a new section "### Cross-model reconciliation"
                 BEFORE the Findings list that summarizes what was
                 added/removed/adjusted. Example:
                   - Added 1 missed finding (SEC at api/foo.py:42)
                   - Removed 0 false positives
                   - Adjusted 1 severity (bar.py:10: Minor → Important)
               - Keep the SDK_REVIEW_V2 marker. Replace it with both
                 markers stacked:
                   <!-- SDK_REVIEW_V2 -->
                   <!-- SDK_REVIEW_V2_RECONCILED -->

            4. Edit the Opus comment in place:
               gh api -X PATCH \
                 "repos/${{ github.repository }}/issues/comments/<comment_id>" \
                 -f body="<reconciled body>"

            5. Output VERDICT:<new verdict> as the LAST LINE.

            If /tmp/codex_disagreements.json is missing or Codex had
            no disagreements (all arrays empty), skip everything and
            output VERDICT:UNCHANGED.
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Glob,Grep,Bash(gh api:*),Bash(cat:*),Bash(jq:*),Bash(python3:*),Bash(python:*),Bash(head:*),Bash(tail:*),Bash(grep:*),Bash(wc:*),Bash(echo:*),Bash(sed:*),Bash(awk:*),Bash(cut:*),Bash(tr:*),Bash(sort:*),Bash(diff:*)"
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          GH_TOKEN: ${{ github.token }}

      # Parse verdict by reading the SDK_REVIEW_V2 comment Claude posted.
      # The action output 'result' isn't reliably exposed by
      # anthropics/claude-code-action@v1 — it resolved to empty string
      # in testing, causing the pipeline to always fall through to
      # NEEDS_FIXES and skip Finalize. Fetching the comment we just
      # posted gives a stable, authoritative source for the verdict.
      #
      # Note: this runs AFTER Adversarial + Reconcile, so the comment
      # we read is the RECONCILED version (if Reconcile ran).
      - name: Parse verdict
        id: verdict
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          # Find the most recent SDK_REVIEW_V2 comment on this PR
          REVIEW_COMMENT=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '[.[] | select(.body | contains("SDK_REVIEW_V2"))] | last | .body // ""')

          if [ -z "$REVIEW_COMMENT" ]; then
            echo "::warning::No SDK_REVIEW_V2 comment found — defaulting to NEEDS_FIXES."
            VERDICT="NEEDS_FIXES"
          else
            # Extract the verdict line. Claude posts e.g.:
            #   ### Verdict: READY TO MERGE
            # Normalize to READY_TO_MERGE / NEEDS_FIXES / BLOCKED / NEEDS_HUMAN_REVIEW.
            RAW=$(printf '%s' "$REVIEW_COMMENT" | grep -oiP '###\s*Verdict:\s*\K[A-Z][A-Z _]+' | head -1 | tr '[:lower:]' '[:upper:]')
            # Collapse whitespace to underscores
            VERDICT=$(printf '%s' "$RAW" | tr -s ' ' '_' | sed 's/_*$//')

            case "$VERDICT" in
              READY_TO_MERGE|NEEDS_FIXES|BLOCKED|NEEDS_HUMAN_REVIEW) ;;
              *)
                echo "::warning::Could not parse verdict from comment — got '$VERDICT'. Defaulting to NEEDS_FIXES."
                VERDICT="NEEDS_FIXES" ;;
            esac
          fi

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Review verdict: $VERDICT"

      # Fix session (Session B — only if auto-fix mode and not clean)
      - name: SDK Fix (Session B — Auto-Fix)
        if: |
          steps.pr.outputs.mode == 'auto-fix' &&
          steps.verdict.outputs.verdict == 'NEEDS_FIXES'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          show_full_output: true
          prompt: |
            You are a code fixer for the Atlan application-sdk.
            A review has been posted on PR #${{ steps.pr.outputs.number }} with exact fix instructions.

            IMPORTANT RULES:
            - Follow CLAUDE.md commit conventions (Conventional Commits format)
            - NEVER add Co-Authored-By lines to commits
            - NEVER introduce new issues — verify each fix doesn't break
              existing behavior before moving to the next one
            - Fix ALL findings (Critical, Important, AND Minor) with scope
              PATCH or MIGRATE
            - SKIP all REFACTOR and DESIGN_CHANGE scope findings
            - Full git history is already checked out. Do NOT run git fetch.
            - uv, python, ruff, and all dev tools are already installed on PATH. Do NOT attempt to install them.

            Process:

            1. Read the most recent SDK review comment on this PR:
               gh api repos/atlanhq/application-sdk/issues/${{ steps.pr.outputs.number }}/comments --paginate \
                 --jq '.[] | select(.body | contains("SDK_REVIEW_V2")) | .body' | tail -1

            2. Parse REVIEW_DATA — extract findings with status "open"
               and scope PATCH or MIGRATE (all severities).

            3. For each PATCH finding:
               a. Read the full file to understand context
               b. Verify the fix makes sense in context
               c. Apply the exact code change from FIX block
               d. Run: uv run pre-commit run --files <changed_file>
               e. Run: uv run pytest <corresponding_test_file> -x (if exists)
               f. If tests/lint fail → revert ONLY this fix, note why

            4. For each MIGRATE finding:
               a. Read all caller files
               b. Update each caller to use the v3 replacement
               c. Run pre-commit on all changed files
               d. Run tests for affected modules
               e. If tests fail → revert, note why

            5. After all fixes applied:
               a. uv run pre-commit run --files <all_changed_files>
               b. uv run pytest tests/unit/ -x --timeout=120
               c. uv run pyright <changed_files> 2>/dev/null || true

            6. Commit (specific files, never git add -A):
               git add <specific changed files>
               git commit -m "fix(review): address SDK review findings (iteration N/M)"
               git push origin ${{ steps.pr.outputs.head_branch }}

            Output: FIXES_APPLIED:<count> or FIXES_APPLIED:0
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(uv run:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git diff:*),Bash(git checkout:*),Bash(git status:*),Bash(gh api:*),Bash(gh pr view:*),Bash(cat:*),Bash(jq:*),Bash(python3:*),Bash(python:*),Bash(wc:*),Bash(ls:*),Bash(head:*),Bash(tail:*),Bash(sort:*),Bash(grep:*),Bash(find:*),Bash(echo:*),Bash(tr:*),Bash(cut:*),Bash(uniq:*),Bash(diff:*),Bash(xargs:*),Bash(sed:*),Bash(awk:*),Bash(ruff:*),Bash(pip:*),Bash(mkdir:*),Bash(tee:*),Bash(which:*),Bash(cp:*),Bash(mv:*),Bash(touch:*),Bash(chmod:*)"
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          GH_TOKEN: ${{ github.token }}

      # Trigger next iteration (fresh run via workflow_dispatch).
      # Max 3 iterations. Honors the `sdk-review-stopped` label so the
      # author can break out of the auto-complete loop between
      # iterations without killing the fix session mid-commit.
      #
      # IMPORTANT: uses gh api /dispatches instead of posting an
      # @sdk-review comment. GITHUB_TOKEN cannot trigger issue_comment
      # workflows (anti-loop guardrail), so a bot-posted comment
      # silently produces zero runs. workflow_dispatch IS allowed for
      # GITHUB_TOKEN, so dispatch + inputs gives us the loop.
      - name: Trigger re-review iteration
        if: |
          steps.pr.outputs.mode == 'auto-fix' &&
          steps.verdict.outputs.verdict == 'NEEDS_FIXES'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          CURRENT: ${{ steps.pr.outputs.iteration }}
          MAX: ${{ steps.pr.outputs.max_iter }}
        run: |
          # Honor stop-request: if the author commented @sdk-review stop
          # during this iteration, don't kick off another one.
          if gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' \
               | grep -qx "sdk-review-stopped"; then
            echo "Stop requested — skipping next iteration."
            gh pr edit "$PR_NUMBER" --remove-label "sdk-review-stopped" 2>/dev/null || true
            gh pr comment "$PR_NUMBER" --body \
              "🛑 **Auto-complete stopped** by request. Fixes from this iteration remain pushed. Comment \`@sdk-review\` to run a fresh review, or \`@sdk-review auto-complete\` to resume."
            exit 0
          fi

          NEXT=$((CURRENT + 1))

          if [ "$NEXT" -gt "$MAX" ]; then
            echo "Max iterations ($MAX) reached."
            gh pr comment "$PR_NUMBER" --body \
              "SDK Review: Max iterations ($MAX) reached. Remaining findings need manual attention."
            gh label create "needs-human-review" --color "d93f0b" --force 2>/dev/null
            gh pr edit "$PR_NUMBER" --add-label "needs-human-review"
            exit 0
          fi

          # Fire the next iteration via workflow_dispatch.
          # The workflow file must exist on the default branch for this
          # to work (GitHub loads workflow_dispatch workflows from the
          # default branch only, regardless of the 'ref' used for the run).
          DEFAULT_BRANCH=$(gh api "repos/${REPO}" --jq '.default_branch')
          echo "Dispatching iteration ${NEXT}/${MAX} via workflow_dispatch (ref=${DEFAULT_BRANCH})..."

          if gh api "repos/${REPO}/actions/workflows/claude.yml/dispatches" \
               -X POST \
               -f ref="${DEFAULT_BRANCH}" \
               -f "inputs[pr_number]=${PR_NUMBER}" \
               -f "inputs[iteration]=${NEXT}" \
               -f "inputs[max_iter]=${MAX}" \
               -f "inputs[trigger_reason]=auto-complete iteration ${NEXT}/${MAX}"; then
            # Post a short informational comment on the PR (not a
            # trigger — just user-facing visibility).
            gh pr comment "$PR_NUMBER" --body \
              "🔁 **Auto-complete iteration ${NEXT}/${MAX} dispatched.** [Watch live progress](${{ github.server_url }}/${{ github.repository }}/actions/workflows/claude.yml)"
          else
            # Dispatch failed (permission / missing workflow / branch
            # deleted). Fall back to telling the human.
            gh pr comment "$PR_NUMBER" --body \
              "⚠️ Auto-complete iteration ${NEXT}/${MAX} could not be dispatched. Re-run manually by commenting \`@sdk-review auto-complete\`."
          fi

      # Finalize if clean (approve + update branch + status = success)
      - name: Finalize (approve if clean)
        id: finalize
        if: steps.verdict.outputs.verdict == 'READY_TO_MERGE'
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
          PR: ${{ steps.pr.outputs.number }}
          MODE: ${{ steps.pr.outputs.mode }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
        run: |
          # Update branch. Try the API first (fast, no checkout needed).
          # The API returns 422 when already up-to-date, 403 when the PR
          # touches .github/workflows/ (needs PAT with 'workflows' OAuth
          # scope). Capture the HTTP status to distinguish these cases.
          HTTP_STATUS=$(gh api "repos/${REPO}/pulls/$PR/update-branch" \
            -X PUT -f update_method=merge \
            --include 2>&1 | head -1 | grep -oP '\d{3}' || echo "000")

          case "$HTTP_STATUS" in
            200) echo "Branch updated via API." ;;
            422) echo "Branch already up to date." ;;
            *)
              echo "API update-branch returned $HTTP_STATUS. Falling back to git merge."
              # Configure git auth using GITHUB_TOKEN (actions/checkout
              # may not persist credentials for push in all cases).
              git config --local http.https://github.com/.extraheader \
                "Authorization: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)"
              git fetch origin "$BASE_BRANCH" "$HEAD_BRANCH"
              git checkout "$HEAD_BRANCH"
              if git merge "origin/$BASE_BRANCH" --no-edit; then
                git push origin "$HEAD_BRANCH" || echo "Push failed — branch update skipped."
              else
                echo "Merge conflict during branch update — aborting."
                git merge --abort
              fi
              ;;
          esac

          # Wait for CI after branch update
          sleep 15
          echo "Checking CI status..."
          if ! gh pr checks "$PR" --required --watch --fail-fast 2>/dev/null; then
            echo "CI checks failing after branch update."
            if [ "$MODE" = "auto-fix" ]; then
              # In auto-fix mode, signal Session C to fix CI issues
              echo "ci_failed=true" >> "$GITHUB_OUTPUT"
              gh pr comment "$PR" --body \
                "⏳ **SDK Review verdict: READY TO MERGE** — but CI is failing after branch update. Auto-fix will attempt to resolve CI issues (pre-commit, tests)."
              exit 0
            fi
            # In review-only / override / challenge mode, just report
            gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              -f state=failure -f context=sdk-review \
              -f description="Review verdict READY TO MERGE, but required CI checks are failing. Fix CI, then re-run @sdk-review." 2>/dev/null || true
            gh pr comment "$PR" --body \
              "ℹ️ **SDK Review verdict: READY TO MERGE** — but required CI checks on this branch are failing. The \`sdk-review\` status is set to \`failure\` to prevent merge. Fix CI (e.g. pre-commit, tests), push, and re-run \`@sdk-review\`."
            echo "ci_failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ci_failed=false" >> "$GITHUB_OUTPUT"

          # Compose context-aware approve message.
          #
          # Special case — admin override:
          #   Body is distinct and audit-friendly, names the admin and
          #   the reason they gave. Both are extracted from the most
          #   recent "@sdk-review override: ..." comment on the PR.
          #
          # Otherwise:
          #   Axis 1 — "Review" vs "Re-review":
          #     Counts existing SDK_REVIEW_V2 comments on the PR.
          #     More than one means this run is a re-review (the count
          #     includes the one we just posted in this run).
          #   Axis 2 — outcome phrase:
          #     First review, review-only:   "no blocking issues found"
          #     First review, auto-complete: "findings resolved"
          #     Re-review, review-only:      "no new issues introduced by the latest changes"
          #     Re-review, auto-complete:    "previous findings resolved; no new issues introduced"
          if [ "$MODE" = "override" ]; then
            # Find the most recent @sdk-review override:… comment by a
            # human collaborator and extract admin + reason.
            OVERRIDE_INFO=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
              --jq '[.[] | select(.body | test("@sdk-review\\s+override:"; "i"))] | last // {}')
            OVERRIDE_ADMIN=$(printf '%s' "$OVERRIDE_INFO" | jq -r '.user.login // "unknown"')
            OVERRIDE_REASON=$(printf '%s' "$OVERRIDE_INFO" | jq -r '.body // ""' \
              | grep -oiP '@sdk-review\s+override:\s*\K.*' \
              | head -1 \
              | sed 's/[[:space:]]*$//')
            if [ -z "$OVERRIDE_REASON" ]; then
              OVERRIDE_REASON="no reason provided"
            fi

            APPROVE_BODY="⚠️ **SDK Review — Admin override.** Approving because @${OVERRIDE_ADMIN} explicitly invoked \`@sdk-review override\`. Reason: _${OVERRIDE_REASON}_. This bypasses normal review findings; the reason above is recorded for audit. CI passing. Branch up to date."
          elif [ "$MODE" = "challenge" ]; then
            APPROVE_BODY="SDK Re-review (challenge response): blocking findings withdrawn or softened after re-evaluating author pushback. CI passing. Branch up to date. Approved."
          else
            PRIOR_REVIEWS=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
              --jq '[.[] | select(.body | contains("SDK_REVIEW_V2"))] | length' 2>/dev/null || echo 1)

            if [ "${PRIOR_REVIEWS:-1}" -gt 1 ]; then
              VERB="Re-review"
              if [ "$MODE" = "auto-fix" ]; then
                OUTCOME="previous findings resolved; no new issues introduced by the latest changes"
              else
                OUTCOME="no new issues introduced by the latest changes"
              fi
            else
              VERB="Review"
              if [ "$MODE" = "auto-fix" ]; then
                OUTCOME="findings resolved"
              else
                OUTCOME="no blocking issues found"
              fi
            fi

            APPROVE_BODY="SDK ${VERB}: ${OUTCOME}. CI passing. Branch up to date. Approved."
          fi

          # Approve
          gh pr review "$PR" --approve --body "$APPROVE_BODY"

          # Labels
          gh label create "sdk-review-approved" --color "0e8a16" --force 2>/dev/null
          gh pr edit "$PR" --add-label "sdk-review-approved"

          # Auto-maintained label only for auto-complete flow
          if [ "$MODE" = "auto-fix" ]; then
            gh label create "sdk-review-auto-maintained" --color "1d76db" --force 2>/dev/null
            gh pr edit "$PR" --add-label "sdk-review-auto-maintained"
          fi

          # Clean up lingering labels
          gh pr edit "$PR" --remove-label "needs-human-review" 2>/dev/null || true
          gh pr edit "$PR" --remove-label "needs-rebase" 2>/dev/null || true

          # Auto-resolve ALL remaining bot inline comment threads.
          # PR is approved → all findings are either fixed or accepted.
          # No reason to leave resolved/stale threads cluttering the
          # Files Changed tab.
          THREADS=$(gh api graphql -f query='
            query($owner:String!,$name:String!,$num:Int!) {
              repository(owner:$owner, name:$name) {
                pullRequest(number:$num) {
                  reviewThreads(first:100) {
                    nodes { id isResolved
                      comments(first:1) {
                        nodes { author{login} }
                      }
                    }
                  }
                }
              }
            }' -F owner=atlanhq -F name=application-sdk -F num="$PR" \
            --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | select(.comments.nodes[0].author.login == "claude[bot]" or .comments.nodes[0].author.login == "github-actions[bot]") | .id' 2>/dev/null || echo "")

          for thread_id in $THREADS; do
            gh api graphql -f query='
              mutation($id:ID!) {
                resolveReviewThread(input:{threadId:$id}) {
                  thread { id isResolved }
                }
              }' -F id="$thread_id" 2>/dev/null || true
          done

          # Final status on the (possibly updated) HEAD SHA
          NEW_SHA=$(gh pr view "$PR" --json headRefOid -q .headRefOid)
          gh api "repos/${REPO}/statuses/${NEW_SHA}" \
            -f state=success -f context=sdk-review \
            -f description="SDK Review: Approved. Ready to merge." 2>/dev/null || true

      # Fix CI (Session C — auto-fix only). Runs when the review
      # verdict is READY_TO_MERGE but CI checks are failing after
      # the branch update (e.g. pre-commit, lint, tests). This
      # avoids the dead end where auto-complete gives up after a
      # clean review just because CI is red.
      - name: Fix CI (Session C — CI remediation)
        id: ci_fix
        if: |
          steps.pr.outputs.mode == 'auto-fix' &&
          steps.verdict.outputs.verdict == 'READY_TO_MERGE' &&
          steps.finalize.outputs.ci_failed == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.LITELLM_API_KEY }}
          show_full_output: true
          prompt: |
            CI checks are failing on PR #${{ steps.pr.outputs.number }} after a
            branch update merge. The review verdict was READY TO MERGE — there
            are no review findings to fix. Your job is to make CI green.

            Branch: ${{ steps.pr.outputs.head_branch }}
            Base:   ${{ steps.pr.outputs.base_branch }}

            IMPORTANT RULES:
            - Follow CLAUDE.md commit conventions (Conventional Commits format)
            - NEVER add Co-Authored-By lines to commits
            - Full git history is already checked out. Do NOT run git fetch.
            - uv, python, ruff, and all dev tools are already installed on PATH. Do NOT attempt to install them.

            Process:

            1. Identify what's failing:
               gh pr checks ${{ steps.pr.outputs.number }} --required --json name,state,description \
                 --jq '.[] | select(.state != "SUCCESS" and .state != "SKIPPED")'

            2. Run pre-commit on all files to catch lint/formatting issues:
               uv run pre-commit run --all-files
               If it fails, review the output, fix the issues, and re-run.

            3. Run unit tests:
               uv run pytest tests/unit/ -x --timeout=120
               If tests fail, read the traceback, fix the root cause.

            4. Run type checking on changed files:
               uv run pyright $(git diff --name-only origin/${{ steps.pr.outputs.base_branch }}...HEAD -- '*.py') 2>/dev/null || true

            5. After all fixes:
               git add <specific changed files>
               git commit -m "fix(ci): resolve CI failures after branch update"
               git push origin ${{ steps.pr.outputs.head_branch }}

            Output: CI_FIXED:<count of files changed> or CI_FIXED:0 if nothing needed fixing.
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(uv run:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git diff:*),Bash(git checkout:*),Bash(git status:*),Bash(gh pr:*),Bash(gh api:*),Bash(cat:*),Bash(jq:*),Bash(python3:*),Bash(python:*),Bash(wc:*),Bash(ls:*),Bash(head:*),Bash(tail:*),Bash(sort:*),Bash(grep:*),Bash(find:*),Bash(echo:*),Bash(tr:*),Bash(cut:*),Bash(uniq:*),Bash(diff:*),Bash(xargs:*),Bash(sed:*),Bash(awk:*),Bash(ruff:*),Bash(pip:*),Bash(mkdir:*),Bash(tee:*),Bash(which:*),Bash(cp:*),Bash(mv:*),Bash(touch:*),Bash(chmod:*)"
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          ANTHROPIC_BASE_URL: https://llmproxy.atlan.dev
          GH_TOKEN: ${{ github.token }}

      # After Session C fixes CI, re-dispatch to re-review and finalize.
      - name: Trigger re-review after CI fix
        if: |
          steps.pr.outputs.mode == 'auto-fix' &&
          steps.verdict.outputs.verdict == 'READY_TO_MERGE' &&
          steps.finalize.outputs.ci_failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CURRENT: ${{ steps.pr.outputs.iteration }}
          MAX: ${{ steps.pr.outputs.max_iter }}
        run: |
          NEXT=$((CURRENT + 1))

          if [ "$NEXT" -gt "$MAX" ]; then
            echo "Max iterations ($MAX) reached during CI fix."
            gh pr comment "$PR_NUMBER" --body \
              "SDK Review: CI fix attempted but max iterations ($MAX) reached. Remaining CI issues need manual attention."
            gh label create "needs-human-review" --color "d93f0b" --force 2>/dev/null
            gh pr edit "$PR_NUMBER" --add-label "needs-human-review"
            exit 0
          fi

          DEFAULT_BRANCH=$(gh api "repos/${REPO}" --jq '.default_branch')
          echo "Dispatching iteration ${NEXT}/${MAX} after CI fix..."

          if gh api "repos/${REPO}/actions/workflows/claude.yml/dispatches" \
               -X POST \
               -f ref="${DEFAULT_BRANCH}" \
               -f "inputs[pr_number]=${PR_NUMBER}" \
               -f "inputs[iteration]=${NEXT}" \
               -f "inputs[max_iter]=${MAX}" \
               -f "inputs[trigger_reason]=CI remediation iteration ${NEXT}/${MAX}"; then
            gh pr comment "$PR_NUMBER" --body \
              "🔁 **CI fix pushed — re-review iteration ${NEXT}/${MAX} dispatched.** [Watch live progress](${{ github.server_url }}/${{ github.repository }}/actions/workflows/claude.yml)"
          else
            gh pr comment "$PR_NUMBER" --body \
              "⚠️ CI fix iteration ${NEXT}/${MAX} could not be dispatched. Re-run manually by commenting \`@sdk-review auto-complete\`."
          fi

      # Mark status = failure for BLOCKED verdict
      - name: Set status (BLOCKED)
        if: steps.verdict.outputs.verdict == 'BLOCKED'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state=failure -f context=sdk-review \
            -f description="SDK Review: BLOCKED — critical security finding." 2>/dev/null || true

          gh pr comment "$PR" --body \
            "🔒 **SDK Review complete — BLOCKED.** Critical security finding detected. See the review comment above for details. This PR cannot be merged until the issue is resolved and \`@sdk-review\` is re-run."

      # Mark status = failure and add label for NEEDS_FIXES in review-only mode
      # (so the PR visibly blocks on merge until author fixes & re-runs)
      - name: Set status (NEEDS_FIXES, review-only)
        if: |
          steps.verdict.outputs.verdict == 'NEEDS_FIXES' &&
          steps.pr.outputs.mode == 'review-only'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state=failure -f context=sdk-review \
            -f description="SDK Review: NEEDS_FIXES — see review comment." 2>/dev/null || true

          gh pr comment "$PR" --body \
            "📋 **SDK Review complete — NEEDS FIXES.** See the review comment above for findings. Address the issues and comment \`@sdk-review\` to re-review, or \`@sdk-review auto-complete\` to auto-fix."

  # ── Reset review status on new commits ──────────────────────
  # When the author pushes new code, reset the sdk-review check
  # to pending so the PR stays blocked until re-reviewed.
  #
  # Distinguishes between:
  # - Author pushes new code → reset review (author's commit)
  # - Branch-keeper merges base → preserve approval (bot's merge commit)
  # - Auto-fix session pushes → preserve (handled by the loop)
  reset-review-status:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize' &&
      (github.event.pull_request.base.ref == 'refactor-v3' ||
       github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if this is a bot/auto commit or author commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          COMMIT_AUTHOR=$(gh api "repos/${REPO}/commits/${HEAD_SHA}" \
            --jq '.author.login // .commit.author.name')
          COMMIT_MSG=$(gh api "repos/${REPO}/commits/${HEAD_SHA}" \
            --jq '.commit.message' | head -1)

          # SECURITY: Do NOT write COMMIT_AUTHOR or COMMIT_MSG to
          # $GITHUB_OUTPUT — the commit author name and subject line
          # can contain multi-line content or `key=value` text that
          # would inject step outputs. Only write the derived is_bot
          # flag, which is a pure bool.
          #
          # Skip reset if:
          # - Commit is from github-actions bot (branch-keeper or auto-fix)
          # - Commit message is a merge from base branch (branch-keeper)
          # - Commit message is an auto-fix iteration
          if [[ "$COMMIT_AUTHOR" == "github-actions"* ]] || \
             [[ "$COMMIT_MSG" == "Merge branch"* ]] || \
             [[ "$COMMIT_MSG" == "fix(review):"* ]]; then
            echo "is_bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_bot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reset sdk-review status + labels + dismiss bot approval (author commits only)
        if: steps.check.outputs.is_bot == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if PR was previously approved (we'll notify only on first reset)
          WAS_APPROVED=$(gh pr view "$PR_NUMBER" --json labels \
            --jq '.labels[].name' | grep -c "sdk-review-approved" || true)

          # Set status to pending — PR is blocked until @sdk-review runs
          gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context=sdk-review \
            -f description="New commits pushed. Comment @sdk-review to unblock." 2>/dev/null || true

          # Remove approved and auto-maintained labels
          gh pr edit "$PR_NUMBER" --remove-label "sdk-review-approved" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --remove-label "sdk-review-auto-maintained" 2>/dev/null || true

          # Dismiss the bot's prior APPROVED review. Removing the label
          # isn't enough — the formal PR review stays green unless
          # explicitly dismissed via the Reviews API. We only dismiss
          # reviews authored by github-actions[bot] — never a human's.
          BOT_REVIEW_IDS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and .state == "APPROVED")] | .[].id' 2>/dev/null || echo "")
          for review_id in $BOT_REVIEW_IDS; do
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews/${review_id}/dismissals" \
              -X PUT \
              -f message="New commits detected — SDK Review approval dismissed. Comment @sdk-review to re-approve." 2>/dev/null || true
          done

          # Only post a comment if the PR was previously approved.
          # This avoids noise on every push to non-approved PRs.
          if [ "$WAS_APPROVED" -gt 0 ]; then
            gh pr comment "$PR_NUMBER" --body \
              "New commits detected. The previous SDK Review approval has been reset because the code changed. Comment \`@sdk-review\` (or \`@sdk-review auto-complete\`) to re-review."
          fi

      - name: Preserve approval for bot commits (branch updates)
        if: steps.check.outputs.is_bot == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Re-set the status to success on the NEW commit SHA so the
          # required check stays green on the updated branch (only if
          # the PR was previously approved).
          HAS_LABEL=$(gh pr view "$PR_NUMBER" --json labels \
            --jq '.labels[].name' | grep -c "sdk-review-approved" || true)

          if [ "$HAS_LABEL" -gt 0 ]; then
            gh api "repos/${REPO}/statuses/${HEAD_SHA}" \
              -f state=success \
              -f context=sdk-review \
              -f description="SDK Review: Approved. Branch updated automatically." 2>/dev/null || true
          fi

  # ── @sdk-review stop handler ────────────────────────────────
  # Cancels an in-progress sdk-review / auto-complete run for this PR.
  #
  # The main sdk-review job uses `concurrency.cancel-in-progress: true`,
  # but that only triggers when a NEW sdk-review is queued. `stop` needs
  # to explicitly cancel runs via the Actions API and also set a label
  # so the in-flight auto-complete loop (if any) won't self-retrigger
  # after its current iteration finishes.
  #
  # Uses a separate concurrency group so it doesn't cancel itself.
  sdk-review-stop:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (contains(github.event.comment.body, '@sdk-review stop') ||
       contains(github.event.comment.body, '@sdk-review cancel')) &&
      github.event.comment.user.login != 'claude[bot]' &&
      github.event.comment.user.login != 'github-actions[bot]' &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      actions: write       # required to cancel other workflow runs
      pull-requests: write
      issues: write
    timeout-minutes: 5
    concurrency:
      group: sdk-review-stop-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Cancel in-progress sdk-review runs for this PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          THIS_RUN: ${{ github.run_id }}
        run: |
          # Acknowledge the stop request immediately
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=eyes 2>/dev/null || true

          # Always set the stop label so any in-flight loop skips its
          # next re-trigger (iteration already running will finish
          # gracefully and honor the label).
          gh label create "sdk-review-stopped" --color "586069" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "sdk-review-stopped" 2>/dev/null || true

          # Find and cancel any in-progress runs of the Claude Code
          # workflow on this PR's head branch.
          HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName)
          RUNS=$(gh run list \
            --workflow="Claude Code" \
            --branch="$HEAD_BRANCH" \
            --status=in_progress \
            --json databaseId \
            --jq '.[].databaseId' 2>/dev/null || echo "")

          CANCELLED=0
          for run_id in $RUNS; do
            if [ "$run_id" != "$THIS_RUN" ]; then
              if gh run cancel "$run_id" 2>/dev/null; then
                CANCELLED=$((CANCELLED + 1))
              fi
            fi
          done

          # Also cancel queued runs so a pending next-iteration
          # trigger doesn't start the loop back up.
          QUEUED=$(gh run list \
            --workflow="Claude Code" \
            --branch="$HEAD_BRANCH" \
            --status=queued \
            --json databaseId \
            --jq '.[].databaseId' 2>/dev/null || echo "")

          for run_id in $QUEUED; do
            if [ "$run_id" != "$THIS_RUN" ]; then
              if gh run cancel "$run_id" 2>/dev/null; then
                CANCELLED=$((CANCELLED + 1))
              fi
            fi
          done

          if [ "$CANCELLED" -gt 0 ]; then
            gh pr comment "$PR_NUMBER" --body \
              "🛑 **Stop acknowledged.** Cancelled ${CANCELLED} in-progress SDK Review run(s). Any fixes already pushed remain in the branch. Comment \`@sdk-review\` to start a fresh review, or \`@sdk-review auto-complete\` to resume the fix loop."
          else
            gh pr comment "$PR_NUMBER" --body \
              "🛑 **Stop acknowledged.** No running SDK Review runs were found, but the \`sdk-review-stopped\` label has been set so any queued iteration will skip. Comment \`@sdk-review\` to start a fresh review."
          fi

