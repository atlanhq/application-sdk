# NOTE: the schedule is HOURLY (cron below). The filename "daily-security-scan.yml"
# is retained deliberately — it is referenced by exact name in
# reconcile_allowlist.py (`gh run list --workflow daily-security-scan.yml`) and in
# .mothership/vuln-triage/tools.md; renaming would break those lookups and the
# prior-run history they page through. The display name reflects the real cadence.
name: Hourly Security Scan — app-runtime-base + SDK Python Deps

on:
  schedule:
    - cron: '17 * * * *' # Hourly at minute 17 (off-peak slot for GitHub runners)
  workflow_dispatch:

permissions:
  contents: read
  actions: write # dispatch the vuln-triage rover for newly-created tickets

env:
  TARGET_IMAGE: registry.atlan.com/public/app-runtime-base:3

jobs:
  scan-and-ticket:
    name: Scan SDK for vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Pull target image
        run: docker pull "$TARGET_IMAGE"

      # Install latest Trivy CLI via the official setup-trivy action. The pinned
      # aquasecurity/trivy-action v0.36.0 ships an older Trivy that emits
      #   WARN [applier] Some OS packages were skipped due to mismatched PURL
      #   namespace pkg_count=159 detected_os="chainguard"
      # and silently reports 0 OS findings on Chainguard/Wolfi images.
      - name: Install Trivy CLI
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          # Pin to a specific version so scan results don't drift between
          # runs as Trivy's vuln DB schema and detection logic evolve. Bump
          # this deliberately when a known scanner fix is needed.
          version: v0.70.0
          cache: true

      # ── Trivy image scan ──────────────────────────────────────────────────

      - name: Trivy image scan (JSON)
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        run: |
          # NOTE: intentionally NO --ignore-unfixed. This is a report-only /
          # ticket-filing scan, so we want visibility into no-fix ("won't fix",
          # disputed, awaiting-patch) CVEs too — they still need tracking and an
          # operational mitigation. Keep --ignore-unfixed only on build/CI
          # gating steps, where un-actionable findings would just wedge the build.
          trivy image \
            --scanners vuln \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --format json \
            --output trivy-image-results.json \
            "$TARGET_IMAGE"

      # ── Install SDK dependencies so vendored native lockfiles materialize ──
      #
      # Rust/Go/native crates bundled inside Python wheels only exist on disk
      # once the wheel is INSTALLED. e.g. temporalio ships a compiled bridge
      # whose temporalio/bridge/Cargo.lock pins pyo3 — a transitive Rust CVE
      # (GHSA-36hh-v3qg-5jq4). The source tree names `temporalio` as a Python
      # dep in uv.lock but never contains that Cargo.lock, so a source-only
      # `trivy fs` cannot see it — which is why pyo3 first surfaced on a
      # downstream connector image, not in this SDK scan. Syncing into .venv
      # lays those vendored manifests on disk so the filesystem scan below
      # reaches them. Verified locally with Trivy v0.70.0: `trivy fs .` reports
      # pyo3/GHSA-36hh-v3qg-5jq4 from .venv/.../temporalio/bridge/Cargo.lock.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Sync SDK dependencies into .venv
        run: uv sync --all-extras --all-groups

      # ── Trivy filesystem scan (source lockfiles + installed .venv wheels) ──

      - name: Trivy filesystem scan (lockfiles + installed wheel artifacts)
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        run: |
          # See note on the image scan above: report-only pass, so no
          # --ignore-unfixed — no-fix CVEs are surfaced and ticketed.
          #
          # Scans the repo root, which now includes the synced .venv — so
          # native lockfiles vendored inside installed wheels (Rust Cargo.lock,
          # etc.) are covered, not just the Python uv.lock. This is what lets
          # the SDK scan catch transitive Rust CVEs like pyo3
          # (GHSA-36hh-v3qg-5jq4) at the source instead of only in downstream
          # connector images.
          trivy fs \
            --scanners vuln \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --format json \
            --output trivy-fs-results.json \
            .

      # ── Parse results ─────────────────────────────────────────────────────

      - name: Upload raw scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-scan-raw-results
          path: |
            trivy-image-results.json
            trivy-fs-results.json
          if-no-files-found: warn
          retention-days: 14

      # Counting + summary logic lives in parse_scan_results.py (tested) rather
      # than inlined here — see docs/standards/ci.md. It emits total_actionable
      # for the Linear step's gate and writes the workflow summary directly.
      - name: Parse scan results + publish summary
        id: parse
        if: always()
        env:
          TARGET_IMAGE: ${{ env.TARGET_IMAGE }}
        run: python3 .github/scripts/parse_scan_results.py

      # ── Create Linear issues (one per severity, deduped against open
      #    issues carrying the "vulnerabilities" label so we don't refile
      #    the same vulns every day). New issues land in the team's
      #    "Backlog" state.
      - name: Create Linear issue (deduped)
        id: linear
        if: steps.parse.outputs.total_actionable != '0'
        env:
          LINEAR_API_KEY:      ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID:      ${{ vars.LINEAR_SECURITY_SCAN_TEAM_ID }}
          LINEAR_PROJECT_ID:   ${{ vars.LINEAR_SECURITY_SCAN_PROJECT_ID }}
          LINEAR_MILESTONE_ID: ${{ vars.LINEAR_SECURITY_SCAN_MILESTONE_ID }}
          LINEAR_ASSIGNEE_ID:  ${{ vars.LINEAR_SECURITY_SCAN_ASSIGNEE_ID }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          export SCAN_DATE=$(date -u +%Y-%m-%d)
          python3 .github/scripts/security_scan_create_linear.py

      # ── Dispatch the vuln-triage rover once per newly-created ticket (one
      #    per severity). Only fires when a *new* (non-deduped) issue was filed
      #    this run, so the heavy VPN/mothership job runs only when there's
      #    something to triage. The loop lives in dispatch_vuln_triage.py
      #    (tested) rather than inlined here — see docs/standards/ci.md.
      - name: Dispatch vuln-triage rover (one per new ticket)
        if: steps.linear.outputs.new_issues != '' && steps.linear.outputs.new_issues != '[]'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_ISSUES: ${{ steps.linear.outputs.new_issues }}
          GH_REF: ${{ github.ref_name }}
        run: python3 .github/scripts/dispatch_vuln_triage.py

  # NOTE: reconciliation (allowlist-entry removal + Linear ticket close/update)
  # is intentionally NOT a job here. It runs on `release: released` (not
  # `published` — that fires for `-rc` prereleases too) in
  # vuln-reconcile-on-release.yml — an allowlist entry must persist until the
  # fix is *released*, because downstream connector build gates check out
  # .security/base-allowlist.json from SDK `main` while their images still carry
  # the CVE from the last released SDK. Removing an entry the moment this hourly
  # scan of `main` goes clean (fix merged, not yet released) would strip their
  # coverage and break check_allowlist.py. See vuln-reconcile-on-release.yml.
