name: Publish Contract Toolkit

# Phase B of the contract-toolkit release. Fires when a release PR opened by
# the Release Contract Toolkit workflow (contract-toolkit-release.yml) is
# merged into main with the `release:contract-toolkit` label. Builds the PKL
# package from merged main, publishes it under contracts/ on the gh-pages
# branch, and creates the contract-toolkit-v<version> annotated tag.
# No GitHub Release is created — that would interleave contract-toolkit
# versions with SDK v* releases on the repo releases page.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pages: write
  pull-requests: read

env:
  PKG_NAME: app-contract-toolkit
  PKL_VERSION: "0.27.2"
  PUBLISH_DIR: contracts

jobs:
  publish:
    name: Publish contract toolkit package
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release:contract-toolkit')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Install PKL
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/pkl "https://github.com/apple/pkl/releases/download/${PKL_VERSION}/pkl-linux-amd64"
          chmod +x /tmp/pkl
          sudo mv /tmp/pkl /usr/local/bin/pkl

      - name: Read release version
        id: meta
        run: |
          set -euo pipefail
          file="contract-toolkit/src/PklProject"
          version="$(grep -oP 'version\s*=\s*"\K[^"]+' "$file")"
          if [ -z "$version" ]; then
            echo "::error::could not parse version from ${file}"
            exit 1
          fi
          tag="contract-toolkit-v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "merge_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Publishing contract toolkit ${tag} from $(git rev-parse HEAD)"

      - name: Build package
        run: pkl project package contract-toolkit/src/ --output-path .out/ --skip-publish-check

      - name: Stash built artifacts
        run: cp -R .out /tmp/contract-toolkit-pkl-out

      - name: Publish package to GitHub Pages branch
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git checkout origin/gh-pages -- . 2>/dev/null || true

          mkdir -p "${PUBLISH_DIR}"
          cp "/tmp/contract-toolkit-pkl-out/${PKG_NAME}@${version}" "${PUBLISH_DIR}/"
          cp "/tmp/contract-toolkit-pkl-out/${PKG_NAME}@${version}.zip" "${PUBLISH_DIR}/"
          cp "/tmp/contract-toolkit-pkl-out/${PKG_NAME}@${version}.zip.sha256" "${PUBLISH_DIR}/"
          if [ -f "/tmp/contract-toolkit-pkl-out/${PKG_NAME}@${version}.sha256" ]; then
            cp "/tmp/contract-toolkit-pkl-out/${PKG_NAME}@${version}.sha256" "${PUBLISH_DIR}/"
          fi
          touch .nojekyll

          git add -A "${PUBLISH_DIR}" .nojekyll
          git diff --cached --quiet || git commit -m "publish ${PKG_NAME}@${version}"
          git push origin gh-pages

      - name: Trigger GitHub Pages build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pages_sha="$(git rev-parse HEAD)"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"

          for attempt in $(seq 1 60); do
            status="$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest" --jq '.status')"
            commit="$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest" --jq '.commit')"

            if [ "$commit" != "$pages_sha" ]; then
              sleep 5
              continue
            fi

            case "$status" in
              built)
                exit 0
                ;;
              errored)
                message="$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest" --jq '.error.message // "unknown error"')"
                echo "::error::GitHub Pages build failed: ${message}"
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "::error::Timed out waiting for GitHub Pages build for ${pages_sha}"
          exit 1

      - name: Create source tag
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          merge_sha="${{ steps.meta.outputs.merge_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists on origin; skipping tag push"
            exit 0
          fi

          git tag -a "$tag" "$merge_sha" -m "Release contract toolkit $tag"
          git push origin "$tag"

      # No GitHub Release is created: contract-toolkit releases would
      # interleave with SDK v* releases on the repo's releases page, which
      # is confusing. The annotated tag, gh-pages publish, and
      # contract-toolkit/CHANGELOG.md are the authoritative record.
