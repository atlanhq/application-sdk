# Reusable workflow: create an annotated git tag and GitHub Release from the current
# version in pyproject.toml, using the matching CHANGELOG.md section as release notes.
#
# After the GitHub Release is published, build-and-publish.yaml in the caller's repo
# fires on the 'release: published' event and pushes the GHCR version-tag ladder.
#
# Usage in each app repo (.github/workflows/tag-and-publish.yaml):
#
#   on:
#     pull_request:
#       types: [closed]
#       branches: [main]
#   jobs:
#     release:
#       if: |
#         github.event.pull_request.merged == true &&
#         contains(github.event.pull_request.labels.*.name, 'release')
#       permissions:
#         contents: write
#       uses: atlanhq/application-sdk/.github/workflows/tag-and-release.yaml@main
#       secrets: inherit
#
name: Tag and Release

on:
  workflow_call:
    inputs:
      sdk_scripts_ref:
        description: "Ref of atlanhq/application-sdk to pull helper scripts from (default: main)"
        required: false
        type: string
        default: "main"
    secrets:
      ORG_PAT_GITHUB:
        required: true
        description: "Org PAT for git tag push and gh release create"
      FLEET_APP_ID:
        required: false
        description: "atlan-app-fleet App ID (org secret). Not passed explicitly by any current caller — auto-available via 'secrets: inherit'. Declared here so the contract is self-documenting."
      FLEET_APP_PRIVATE_KEY:
        required: false
        description: "atlan-app-fleet App private key (org secret). Same availability as FLEET_APP_ID above."

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Mint fleet App token
        # Confirmed empirically (atlanhq/atlan-hello-world-app#117) that a
        # GitHub Release created with an App token re-triggers on:release
        # workflows in the caller's repo, the same way a real PAT identity
        # does and the default GITHUB_TOKEN does not.
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}

      - name: Checkout SDK helper scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: atlanhq/application-sdk
          ref: ${{ inputs.sdk_scripts_ref }}
          path: .sdk-scripts
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Get version
        id: get_version
        run: |
          VERSION=$(uvx --from=toml-cli toml get --toml-path=pyproject.toml project.version)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        run: python3 .sdk-scripts/.github/scripts/extract_release_notes.py "${{ steps.get_version.outputs.version }}" > .github/release_notes.md

      - name: Create git tag
        run: |
          set -euo pipefail
          git config --global user.name 'atlan-ci'
          git config --global user.email 'it@atlan.com'
          TAG="v${{ steps.get_version.outputs.version }}"
          TARGET="$(git rev-parse HEAD)"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch --no-tags origin "refs/tags/${TAG}:refs/tags/${TAG}"
            EXISTING="$(git rev-parse "${TAG}^{}")"
            if [ "${EXISTING}" = "${TARGET}" ]; then
              echo "Tag ${TAG} already exists on ${TARGET}; skipping."
            else
              echo "::error::Tag ${TAG} already exists on ${EXISTING}, expected ${TARGET}. Refusing to rewrite a published tag."
              exit 1
            fi
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Delete existing GitHub Release (if any)
        run: gh release delete "v${{ steps.get_version.outputs.version }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: "v${{ steps.get_version.outputs.version }}"
          name: "v${{ steps.get_version.outputs.version }}"
          body_path: .github/release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
          token: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}
