name: Sync requirements.txt for Dependabot

on:
  push:
    branches:
      - 'dependabot/**'
      - 'renovate/**'
    paths:
      - 'uv.lock'

permissions:
  contents: write

jobs:
  sync-requirements:
    name: Sync requirements.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.20"

      - name: Regenerate requirements.txt
        run: uv export --no-hashes --frozen > requirements.txt

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet requirements.txt; then
            git add requirements.txt
            git commit -m "chore: sync requirements.txt with updated uv.lock"
            git push
          fi
