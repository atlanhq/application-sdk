name: Sync requirements.txt for Dependabot

on:
  push:
    branches:
      - 'dependabot/**'
      - 'renovate/**'
    paths:
      - 'uv.lock'

permissions:
  contents: write

jobs:
  sync-requirements:
    name: Sync requirements.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.ORG_PAT_GITHUB }}
          ref: ${{ github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.28"

      - name: Regenerate requirements.txt
        run: uv export --no-hashes --frozen > requirements.txt

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet requirements.txt; then
            git add requirements.txt
            git commit -m "chore: sync requirements.txt with updated uv.lock"
            git push
          fi
