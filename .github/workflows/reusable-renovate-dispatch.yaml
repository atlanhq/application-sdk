name: Renovate Fan-out Dispatch (Reusable)

# Triggers Renovate runs on all consumer app repos immediately after an SDK or
# contract-toolkit release. Consumer repos pick up the new version within
# minutes rather than waiting for the next scheduled Renovate run.
#
# Usage — add a fan-out job to tag-and-publish.yaml (after the publish step):
#
#   fan-out:
#     name: Fan out Renovate to consumers
#     needs: [publish]          # run after PyPI/gh-pages publish completes
#     uses: atlanhq/application-sdk/.github/workflows/reusable-renovate-dispatch.yaml@main
#     secrets: inherit
#
# Usage — same pattern in contract-toolkit-publish.yml (after Pages publish):
#
#   fan-out:
#     name: Fan out Renovate to consumers
#     needs: [publish]
#     uses: atlanhq/application-sdk/.github/workflows/reusable-renovate-dispatch.yaml@main
#     secrets: inherit
#
# No secrets to configure: this mints its own atlan-app-fleet token internally
# from the FLEET_APP_ID / FLEET_APP_PRIVATE_KEY org secrets (visible to every
# atlanhq repo), so `secrets: inherit` is all any caller needs.
#
# Each consumer repo must have a .github/workflows/renovate.yaml that accepts
# workflow_dispatch (see renovate-config/README.md for the template). If a
# consumer has not yet adopted the preset the dispatch is skipped with a warning.

on:
  workflow_call:
    inputs:
      workflow-file:
        description: Workflow filename to trigger in each consumer repo.
        required: false
        default: "renovate.yaml"
        type: string
      ref:
        description: Branch/ref to run the workflow on in consumer repos.
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  discover:
    name: Discover consumer repos
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.discover.outputs.repos }}
    steps:
      - name: Mint fleet App token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq

      - name: Checkout application-sdk scripts
        # Explicit repository/token: without these, actions/checkout defaults to
        # the *caller's* repo (github.repository, in a workflow_call reusable),
        # not application-sdk. Today's only documented callers ARE
        # application-sdk (tag-and-publish.yaml / contract-toolkit-publish.yml),
        # so that default happens to work -- but this is a published reusable,
        # so an external caller would otherwise silently check out the wrong
        # repo and fail the discover step with a confusing "file not found".
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: atlanhq/application-sdk
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Discover atlan-application-sdk consumers
        id: discover
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 .github/scripts/discover_org_consumers.py \
            --owner atlanhq \
            --query "atlan-application-sdk filename:pyproject.toml"

  dispatch:
    name: Trigger ${{ matrix.repo }}
    needs: [discover]
    if: needs.discover.outputs.repos != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.repos) }}
      fail-fast: false   # attempt all consumers even if some fail
      max-parallel: 10   # avoid GitHub API rate limits
    steps:
      - name: Mint fleet App token
        id: app-token
        # Not scoped to matrix.repo: that's "owner/repo" but `repositories:`
        # takes bare names, and this job dispatches to an arbitrary/dynamic
        # set of consumer repos anyway (the whole point of a fleet fan-out).
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq

      - name: Trigger workflow_dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if gh workflow run "${{ inputs.workflow-file }}" \
              --repo "${{ matrix.repo }}" \
              --ref "${{ inputs.ref }}"; then
            echo "Triggered Renovate in ${{ matrix.repo }}"
          else
            echo "::warning::Could not trigger ${{ inputs.workflow-file }} in ${{ matrix.repo }}" \
              "(workflow may not exist yet or token lacks permissions)"
          fi
