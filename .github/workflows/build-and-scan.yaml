# Build & Scan — reusable security scanning template.
#
# Builds a Docker image and runs Trivy + Snyk in parallel.
# Checks results against .security/allowlist.json in the caller repo.
# Fails if any CRITICAL/HIGH CVE is not in the allowlist.
#
# Used in two places:
#   1. Directly by app repos on PR (blocks merge on new vulnerabilities)
#   2. By build-and-publish-app.yaml on merge (reconfirms before publish)
#
# Usage (PR check):
#   jobs:
#     scan:
#       uses: atlanhq/application-sdk/.github/workflows/build-and-scan.yaml@main
#       secrets: inherit
#
name: Build & Scan

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or SHA to checkout and build (default: caller's ref)"
        required: false
        type: string
      image:
        description: "Pre-built image to scan (skip build if provided)"
        required: false
        type: string
      snyk_org:
        description: "Snyk organization slug"
        required: false
        type: string
        default: "partner-images"
      snyk_monitor:
        description: "Push scan results to Snyk UI dashboard via snyk container monitor"
        required: false
        type: boolean
        default: false
      fail_on_findings:
        description: "Exit 1 if new non-allowlisted vulnerabilities found (true for PR gate, false for merge path)"
        required: false
        type: boolean
        default: true
    secrets:
      ORG_PAT_GITHUB:
        required: true

permissions:
  contents: read
  packages: read

jobs:
  # ── Build Docker image (single-arch, no push) ──────────────────────────────
  build:
    name: Build Image
    if: inputs.image == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      scan_image: ${{ steps.meta.outputs.scan_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Read Dockerfile path
        id: meta
        run: |
          if [ -f atlan.yaml ]; then
            DOCKERFILE=$(python3 -c "import yaml; d=yaml.safe_load(open('atlan.yaml')); print(d.get('dockerfile', './Dockerfile'))")
          else
            DOCKERFILE="./Dockerfile"
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "scan_image=scan-target:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ steps.meta.outputs.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.scan_image }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha,scope=scan
          cache-to: type=gha,mode=max,scope=scan
          provenance: false
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── Trivy scan (parallel with Snyk) ─────────────────────────────────────────
  trivy-scan:
    name: Trivy Scan
    needs: build
    if: always() && (needs.build.result == 'success' || inputs.image != '')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download image artifact
        if: inputs.image == ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image
          path: /tmp

      - name: Load local image
        if: inputs.image == ''
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        if: inputs.image != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Install Trivy
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          TRIVY_VERSION=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/aquasecurity/trivy/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | sed 's/^v//')
          curl -sL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy

      - name: Run Trivy scan
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        run: |
          IMAGE="${{ inputs.image || needs.build.outputs.scan_image }}"
          trivy image \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --format json \
            --quiet \
            --output /tmp/trivy_results.json \
            "$IMAGE"

      - name: Upload Trivy results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-results
          path: /tmp/trivy_results.json
          retention-days: 1

  # ── Snyk scan (parallel with Trivy) ─────────────────────────────────────────
  snyk-scan:
    name: Snyk Scan
    needs: build
    if: always() && (needs.build.result == 'success' || inputs.image != '')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download image artifact
        if: inputs.image == ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image
          path: /tmp

      - name: Load local image
        if: inputs.image == ''
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        if: inputs.image != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@b98d498629f1c368650224d6d212bf7dfa89e4bf # 0.4.0

      - name: Run Snyk container scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.us.snyk.io
        run: |
          IMAGE="${{ inputs.image || needs.build.outputs.scan_image }}"
          snyk container test "$IMAGE" \
            --severity-threshold=high \
            --org=${{ inputs.snyk_org }} \
            --json-file-output=/tmp/snyk_results.json || true

      - name: Monitor with Snyk (push results to Snyk UI)
        if: inputs.snyk_monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.us.snyk.io
        run: |
          IMAGE="${{ inputs.image || needs.build.outputs.scan_image }}"
          snyk container monitor "$IMAGE" \
            --severity-threshold=high \
            --org=${{ inputs.snyk_org }}

      - name: Upload Snyk results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: snyk-results
          path: /tmp/snyk_results.json
          retention-days: 1

  # ── Security Gate — merge results, check allowlist ──────────────────────────
  security-gate:
    name: Security Gate
    needs: [trivy-scan, snyk-scan]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout base allowlist from SDK
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: atlanhq/application-sdk
          ref: main
          sparse-checkout: |
            .security
            .github/scripts
          path: _sdk
          token: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Download Trivy results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: trivy-results
          path: /tmp

      - name: Download Snyk results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: snyk-results
          path: /tmp

      - name: Check against allowlist
        env:
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
        run: python3 _sdk/.github/scripts/check_allowlist.py --trivy-results /tmp/trivy_results.json --write-comment

      - name: Report Snyk findings (informational)
        if: always()
        run: |
          if [ -f /tmp/snyk_results.json ]; then
            python3 - <<'PYEOF'
          import json, sys
          try:
              with open("/tmp/snyk_results.json") as f:
                  snyk = json.load(f)
              if snyk.get("error"):
                  print(f"Snyk error: {snyk['error']}")
              else:
                  vulns = snyk.get("vulnerabilities", [])
                  critical_high = [v for v in vulns if v.get("severity", "").upper() in {"CRITICAL", "HIGH"}]
                  print(f"Snyk (informational): {len(critical_high)} CRITICAL/HIGH findings")
                  for v in critical_high[:20]:
                      print(f"  {v.get('severity','?'):8s} {v.get('id','')} {v.get('packageName','')}")
          except Exception as e:
              print(f"Warning: Snyk results unavailable: {e}")
          PYEOF
          else
            echo "No Snyk results available"
          fi

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/scan_comment.md', 'utf8');
            } catch {
              return;
            }
            if (!body || !body.trim()) return;
            const time = new Date().toUTCString();
            body += `\n\n<sub>Run: ${context.runId} | ${time}</sub>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
