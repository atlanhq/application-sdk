# Build & Scan — reusable security scanning template.
#
# Builds a Docker image and runs Trivy.
# Checks results against .security/allowlist.json in the caller repo.
# Fails if any CRITICAL/HIGH CVE is not in the allowlist.
#
# Used in two places:
#   1. Directly by app repos on PR (blocks merge on new vulnerabilities)
#   2. By build-and-publish-app.yaml on merge (reconfirms before publish)
#
# Usage (PR check):
#   jobs:
#     scan:
#       uses: atlanhq/application-sdk/.github/workflows/build-and-scan.yaml@main
#       secrets: inherit
#
name: Build & Scan

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or SHA to checkout and build (default: caller's ref)"
        required: false
        type: string
      image:
        description: "Pre-built image to scan (skip build if provided)"
        required: false
        type: string
      fail_on_findings:
        description: "Exit 1 if new non-allowlisted vulnerabilities found (true for PR gate, false for merge path)"
        required: false
        type: boolean
        default: true
      lfs:
        description: "Check out git-LFS objects before building the image (default false). Set true for apps that vendor LFS-tracked assets (e.g. large parser jars) into the Docker build context — without it the build copies the LFS pointer, not the real file. Mirrors the same input on build-and-publish-app.yaml; only applied to the image-build checkout."
        required: false
        type: boolean
        default: false
    secrets:
      ORG_PAT_GITHUB:
        required: true
        description: "Org PAT for GHCR auth, the git_token BuildKit secret, and Install Trivy's release lookup -- the build/trivy-scan jobs already need it for GHCR (App tokens only have repo-level Packages permission; these packages are org-level), so everything else in those jobs uses it uniformly too rather than minting a redundant App token."
      FLEET_APP_ID:
        required: false
        description: "atlan-app-fleet App ID (org secret), used only by security-gate's cross-repo SDK checkout (that job never touches GHCR). Not passed explicitly by any current caller — auto-available via 'secrets: inherit'. Declared here so the contract is self-documenting."
      FLEET_APP_PRIVATE_KEY:
        required: false
        description: "atlan-app-fleet App private key (org secret). Same availability as FLEET_APP_ID above."

permissions:
  contents: read
  packages: read
  # Needed for the Security Gate's "Comment on PR" step to post the gate
  # result summary using GITHUB_TOKEN. Adds capability only — no other
  # behaviour changes.
  pull-requests: write

jobs:
  # ── Build Docker image (single-arch, no push) ──────────────────────────────
  build:
    name: Build Image
    if: inputs.image == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      scan_image: ${{ steps.meta.outputs.scan_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          lfs: ${{ inputs.lfs }}

      - name: Read Dockerfile path
        id: meta
        run: |
          if [ -f atlan.yaml ]; then
            DOCKERFILE=$(python3 -c "import yaml; d=yaml.safe_load(open('atlan.yaml')); print(d.get('dockerfile', './Dockerfile'))")
          else
            DOCKERFILE="./Dockerfile"
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "scan_image=scan-target:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ steps.meta.outputs.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.scan_image }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha,scope=scan
          cache-to: type=gha,mode=max,scope=scan
          provenance: false
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}
          # Forward the org PAT as a BuildKit secret too, so Dockerfiles that clone a
          # private git dependency via `--mount=type=secret,id=git_token` (e.g. apps
          # pulling atlan-query-redaction) can authenticate during the scan build.
          # Ignored by Dockerfiles that don't mount it, so it's a no-op for every other
          # app. Mirrors the token the deploy/publish workflow already provides. This
          # job already logs into GHCR with the PAT above, so there's no benefit to
          # minting a separate App token just for this -- the PAT is already in play.
          secrets: |
            git_token=${{ secrets.ORG_PAT_GITHUB }}

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 7

  # ── Trivy scan ──────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Scan
    needs: build
    if: always() && (needs.build.result == 'success' || inputs.image != '')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download image artifact
        if: inputs.image == ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docker-image
          path: /tmp

      - name: Load local image
        if: inputs.image == ''
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        if: inputs.image != ''
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Install Trivy
        # Install via the official setup-trivy action with a PINNED version —
        # the same recipe already used by scheduled-trivy-scan.yml and the
        # sdk-trivy-scan composite (same action SHA, same v0.70.0 pin). This
        # replaces a hand-rolled install that resolved the version from
        # api.github.com/.../trivy/releases/latest at scan time: when that call
        # returned anything but the expected JSON (a transient GitHub API 5xx,
        # a rate limit, an outage), the version came back empty, the download
        # URL degraded to .../download/v/trivy__Linux-64bit.tar.gz, curl saved
        # the error page, and `tar` failed with "gzip: stdin: not in gzip
        # format". Because the security gate `needs` this job and publish
        # `needs` the gate, a momentary GitHub blip silently failed the
        # marketplace publish for every app on the fleet — no vulnerability
        # involved (this job also runs with fail_on_findings=false).
        #
        # Note this is the install-only setup-trivy action, NOT the all-in-one
        # aquasecurity/trivy-action (#1130): the latter's pinned release bundles
        # an older Trivy that under-reports on Chainguard/Wolfi base images.
        #
        # The version is pinned deliberately (scan results drift with Trivy's
        # vuln-DB schema) and kept in lockstep with the fleet's other scans;
        # the aquasecurity/trivy packageRule in renovate-config/default.json
        # disables auto-bumps so a change here is always a conscious decision.
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.70.0
          cache: true

      - name: Run Trivy scan
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        run: |
          IMAGE="${{ inputs.image || needs.build.outputs.scan_image }}"
          trivy image \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --format json \
            --quiet \
            --output /tmp/trivy_results.json \
            "$IMAGE"

      - name: Upload Trivy results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-results
          path: /tmp/trivy_results.json
          retention-days: 7

  # ── Security Gate — check Trivy results against allowlist ───────────────────
  security-gate:
    name: Security Gate
    needs: [trivy-scan]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mint fleet App token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: application-sdk

      - name: Checkout base allowlist from SDK
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: atlanhq/application-sdk
          ref: main
          sparse-checkout: |
            .security
            .github/scripts
          path: _sdk
          token: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}

      - name: Download Trivy results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: trivy-results
          path: /tmp

      - name: Check against allowlist
        env:
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
        run: python3 _sdk/.github/scripts/check_allowlist.py --trivy-results /tmp/trivy_results.json --write-comment

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          # Same-repo PR comment — use the workflow's built-in token instead
          # of the fine-grained PAT (which has to be manually granted to each
          # repo and 404s on any repo not on its allowlist).
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/scan_comment.md', 'utf8');
            } catch {
              return;
            }
            if (!body || !body.trim()) return;
            const time = new Date().toUTCString();
            body += `\n\n<sub>Run: ${context.runId} | ${time}</sub>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
