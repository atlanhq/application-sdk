# Build & Scan — reusable security scanning template.
#
# Builds a Docker image and runs Trivy + Snyk in parallel.
# Checks results against .security/allowlist.json in the caller repo.
# Fails if any CRITICAL/HIGH CVE is not in the allowlist.
#
# Used in two places:
#   1. Directly by app repos on PR (blocks merge on new vulnerabilities)
#   2. By build-and-publish-app.yaml on merge (reconfirms before publish)
#
# Usage (PR check):
#   jobs:
#     scan:
#       uses: atlanhq/application-sdk/.github/workflows/build-and-scan.yaml@main
#       secrets: inherit
#
name: Build & Scan

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or SHA to checkout and build (default: caller's ref)"
        required: false
        type: string
      image:
        description: "Pre-built image to scan (skip build if provided)"
        required: false
        type: string
      snyk_org:
        description: "Snyk organization slug"
        required: false
        type: string
        default: "partner-images"
      snyk_monitor:
        description: "Push scan results to Snyk UI dashboard via snyk container monitor"
        required: false
        type: boolean
        default: false
      fail_on_findings:
        description: "Exit 1 if new non-allowlisted vulnerabilities found (true for PR gate, false for merge path)"
        required: false
        type: boolean
        default: true
    secrets:
      ORG_PAT_GITHUB:
        required: true

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  # ── Build Docker image (single-arch, no push) ──────────────────────────────
  build:
    name: Build Image
    if: inputs.image == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      scan_image: ${{ steps.meta.outputs.scan_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Read Dockerfile path
        id: meta
        run: |
          if [ -f atlan.yaml ]; then
            DOCKERFILE=$(python3 -c "import yaml; d=yaml.safe_load(open('atlan.yaml')); print(d.get('dockerfile', './Dockerfile'))")
          else
            DOCKERFILE="./Dockerfile"
          fi
          SHA=$(git rev-parse --short HEAD)
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"
          echo "scan_image=scan-target:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.meta.outputs.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.scan_image }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha,scope=scan
          cache-to: type=gha,mode=max,scope=scan
          provenance: false
          build-args: |
            ACCESS_TOKEN_USR=${{ github.actor }}
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── Trivy scan (parallel with Snyk) ─────────────────────────────────────────
  trivy-scan:
    name: Trivy Scan
    needs: build
    if: always() && (needs.build.result == 'success' || inputs.image != '')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download image artifact
        if: inputs.image == ''
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load local image
        if: inputs.image == ''
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        if: inputs.image != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Install Trivy
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          TRIVY_VERSION=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/aquasecurity/trivy/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | sed 's/^v//')
          curl -sL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy

      - name: Run Trivy scan
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        run: |
          IMAGE="${{ inputs.image || needs.build.outputs.scan_image }}"
          trivy image \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --format json \
            --quiet \
            --output /tmp/trivy_results.json \
            "$IMAGE"

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: /tmp/trivy_results.json
          retention-days: 1

  # ── Snyk scan (parallel with Trivy) ─────────────────────────────────────────
  snyk-scan:
    name: Snyk Scan
    needs: build
    if: always() && (needs.build.result == 'success' || inputs.image != '')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download image artifact
        if: inputs.image == ''
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load local image
        if: inputs.image == ''
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        if: inputs.image != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk container scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.us.snyk.io
        run: |
          IMAGE="${{ inputs.image || needs.build.outputs.scan_image }}"
          snyk container test "$IMAGE" \
            --severity-threshold=high \
            --org=${{ inputs.snyk_org }} \
            --json-file-output=/tmp/snyk_results.json || true

      - name: Monitor with Snyk (push results to Snyk UI)
        if: inputs.snyk_monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_API: https://api.us.snyk.io
        run: |
          IMAGE="${{ inputs.image || needs.build.outputs.scan_image }}"
          snyk container monitor "$IMAGE" \
            --severity-threshold=high \
            --org=${{ inputs.snyk_org }}

      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: /tmp/snyk_results.json
          retention-days: 1

  # ── Security Gate — merge results, check allowlist ──────────────────────────
  security-gate:
    name: Security Gate
    needs: [trivy-scan, snyk-scan]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for allowlist)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Checkout base allowlist from SDK
        uses: actions/checkout@v4
        with:
          repository: atlanhq/application-sdk
          ref: ${{ github.workflow_sha || 'main' }}
          sparse-checkout: .security
          path: _sdk
          token: ${{ secrets.ORG_PAT_GITHUB || github.token }}

      - name: Download Trivy results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: trivy-results
          path: /tmp

      - name: Download Snyk results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: snyk-results
          path: /tmp

      - name: Check against allowlist
        env:
          FAIL_ON_FINDINGS: ${{ inputs.fail_on_findings }}
        run: |
          python3 - <<'PYEOF'
          import json, sys, os
          from datetime import datetime

          # Load base allowlist (from SDK) — base entries always win on conflict
          base_allowlist = {}
          base_path = "_sdk/.security/base-allowlist.json"
          try:
              with open(base_path) as f:
                  base_raw = json.load(f)
              base_allowlist = {k: v for k, v in base_raw.items() if not k.startswith("_")}
              print(f"Base allowlist: {len(base_allowlist)} entries")
          except FileNotFoundError:
              print(f"Warning: {base_path} not found — no base allowlist")
          except json.JSONDecodeError as e:
              print(f"Error: base allowlist has invalid JSON: {e}")
              sys.exit(1)

          # Load repo allowlist
          repo_allowlist = {}
          repo_path = ".security/allowlist.json"
          try:
              if os.path.exists(repo_path):
                  with open(repo_path) as f:
                      repo_raw = json.load(f)
                  repo_allowlist = {k: v for k, v in repo_raw.items() if not k.startswith("_")}
                  print(f"Repo allowlist: {len(repo_allowlist)} entries")
              else:
                  print("No .security/allowlist.json in repo")
          except json.JSONDecodeError as e:
              print(f"Error: repo allowlist has invalid JSON: {e}")
              sys.exit(1)

          # Merge: repo first, then base overwrites — base always wins on conflict
          allowlist = {}
          allowlist.update(repo_allowlist)
          conflicts = [k for k in base_allowlist if k in repo_allowlist]
          if conflicts:
              for c in conflicts:
                  print(f"Warning: conflict on {c} — base allowlist wins (repo entry ignored)")
          allowlist.update(base_allowlist)

          if not allowlist:
              print("No allowlists found — all vulnerabilities will be reported but not blocked.")
              allowlist = None

          print(f"Total allowlist: {len(allowlist) if allowlist else 0} entries")

          today = datetime.now().strftime("%Y-%m-%d")
          all_vulns = {}

          # Parse Trivy
          trivy_count = 0
          try:
              with open("/tmp/trivy_results.json") as f:
                  trivy = json.load(f)
              for result in trivy.get("Results", []):
                  for vuln in result.get("Vulnerabilities", []):
                      vid = vuln.get("VulnerabilityID")
                      if vid and vid not in all_vulns:
                          all_vulns[vid] = {
                              "id": vid,
                              "severity": vuln.get("Severity", "").upper(),
                              "package": vuln.get("PkgName", ""),
                              "installed": vuln.get("InstalledVersion", ""),
                              "fixed": vuln.get("FixedVersion", ""),
                              "source": "trivy",
                          }
                          trivy_count += 1
          except Exception as e:
              print(f"Warning: Trivy results unavailable: {e}")

          # Parse Snyk
          snyk_count = 0
          try:
              with open("/tmp/snyk_results.json") as f:
                  snyk = json.load(f)
              if not snyk.get("error"):
                  for vuln in snyk.get("vulnerabilities", []):
                      vid = vuln.get("id")
                      cves = vuln.get("identifiers", {}).get("CVE", [])
                      if vid and vid not in all_vulns:
                          if not any(c in all_vulns for c in cves):
                              all_vulns[vid] = {
                                  "id": vid,
                                  "severity": vuln.get("severity", "").upper(),
                                  "package": vuln.get("packageName") or vuln.get("name", ""),
                                  "installed": vuln.get("version", ""),
                                  "fixed": ", ".join(vuln.get("fixedIn", [])) if vuln.get("fixedIn") else "",
                                  "source": "snyk",
                              }
                              snyk_count += 1
                  for app in snyk.get("applications", []):
                      for vuln in app.get("vulnerabilities", []):
                          vid = vuln.get("id")
                          if vid and vid not in all_vulns:
                              all_vulns[vid] = {
                                  "id": vid,
                                  "severity": vuln.get("severity", "").upper(),
                                  "package": vuln.get("packageName") or vuln.get("name", ""),
                                  "installed": vuln.get("version", ""),
                                  "fixed": ", ".join(vuln.get("fixedIn", [])) if vuln.get("fixedIn") else "",
                                  "source": "snyk",
                              }
                              snyk_count += 1
          except Exception as e:
              print(f"Warning: Snyk results unavailable: {e}")

          unique = list(all_vulns.values())

          # If no allowlist file exists, report findings but don't block
          if allowlist is None:
              print(f"Found {len(unique)} CRITICAL/HIGH vulnerabilities (not blocking — no allowlist configured)")
              for v in sorted(unique, key=lambda x: {"CRITICAL":0,"HIGH":1}.get(x["severity"],9)):
                  print(f"  {v['severity']:8s} [{v['source']:5s}] {v['id']} {v['package']}@{v['installed']}")
              print(f"\nGATE SKIPPED: No .security/allowlist.json — add one to enable blocking")
              sys.exit(0)

          allowed, expired, new_vulns = [], [], []

          for v in unique:
              entry = allowlist.get(v["id"])
              if entry and not entry.get("_comment"):
                  if today > entry.get("expires", "9999-12-31"):
                      expired.append(v)
                  else:
                      allowed.append(v)
              else:
                  new_vulns.append(v)

          sev_order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3}
          new_vulns.sort(key=lambda x: sev_order.get(x["severity"], 9))
          expired.sort(key=lambda x: sev_order.get(x["severity"], 9))

          print(f"\n{'='*60}")
          print(f"SECURITY SCAN RESULTS")
          print(f"{'='*60}")
          print(f"Scanners: Trivy ({trivy_count}) + Snyk ({snyk_count})")
          print(f"Total unique CRITICAL/HIGH: {len(unique)}")
          print(f"  Allowlisted: {len(allowed)}")
          print(f"  Expired:     {len(expired)}")
          print(f"  NEW:         {len(new_vulns)}")
          print(f"{'='*60}\n")

          if allowed:
              print(f"--- Allowlisted ({len(allowed)}) ---")
              for v in allowed:
                  print(f"  {v['severity']:8s} [{v['source']:5s}] {v['id']}")
              print()

          if expired:
              print(f"--- Expired ({len(expired)}) ---")
              for v in expired:
                  print(f"  {v['severity']:8s} [{v['source']:5s}] {v['id']} {v['package']}@{v['installed']}")
              print()

          if new_vulns:
              print(f"--- NEW ({len(new_vulns)}) ---")
              for v in new_vulns:
                  fix = f" -> fix: {v['fixed']}" if v["fixed"] else ""
                  print(f"  {v['severity']:8s} [{v['source']:5s}] {v['id']} {v['package']}@{v['installed']}{fix}")
              print()

          fail_on_findings = os.environ.get("FAIL_ON_FINDINGS", "true").lower() == "true"

          blockers = new_vulns + expired
          if blockers:
              status = "Failed" if fail_on_findings else "Warning"
              summary = f"### 🛡️ Security Gate {status}\n\n"
              summary += f"Scanners: Trivy ({trivy_count} findings) + Snyk ({snyk_count} findings) | "
              summary += f"Total: {len(unique)} | Allowlisted: {len(allowed)} | **New: {len(new_vulns)}**"
              if expired:
                  summary += f" | Expired: {len(expired)}"
              summary += "\n\n"
              summary += "| Severity | Scanner | ID | Package | Fix Available |\n"
              summary += "|----------|---------|-----|---------|---------------|\n"
              for v in blockers:
                  fix = v["fixed"] if v["fixed"] else "No fix"
                  summary += f"| {v['severity']} | {v['source']} | `{v['id']}` | `{v['package']}@{v['installed']}` | {fix} |\n"
              summary += f"\n**To resolve:** fix the vulnerability or add it to `.security/allowlist.json` with owner approval.\n"
              with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as f:
                  f.write(summary)
              with open("/tmp/scan_comment.md", "w") as f:
                  f.write(summary)
              if fail_on_findings:
                  print(f"GATE FAILED: {len(blockers)} non-allowlisted vulnerabilities")
                  sys.exit(1)
              else:
                  print(f"GATE WARNING: {len(blockers)} non-allowlisted vulnerabilities (non-blocking)")
          else:
              summary = f"### 🛡️ Security Gate Passed\n\n"
              summary += f"Scanners: Trivy ({trivy_count} findings) + Snyk ({snyk_count} findings) | "
              summary += f"Total: {len(unique)} CRITICAL/HIGH | All allowlisted ✅\n"
              with open("/tmp/scan_comment.md", "w") as f:
                  f.write(summary)
              print(f"GATE PASSED: All {len(unique)} vulnerabilities are allowlisted")
          PYEOF

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('/tmp/scan_comment.md', 'utf8');
            } catch {
              body = '### 🛡️ Security Gate\n\nScan results unavailable.';
            }
            const marker = '### 🛡️ Security Gate';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
