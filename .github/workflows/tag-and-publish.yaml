name: Release and Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    # Only run when a PR with the "release" label is merged
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    name: Create release and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Need full history for release notes

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"

      - name: Install dependencies
        shell: bash
        run: uv sync --all-extras --all-groups

      - name: Get version
        id: get_version
        run: |
          VERSION=$(uvx --from=toml-cli toml get --toml-path=pyproject.toml project.version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Extract changelog for this version
        run: |
          python .github/scripts/extract_release_notes.py "${{ env.VERSION }}" > .github/release_notes.md

      - name: Create Git tag
        run: |
          git config --global user.name 'atlan-ci'
          git config --global user.email 'it@atlan.com'

          # Delete existing tag if present (idempotent re-runs)
          git push origin :refs/tags/"v${{ env.VERSION }}" 2>/dev/null || true
          git tag -d "v${{ env.VERSION }}" 2>/dev/null || true

          git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Mint fleet App token
        # A real (non-github-actions[bot]) identity is required so the
        # Release created below re-fires harbor-release.yaml's
        # `on: release: [published]` trigger.
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: application-sdk

      - name: Delete existing GitHub Release (if any)
        run: gh release delete "v${{ env.VERSION }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          body_path: .github/release_notes.md
          draft: false
          prerelease: ${{ contains(env.VERSION, 'rc') }}
          token: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}

      # TODO: Uncomment in case we need to publish to TestPyPI
      # Available at: https://test.pypi.org/project/atlan-application-sdk/
      # USAGE:  pip3 install -i https://test.pypi.org/simple/ atlan-application-sdk
      # testpypi config available (commented out) under pyproject.toml
      # - name: Build and publish to TestPyPI
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
      #   run: |
      #     uv build
      #     uv publish --index testpypi

      # Available at: https://pypi.org/project/atlan-application-sdk/
      - name: Build and publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish

  fan-out:
    # After an SDK release, trigger the self-hosted Renovate runner so consumers
    # pick up the new atlan-application-sdk version within minutes rather than
    # waiting for the next scheduled run. Skipped automatically when `release` is
    # skipped (non-release PR) or fails.
    name: Fan out Renovate to consumers
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint fleet App token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.FLEET_APP_ID }}
          private-key: ${{ secrets.FLEET_APP_PRIVATE_KEY }}
          owner: atlanhq
          repositories: application-sdk
      - name: Trigger the self-hosted Renovate runner
        # No dry_run/repos overrides: inherits renovate.yaml's defaults (full
        # discovery; dry_run=full until PR2 Stage 3 flips it live). So this is an
        # inert rehearsal today and becomes the real post-release fan-out at
        # go-live. Soft-fail so a fan-out hiccup never fails the release.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.ORG_PAT_GITHUB }}
        run: |
          gh workflow run renovate.yaml --repo atlanhq/application-sdk \
          || echo "::warning::Could not trigger renovate.yaml — consumers will update on the next scheduled run."