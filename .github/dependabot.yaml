version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: daily
    versioning-strategy: lockfile-only
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
