name: End to End Tests for application-sdk examples

description: |
  Runs End-to-End (E2E) tests for application-sdk examples.

  This action executes a comprehensive suite of end-to-end tests for the application-sdk examples.
  It validates the functionality of example applications by:
  - Setting up required infrastructure (Dapr, Temporal)
  - Installing all necessary dependencies
  - Running the examples in an environment that mirrors production
  - Verifying the examples work as expected from start to finish

  The tests ensure that the examples provided in the SDK are working correctly
  and can serve as reliable reference implementations for SDK users.

inputs:
  operating-system:
    required: true
    description: The operating system to use for the action.
  github-token:
    required: true
    description: The GitHub token to use for the action.
  postgres-host:
    required: true
    description: The host of the Postgres database.
  postgres-password:
    required: true
    description: The password of the Postgres database.
  snowflake-account-id:
    required: true
    description: The account ID of the Snowflake database.
  snowflake-user:
    required: true
    description: The user of the Snowflake database.
  snowflake-password:
    required: true
    description: The password of the Snowflake database.

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Install Dapr CLI (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash -s 1.17.1
        dapr init --runtime-version 1.17.3 --slim

    - name: Install Dapr CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $script=iwr -useb https://raw.githubusercontent.com/dapr/cli/master/install/install.ps1; $block=[ScriptBlock]::Create($script); invoke-command -ScriptBlock $block -ArgumentList 1.17.1, "$env:USERPROFILE\.dapr\bin\"
        $env:Path += ";$env:USERPROFILE\.dapr\bin\"
        dapr init --runtime-version 1.17.3 --slim

    - name: Install Temporal CLI (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        TEMPORAL_VERSION="1.3.0"
        mkdir -p "$HOME/.temporalio/bin"
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac
        curl -sSLf "https://github.com/temporalio/cli/releases/download/v${TEMPORAL_VERSION}/temporal_cli_${TEMPORAL_VERSION}_${OS}_${ARCH}.tar.gz" \
          -o /tmp/temporal.tar.gz
        tar -xzf /tmp/temporal.tar.gz -C "$HOME/.temporalio/bin"
        chmod +x "$HOME/.temporalio/bin/temporal"

    - name: Install Temporal CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $TemporalVersion = "1.3.0"
        New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.temporalio\bin"
        Invoke-WebRequest -Uri "https://github.com/temporalio/cli/releases/download/v$TemporalVersion/temporal_cli_${TemporalVersion}_windows_amd64.zip" -OutFile "$env:TEMP\temporal.zip"
        Expand-Archive -Path "$env:TEMP\temporal.zip" -DestinationPath "$env:USERPROFILE\.temporalio\bin" -Force

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.7.3"

    - name: Install dependencies
      shell: bash
      run: uv sync --all-extras --all-groups

    # Set up PATH for DAPR and Temporal globally
    - name: Setup PATH for DAPR and Temporal (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "$HOME/.dapr/bin" >> $GITHUB_PATH
        echo "$HOME/.temporalio/bin" >> $GITHUB_PATH

    - name: Setup PATH for DAPR and Temporal (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        echo "$env:USERPROFILE\.dapr\bin" >> $env:GITHUB_PATH
        echo "$env:USERPROFILE\.temporalio\bin" >> $env:GITHUB_PATH

    # Start services sequentially: Temporal first (to avoid port-binding race with Dapr)
    - name: Start Platform Services (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        temporal server start-dev --db-filename /tmp/temporal-e2e.db &
        ready=false
        for i in $(seq 1 20); do
          if temporal workflow list --namespace default 2>/dev/null; then
            echo "Temporal is ready"
            ready=true
            break
          fi
          sleep 2
        done
        if [ "$ready" != "true" ]; then
          echo "Temporal failed to become ready after 40 seconds"
          exit 1
        fi
        $HOME/.dapr/bin/daprd \
          --app-id e2e-examples \
          --dapr-http-port 3500 \
          --dapr-grpc-port 50001 \
          --resources-path ./components \
          --placement-host-address '' \
          --scheduler-host-address '' \
          --log-level warn &
        ready=false
        for i in $(seq 1 15); do
          if curl -sf http://localhost:3500/v1.0/metadata > /dev/null 2>&1; then
            echo "Dapr is ready"
            ready=true
            break
          fi
          sleep 2
        done
        if [ "$ready" != "true" ]; then
          echo "Dapr failed to become ready after 30 seconds"
          exit 1
        fi

    - name: Start Platform Services (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Start-Process -FilePath "temporal" -ArgumentList "server", "start-dev", "--db-filename", "$env:TEMP\temporal-e2e.db" -NoNewWindow
        $ready = $false
        for ($i = 1; $i -le 20; $i++) {
          $result = temporal workflow list --namespace default 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Temporal is ready"
            $ready = $true
            break
          }
          Start-Sleep 2
        }
        if (-not $ready) { Write-Error "Temporal failed to become ready"; exit 1 }
        Start-Process -FilePath "$env:USERPROFILE\.dapr\bin\daprd.exe" `
          -ArgumentList "--app-id", "e2e-examples", "--dapr-http-port", "3500", "--dapr-grpc-port", "50001", "--resources-path", ".\components", "--placement-host-address", "", "--scheduler-host-address", "", "--log-level", "warn" `
          -NoNewWindow
        $ready = $false
        for ($i = 1; $i -le 15; $i++) {
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:3500/v1.0/metadata" -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop
            if ($r.StatusCode -eq 200) { Write-Host "Dapr is ready"; $ready = $true; break }
          } catch {}
          Start-Sleep 2
        }
        if (-not $ready) { Write-Error "Dapr failed to become ready"; exit 1 }

    # Make API call and capture workflow/run IDs for each example
    - name: Start the workflows
      shell: bash
      id: workflow_info
      env:
        DAPR_HTTP_PORT: "3500"
        POSTGRES_HOST: ${{ inputs.postgres-host }}
        POSTGRES_PASSWORD: ${{ inputs.postgres-password }}
        SNOWFLAKE_ACCOUNT_ID: ${{ inputs.snowflake-account-id }}
        SNOWFLAKE_USER: ${{ inputs.snowflake-user }}
        SNOWFLAKE_PASSWORD: ${{ inputs.snowflake-password }}
      run: |
        cd examples
        uv run run_examples.py

        echo "Workflow status:"
        cat workflow_status.md

        echo "Operating system: **${{ inputs.operating-system }}**" >> workflow_status.md

    - name: Comment test results on Pull Request
      if: ${{ !cancelled() && github.event_name == 'pull_request' }}
      uses: mshick/add-pr-comment@v2
      with:
        message-id: "workflow_status_${{ inputs.operating-system }}"
        message-path: "examples/workflow_status.md"

    # Stop all services
    - name: Stop all services
      shell: bash
      continue-on-error: true
      run: |
        uv run poe stop-deps
        sleep 10  # Give services time to stop
