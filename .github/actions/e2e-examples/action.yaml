name: End to End Tests for application-sdk examples

description: |
  Runs End-to-End (E2E) tests for application-sdk examples.

  This action executes a comprehensive suite of end-to-end tests for the application-sdk examples.
  It validates the functionality of example applications by:
  - Setting up required infrastructure (Dapr, Temporal)
  - Installing all necessary dependencies
  - Running the examples in an environment that mirrors production
  - Verifying the examples work as expected from start to finish

  The tests ensure that the examples provided in the SDK are working correctly
  and can serve as reliable reference implementations for SDK users.

inputs:
  operating-system:
    required: true
    description: The operating system to use for the action.
  github-token:
    required: true
    description: The GitHub token to use for the action.
  postgres-host:
    required: true
    description: The host of the Postgres database.
  postgres-password:
    required: true
    description: The password of the Postgres database.
  snowflake-account-id:
    required: true
    description: The account ID of the Snowflake database.
  snowflake-user:
    required: true
    description: The user of the Snowflake database.
  snowflake-password:
    required: true
    description: The password of the Snowflake database.

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Read the pinned daprd version from the SDK's single source of truth
    # (application_sdk/version.py — ``__dapr_version``). Keeps CI in lockstep
    # with the version the embedded local-dev sidecar downloads.
    - name: Resolve pinned daprd version
      id: dapr-version
      shell: bash
      run: |
        ver=$(grep '^__dapr_version' application_sdk/version.py | cut -d'"' -f2)
        if [[ -z "$ver" ]]; then
          echo "::error::Failed to parse __dapr_version from application_sdk/version.py"
          exit 1
        fi
        echo "version=$ver" >> "$GITHUB_OUTPUT"

    - name: Install Dapr CLI (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash -s 1.17.1
        dapr init --runtime-version ${{ steps.dapr-version.outputs.version }} --slim

    - name: Install Dapr CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Direct download — avoids install.ps1's GitHub API lookup, which hits the
        # 60 req/hr unauthenticated rate limit on shared runner IPs.
        $CliVersion = "1.17.1"
        $CliZip = "$env:TEMP\dapr_cli.zip"
        Invoke-WebRequest -Uri "https://github.com/dapr/cli/releases/download/v$CliVersion/dapr_windows_amd64.zip" -OutFile $CliZip
        $InstallDir = "$env:USERPROFILE\.dapr\bin"
        New-Item -ItemType Directory -Force -Path $InstallDir | Out-Null
        Expand-Archive -Path $CliZip -DestinationPath $InstallDir -Force
        Remove-Item $CliZip
        $env:Path += ";$InstallDir"
        dapr init --runtime-version ${{ steps.dapr-version.outputs.version }} --slim

    - name: Install Temporal CLI
      uses: temporalio/setup-temporal@1059a504f87e7fa2f385e3fa40d1aa7e62f1c6ca # v0
      with:
        version: "v1.3.0"

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.7.3"

    - name: Install dependencies
      shell: bash
      run: uv sync --all-extras --all-groups

    # Set up PATH for DAPR globally (Temporal PATH is managed by setup-temporal action)
    - name: Setup PATH for DAPR (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: echo "$HOME/.dapr/bin" >> $GITHUB_PATH

    - name: Setup PATH for DAPR (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: echo "$env:USERPROFILE\.dapr\bin" >> $env:GITHUB_PATH

    # Start services sequentially: Temporal first (to avoid port-binding race with Dapr).
    # Uses bash on all platforms — Git Bash is available on Windows runners and correctly
    # passes empty-string arguments (PowerShell Start-Process drops them, corrupting
    # --placement-host-address and --scheduler-host-address flags).
    - name: Start Platform Services
      shell: bash
      run: |
        temporal server start-dev --db-filename /tmp/temporal-e2e.db &
        ready=false
        for i in $(seq 1 20); do
          if temporal workflow list --namespace default 2>/dev/null; then
            echo "Temporal is ready"
            ready=true
            break
          fi
          sleep 2
        done
        if [ "$ready" != "true" ]; then
          echo "Temporal failed to become ready after 40 seconds"
          exit 1
        fi
        daprd \
          --app-id e2e-examples \
          --dapr-http-port 3500 \
          --dapr-grpc-port 50001 \
          --resources-path ./components \
          --placement-host-address '' \
          --scheduler-host-address '' \
          --log-level warn &
        ready=false
        for i in $(seq 1 30); do
          if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3500/v1.0/healthz)" = "204" ]; then
            echo "Dapr is ready"
            ready=true
            break
          fi
          sleep 2
        done
        if [ "$ready" != "true" ]; then
          echo "Dapr failed to become ready after 60 seconds"
          exit 1
        fi

    # Make API call and capture workflow/run IDs for each example
    - name: Start the workflows
      shell: bash
      id: workflow_info
      env:
        DAPR_HTTP_PORT: "3500"
        POSTGRES_HOST: ${{ inputs.postgres-host }}
        POSTGRES_PASSWORD: ${{ inputs.postgres-password }}
        SNOWFLAKE_ACCOUNT_ID: ${{ inputs.snowflake-account-id }}
        SNOWFLAKE_USER: ${{ inputs.snowflake-user }}
        SNOWFLAKE_PASSWORD: ${{ inputs.snowflake-password }}
      run: |
        cd examples
        uv run run_examples.py

        echo "Workflow status:"
        cat workflow_status.md

        echo "Operating system: **${{ inputs.operating-system }}**" >> workflow_status.md

    - name: Comment test results on Pull Request
      if: ${{ !cancelled() && github.event_name == 'pull_request' }}
      uses: mshick/add-pr-comment@v2
      with:
        message-id: "workflow_status_${{ inputs.operating-system }}"
        message-path: "examples/workflow_status.md"

    # Stop all services
    - name: Stop all services
      shell: bash
      continue-on-error: true
      run: |
        uv run poe stop-deps
        sleep 10  # Give services time to stop
