# Full-DAG SDR e2e queue-alignment overlay (SDK-owned).
#
# Layered (opt-in via the sdr-e2e action's `full-dag: true` input) on top of the
# SDK CI overrides and below any app overlay + the two-store overlay. Replaces
# the byte-identical per-app overlay every agent-mode full-DAG app used to carry.
#
# The full-DAG harness's extract node dispatches to the Temporal queue
#   atlan-<agent_name>  (agent_name = <app>-<ATLAN_DEPLOYMENT_NAME>)
# and the CI worker registers on
#   atlan-{ATLAN_APPLICATION_NAME}-{ATLAN_DEPLOYMENT_NAME}
# so worker and harness line up only when they read the SAME
# ATLAN_DEPLOYMENT_NAME. If they diverge the extract is never picked up and the
# harness's stall-guard trips. The action's `Derive per-leg deployment name`
# step writes that value (`e2e-full-ci-<run_id>[-<artifact-suffix>]`, from
# derive_deployment_name.py) to $GITHUB_ENV, so this overlay passes it through
# from the host env rather than hardcoding `e2e-full-ci-${GITHUB_RUN_ID}` —
# hardcoding would drop the per-leg suffix and re-collide every matrix leg onto
# one queue. Single-suite (no-suffix) runs resolve to the same
# `e2e-full-ci-<run_id>` value, so existing callers are unaffected. The compose
# service is always `atlan-app` (the configurator's fixed name), so this file is
# app-agnostic — nothing to template.
services:
  atlan-app:
    environment:
      - ATLAN_DEPLOYMENT_NAME
      # Full-DAG worker boot waits on the Dapr sidecar; give it more slack than
      # the 60s default so a cold CI runner doesn't false-fail the health gate.
      - ATLAN_DAPR_SIDECAR_WAIT_TIMEOUT=120
