# CI-specific docker compose overrides for the SDR integration test stack.
#
# Merged on top of the configurator-generated ci-deploy/docker-compose.yaml.
# Apps may add a third file at .github/e2e/docker-compose.ci.yml in their
# own repo for connector-specific overrides (extra env vars, additional
# volume mounts, etc.); the composite action picks it up automatically.
#
# Naming gaps bridged here:
#   CI secret / env var          SDK / production name
#   ─────────────────────────── ──────────────────────────────────
#   SDR_CLIENT_ID               ATLAN_AUTH_CLIENT_ID
#   SDR_CLIENT_SECRET           ATLAN_AUTH_CLIENT_SECRET
#   ATLAN_BASE_URL              ATLAN_AUTH_BASE_URL, ATLAN_AUTH_TOKEN_URL
#   (configurator)              ATLAN_TEMPORAL_TLS_ENABLED
#
# GITHUB_WORKSPACE is an absolute path set by GitHub Actions and is used for
# the secrets volume mount to avoid relative-path ambiguity across compose files.

services:
  atlan-app:
    # Ensure CWD is /app so that Path("./components") in create_store_from_binding
    # resolves to /app/components (the bind-mounted Dapr components directory).
    working_dir: /app
    # Pin Temporal + auth hostnames to IPv4 so the bundled Rust gRPC
    # resolver in temporalio 1.27.x doesn't try AAAA records the
    # GH-runner docker bridge can't reach. The composite action's
    # "Resolve Temporal + auth hostnames to IPv4" step exports
    # TEMPORAL_HOST/IPV4 + AUTH_HOST/IPV4 for the substitution below.
    extra_hosts:
      - "${TEMPORAL_HOST}:${TEMPORAL_IPV4}"
      - "${AUTH_HOST}:${AUTH_IPV4}"
    # Mount CI-generated secrets file for the local.file Dapr secret store.
    # SDR_CONFIG_DIR is set by the action's "Resolve SDR config paths" step
    # to .github/sdr-e2e or .github/e2e depending on the app's layout.
    volumes:
      - ${GITHUB_WORKSPACE}/${SDR_CONFIG_DIR}/secrets:/app/secrets:ro
    environment:
      # Disable observability upload — the CI atlan-objectstore S3 config
      # is not set up for external access and will crash the container on startup.
      - ATLAN_ENABLE_OBSERVABILITY_DAPR_SINK=false
      # Bridge: configurator → main.py (TLS)
      - ATLAN_TEMPORAL_TLS_ENABLED=true
      # Bridge: ATLAN_BASE_URL → production SDK names
      - ATLAN_AUTH_TOKEN_URL=${ATLAN_BASE_URL}/auth/realms/default/protocol/openid-connect/token
      - ATLAN_AUTH_BASE_URL=${ATLAN_BASE_URL}
      # Bridge: SDR_CLIENT_ID/SECRET → production SDK names for OAuth auth
      - ATLAN_AUTH_CLIENT_ID=${SDR_CLIENT_ID}
      - ATLAN_AUTH_CLIENT_SECRET=${SDR_CLIENT_SECRET}
