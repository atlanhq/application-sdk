apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
spec:
  type: secretstores.local.file
  version: v1
  ignoreErrors: true
  metadata:
    # Apps must write their secrets bundle to /app/secrets/credentials.json
    # (the canonical SDR test secrets path). The container mounts
    # ${GITHUB_WORKSPACE}/.github/e2e/secrets at /app/secrets ro.
    - name: secretsFile
      value: /app/secrets/credentials.json
    - name: nestedSeparator
      value: ":"
