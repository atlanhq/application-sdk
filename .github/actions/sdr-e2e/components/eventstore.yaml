apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: eventstore
spec:
  # In CI, redirect event publishing to local storage instead of the tenant's
  # HTTP event ingress. The tenant ingress returns 500 for test workflows
  # (the connection QN doesn't exist in the tenant), which causes every
  # extraction activity to fail. Writing to a local directory is a no-op
  # that lets the bindings.localstorage "create" operation return 200.
  type: bindings.localstorage
  version: v1
  metadata:
    - name: rootPath
      value: /tmp/ci-events
