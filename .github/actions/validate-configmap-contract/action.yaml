name: Validate ConfigMap Contract
description: |
  Validates that atlan.yaml:name matches at least one generated configmap JSON
  filename stem under app/generated.

inputs:
  atlan-yaml-path:
    description: Path to atlan.yaml in the app repository.
    required: false
    default: atlan.yaml
  generated-dir:
    description: Directory containing generated contract JSON files.
    required: false
    default: app/generated

runs:
  using: composite
  steps:
    - name: Validate generated configmap contract
      shell: bash
      env:
        ATLAN_YAML_PATH: ${{ inputs.atlan-yaml-path }}
        GENERATED_DIR: ${{ inputs.generated-dir }}
      run: |
        set -euo pipefail
        python3 "${GITHUB_ACTION_PATH}/../../scripts/validate_configmap_contract.py" \
          --atlan-yaml "${ATLAN_YAML_PATH}" \
          --generated-dir "${GENERATED_DIR}"
