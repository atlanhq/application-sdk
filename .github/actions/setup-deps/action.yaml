name: Setup Python Dependencies for Atlan Apps
description: |
  Sets up Python project dependencies and manages dependency caching for Atlan Apps.
  This action handles the installation of Python 3.11, uv package manager, and project dependencies.
  It implements efficient caching strategies to speed up workflow execution by storing and reusing
  the virtual environment.

inputs:
  cache:
    description: "Enable dependency caching"
    required: false
    default: "true"
  python-version:
    required: false
    description: The Python version to use for the action.
    default: "3.11"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 1

    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache uv binary
      id: cache-uv-bin
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ runner.tool_cache }}/uv
        key: uv-bin-${{ runner.os }}-${{ runner.arch }}-0.11.21

    - name: Install uv
      uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      with:
        version: "0.11.26"
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        github-token: ${{ github.token }}
        download-from-astral-mirror: false

    - name: Cache virtual environment
      id: cache-venv
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('uv.lock') }}

    - name: Install dependencies
      if: steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      run: |
        PYTHON_MINOR=$(echo "${{ inputs.python-version }}" | cut -d. -f2)
        if [ "${PYTHON_MINOR}" -ge 14 ] 2>/dev/null; then
          # Python 3.14+: skip dev group (libcst's pyo3 doesn't support 3.14 yet)
          "${{ github.action_path }}/../../scripts/with-retry.sh" uv sync --all-extras --no-group dev
        else
          "${{ github.action_path }}/../../scripts/with-retry.sh" uv sync --all-extras --all-groups
        fi
