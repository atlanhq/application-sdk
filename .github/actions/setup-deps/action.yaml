name: Setup Python Dependencies for Atlan Apps
description: |
  Sets up Python project dependencies and manages dependency caching for Atlan Apps.
  This action handles the installation of Python 3.11, uv package manager, and project dependencies.
  It implements efficient caching strategies to speed up workflow execution by storing and reusing
  the virtual environment.

inputs:
  cache:
    description: "Enable dependency caching"
    required: false
    default: "true"
  python-version:
    required: false
    description: The Python version to use for the action.
    default: "3.11"

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 1

    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache uv binary
      id: cache-uv-bin
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ runner.tool_cache }}/uv
        key: uv-bin-${{ runner.os }}-${{ runner.arch }}-0.11.21

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "0.11.29"
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        github-token: ${{ github.token }}
        download-from-astral-mirror: false

    - name: Cache virtual environment
      id: cache-venv
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .venv
        # Hash the whole importable conformance package, not just uv.lock: it is
        # a non-editable path dependency baked into .venv as a wheel, and
        # `uv sync` only runs on a cache miss (see below). Keyed on uv.lock
        # alone, a source-only change reuses a stale build, so type-checks/tests
        # run against outdated code. Hash `conformance/**` (not just `*.py`) so
        # bundled non-.py wheel assets the rules read at runtime — data/*.json
        # (e.g. toolkit_baseline.json), suite/schema/*.json, bootstrap/templates/*
        # — also bust the cache. The sibling tests/, pyproject.toml, and README
        # are outside conformance/ and correctly excluded (not in the wheel).
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('uv.lock', 'packages/conformance/conformance/**') }}

    - name: Install dependencies
      if: steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      run: |
        PYTHON_MINOR=$(echo "${{ inputs.python-version }}" | cut -d. -f2)
        if [ "${PYTHON_MINOR}" -ge 14 ] 2>/dev/null; then
          # Python 3.14+: skip dev group (libcst's pyo3 doesn't support 3.14 yet)
          "${{ github.action_path }}/../../scripts/with-retry.sh" uv sync --all-extras --no-group dev
        else
          "${{ github.action_path }}/../../scripts/with-retry.sh" uv sync --all-extras --all-groups
        fi
