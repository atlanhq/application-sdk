# Composite: scan the SDK (base image + installed deps) with Trivy, leaving
# trivy-image-results.json + trivy-fs-results.json in the working directory.
#
# Single source of truth for the scan recipe, shared by:
#   - daily-security-scan.yml  (hourly detection + ticketing)
#   - vuln-reconcile-on-release.yml  (fresh scan of the released state, then reconcile)
#
# Report-only by design: NO --ignore-unfixed, so no-fix CVEs are surfaced too.
# The caller is responsible for `actions/checkout` before invoking this.

name: SDK Trivy scan
description: Trivy image + filesystem scan of the SDK base image and installed deps.

inputs:
  target-image:
    # Single source of truth for the base image scanned by BOTH the hourly scan
    # and the release reconcile. Callers rely on this default rather than holding
    # their own copy — bump it here only. The hourly workflow reads it back via
    # the `target-image` output below for its summary header.
    description: Base image to scan.
    required: false
    default: registry.atlan.com/public/app-runtime-base:3
  trivy-version:
    description: Pinned Trivy CLI version (bump deliberately when a scanner fix is needed).
    required: false
    default: v0.70.0

outputs:
  target-image:
    description: The resolved base image that was scanned (for callers' summaries).
    value: ${{ inputs.target-image }}

runs:
  using: composite
  steps:
    - name: Pull target image
      shell: bash
      env:
        TARGET_IMAGE: ${{ inputs.target-image }}
      run: docker pull "$TARGET_IMAGE"

    # Install latest Trivy CLI via the official setup-trivy action. The pinned
    # aquasecurity/trivy-action v0.36.0 ships an older Trivy that emits
    #   WARN [applier] Some OS packages were skipped due to mismatched PURL
    #   namespace pkg_count=159 detected_os="chainguard"
    # and silently reports 0 OS findings on Chainguard/Wolfi images.
    - name: Install Trivy CLI
      uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
      with:
        # Pin to a specific version so scan results don't drift between
        # runs as Trivy's vuln DB schema and detection logic evolve. Bump
        # this deliberately when a known scanner fix is needed.
        version: ${{ inputs.trivy-version }}
        cache: true

    # ── Trivy image scan ──────────────────────────────────────────────────

    - name: Trivy image scan (JSON)
      shell: bash
      env:
        TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
        TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
        TARGET_IMAGE: ${{ inputs.target-image }}
      run: |
        # NOTE: intentionally NO --ignore-unfixed. This is a report-only /
        # ticket-filing scan, so we want visibility into no-fix ("won't fix",
        # disputed, awaiting-patch) CVEs too — they still need tracking and an
        # operational mitigation. Keep --ignore-unfixed only on build/CI
        # gating steps, where un-actionable findings would just wedge the build.
        trivy image \
          --scanners vuln \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          --format json \
          --output trivy-image-results.json \
          "$TARGET_IMAGE"

    # ── Install SDK dependencies so vendored native lockfiles materialize ──
    #
    # Rust/Go/native crates bundled inside Python wheels only exist on disk
    # once the wheel is INSTALLED. e.g. temporalio ships a compiled bridge
    # whose temporalio/bridge/Cargo.lock pins pyo3 — a transitive Rust CVE
    # (GHSA-36hh-v3qg-5jq4). The source tree names `temporalio` as a Python
    # dep in uv.lock but never contains that Cargo.lock, so a source-only
    # `trivy fs` cannot see it — which is why pyo3 first surfaced on a
    # downstream connector image, not in this SDK scan. Syncing into .venv
    # lays those vendored manifests on disk so the filesystem scan below
    # reaches them. Verified locally with Trivy v0.70.0: `trivy fs .` reports
    # pyo3/GHSA-36hh-v3qg-5jq4 from .venv/.../temporalio/bridge/Cargo.lock.
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "0.11.30"
        enable-cache: true
    - name: Sync SDK dependencies into .venv
      shell: bash
      run: uv sync --all-extras --all-groups

    # ── Trivy filesystem scan (source lockfiles + installed .venv wheels) ──

    - name: Trivy filesystem scan (lockfiles + installed wheel artifacts)
      shell: bash
      env:
        TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
        TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1
      run: |
        # See note on the image scan above: report-only pass, so no
        # --ignore-unfixed — no-fix CVEs are surfaced and ticketed.
        #
        # Scans the repo root, which now includes the synced .venv — so
        # native lockfiles vendored inside installed wheels (Rust Cargo.lock,
        # etc.) are covered, not just the Python uv.lock. This is what lets
        # the SDK scan catch transitive Rust CVEs like pyo3
        # (GHSA-36hh-v3qg-5jq4) at the source instead of only in downstream
        # connector images.
        trivy fs \
          --scanners vuln \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          --format json \
          --output trivy-fs-results.json \
          .
