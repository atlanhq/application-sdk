# git-cliff config — generates CHANGELOG.md and per-release notes from git history.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# Header emitted once at the top of CHANGELOG.md.
header = """
# Changelog

All notable changes to this project are documented here.

Release notes are generated from [conventional commit](https://www.conventionalcommits.org/)
messages. Every merge to `main` that touches contract-toolkit files auto-creates or
updates a release PR — see `.github/workflows/contract-toolkit-release.yml`.

"""

# Rendered for each version block via Tera templates.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="contract-toolkit-v") | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**({{ commit.scope }})** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/atlanhq/application-sdk/pull/{{ commit.remote.pr_number }})){% endif %}\
{% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true
# Shared macro used inside `body` for repo URLs.
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Keep commits that match these patterns; skip everything else.
commit_parsers = [
  { message = "^feat!|^[a-z]+(\\(.+\\))?!:", group = "Breaking changes" },
  # Match BREAKING CHANGE only as a trailer (start of a line), per conventional-commits
  # spec. The plain substring match would false-positive on any commit body that merely
  # mentions the phrase (seen before: a chore commit describing AGENTS.md's commit rules).
  { body = "(?m)^BREAKING[ _-]CHANGE: ", group = "Breaking changes" },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^ci", group = "CI & tooling" },
  # Skip the version-bump commits the release workflow creates so they don't pollute the changelog.
  { message = "^chore\\(release\\): bump|^chore: bump version|^chore: release v|^chore\\([^)]+\\): release v", skip = true },
  { message = "^chore: publish|^publish ", skip = true },
  { message = "^chore", group = "Chores" },
  { message = "^refactor|^perf|^style|^test", group = "Other changes" },
]
protect_breaking_commits = true
filter_commits = false
topo_order = false
sort_commits = "newest"

# [remote.github] is enabled in CI (via GITHUB_TOKEN) so PR links get auto-filled.
# Leaving it commented out here so local `git-cliff` runs don't require network access.
# The CI workflow passes --github-repo / GITHUB_TOKEN explicitly.
# [remote.github]
# owner = "atlanhq"
# repo = "application-sdk"
