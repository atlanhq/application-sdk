{{/*
  Creates credential secrets by looking up an existing secret in another namespace.
  Used when credentials already exist (e.g., argo-client-creds in default namespace)
  and need to be copied into the app's namespace for DAPR secret store access.

  The lookup happens at helm install/upgrade time. If the source secret doesn't exist
  (e.g., in a test cluster), the template is a no-op.

  Skipped if connectorCredentials already defines the same credential name with data,
  to allow --set overrides (e.g., in E2E tests) to take precedence.
*/}}
{{- range $name, $ext := .Values.externalCredentials }}
{{- if $ext.sourceSecret }}
{{- /* Skip if connectorCredentials already provides this credential with non-empty data */}}
{{- $skip := false }}
{{- $connCred := index $.Values.connectorCredentials $name | default dict }}
{{- $connData := $connCred.data | default dict }}
{{- range $k, $v := $connData }}
  {{- if and $v (ne $k "type") (ne $k "base_url") }}
    {{- $skip = true }}
  {{- end }}
{{- end }}
{{- if not $skip }}
{{- $sourceNs := $ext.sourceNamespace | default "default" }}
{{- $srcSecret := lookup "v1" "Secret" $sourceNs $ext.sourceSecret }}
{{- if $srcSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ include "atlan-app.namespace" $ }}
  labels:
    {{- include "atlan-app.commonLabels" $ | nindent 4 }}
    app.kubernetes.io/component: credential
  annotations:
    atlan-app/source-secret: {{ printf "%s/%s" $sourceNs $ext.sourceSecret }}
type: Opaque
stringData:
  {{- $blob := dict "type" $ext.type }}
  {{- range $target, $source := $ext.fieldMapping }}
  {{- $raw := index $srcSecret.data $source }}
  {{- $_ := set $blob $target ($raw | b64dec) }}
  {{- end }}
  {{- if $ext.extraData }}
  {{- range $k, $v := $ext.extraData }}
  {{- $_ := set $blob $k $v }}
  {{- end }}
  {{- end }}
  {{- if hasPrefix "atlan" ($ext.type | default "") }}
  {{- $_ := set $blob "base_url" "INTERNAL" }}
  {{- end }}
  {{ $name }}: {{ $blob | toJson | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
