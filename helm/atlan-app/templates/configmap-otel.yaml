apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "atlan-app.otelConfigMapName" . }}
  namespace: {{ include "atlan-app.namespace" . }}
  labels:
    {{- include "atlan-app.commonLabels" . | nindent 4 }}
    component: otel-collector
    app.kubernetes.io/component: otel-collector
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
      resource:
        attributes:
          - key: app.name
            value: {{ include "atlan-app.appName" . }}
            action: upsert

    exporters:
      file/logs:
        path: /var/log/otel/logs.jsonl
        rotation:
          max_megabytes: 100
          max_days: 7
          max_backups: 3
      file/traces:
        path: /var/log/otel/traces.jsonl
        rotation:
          max_megabytes: 100
          max_days: 7
          max_backups: 3
      file/metrics:
        path: /var/log/otel/metrics.jsonl
        rotation:
          max_megabytes: 50
          max_days: 7
          max_backups: 3
      debug:
        verbosity: basic
      {{- if .Values.otel.exporter.enabled }}
      otlp/node:
        endpoint: "${env:K8S_NODE_IP}:4317"
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 5
          queue_size: 500
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
      {{- end }}

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      zpages:
        endpoint: 0.0.0.0:55679

    service:
      extensions: [health_check, zpages]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [file/traces]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [file/metrics]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          {{- if .Values.otel.exporter.enabled }}
          exporters: [file/logs, otlp/node]
          {{- else }}
          exporters: [file/logs]
          {{- end }}
      telemetry:
        logs:
          level: info
