# Atlan Conformance Rule Catalog
#
# Source-of-truth for every rule the conformance suite knows about.
# Each entry is a SARIF reportingDescriptor with Atlan-specific governance
# fields (tier, mechanism, category, autofixable, orthogonal_gate, since).
#
# Rule ID namespaces:
#   P001–P099  error-recovery patterns  (from signal-over-noise surface phase)
#   L001–L099  logging patterns         (from signal-over-noise tune phase)
#   T001–T099  test-quality patterns    (reserved)
#   D001–D099  dependency patterns      (reserved)
#
# Tiers:
#   warn  — visible + counted, does NOT fail the CI gate.  New rules start here.
#   block — failures fail the gate and block merges.
#
# Mechanisms:
#   static  — AST / regex analysis; milliseconds, no execution, safe pre-commit.
#   test    — requires a built env + test execution; slower, can flake.
#
# Evolution: only ever add entries or change mutable fields (short_description,
# full_description, help_uri, autofixable, orthogonal_gate).  Never change id,
# tier, or mechanism of an existing entry without a new SDK major version and a
# migration note.

# ─── Error-recovery patterns (P-series) ──────────────────────────────────────

- id: P001
  name: BareExceptPass
  tier: block
  mechanism: static
  category: silent-swallow
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "Bare 'except: pass' silently discards every exception"
  full_description: |
    A bare ``except: pass`` catches KeyboardInterrupt, SystemExit, and
    GeneratorExit and discards them with no trace.  This is the hardest class
    of bugs to debug.  Replace with a typed catch that at minimum logs the
    error with ``exc_info=True``.  Never acceptable — even cleanup paths
    should log at DEBUG.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p001"

- id: P002
  name: TypedExceptPass
  tier: block
  mechanism: static
  category: silent-swallow
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "Typed 'except SomeError: pass' discards exception silently"
  full_description: |
    A typed catch that still discards silently loses the stack trace entirely.
    Acceptable only for truly trivial best-effort operations where failure is
    100% expected AND the surrounding code handles the missing result, AND
    there is a comment explaining the reasoning.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p002"

- id: P003
  name: BroadContextlibSuppress
  tier: warn
  mechanism: static
  category: silent-swallow
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "contextlib.suppress() — check whether scope is too broad"
  full_description: |
    ``contextlib.suppress(Exception)`` or ``suppress(BaseException)`` is HIGH
    severity; narrow ``suppress(FileNotFoundError)`` on a cleanup path is
    acceptable.  The checker must inspect the suppressed exception type before
    classifying.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p003"

- id: P004
  name: BroadExceptClause
  tier: warn
  mechanism: static
  category: overly-broad-catch
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "Overly broad 'except Exception/BaseException' without exc_info"
  full_description: |
    Catches everything but the specific type is unknown.  HIGH severity when
    not logged; MEDIUM when logged but missing ``exc_info=True``.  Acceptable
    only at top-level handlers (worker loops, HTTP handlers) when properly
    logged with ``exc_info=True``.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p004"

- id: P005
  name: ExceptBlockMissingExcInfo
  tier: warn
  mechanism: static
  category: missing-traceback
  autofixable: true
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "except block logs without exc_info=True — stack trace discarded"
  full_description: |
    The message is logged but the stack trace is lost.  Add ``exc_info=True``
    to every ``logger.warning()`` / ``logger.error()`` call inside an except
    block.  ``logger.exception()`` is exempt (it implies ``exc_info=True``).
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p005"

- id: P006
  name: BareExceptWithBody
  tier: block
  mechanism: static
  category: silent-swallow
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "Bare 'except:' (no type) — catches SystemExit and KeyboardInterrupt"
  full_description: |
    Like P001 but the block may have a body.  Still catches KeyboardInterrupt
    and SystemExit.  Always specify at least ``except Exception:``.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p006"

- id: P007
  name: ErrorToReturnValue
  tier: warn
  mechanism: static
  category: error-to-return-value
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "except block returns a value without logging — error hidden"
  full_description: |
    Exception is converted to a return value (None, {}, [], False) with no
    trace.  Callers see a wrong result with no idea why.  At minimum log
    before returning; prefer raising a domain-specific exception instead.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p007"

- id: P008
  name: ImportErrorWithoutLogging
  tier: warn
  mechanism: static
  category: optional-import
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "except ImportError without logging — environment issues hidden"
  full_description: |
    Optional-dependency guard.  Acceptable when the import is genuinely
    optional AND the fallback path is correct AND there is a comment.  Log at
    DEBUG if the module is preferred but not required.  Flag if the module is
    expected to be present (will fail later with a confusing AttributeError).
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p008"

- id: P009
  name: ExceptBlockOnlyAssigns
  tier: warn
  mechanism: static
  category: error-to-return-value
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "except block only assigns a variable — error hidden with no log"
  full_description: |
    Exception sets a flag or default value with no trace.  Combines P007's
    error-hiding with no logging.  Add a ``logger.warning(..., exc_info=True)``
    before the assignment.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p009"

- id: P010
  name: AsyncioGatherExceptionsUnexamined
  tier: warn
  mechanism: static
  category: asyncio-unexamined
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "asyncio.gather(return_exceptions=True) results not checked for exceptions"
  full_description: |
    ``return_exceptions=True`` returns exception instances as values in the
    result list.  If the list is not subsequently inspected for ``Exception``
    instances, errors vanish silently.  The pattern is only a bug when results
    are not checked; ``return_exceptions=True`` itself is acceptable.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p010"

- id: P012
  name: UntypedBuiltinRaise
  tier: warn
  mechanism: static
  category: untyped-raise
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "raise ValueError/RuntimeError/... where a typed AppError applies"
  full_description: |
    SDK code raises a bare Python builtin.  The Automation Engine receives an
    opaque string — no category, code, audience, or retryable field.
    Dashboards are blind; on-call routing is impossible.  Use the typed error
    leaf from ``application_sdk.errors``.  Acceptable only inside dataclass
    ``__post_init__`` / stdlib validator methods where Python semantics require
    ``TypeError``/``ValueError`` for stdlib interoperability.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p012"

- id: P013
  name: LegacyAtlanErrorRaise
  tier: block
  mechanism: static
  category: legacy-raise
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "raise ClientError/ApiError/... (deprecated AtlanError stack)"
  full_description: |
    ``AtlanError`` and its subclasses emit a ``DeprecationWarning`` at
    construction time and reach AE as opaque strings.  They produce no typed
    wire envelope.  Scheduled for removal in v4.0.  Replace with the
    appropriate leaf from ``application_sdk.errors``.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#p013"

# ─── Logging patterns (L-series) ─────────────────────────────────────────────

- id: L001
  name: FStringInLogMessage
  tier: block
  mechanism: static
  category: log-format
  autofixable: true
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "f-string in log message — breaks log grouping and aggregation"
  full_description: |
    Using an f-string creates a unique message string per call, breaking log
    grouping and aggregation in Grafana/ClickHouse.  It also always evaluates
    eagerly.  Rewrite as %-style message body: embed context directly in the
    format string, do not move values to kwargs.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l001"

- id: L002
  name: InconsistentLoggerFactory
  tier: warn
  mechanism: static
  category: log-format
  autofixable: true
  since: "3.16.0"
  short_description: "Logger factory inconsistent with project canonical factory"
  full_description: |
    Mixing logger factories produces inconsistent log formats, loses structured
    fields, and breaks log correlation.  The checker discovers the canonical
    factory (dominant by occurrence count) in Phase 1 and flags deviations.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l002"

- id: L003
  name: ExtraKwargsWrongFramework
  tier: warn
  mechanism: static
  category: log-format
  autofixable: false
  since: "3.16.0"
  short_description: "extra={} used where framework expects direct kwargs (or vice versa)"
  full_description: |
    Whether ``extra={}`` is correct depends on the logging framework.  For
    structlog and loguru, ``extra={}`` is usually wrong — the data lands in an
    unindexed nested dict invisible to aggregation queries.  Framework-dependent
    classification; the checker must detect the active framework first.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l003"

- id: L004
  name: ExceptBlockMissingExcInfoLog
  tier: block
  mechanism: static
  category: missing-traceback
  autofixable: true
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "logger.warning/error in except block without exc_info=True"
  full_description: |
    Logging an exception without ``exc_info=True`` produces a message with no
    stack trace — the root cause is invisible.  Add ``exc_info=True`` to all
    ``logger.warning()`` / ``logger.error()`` calls within an except block.
    ``.exception()`` is exempt.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l004"

- id: L005
  name: PrintInProductionCode
  tier: warn
  mechanism: static
  category: log-format
  autofixable: true
  since: "3.16.0"
  short_description: "print() in production code — bypasses logging framework"
  full_description: |
    ``print()`` produces no level, no structured fields, no correlation IDs.
    In production services, output may go to stdout unformatted, be lost, or
    interleave with structured log lines.  Acceptable in CLI scripts, test/debug
    scripts, and ``if __name__ == "__main__":`` blocks.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l005"

- id: L006
  name: InfoInTightLoop
  tier: warn
  mechanism: static
  category: log-level
  autofixable: false
  since: "3.16.0"
  short_description: "logger.info() inside a tight loop — generates excessive log volume"
  full_description: |
    Per-item INFO logging in a large loop drowns meaningful signals and
    degrades performance.  INFO is for lifecycle milestones, not per-item
    events.  Use DEBUG per-item and INFO for the loop summary.  The checker
    should inspect whether the loop is clearly bounded (≤10 items) before
    flagging.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l006"

- id: L007
  name: LoggerCriticalUsage
  tier: warn
  mechanism: static
  category: log-level
  autofixable: true
  since: "3.16.0"
  short_description: "logger.critical() — CRITICAL is not a meaningful level here"
  full_description: |
    CRITICAL is not a meaningful level in distributed systems — every service
    failure is "critical" from some perspective.  Use ERROR and handle severity
    through alerting rules on the observability platform.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l007"

- id: L008
  name: UnguardedExpensiveDebug
  tier: warn
  mechanism: static
  category: log-performance
  autofixable: false
  since: "3.16.0"
  short_description: "Expensive computation in logger.debug() argument — evaluates eagerly"
  full_description: |
    Arguments to log calls are evaluated eagerly regardless of whether the
    level is enabled.  Guard expensive serialization / computation with
    ``if logger.isEnabledFor(logging.DEBUG):``.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l008"

- id: L009
  name: WarnThenRaiseDuplication
  tier: warn
  mechanism: static
  category: log-noise
  autofixable: false
  since: "3.16.0"
  short_description: "logger.warning/error immediately before raise — duplicate log records"
  full_description: |
    Logging an error immediately before re-raising creates duplicate records in
    the log stream, inflating error counts in dashboards.  Acceptable only
    when adding context not available to the caller.  Otherwise: just re-raise.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l009"

- id: L010
  name: CredentialInLogOutput
  tier: block
  mechanism: static
  category: security
  autofixable: false
  orthogonal_gate: tests
  since: "3.16.0"
  short_description: "Credential/secret value in log output — security vulnerability"
  full_description: |
    Credentials in log output are a security vulnerability — logs are often
    stored in plaintext in log aggregation systems, accessible to more people
    than the credential store.  Requires human security review before marking
    acceptable.  Logging a credential *name* is acceptable; logging a
    credential *value* is CRITICAL.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l010"

- id: L011
  name: StringConcatenationInLog
  tier: block
  mechanism: static
  category: log-format
  autofixable: true
  since: "3.16.0"
  short_description: "String concatenation in log message — breaks log grouping"
  full_description: |
    Like f-strings (L001), string concatenation embeds values into the message
    string in a way that breaks log grouping.  Rewrite as %-style message body.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l011"

- id: L012
  name: PctStyleInNonStdlibLogger
  tier: warn
  mechanism: static
  category: log-format
  autofixable: false
  since: "3.16.0"
  short_description: "%-style formatting in non-stdlib logger — silently produces wrong output"
  full_description: |
    %-style is a stdlib feature.  In structlog, ``%s`` appears literally in
    output.  In loguru (without a bridge adapter), the positional arg is
    silently ignored.  Framework-dependent: ACCEPTABLE for stdlib, MEDIUM for
    structlog, LOW-to-HIGH for loguru depending on whether a bridge adapter is
    present.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l012"

- id: L013
  name: StdlibExtraReservedKeyCollision
  tier: block
  mechanism: static
  category: log-crash
  autofixable: false
  since: "3.16.0"
  short_description: "extra={} key collides with stdlib LogRecord attribute — crashes caller"
  full_description: |
    stdlib's ``Logger.makeRecord()`` raises ``KeyError`` if any key in
    ``extra={}`` matches a ``LogRecord`` attribute.  This crash propagates
    directly to the caller — NOT caught by ``handleError()``.  The 22 forbidden
    keys include: ``name``, ``message``, ``module``, ``args``, ``filename``,
    ``process``, ``thread``.  Applies to stdlib only.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l013"

- id: L014
  name: StdlibArbitraryKwargs
  tier: block
  mechanism: static
  category: log-crash
  autofixable: true
  since: "3.16.0"
  short_description: "Arbitrary kwargs in stdlib logger — raises TypeError immediately"
  full_description: |
    stdlib ``logger.info()`` only accepts ``exc_info``, ``extra``,
    ``stack_info``, and ``stacklevel``.  Any other kwarg raises ``TypeError``
    and crashes the caller.  Very common when migrating from structlog/loguru.
    Applies to stdlib only.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l014"

- id: L015
  name: StructlogEventKwargOverwrite
  tier: warn
  mechanism: static
  category: log-format
  autofixable: false
  since: "3.16.0"
  short_description: "event= kwarg in structlog silently overwrites the log message"
  full_description: |
    In structlog, the first positional argument is stored as the ``event`` key
    — it IS the log message.  Passing ``event=`` as a keyword argument silently
    overwrites the message with the domain value.  Rename the domain field to
    avoid collision.  Applies to structlog only.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l015"

- id: L016
  name: DictConfigDisableExistingLoggers
  tier: warn
  mechanism: static
  category: log-config
  autofixable: true
  since: "3.16.0"
  short_description: "dictConfig without disable_existing_loggers=False silently kills loggers"
  full_description: |
    ``logging.config.dictConfig()``'s ``disable_existing_loggers`` defaults to
    ``True``, which silently disables all loggers created before the call.  This
    is the most common source of "why is my logging not working?".  Always set
    ``"disable_existing_loggers": False``.  Applies to stdlib only.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l016"

- id: L017
  name: BasicConfigNoopAfterFirstCall
  tier: warn
  mechanism: static
  category: log-config
  autofixable: false
  since: "3.16.0"
  short_description: "Multiple basicConfig() calls — second+ are silent no-ops"
  full_description: |
    ``logging.basicConfig()`` is silently ignored if the root logger already
    has handlers.  Multiple calls across the codebase mean whichever runs first
    wins; the rest are dropped silently.  Flag any codebase with more than one
    ``basicConfig()`` call outside ``if __name__ == "__main__":`` blocks.
    Applies to stdlib only.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l017"

- id: L018
  name: LoggerExceptionOutsideExcept
  tier: warn
  mechanism: static
  category: log-level
  autofixable: false
  since: "3.16.0"
  short_description: "logger.exception() called outside an except block"
  full_description: |
    ``logger.exception()`` captures the current exception info via
    ``sys.exc_info()``.  Called outside an except block, it captures nothing
    (or a stale exception from a previous except clause), producing a misleading
    traceback or no traceback.  Use ``logger.error(..., exc_info=True)`` only
    inside except blocks.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l018"

- id: L024
  name: KwargsInApplicationLogCalls
  tier: warn
  mechanism: static
  category: log-format
  autofixable: false
  since: "3.16.0"
  short_description: "kwargs in application log calls — use %-style message body instead"
  full_description: |
    Arbitrary kwargs in log calls are an anti-pattern in this project.
    Framework context (Temporal fields, correlation IDs) is auto-injected by
    the logging adapter; all other kwargs land in an unindexed JSON blob
    invisible in the log stream.  Embed context directly in the message body
    using %-style formatting.
  help_uri: "https://github.com/atlanhq/application-sdk/blob/main/conformance/docs/schema-contract.md#l024"
