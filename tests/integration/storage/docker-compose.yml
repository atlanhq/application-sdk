services:
  # MinIO — S3-compatible object storage for s3_integration tests.
  # Credentials: access key "minio", secret key "minio123"
  # S3 API: http://localhost:9000   Console: http://localhost:9001
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # mc — MinIO client that creates the test bucket once MinIO is healthy.
  # Runs once and exits; restart: on-failure handles transient startup races.
  minio-setup:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio minio123 &&
        mc mb --ignore-existing local/test-bucket &&
        echo 'MinIO bucket ready'
      "
    restart: on-failure

  # Azurite — Azure Blob/Queue/Table emulator for azure_integration tests.
  # Default account: devstoreaccount1
  # Blob endpoint: http://localhost:10000/devstoreaccount1
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.32.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --loose
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 5s
      timeout: 5s
      retries: 10
